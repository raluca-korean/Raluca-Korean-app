<style>
:root{
  --text:#1a0533;
  --muted:rgba(80,40,100,.60);
  --parchment:#faf5e8;
  --parchment2:#f3ecda;
  --spine:#3b1f5e;
  --spine2:#5a3090;
  --ink:#1a0533;
  --word-bg:rgba(219,39,119,.07);
  --word-border:rgba(219,39,119,.15);
  --divider:rgba(124,58,237,.18);
}
body.dark-mode{
  --text:#f0e8ff;
  --muted:rgba(200,170,240,.65);
  --parchment:#1a0830;
  --parchment2:#130626;
  --spine:#0e0420;
  --spine2:#280a50;
  --ink:#f0e8ff;
  --word-bg:rgba(244,114,182,.07);
  --word-border:rgba(244,114,182,.18);
  --divider:rgba(168,85,247,.22);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(219,39,119,.22) 0%, transparent 45%),
    radial-gradient(ellipse at 100% 0%,  rgba(14,165,233,.18)  0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.16)  0%, transparent 45%),
    linear-gradient(180deg,#fce7f3 0%,#fdf4ff 40%,#eff6ff 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px 48px;
  gap:20px;
  color:var(--text);
  transition:background .3s;
}

/* ── TOP BAR ─────────────────────────────── */
.topbar{
  width:100%;
  max-width:540px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.topbar-left{
  display:flex;
  align-items:center;
  gap:10px;
}
.page-title{
  font-size:18px;
  font-weight:900;
  color:var(--text);
}
.topbar-right{
  display:flex;
  gap:8px;
  align-items:center;
}

/* ── PROGRESS ────────────────────────────── */
.progress-wrap{
  width:100%;
  max-width:540px;
}
.prog-bar{
  height:7px;
  border-radius:999px;
  background:rgba(219,39,119,.12);
  overflow:hidden;
}
.prog-fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#f472b6,#a855f7);
  transition:width .4s ease;
}
.prog-text{
  font-size:11px;
  color:var(--muted);
  text-align:right;
  margin-top:3px;
  font-weight:700;
}

/* ── BOOK ────────────────────────────────── */
.book{
  display:flex;
  width:100%;
  max-width:480px;
  min-height:520px;
  border-radius:6px 14px 14px 6px;
  box-shadow:
    -8px 8px 40px rgba(0,0,0,.22),
     4px 4px 20px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,255,255,.06);
  user-select:none;
}

/* spine */
.spine{
  width:30px;
  flex-shrink:0;
  background:linear-gradient(to right, var(--spine) 0%, var(--spine2) 50%, var(--spine) 100%);
  border-radius:6px 0 0 6px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.spine::after{
  content:'';
  position:absolute;
  top:0; bottom:0; right:0;
  width:4px;
  background:linear-gradient(to right, rgba(0,0,0,.30), transparent);
}
.spine-text{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  transform:rotate(180deg);
  font-size:10px;
  font-weight:900;
  letter-spacing:2px;
  color:rgba(255,255,255,.40);
  text-transform:uppercase;
}

/* page */
.page-wrap{
  flex:1;
  border-radius:0 14px 14px 0;
  overflow:hidden;
  position:relative;
  background:var(--parchment);
}
/* inner shadow from spine */
.page-wrap::before{
  content:'';
  position:absolute;
  top:0; left:0; bottom:0;
  width:22px;
  background:linear-gradient(to right, rgba(0,0,0,.10), transparent);
  z-index:2;
  pointer-events:none;
}

.page{
  width:100%;
  height:100%;
  min-height:520px;
  padding:36px 32px 28px;
  background:
    linear-gradient(160deg, var(--parchment) 0%, var(--parchment2) 100%);
  display:flex;
  flex-direction:column;
  gap:0;
  position:relative;
}

/* flip animations */
.page.flip-out{
  animation:flipOut .25s ease-in forwards;
}
.page.flip-in{
  animation:flipIn .25s ease-out forwards;
}
@keyframes flipOut{
  from{opacity:1;transform:translateX(0) scaleX(1)}
  to  {opacity:0;transform:translateX(-18px) scaleX(.92)}
}
@keyframes flipIn{
  from{opacity:0;transform:translateX(18px) scaleX(.92)}
  to  {opacity:1;transform:translateX(0) scaleX(1)}
}

/* ── HANJA AREA ──────────────────────────── */
.hanja-area{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0 20px;
}
.hanja-char{
  font-size:110px;
  line-height:1;
  background:linear-gradient(135deg,#db2777 10%,#7c3aed 90%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 4px 12px rgba(124,58,237,.18));
}
body.dark-mode .hanja-char{
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 18px rgba(244,114,182,.28));
}
.hanja-reading{
  margin-top:6px;
  font-size:18px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:.5px;
}
.hanja-meaning{
  margin-top:4px;
  font-size:15px;
  font-weight:900;
  color:var(--ink);
}

/* ── DIVIDER ─────────────────────────────── */
.divider{
  border:none;
  border-top:1.5px solid var(--divider);
  margin:14px 0 16px;
}

/* ── WORDS ───────────────────────────────── */
.words{
  display:flex;
  flex-direction:column;
  gap:9px;
  flex:1;
}
.word-row{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--word-bg);
  border:1px solid var(--word-border);
  border-radius:12px;
  padding:9px 14px;
}
.word-ko{
  font-size:18px;
  font-weight:900;
  background:linear-gradient(135deg,#db2777,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  min-width:60px;
}
body.dark-mode .word-ko{
  -webkit-text-fill-color:transparent;
}
.word-sep{
  color:var(--divider);
  font-size:16px;
  font-weight:300;
}
.word-tr{
  font-size:13px;
  font-weight:700;
  color:var(--ink);
  opacity:.85;
}

/* ── PAGE FOOTER ─────────────────────────── */
.page-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:18px;
  padding-top:12px;
  border-top:1px solid var(--divider);
}
.page-num{
  font-size:11px;
  color:var(--muted);
  font-weight:800;
  letter-spacing:.5px;
}
.learned-badge{
  font-size:11px;
  font-weight:900;
  padding:4px 10px;
  border-radius:999px;
  background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(5,150,105,.12));
  border:1px solid rgba(16,185,129,.30);
  color:#059669;
  display:none;
}
.learned-badge.visible{display:inline-block}

/* ── CONTROLS ────────────────────────────── */
.controls{
  display:flex;
  align-items:center;
  gap:12px;
  justify-content:center;
}
.btn-nav{
  width:46px; height:46px;
  border-radius:999px;
  border:1.5px solid rgba(219,39,119,.20);
  background:#fff;
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .1s,box-shadow .1s;
  box-shadow:0 4px 14px rgba(219,39,119,.10);
}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(219,39,119,.18)}
.btn-nav:disabled{opacity:.28;cursor:default;transform:none;box-shadow:none}
.btn-learned{
  padding:12px 24px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color:#fff;
  font-weight:900;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(168,85,247,.28);
  transition:transform .1s,filter .1s;
}
.btn-learned:hover{transform:translateY(-2px)}
.btn-learned.done{
  background:linear-gradient(135deg,#10b981,#059669);
  box-shadow:0 8px 20px rgba(16,185,129,.28);
}

/* dark mode controls */
body.dark-mode .btn-nav{
  background:rgba(28,4,50,.92);
  color:#f0e8ff;
  border-color:rgba(244,114,182,.25);
}
body.dark-mode .prog-bar{background:rgba(244,114,182,.12)}
</style>

      {ko:"목재",ro:"lemn / cherestea",en:"wood / lumber"},
      {ko:"목표",ro:"obiectiv / țintă",en:"goal / target"},
      {ko:"초목",ro:"vegetație",en:"vegetation"}
    ]
  },
  {
    hanja:"白", reading:{ro:"백 (baek)",en:"백 (baek)"}, meaning:{ro:"alb",en:"white"},
    words:[
      {ko:"백색",ro:"culoarea albă",en:"white color"},
      {ko:"백지",ro:"pagină albă / blank",en:"blank paper"},
      {ko:"고백",ro:"confesiune / mărturisire",en:"confession"},
      {ko:"백합",ro:"crin",en:"lily"}
    ]
  },
  {
    hanja:"老", reading:{ro:"노/로 (no/ro)",en:"노/로 (no/ro)"}, meaning:{ro:"bătrân / vechi",en:"old / elder"},
    words:[
      {ko:"노인",ro:"persoană în vârstă",en:"elderly person"},
      {ko:"노력",ro:"efort",en:"effort"},
      {ko:"노래",ro:"cântec",en:"song"},
      {ko:"양로원",ro:"azil de bătrâni",en:"nursing home"}
    ]
  },
  {
    hanja:"新", reading:{ro:"신 (sin)",en:"신 (sin)"}, meaning:{ro:"nou",en:"new"},
    words:[
      {ko:"신문",ro:"ziar",en:"newspaper"},
      {ko:"신제품",ro:"produs nou",en:"new product"},
      {ko:"신기",ro:"uimitor / nou",en:"amazing / novel"},
      {ko:"혁신",ro:"inovație",en:"innovation"}
    ]
  }
];

let idx = 0;
let learned = JSON.parse(localStorage.getItem("HJ_LEARNED") || "[]");
let lang = localStorage.getItem("RK_LANG") || "ro";

const UI = {
  ro:{ learned:"Învățat", learnedDone:"✓ Învățat", learnedLabel:"învățate" },
  en:{ learned:"Learned", learnedDone:"✓ Learned", learnedLabel:"learned" }
};

function renderPage(animate){
  const page = document.getElementById("page");
  const item = DATA[idx];
  const isLearned = learned.includes(idx);

  const html = `
    <div class="hanja-area">
      <div class="hanja-char">${item.hanja}</div>
      <div class="hanja-reading">${item.reading[lang]}</div>
      <div class="hanja-meaning">${item.meaning[lang]}</div>
    </div>
    <hr class="divider">
    <div class="words">
      ${item.words.map(w => `
        <div class="word-row">
          <span class="word-ko">${w.ko}</span>
          <span class="word-sep">—</span>
          <span class="word-tr">${w[lang]}</span>
        </div>`).join("")}
    </div>
    <div class="page-footer">
      <span class="page-num">${idx + 1} / ${DATA.length}</span>
      <span class="learned-badge ${isLearned ? "visible" : ""}">✓ ${UI[lang].learnedDone}</span>
    </div>`;

  if(animate){
    page.classList.add("flip-out");
    page.addEventListener("animationend", function handler(){
      page.removeEventListener("animationend", handler);
      page.innerHTML = html;
      page.classList.remove("flip-out");
      page.classList.add("flip-in");
      page.addEventListener("animationend", function h2(){
        page.removeEventListener("animationend", h2);
        page.classList.remove("flip-in");
      });
    });
  } else {
    page.innerHTML = html;
  }

  document.getElementById("btnPrev").disabled = idx === 0;
  document.getElementById("btnNext").disabled = idx === DATA.length - 1;
  const btn = document.getElementById("btnLearned");
  btn.textContent = isLearned ? UI[lang].learnedDone : "✔ " + UI[lang].learned;
  btn.classList.toggle("done", isLearned);
  updateProgress();
}

function navigate(dir){
  const next = idx + dir;
  if(next < 0 || next >= DATA.length) return;
  idx = next;
  renderPage(true);
}

function markLearned(){
  if(!learned.includes(idx)) learned.push(idx);
  localStorage.setItem("HJ_LEARNED", JSON.stringify(learned));
  renderPage(false);
}

function updateProgress(){
  const pct = Math.round(learned.length / DATA.length * 100);
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("learnedCount").textContent = learned.length;
  document.getElementById("totalCount").textContent = DATA.length;
  document.getElementById("learnedLabel").textContent = UI[lang].learnedLabel;
}

function setLang(l){
  lang = l;
  localStorage.setItem("RK_LANG", l);
  updateLangBtns();
  renderPage(false);
}

function updateLangBtns(){
  const on  = "linear-gradient(135deg,#f472b6,#a855f7,#6366f1)";
  const off = "linear-gradient(160deg,#fff,#fdf4ff)";
  const ro = document.getElementById("langRo");
  const en = document.getElementById("langEn");
  ro.style.background = lang==="ro"?on:off;
  ro.style.color = lang==="ro"?"#fff":"var(--text)";
  en.style.background = lang==="en"?on:off;
  en.style.color = lang==="en"?"#fff":"var(--text)";
}

document.getElementById("btnPrev").addEventListener("click", ()=> navigate(-1));
document.getElementById("btnNext").addEventListener("click", ()=> navigate(1));
document.getElementById("btnLearned").addEventListener("click", markLearned);
document.getElementById("langRo").addEventListener("click", ()=> setLang("ro"));
document.getElementById("langEn").addEventListener("click", ()=> setLang("en"));

updateLangBtns();
renderPage(false);
</script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
