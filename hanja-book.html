<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Raluca Korean · Hanja</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#030308" id="themeColorMeta">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./hanja-book.css">
</head>
<body>

<!-- LAYER 0: ambient field canvas -->
<canvas id="fieldCanvas"></canvas>

<!-- LAYER 1: resonance SVG overlay -->
<svg id="resSVG" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- LAYER 2: Cognitive Morphogenesis Interface -->
<div id="cmi">

  <!-- TOP-LEFT: knowledge state -->
  <div id="kState">
    <div id="kBar"><div id="kFill"></div></div>
    <div id="kCount">
      <span id="kLearned">0</span><span class="kdot">·</span><span id="kTotal">100</span>
    </div>
    <div id="streakRow">
      <span id="streakFire">🔥</span><span id="streakVal">0</span><span id="streakSep"> · </span><span id="goalVal">0</span><span id="goalMark"></span>
    </div>
  </div>

  <!-- TOP-RIGHT: sys tray -->
  <div id="sysTray">
    <button class="trayBtn" id="searchBtn" title="Caută (/)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <a href="./index.html" class="trayBtn" id="homeBtn" title="Home">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </a>
    <div id="langWrap">
      <button class="trayBtn" id="langBtn"></button>
      <div id="langPicker">
        <button id="pickRo">ro</button>
        <button id="pickEn">en</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM-LEFT: theme toggle -->
  <button class="trayBtn" id="themeBtn" title="Toggle theme">◐</button>

  <!-- CENTER STAGE: nucleus + orbital field -->
  <div id="stage">

    <!-- THE MORPHIC NUCLEUS -->
    <div id="nucleus">
      <div class="ring" id="ring3"></div>
      <div class="ring" id="ring2"></div>
      <div class="ring" id="ring1"></div>
      <div id="nucCore">
        <div id="hanjaGlyph"></div>
        <button id="strokeBtn" title="Stroke order">✍</button>
      </div>
      <div id="nucLabel">
        <div id="glyphReading"></div>
        <div id="glyphMeaning"></div>
      </div>
    </div>

    <!-- ORBITAL FIELD: 4 word nodes -->
    <div id="orbField">
      <div class="orbitShell" id="osh0">
        <div class="orbNode" id="orb0" data-wi="0">
          <span class="orbKo"></span>
          <span class="orbTr"></span>
        </div>
      </div>
      <div class="orbitShell" id="osh1">
        <div class="orbNode" id="orb1" data-wi="1">
          <span class="orbKo"></span>
          <span class="orbTr"></span>
        </div>
      </div>
      <div class="orbitShell" id="osh2">
        <div class="orbNode" id="orb2" data-wi="2">
          <span class="orbKo"></span>
          <span class="orbTr"></span>
        </div>
      </div>
      <div class="orbitShell" id="osh3">
        <div class="orbNode" id="orb3" data-wi="3">
          <span class="orbKo"></span>
          <span class="orbTr"></span>
        </div>
      </div>
    </div>

  </div><!-- /stage -->

  <!-- BOTTOM SYSTEM BAR -->
  <div id="sysBar">
    <div id="topActions">
      <button id="etymBtn">
        <span id="etymIcon">⌬</span> <span id="etymLabel">Etimologie</span>
      </button>
      <button id="quizBtn">⚡ Quiz</button>
      <button id="quizExitBtn">← Înapoi</button>
    </div>
    <button id="learnBtn">
      <span id="learnText">Înregistrează</span>
    </button>
    <div id="navRow">
      <button id="navPrev" class="navBtn" disabled><span>‹</span></button>
      <div id="posLabel">
        <span id="posIdx">1</span><span class="posDot">·</span><span id="posTotal">100</span>
      </div>
      <button id="navNext" class="navBtn"><span>›</span></button>
    </div>
  </div>

</div><!-- /cmi -->

<!-- SEARCH OVERLAY -->
<div id="searchOverlay" class="hidden">
  <div id="searchBox">
    <input id="searchInput" type="text" placeholder="Caută hanja, citire, sens…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="searchClear">✕</button>
  </div>
  <div id="searchResults"></div>
</div>

<!-- WORD BLOOM PANEL -->
<div id="wordBloom" class="hidden">
  <button id="bloomClose">✕</button>
  <div id="bloomWord"></div>
  <div id="bloomMeaning"></div>
  <div class="bloomSep"></div>
  <div id="bloomKo"></div>
  <div id="bloomTr"></div>
  <button id="bloomSpeak">▶</button>
</div>

<!-- ETYMOLOGY BLOOM PANEL -->
<div id="etymPanel" class="hidden">
  <button id="etymClose">✕</button>
  <div id="etymTitle"></div>
  <div id="etymBody"></div>
</div>

<!-- STROKE ORDER PANEL -->
<div id="strokePanel" class="hidden">
  <button id="strokeClose">✕</button>
  <div id="strokeTitle"></div>
  <div id="strokeWriter"></div>
  <div id="strokeActions">
    <button id="strokeAnimate">▶ Animație</button>
    <button id="strokeQuiz">✎ Testează</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3/dist/hanzi-writer.min.js"></script>
<script src="./js/core/storage.js"></script>
<script src="./js/hanja-book.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
