<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Hanja Book</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./hanja-book.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="page-title">📖 Hanja Book</span>
  </div>
  <div class="topbar-right" id="pageControls"></div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-text"><span id="learnedCount">0</span> / <span id="totalCount">0</span> <span id="learnedLabel">învățate</span></div>
</div>

<!-- BOOK -->
<div class="book">
  <div class="spine">
    <span class="spine-text">Hanja</span>
  </div>
  <div class="page-wrap">
    <div class="page" id="page">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn-nav" id="btnPrev" title="Pagina anterioară">◀</button>
  <button class="btn-learned" id="btnLearned">✔ Învățat</button>
  <button class="btn-nav" id="btnNext" title="Pagina următoare">▶</button>
</div>

<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/hanja-book.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
