<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Stories</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7b5cfa">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./stories.css">
</head>
<body class="rfi-dark">

<canvas id="rfCanvas"></canvas>

<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="rf-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<div id="rfi">

  <!-- Ambient header — not a nav bar, a floating utility layer -->
  <div id="rfAmbient">
    <div id="rfBreadcrumb"></div>
    <div id="rfUtility">
      <div id="rfLangWrap">
        <button id="rfLangBtn" class="rf-lang-btn">ro</button>
        <div id="rfLangPicker">
          <button id="rfPickRo">ro</button>
          <button id="rfPickEn">en</button>
        </div>
      </div>
      <a href="index.html" class="rf-util-btn" aria-label="Home"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    </div>
  </div>

  <!-- STATE 1: FIELD — story nodes float in the knowledge field -->
  <div id="stateField" class="rf-state active">
    <div id="fieldOrigin">
      <div id="fieldEyebrow">RESONANCE FIELD INTERFACE</div>
      <h1 id="fieldTitle">Povești</h1>
      <p id="fieldSub">Intră în rezonanță cu un univers narativ</p>
    </div>
    <div id="rfNodes"></div>
  </div>

  <!-- STATE 2: CONSTELLATION — selected story with episode path -->
  <div id="stateConstellation" class="rf-state">
    <div id="constellationCore">
      <div id="coreIcon"></div>
      <div id="coreTitle"></div>
      <div id="coreChars"></div>
    </div>
    <div id="episodePath"></div>
    <button id="btnFieldBack" class="rf-retreat-btn">
      <span>←</span><span id="btnFieldBackLabel">Câmp</span>
    </button>
  </div>

  <!-- STATE 3: IMMERSION — dialogue emerges from the field -->
  <div id="stateImmersion" class="rf-state">
    <div id="immersionAxis">
      <div id="immProgressTrack"><div id="immProgressFlow"></div></div>
      <div id="immEpLabel"></div>
    </div>
    <div id="immersionChamber">
      <div id="immersionAura"></div>
      <div id="immersionStream"></div>
    </div>
    <div id="immersionControl">
      <button id="btnNextLine" class="rf-nucleus-btn"><span id="btnNextLineLabel"></span></button>
    </div>
    <button id="btnConstellationBack" class="rf-retreat-btn">
      <span>←</span><span id="btnConstellationBackLabel"></span>
    </button>
  </div>

  <!-- STATE 4: PRACTICE — sentence resonance ordering -->
  <div id="statePractice" class="rf-state">
    <div id="practiceOrbit">
      <div class="rf-field-label" id="practiceBankLabel"></div>
      <div id="practiceBank" class="rf-fragment-field"></div>
    </div>
    <div id="practiceTarget">
      <div class="rf-field-label" id="practiceSeqLabel"></div>
      <div id="practiceSequence" class="rf-sequence-field">
        <span id="practicePlaceholder" class="rf-seq-placeholder"></span>
      </div>
    </div>
    <div id="practiceFeedback"></div>
    <div id="practiceControl">
      <button id="btnCheck" class="rf-nucleus-btn"><span id="btnCheckLabel"></span></button>
      <button id="btnReset" class="rf-secondary-btn"><span id="btnResetLabel"></span></button>
    </div>
  </div>

  <!-- STATE 5: COMPLETE — resonance achieved -->
  <div id="stateComplete" class="rf-state">
    <div id="resonanceEvent">
      <div class="rf-resonance-ring" style="--dur:1.8s;--delay:0s"></div>
      <div class="rf-resonance-ring" style="--dur:1.8s;--delay:0.6s"></div>
      <div class="rf-resonance-ring" style="--dur:1.8s;--delay:1.2s"></div>
      <div id="resonanceCore">
        <div id="completePulse"></div>
        <div id="completeTitle"></div>
        <div id="completeXP"></div>
      </div>
    </div>
    <button id="btnNextEpisode" class="rf-nucleus-btn"><span id="btnNextEpLabel"></span></button>
  </div>

</div>

<button id="rfTheme" title="Toggle field mode">◐</button>

<script src="./js/core/storage.js"></script>
<script src="./js/core/gamification.js"></script>
<script src="./js/stories.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
