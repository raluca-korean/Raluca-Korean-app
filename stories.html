<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Stories</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2877">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./stories.css">
</head>
<body class="theme-anime">
<div class="app">

  <!-- HEADER -->
  <div class="card headerCard">
    <div class="headerRow">
      <div class="stories-nav">
        <button id="btnToList"     class="back-btn" style="display:none">‹ Stories</button>
        <button id="btnToEpisodes" class="back-btn" style="display:none"></button>
        <h1 id="navTitle">📖 Stories</h1>
      </div>
      <div id="pageControls"></div>
    </div>
    <p class="sub" id="navSub">Dialoguri cu context narativ</p>
  </div>

  <!-- VIEW: Story list -->
  <div id="viewList" class="s-view active">
    <div class="stories-grid" id="storiesGrid"></div>
  </div>

  <!-- VIEW: Episode list -->
  <div id="viewEpisodes" class="s-view">
    <div class="char-bar card" id="charBar"></div>
    <div id="episodeList"></div>
  </div>

  <!-- VIEW: Episode player -->
  <div id="viewPlayer" class="s-view">

    <!-- Phase: Read -->
    <div class="card" id="phaseRead">
      <div class="phase-label" id="readLabel"></div>
      <div class="dialogue" id="dialogue"></div>
      <div class="dialogue-foot">
        <button class="primary" id="btnNextLine"></button>
      </div>
    </div>

    <!-- Phase: Practice -->
    <div class="card" id="phasePractice" style="display:none">
      <div class="phase-label" id="practiceLabel"></div>
      <div class="practice-bank" id="practiceBank"></div>
      <div class="practice-sep"></div>
      <div class="practice-line" id="practiceLine">
        <span class="practice-placeholder" id="practicePlaceholder"></span>
      </div>
      <div class="practice-feedback" id="practiceFeedback"></div>
      <div class="practice-controls">
        <button class="primary" id="btnCheck"></button>
        <button id="btnReset"></button>
      </div>
    </div>

    <!-- Phase: Complete -->
    <div class="card" id="phaseComplete" style="display:none">
      <div class="complete-body" id="completeBody"></div>
      <button class="primary" id="btnNextEpisode" style="width:100%;margin-top:16px"></button>
    </div>

  </div>

</div>

<script src="./js/core/storage.js"></script>
<script src="./js/core/gamification.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/stories.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
