<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Raluca Korean</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000009">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./writing.css">
</head>

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  RESONANCE FIELD INTERFACE (RFI)                        ║
  ║  Un nou paradigm de interfață — inventat pentru         ║
  ║  Raluca Korean, 2025                                    ║
  ║                                                          ║
  ║  Filozofie:                                              ║
  ║  Nu există ecrane, carduri sau containere.               ║
  ║  Cunoașterea există ca câmpuri de energie.               ║
  ║  Utilizatorul nu navighează spre informație —            ║
  ║  informația rezonează spre atenția utilizatorului.       ║
  ╚══════════════════════════════════════════════════════════╝
-->

<body class="theme-anime rfi-body">

<!-- ▓ CÂMP VIZUAL ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<canvas id="rfiField" class="rfi-field"></canvas>

<!-- ▓ NODURI INVIZIBILE PENTRU JS ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<h1   id="pageTitle" class="rfi-hidden">Practică Scrisul</h1>
<span id="pageSub"   class="rfi-hidden">Litere · Silabe · Cuvinte · Propoziții</span>
<div  id="progFill"  class="rfi-hidden"></div>

<!-- ▓ ZONA PERIFERICĂ SUPERIOARĂ ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<!-- Controale și navigare mod — nu tab-uri, ci sigilii-glifuri -->
<div class="rfi-periphery">
  <div id="pageControls" class="rfi-controls"></div>

  <div class="rfi-sigils">
    <button class="mode-tab active" data-mode="letters"   id="tab-letters"   title="Litere">ㄱ</button>
    <button class="mode-tab"        data-mode="syllables" id="tab-syllables"  title="Silabe">가</button>
    <button class="mode-tab"        data-mode="words"     id="tab-words"      title="Cuvinte">단</button>
    <button class="mode-tab"        data-mode="sentences" id="tab-sentences"  title="Propoziții">문</button>
  </div>

  <div class="rfi-echo" id="progLbl">01 / 26</div>
</div>

<!-- ▓ CÂMPUL CENTRAL DE CUNOAȘTERE ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<!-- Caracterul nu este afișat — el ESTE spațiul. -->
<div class="rfi-knowledge">

  <!-- Inele de rezonanță (decorative, rotesc lent) -->
  <div class="rfi-ring rfi-ring-1"><span class="rfi-node"></span></div>
  <div class="rfi-ring rfi-ring-2"><span class="rfi-node"></span></div>
  <div class="rfi-ring rfi-ring-3"><span class="rfi-node"></span></div>

  <!-- Câmpul de energie al caracterului -->
  <div class="rfi-energy"></div>

  <!-- Silabele (mod cuvinte / propoziții) — plutesc liber -->
  <div class="syl-boxes" id="sylBoxes"></div>

  <!-- Prezența caracterului — nu text pe fundal, ci lumina fondului -->
  <div class="rfi-presence">
    <div class="target-char" id="targetChar" onclick="speakTarget()">ㄱ</div>
  </div>

  <!-- Fragment de cunoaștere: pronunție + sunet + sens -->
  <div class="rfi-fragment">
    <span class="target-rom"  id="targetRom">g/k</span>
    <span class="rfi-sep">·</span>
    <span class="target-meta" id="targetMeta"></span>
    <button class="audio-btn rfi-sound" onclick="speakTarget()" title="Pronunție">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
  </div>

</div><!-- /rfi-knowledge -->

<!-- ▓ CÂMPUL DE MANIFESTARE ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<!-- Zona în care cunoașterea devine acțiune fizică.           -->
<!-- Nu canvas într-un container — SPAȚIUL DEVINE CANVAS.      -->
<div class="rfi-manifestation">

  <!-- Spectrul fantomă — opțional -->
  <div class="rfi-spectrum-ctrl">
    <label class="trace-toggle rfi-trace-lbl">
      <input type="checkbox" id="traceChk" checked>
      <span class="rfi-trace-dot"></span>
      <span id="traceLbl" class="rfi-trace-txt">Spectru</span>
    </label>
  </div>

  <!-- Suprafața de scriere — fără margini vizibile -->
  <div class="rfi-surface">
    <div class="board-wrap">
      <div class="board-trace" id="boardTrace">ㄱ</div>
      <div class="board-dividers" id="boardDividers"></div>
      <canvas id="wCanvas" width="320" height="320"></canvas>
    </div>
  </div>

  <div id="wordHint" class="word-hint rfi-word-hint" style="display:none;"></div>

  <!-- Triggerele de rezonanță — nu butoane, ci puncte de activare -->
  <div class="board-actions rfi-triggers">

    <button class="rfi-trigger rfi-t-reset" onclick="clearBoard()" title="Resetează">
      <span class="rfi-t-ring"></span>
      <svg class="rfi-t-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
    </button>

    <button id="btnCheck" class="rfi-trigger rfi-t-resonate ok" onclick="doCheck()">
      <span class="rfi-t-ring"></span>
      <span class="rfi-t-ring rfi-t-ring-2"></span>
      <span class="rfi-t-core"></span>
      <span id="checkLbl" class="rfi-t-label">Rezonează</span>
    </button>

    <button id="btnNext" class="rfi-trigger rfi-t-advance" onclick="nextItem()" disabled title="Următor">
      <span class="rfi-t-ring"></span>
      <svg class="rfi-t-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

  </div>

</div><!-- /rfi-manifestation -->

<!-- ▓ ECO COGNITIV ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<!-- Feedback-ul nu apare pe ecran — rezonează din spațiu.    -->
<div class="rfi-cognitive-echo" id="fbCard" style="display:none;">
  <div class="rfi-echo-score">
    <span class="fb-score" id="fbScore">0%</span>
    <span class="fb-msg"   id="fbMsg"></span>
  </div>
  <div class="fb-bar rfi-resonance-bar">
    <div class="fb-fill rfi-resonance-fill" id="fbFill"></div>
  </div>
  <div class="fb-compare rfi-field-compare">
    <div class="fb-col rfi-field-col">
      <div class="fb-col-lbl" id="fbYourLbl">REZONANȚA TA</div>
      <canvas id="fbUserCv" width="90" height="90" class="fb-cv rfi-cv"></canvas>
    </div>
    <div class="fb-col rfi-field-col">
      <div class="fb-col-lbl" id="fbRefLbl">CÂMP REFERINȚĂ</div>
      <canvas id="fbRefCv"  width="90" height="90" class="fb-cv rfi-cv"></canvas>
    </div>
  </div>
</div>

<!-- ▓ SCRIPTURI ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
<script src="./js/writing.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   RFI ENGINE — Sistemul de particule și câmpuri vii
   ═══════════════════════════════════════════════════════════ */
(function RFI() {

  /* ── CÂMPUL VIZUAL (particule + linii de forță) ──────────── */
  const cv = document.getElementById('rfiField');
  if (!cv) return;
  const cx = cv.getContext('2d');

  const P = []; // particule
  const L = []; // linii de forță (conexiuni rare)

  function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    [124, 58,  237], // violet
    [  6,182, 212], // cyan
    [236, 72,  153], // roz
    [180,200,  255], // albastru-alb
  ];

  for (let i = 0; i < 200; i++) {
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    P.push({
      x:     Math.random(),
      y:     Math.random(),
      r:     Math.random() * 1.1 + 0.15,
      base:  Math.random() * 0.45 + 0.05,
      phase: Math.random() * Math.PI * 2,
      freq:  Math.random() * 0.5 + 0.15,
      vx:    (Math.random() - 0.5) * 0.00012,
      vy:    (Math.random() - 0.5) * 0.00012,
      c,
    });
  }

  // Câteva perechi de particule conectate cu linii subtile
  for (let i = 0; i < 18; i++) {
    L.push([
      Math.floor(Math.random() * P.length),
      Math.floor(Math.random() * P.length),
    ]);
  }

  let t = 0;
  function frame() {
    cx.clearRect(0, 0, cv.width, cv.height);
    t += 0.009;

    // Linii de forță
    for (const [ai, bi] of L) {
      const a = P[ai], b = P[bi];
      const ax = a.x * cv.width,  ay = a.y * cv.height;
      const bx = b.x * cv.width,  by = b.y * cv.height;
      const dist = Math.hypot(bx - ax, by - ay);
      if (dist < cv.width * 0.35) {
        const alpha = (1 - dist / (cv.width * 0.35)) * 0.06;
        cx.beginPath();
        cx.moveTo(ax, ay); cx.lineTo(bx, by);
        cx.strokeStyle = `rgba(${a.c[0]},${a.c[1]},${a.c[2]},${alpha})`;
        cx.lineWidth = 0.5;
        cx.stroke();
      }
    }

    // Particule
    for (const p of P) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
      if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;
      const alpha = p.base + Math.sin(p.phase + t * p.freq) * 0.2;
      cx.beginPath();
      cx.arc(p.x * cv.width, p.y * cv.height, p.r, 0, Math.PI * 2);
      cx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${Math.max(0.03, alpha)})`;
      cx.fill();
    }

    requestAnimationFrame(frame);
  }
  frame();

  /* ── GRAVITAȚIE COGNITIVĂ ───────────────────────────────── */
  /* Fragmentele de cunoaștere derivă ușor spre atenția user   */
  const fragment = document.querySelector('.rfi-fragment');
  if (fragment) {
    let ox = 0, oy = 0;
    let tx = 0, ty = 0;
    document.addEventListener('mousemove', e => {
      const r = document.querySelector('.rfi-knowledge').getBoundingClientRect();
      tx = (e.clientX - r.left - r.width  / 2) * 0.025;
      ty = (e.clientY - r.top  - r.height / 2) * 0.025;
    });
    document.addEventListener('touchmove', e => {
      const touch = e.touches[0];
      const r = document.querySelector('.rfi-knowledge').getBoundingClientRect();
      tx = (touch.clientX - r.left - r.width  / 2) * 0.02;
      ty = (touch.clientY - r.top  - r.height / 2) * 0.02;
    }, { passive: true });

    function driftFragment() {
      ox += (tx - ox) * 0.06;
      oy += (ty - oy) * 0.06;
      fragment.style.transform = `translate(calc(-50% + ${ox}px), ${oy}px)`;
      requestAnimationFrame(driftFragment);
    }
    driftFragment();
  }

  /* ── MAGNETISM TRIGGERELE ───────────────────────────────── */
  document.querySelectorAll('.rfi-trigger').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      if (btn.disabled) return;
      const r   = btn.getBoundingClientRect();
      const x   = (e.clientX - r.left  - r.width  / 2) * 0.35;
      const y   = (e.clientY - r.top   - r.height / 2) * 0.35;
      btn.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transform = '';
    });
  });

  /* ── PULS DE REZONANȚĂ LA VERIFICARE ───────────────────── */
  const btnCheck = document.getElementById('btnCheck');
  if (btnCheck) {
    btnCheck.addEventListener('click', function() {
      if (this.disabled) return;
      const knowledge = document.querySelector('.rfi-knowledge');
      if (!knowledge) return;
      knowledge.classList.remove('rfi-burst');
      void knowledge.offsetWidth;
      knowledge.classList.add('rfi-burst');
      knowledge.addEventListener('animationend', () =>
        knowledge.classList.remove('rfi-burst'), { once: true });
    });
  }

})();
</script>

</body>
</html>
