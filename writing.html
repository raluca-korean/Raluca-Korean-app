<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Practică Scrisul</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0015">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./writing.css">
</head>
<body class="theme-anime">
<div class="wr-root">

  <!-- ══ TOP NAV ══════════════════════════════════════════ -->
  <nav class="wr-nav">
    <div id="pageControls" class="wr-nav-controls"></div>
    <div class="wr-nav-center">
      <h1 id="pageTitle">Practică Scrisul</h1>
      <span id="pageSub" class="wr-nav-sub">Litere · Silabe · Cuvinte</span>
    </div>
    <div class="wr-nav-counter" id="progLbl">1 / 26</div>
  </nav>

  <!-- ══ PROGRESS STRIP ═══════════════════════════════════ -->
  <div class="wr-progress-track">
    <div class="wr-progress-fill" id="progFill"></div>
  </div>

  <!-- ══ SEGMENT TABS ════════════════════════════════════ -->
  <div class="wr-tabs-wrap">
    <div class="wr-tabs-pill">
      <button class="mode-tab active" data-mode="letters"   id="tab-letters">Litere</button>
      <button class="mode-tab"        data-mode="syllables" id="tab-syllables">Silabe</button>
      <button class="mode-tab"        data-mode="words"     id="tab-words">Cuvinte</button>
      <button class="mode-tab"        data-mode="sentences" id="tab-sentences">Propoziții</button>
    </div>
  </div>

  <!-- ══ CHARACTER HERO ══════════════════════════════════ -->
  <div class="wr-hero">
    <div class="wr-hero-halo"></div>
    <div class="syl-boxes" id="sylBoxes"></div>
    <div class="target-char" id="targetChar" onclick="speakTarget()">ㄱ</div>
    <div class="wr-rom-row">
      <span class="target-rom"  id="targetRom">g/k</span>
      <span class="target-meta" id="targetMeta"></span>
      <button class="audio-btn" onclick="speakTarget()" title="Audio">🔊</button>
    </div>
  </div>

  <!-- ══ DRAWING PAD ══════════════════════════════════════ -->
  <div class="wr-pad-section">
    <div class="wr-pad-header">
      <label class="trace-toggle">
        <input type="checkbox" id="traceChk" checked>
        <span id="traceLbl">Afișează litera fantomă</span>
      </label>
    </div>

    <div class="wr-pad-outer">
      <div class="board-wrap">
        <div class="board-trace" id="boardTrace">ㄱ</div>
        <div class="board-dividers" id="boardDividers"></div>
        <canvas id="wCanvas" width="320" height="320"></canvas>
      </div>
    </div>

    <div id="wordHint" class="word-hint" style="display:none;"></div>

    <div class="board-actions">
      <button class="wr-btn-clear" onclick="clearBoard()">🗑️</button>
      <button id="btnCheck" class="wr-btn-check ok" onclick="doCheck()">
        ✅ <span id="checkLbl">Verifică</span>
      </button>
      <button id="btnNext" class="wr-btn-next" onclick="nextItem()" disabled>→</button>
    </div>
  </div>

  <!-- ══ FEEDBACK ══════════════════════════════════════════ -->
  <div class="wr-result" id="fbCard" style="display:none;">
    <div class="wr-result-inner">
      <div class="wr-score-row">
        <div class="fb-score" id="fbScore">0%</div>
        <div class="fb-msg"   id="fbMsg"></div>
      </div>
      <div class="fb-bar"><div class="fb-fill" id="fbFill"></div></div>
      <div class="fb-compare">
        <div class="fb-col">
          <div class="fb-col-lbl" id="fbYourLbl">Ce ai scris</div>
          <canvas id="fbUserCv" width="130" height="130" class="fb-cv"></canvas>
        </div>
        <div class="fb-col">
          <div class="fb-col-lbl" id="fbRefLbl">Referință</div>
          <canvas id="fbRefCv"  width="130" height="130" class="fb-cv"></canvas>
        </div>
      </div>
    </div>
  </div>

</div><!-- /wr-root -->

<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
<script src="./js/writing.js"></script>
</body>
</html>
