<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#03020a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./writing.css">
</head>
<body class="theme-anime">

<!-- ░░ STELE DE FUNDAL ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
<canvas id="starfield" class="starfield"></canvas>

<div class="cosmos">

  <!-- HUD: controale + mod + poziție -->
  <div class="cosmos-hud">
    <div id="pageControls" class="cosmos-controls"></div>
    <div class="cosmos-modes">
      <button class="mode-tab active" data-mode="letters"   id="tab-letters">ㄱ Litere</button>
      <button class="mode-tab"        data-mode="syllables" id="tab-syllables">가 Silabe</button>
      <button class="mode-tab"        data-mode="words"     id="tab-words">词 Cuvinte</button>
      <button class="mode-tab"        data-mode="sentences" id="tab-sentences">文 Prop.</button>
    </div>
    <div class="cosmos-pos" id="progLbl">01 / 26</div>
  </div>

  <!-- Elemente invizibile pentru JS -->
  <h1 id="pageTitle" style="display:none">Practică Scrisul</h1>
  <span id="pageSub" style="display:none">Litere · Silabe · Cuvinte · Propoziții</span>
  <div id="progFill" style="display:none"></div>

  <!-- ░░ UNIVERSUL CENTRAL ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
  <div class="cosmos-universe">

    <!-- Inele orbitale -->
    <div class="orbit orbit-a"><span class="orbit-dot"></span></div>
    <div class="orbit orbit-b"><span class="orbit-dot"></span></div>
    <div class="orbit orbit-c"><span class="orbit-dot"></span></div>

    <!-- Câmpul de energie al caracterului -->
    <div class="char-field"></div>

    <!-- Silabe (mod cuvinte/propoziții) -->
    <div class="syl-boxes" id="sylBoxes"></div>

    <!-- Caracterul principal -->
    <div class="char-core">
      <div class="target-char" id="targetChar" onclick="speakTarget()">ㄱ</div>
    </div>

    <!-- Info sub caracter -->
    <div class="char-info">
      <span class="target-rom"  id="targetRom">g/k</span>
      <span class="target-meta" id="targetMeta"></span>
      <button class="audio-btn" onclick="speakTarget()" title="Audio">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
    </div>

  </div><!-- /cosmos-universe -->

  <!-- ░░ PAD DE SCRIERE ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
  <div class="cosmos-pad">

    <div class="pad-controls">
      <label class="trace-toggle">
        <input type="checkbox" id="traceChk" checked>
        <span id="traceLbl">Fantomă</span>
      </label>
    </div>

    <!-- Suprafața de scris -->
    <div class="pad-surface">
      <div class="pad-corner pad-corner-tl"></div>
      <div class="pad-corner pad-corner-tr"></div>
      <div class="pad-corner pad-corner-bl"></div>
      <div class="pad-corner pad-corner-br"></div>
      <div class="board-wrap">
        <div class="board-trace" id="boardTrace">ㄱ</div>
        <div class="board-dividers" id="boardDividers"></div>
        <canvas id="wCanvas" width="320" height="320"></canvas>
      </div>
    </div>

    <div id="wordHint" class="word-hint" style="display:none;"></div>

    <!-- Butoane -->
    <div class="board-actions pad-actions">
      <button class="cosmos-btn ghost-btn" onclick="clearBoard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      </button>
      <button id="btnCheck" class="cosmos-btn prime-btn ok" onclick="doCheck()">
        <span class="prime-glow"></span>
        <span id="checkLbl">Verifică</span>
      </button>
      <button id="btnNext" class="cosmos-btn ghost-btn next-btn" onclick="nextItem()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

  </div><!-- /cosmos-pad -->

  <!-- ░░ REZULTAT ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
  <div class="cosmos-result" id="fbCard" style="display:none;">
    <div class="result-row">
      <div class="fb-score" id="fbScore">0%</div>
      <div class="fb-msg"   id="fbMsg"></div>
    </div>
    <div class="fb-bar"><div class="fb-fill" id="fbFill"></div></div>
    <div class="fb-compare">
      <div class="fb-col">
        <div class="fb-col-lbl" id="fbYourLbl">CE AI SCRIS</div>
        <canvas id="fbUserCv" width="130" height="130" class="fb-cv"></canvas>
      </div>
      <div class="fb-col">
        <div class="fb-col-lbl" id="fbRefLbl">REFERINȚĂ</div>
        <canvas id="fbRefCv"  width="130" height="130" class="fb-cv"></canvas>
      </div>
    </div>
  </div>

</div><!-- /cosmos -->

<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
<script src="./js/writing.js"></script>

<script>
/* ── STARFIELD ─────────────────────────────────────────── */
(function () {
  const cv = document.getElementById('starfield');
  if (!cv) return;
  const cx = cv.getContext('2d');
  const stars = [];
  const COLORS = ['180,200,255','160,140,255','100,220,255','255,160,220'];

  function init() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
    if (stars.length) return;
    for (let i = 0; i < 180; i++) {
      stars.push({
        x:     Math.random(),
        y:     Math.random(),
        r:     Math.random() * 1.3 + 0.2,
        o:     Math.random() * 0.55 + 0.1,
        phase: Math.random() * Math.PI * 2,
        freq:  Math.random() * 0.6 + 0.2,
        col:   COLORS[i % COLORS.length],
      });
    }
  }

  let t = 0;
  function draw() {
    cx.clearRect(0, 0, cv.width, cv.height);
    t += 0.01;
    for (const s of stars) {
      const alpha = s.o + Math.sin(s.phase + t * s.freq) * 0.22;
      cx.beginPath();
      cx.arc(s.x * cv.width, s.y * cv.height, s.r, 0, Math.PI * 2);
      cx.fillStyle = `rgba(${s.col},${Math.max(0.04, alpha)})`;
      cx.fill();
    }
    requestAnimationFrame(draw);
  }

  init();
  window.addEventListener('resize', init);
  draw();
})();

/* ── MAGNETIC BUTTONS ──────────────────────────────────── */
document.querySelectorAll('.cosmos-btn').forEach(btn => {
  btn.addEventListener('mousemove', e => {
    if (btn.disabled) return;
    const r = btn.getBoundingClientRect();
    const x = (e.clientX - r.left - r.width  / 2) * 0.3;
    const y = (e.clientY - r.top  - r.height / 2) * 0.3;
    btn.style.transform = `translate(${x}px,${y}px)`;
  });
  btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
});

/* ── PULSE LA VERIFICARE ────────────────────────────────── */
document.getElementById('btnCheck').addEventListener('click', function () {
  if (this.disabled) return;
  const universe = document.querySelector('.cosmos-universe');
  if (universe) {
    universe.classList.remove('pulse-burst');
    void universe.offsetWidth;
    universe.classList.add('pulse-burst');
  }
});
</script>

</body>
</html>
