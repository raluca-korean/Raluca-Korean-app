<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Conversații</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<style>
/* ── HUB ────────────────────────────────────────────── */
.cv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:4px}
.cv-card{
  background:var(--rk-card);border:2px solid var(--rk-stroke);border-bottom:4px solid var(--rk-stroke-b);
  border-radius:18px;padding:20px 18px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
  box-shadow:0 4px 14px var(--rk-shadow);text-decoration:none;display:block;color:inherit;
}
.cv-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(219,39,119,.18);border-color:rgba(219,39,119,.35)}
.cv-card-icon{font-size:40px;line-height:1;margin-bottom:10px}
.cv-card-title{font-size:16px;font-weight:900;color:var(--rk-heading);margin-bottom:4px}
.cv-card-desc{font-size:12px;color:var(--rk-muted)}
.cv-card-meta{display:flex;align-items:center;gap:8px;margin-top:10px}
.cv-lvl{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(124,58,237,.12);color:var(--rk-violet);text-transform:uppercase}
.cv-turns{font-size:11px;color:var(--rk-muted-ui);font-weight:600}
.cv-done{font-size:12px;color:#16a34a;font-weight:700}

/* ── CHAT LAYOUT ────────────────────────────────────── */
#chatView{
  display:none;flex-direction:column;height:100vh;max-width:720px;
  margin:0 auto;font-family:'Noto Sans KR',sans-serif;
}
.cv-chat-header{
  padding:12px 16px;background:var(--rk-card);
  border-bottom:2px solid var(--rk-stroke);flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
.cv-back-btn{
  background:none;border:1.5px solid var(--rk-stroke);border-radius:20px;
  padding:6px 14px;font-size:13px;font-weight:700;color:var(--rk-text);
  cursor:pointer;flex-shrink:0;box-shadow:none;transition:border-color .15s;
}
.cv-back-btn:hover{border-color:rgba(219,39,119,.5);transform:none}
.cv-chat-title{flex:1;font-size:15px;font-weight:900;color:var(--rk-heading)}
.cv-chat-score{font-size:13px;font-weight:700;color:var(--rk-violet);flex-shrink:0}
.cv-trans-btn{
  background:none;border:1.5px solid var(--rk-stroke);border-radius:20px;
  padding:5px 11px;font-size:11px;font-weight:700;color:var(--rk-muted-ui);
  cursor:pointer;box-shadow:none;transition:all .15s;flex-shrink:0;
}
.cv-trans-btn.on{border-color:rgba(124,58,237,.45);color:var(--rk-violet);background:rgba(124,58,237,.07)}
.cv-trans-btn:hover{transform:none}

/* ── CHAT MESSAGES ──────────────────────────────────── */
.cv-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--rk-bg-flat)}
body.dark-mode .cv-messages{background:#0d0a1a}

.cv-msg-row{display:flex;align-items:flex-end;gap:8px}
.cv-msg-row.staff{justify-content:flex-start}
.cv-msg-row.you{justify-content:flex-end;flex-direction:row-reverse}

.cv-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;background:var(--rk-card);
  border:1.5px solid var(--rk-stroke);
}
.cv-bubble{
  max-width:78%;padding:10px 14px;border-radius:16px;line-height:1.6;
  animation:bubbleIn .25s ease;
}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:none}}
.cv-bubble.staff{
  background:var(--rk-card);border:1.5px solid var(--rk-stroke);
  border-bottom-left-radius:4px;
}
body.dark-mode .cv-bubble.staff{background:#1a0e2e;border-color:rgba(219,39,119,.20)}
.cv-bubble.you-ok{
  background:linear-gradient(135deg,#db2777,#7c3aed);color:#fff;
  border-bottom-right-radius:4px;
}
.cv-bubble.you-err{
  background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;
  border-bottom-right-radius:4px;
}
.cv-bubble.you-correct-hint{
  background:linear-gradient(135deg,#16a34a,#059669);color:#fff;
  border-bottom-right-radius:4px;font-size:12px;opacity:.85;
}
.cv-ko{font-size:15px;font-weight:700}
.cv-trans{font-size:12px;margin-top:3px;opacity:.75;font-weight:500}
.cv-bubble.you-ok .cv-trans,.cv-bubble.you-err .cv-trans,.cv-bubble.you-correct-hint .cv-trans{opacity:.8;color:#fff}
.cv-trans.hidden{display:none}
.cv-typing{padding:10px 14px;background:var(--rk-card);border:1.5px solid var(--rk-stroke);border-radius:16px;border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center}
.cv-typing span{width:7px;height:7px;border-radius:50%;background:var(--rk-muted);animation:dot 1.2s ease-in-out infinite}
.cv-typing span:nth-child(2){animation-delay:.2s}
.cv-typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── OPTIONS PANEL ──────────────────────────────────── */
.cv-options{padding:14px 16px;background:var(--rk-card);border-top:2px solid var(--rk-stroke);flex-shrink:0}
body.dark-mode .cv-options{background:#1a0e2e}
.cv-opts-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--rk-muted-ui);margin-bottom:10px}
.cv-opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cv-opt-btn{
  padding:10px 13px;border-radius:12px;border:1.5px solid var(--rk-stroke);
  background:var(--rk-card);color:var(--rk-heading);
  font-size:13px;font-weight:600;cursor:pointer;text-align:left;
  transition:all .15s;font-family:inherit;line-height:1.4;box-shadow:none;
}
.cv-opt-btn:hover{border-color:rgba(219,39,119,.45);background:rgba(219,39,119,.05);transform:translateY(-1px)}
.cv-opt-ko{display:block;font-weight:700;font-size:14px}
.cv-opt-trans{display:block;font-size:11px;color:var(--rk-muted-ui);margin-top:2px;font-weight:500}
.cv-opt-trans.hidden{display:none}
.cv-opts-waiting{text-align:center;padding:8px;font-size:13px;color:var(--rk-muted-ui)}

/* ── COMPLETE VIEW ──────────────────────────────────── */
#completeView{display:none}
.cv-complete{max-width:520px;margin:0 auto;padding:0 16px 40px}
.cv-score-card{
  background:var(--rk-card);border:2px solid var(--rk-stroke);border-bottom:4px solid var(--rk-stroke-b);
  border-radius:22px;padding:36px 28px;text-align:center;box-shadow:0 6px 24px var(--rk-shadow);margin-bottom:14px;
}
.cv-score-icon{font-size:58px;line-height:1;margin-bottom:10px}
.cv-score-num{font-size:32px;font-weight:900;color:var(--rk-heading)}
.cv-score-sub{font-size:15px;color:var(--rk-muted);margin-top:4px}
.cv-score-badge{display:inline-block;margin-top:14px;padding:6px 22px;border-radius:20px;font-size:14px;font-weight:700}
.badge-perfect{background:rgba(22,163,74,.15);color:#166534;border:1.5px solid rgba(22,163,74,.4)}
.badge-good{background:rgba(124,58,237,.12);color:#5b21b6;border:1.5px solid rgba(124,58,237,.35)}
.badge-ok{background:rgba(245,158,11,.12);color:#92400e;border:1.5px solid rgba(245,158,11,.4)}
.badge-practice{background:rgba(239,68,68,.10);color:#991b1b;border:1.5px solid rgba(239,68,68,.3)}
.cv-actions{display:flex;gap:10px;margin-top:10px}
.cv-action-btn{
  flex:1;padding:13px;font-size:14px;font-weight:700;border-radius:12px;
  cursor:pointer;font-family:inherit;transition:opacity .2s;
}
.cv-action-btn.pri{background:linear-gradient(135deg,#db2777,#7c3aed);border:none;color:#fff;box-shadow:0 4px 14px rgba(219,39,119,.28)}
.cv-action-btn.sec{background:var(--rk-card);border:2px solid var(--rk-stroke);color:var(--rk-heading)}
.cv-action-btn:hover{opacity:.85;transform:translateY(-1px)}

/* ── DARK MODE FIXES ────────────────────────────────── */
body.dark-mode .cv-card{background:#1a0e2e;border-color:rgba(219,39,119,.22)}
body.dark-mode .cv-chat-header{background:#1a0e2e;border-color:rgba(219,39,119,.20)}
body.dark-mode .cv-opt-btn{background:#1a0e2e;border-color:rgba(219,39,119,.18);color:#eef0ff}
body.dark-mode .cv-score-card{background:#1a0e2e}
body.dark-mode .cv-action-btn.sec{background:#1a0e2e;color:#eef0ff}

@media(max-width:480px){
  .cv-opts-grid{grid-template-columns:1fr}
  .cv-grid{grid-template-columns:1fr 1fr}
  .cv-card-icon{font-size:30px}
}
</style>
</head>
<body class="theme-anime">

<!-- ══════════════════ HUB ══════════════════ -->
<div id="hubView" class="app">

</div>

<!-- ══════════════════ CHAT ══════════════════ -->
<div id="chatView">

  <div class="cv-messages" id="chatMessages"></div>
  <div class="cv-options" id="chatOptions"></div>
</div>

<!-- ══════════════════ COMPLETE ══════════════════ -->
<div id="completeView" class="app">
  <div class="cv-complete">
    <div class="cv-score-card">
      <div class="cv-score-icon" id="cIcon">🎉</div>

    </div>
    <div class="cv-actions">
      <button class="cv-action-btn sec" id="retryBtn">🔄 Din nou</button>
      <button class="cv-action-btn pri" id="otherBtn">📋 Alte scenarii</button>
    </div>
  </div>
</div>

    title:'💬 Conversații', sub:'Dialoguri situaționale interactive',

    topik:'TOPIK', turns:'replici',
    done:'✓ Completat',
    transBtn:'RO', transBtnOff:'—',
    optLabel:'Tu spui:',
    waiting:'…',
    scoreOf:'corecte din',
    scoreSuffix:'replici',
    perfect:'🎉 Perfect!', perfectSub:'Ai răspuns corect la toate replicile!',
    good:'👍 Bine!', goodSub:'Excelent efort!',
    ok:'😊 OK', okSub:'Continuă să exersezi!',
    practice:'💪 Practică', practiceSub:'Ai nevoie de mai multă practică.',
    retry:'🔄 Din nou', other:'📋 Alte scenarii',
    backBtn:'← Înapoi'
  },
  en:{
    title:'💬 Conversations', sub:'Interactive situational dialogues',
    hubTitle:'Choose a scenario',
    topik:'TOPIK', turns:'turns',
    done:'✓ Completed',
    transBtn:'EN', transBtnOff:'—',
    optLabel:'You say:',
    waiting:'…',
    scoreOf:'correct out of',
    scoreSuffix:'turns',
    perfect:'🎉 Perfect!', perfectSub:'You answered every line correctly!',
    good:'👍 Good!', goodSub:'Great effort!',
    ok:'😊 OK', okSub:'Keep practicing!',
    practice:'💪 Practice', practiceSub:'You need more practice.',
    retry:'🔄 Try again', other:'📋 Other scenarios',
    backBtn:'← Back'
  }
};
function L(){ return UI[LANG]; }

var SCORES_KEY = 'RK_CONV_SCORES';
function loadScores(){ try{return JSON.parse(localStorage.getItem(SCORES_KEY)||'{}');}catch(e){return {};} }
function saveScore(id, pct){
  try{
    var s=loadScores(); s[id]=pct;
    localStorage.setItem(SCORES_KEY,JSON.stringify(s));
  }catch(e){}
}

// ── HUB ──────────────────────────────────────────────────────────
function renderHub(){
  var l=L();
  document.getElementById('pageTitle').textContent=l.title;
  document.getElementById('pageSubtitle').textContent=l.sub;
  document.getElementById('hubTitle').textContent=l.hubTitle;
  var scores=loadScores();
  var grid=document.getElementById('scenarioGrid');
  grid.innerHTML='';
  SCENARIOS.forEach(function(sc){
    var userTurnCount=sc.lines.filter(function(ln){return ln.sp==='you';}).length;
    var prev=scores[sc.id];
    var doneHtml=prev!=null?'<span class="cv-done">✓ '+prev+'%</span>':'';
    var card=document.createElement('div');
    card.className='cv-card';
    card.innerHTML=
      '<div class="cv-card-icon">'+sc.icon+'</div>'+
      '<div class="cv-card-title">'+sc.title[LANG]+'</div>'+
      '<div class="cv-card-desc">'+sc.desc[LANG]+'</div>'+
      '<div class="cv-card-meta">'+
        '<span class="cv-lvl">'+l.topik+' '+sc.topik+'</span>'+
        '<span class="cv-turns">'+userTurnCount+' '+l.turns+'</span>'+
        doneHtml+
      '</div>';
    card.addEventListener('click',function(){ startScenario(sc); });
    grid.appendChild(card);
  });
}

// ── START SCENARIO ────────────────────────────────────────────────
function startScenario(sc){
  currentScenario=sc;
  lineIndex=0; score=0; userTurns=0; waitingForNext=false;
  document.getElementById('hubView').style.display='none';
  document.getElementById('completeView').style.display='none';
  var cv=document.getElementById('chatView');
  cv.style.display='flex';
  document.getElementById('chatTitle').textContent=sc.icon+' '+sc.title[LANG];
  document.getElementById('chatMessages').innerHTML='';
  updateScoreDisplay();
  updateTransBtn();
  advanceDialog();
}

function updateScoreDisplay(){
  document.getElementById('chatScore').textContent=score+'/'+userTurns;
}

// ── ADVANCE DIALOG ────────────────────────────────────────────────
function advanceDialog(){
  var sc=currentScenario;
  if(!sc) return;
  if(lineIndex>=sc.lines.length){
    endScenario(); return;
  }
  var line=sc.lines[lineIndex];
  if(line.sp==='staff'||line.sp==='stranger'){
    showTyping(function(){
      addBubble('staff', line.ko, line.ro, line.en);
      lineIndex++;
      advanceDialog();
    });
  } else {
    showOptions(line);
  }
}

function showTyping(cb){
  var msgs=document.getElementById('chatMessages');
  var row=document.createElement('div');
  row.className='cv-msg-row staff';
  row.id='typingRow';
  row.innerHTML=
    '<div class="cv-avatar">'+currentScenario.icon+'</div>'+
    '<div class="cv-typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(row);
  scrollBottom();
  setTimeout(function(){
    row.remove();
    cb();
  }, 700);
}

function addBubble(side, ko, ro, en){
  var msgs=document.getElementById('chatMessages');
  var row=document.createElement('div');
  var transText= LANG==='ro' ? ro : en;
  if(side==='staff'){
    row.className='cv-msg-row staff';
    row.innerHTML=
      '<div class="cv-avatar">'+currentScenario.icon+'</div>'+
      '<div class="cv-bubble staff">'+
        '<div class="cv-ko">'+escHtml(ko)+'</div>'+
        '<div class="cv-trans'+(showTrans?'':' hidden')+'">'+escHtml(transText)+'</div>'+
      '</div>';
  } else {
    var cls='cv-bubble '+side;
    row.className='cv-msg-row you';
    row.innerHTML=
      '<div class="'+cls+'">'+
        '<div class="cv-ko">'+escHtml(ko)+'</div>'+
        '<div class="cv-trans'+(showTrans?'':' hidden')+'">'+escHtml(transText)+'</div>'+
      '</div>'+
      '<div class="cv-avatar" style="background:linear-gradient(135deg,#db2777,#7c3aed);color:#fff;border:none">👤</div>';
  }
  msgs.appendChild(row);
  scrollBottom();
}

// ── OPTIONS ───────────────────────────────────────────────────────
function showOptions(line){
  var l=L();
  var opts=document.getElementById('chatOptions');
  opts.innerHTML=
    '<div class="cv-opts-label">'+l.optLabel+'</div>'+
    '<div class="cv-opts-grid" id="optsGrid"></div>';
  var grid=document.getElementById('optsGrid');
  line.opts.forEach(function(opt){
    var btn=document.createElement('button');
    btn.className='cv-opt-btn';
    btn.innerHTML=
      '<span class="cv-opt-ko">'+escHtml(opt.ko)+'</span>'+
      '<span class="cv-opt-trans'+(showTrans?'':' hidden')+'">'+escHtml(LANG==='ro'?opt.ro:opt.en)+'</span>';
    btn.addEventListener('click',function(){ selectOption(line, opt, btn); });
    grid.appendChild(btn);
  });
  scrollBottom();
}

function selectOption(line, opt, btn){
  if(waitingForNext) return;
  waitingForNext=true;
  userTurns++;
  var isOk=opt.ok;
  if(isOk) score++;
  updateScoreDisplay();

  // Disable all options
  document.querySelectorAll('.cv-opt-btn').forEach(function(b){ b.disabled=true; b.style.opacity='.5'; });

  if(isOk){
    addBubble('you-ok', opt.ko, opt.ro, opt.en);
  } else {
    addBubble('you-err', opt.ko, opt.ro, opt.en);
    // Show correct answer
    var correct=line.opts.find(function(o){return o.ok;});
    if(correct){
      setTimeout(function(){
        addBubble('you-correct-hint', '✓ '+correct.ko, correct.ro, correct.en);
      }, 300);
    }
  }

  clearOptions();
  lineIndex++;
  waitingForNext=false;
  setTimeout(advanceDialog, isOk?700:1400);
}

function clearOptions(){
  document.getElementById('chatOptions').innerHTML=
    '<div class="cv-opts-waiting">…</div>';
}

// ── END SCENARIO ──────────────────────────────────────────────────
function endScenario(){
  clearOptions();
  var pct = userTurns ? Math.round(score/userTurns*100) : 0;
  saveScore(currentScenario.id, pct);
  var l=L();
  var icon,badge,sub,cls;
  if(pct===100){ icon='🎉'; badge=l.perfect; sub=l.perfectSub; cls='badge-perfect'; }
  else if(pct>=75){ icon='👏'; badge=l.good; sub=l.goodSub; cls='badge-good'; }
  else if(pct>=50){ icon='😊'; badge=l.ok; sub=l.okSub; cls='badge-ok'; }
  else { icon='💪'; badge=l.practice; sub=l.practiceSub; cls='badge-practice'; }

  setTimeout(function(){
    document.getElementById('chatView').style.display='none';
    var cv=document.getElementById('completeView');
    cv.style.display='block';
    document.getElementById('cIcon').textContent=icon;
    document.getElementById('cNum').textContent=score+' / '+userTurns;
    document.getElementById('cSub').textContent=l.scoreOf+' '+userTurns+' '+l.scoreSuffix;
    document.getElementById('cBadge').textContent=badge;
    document.getElementById('cBadge').className='cv-score-badge '+cls;
    document.getElementById('retryBtn').textContent=l.retry;
    document.getElementById('otherBtn').textContent=l.other;
  }, 600);
}

// ── BACK / RETRY ──────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click',function(){
  document.getElementById('chatView').style.display='none';
  document.getElementById('hubView').style.display='block';
  renderHub();
});
document.getElementById('retryBtn').addEventListener('click',function(){
  if(currentScenario) startScenario(currentScenario);
});
document.getElementById('otherBtn').addEventListener('click',function(){
  document.getElementById('completeView').style.display='none';
  document.getElementById('hubView').style.display='block';
  renderHub();
});

// ── TRANSLATION TOGGLE ────────────────────────────────────────────
document.getElementById('transBtn').addEventListener('click',function(){
  showTrans=!showTrans;
  this.classList.toggle('on', showTrans);
  this.textContent=showTrans?(LANG==='ro'?'RO':'EN'):'—';
  document.querySelectorAll('.cv-trans,.cv-opt-trans').forEach(function(el){
    el.classList.toggle('hidden',!showTrans);
  });
});

function updateTransBtn(){
  var btn=document.getElementById('transBtn');
  btn.classList.toggle('on', showTrans);
  btn.textContent=showTrans?(LANG==='ro'?'RO':'EN'):'—';
}

// ── UTILS ─────────────────────────────────────────────────────────
function scrollBottom(){
  var el=document.getElementById('chatMessages');
  if(el) el.scrollTop=el.scrollHeight;
}
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── LANG ──────────────────────────────────────────────────────────
RKLang.init(function(lang){
  LANG=lang;
  if(document.getElementById('hubView').style.display!=='none'){
    renderHub();
  }
});

renderHub();
</script>
