<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Exercises</title>
  
<link rel="stylesheet" href="/Raluca-Korean-app/theme-anime.css?v=3">
 
</head> 
  <body class="theme-anime">
  <div class="app">

    <div class="card headerCard">
      <div class="headerRow">
<div class="titleWrap">
  <h1 id="pageTitle">Exerciții TOPIK</h1>
  <div class="sub" id="pageSubtitle">Quiz bilingv • Lecții TOPIK • Română / English</div>

  <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
    <button type="button" id="langRo">Română</button>
    <button type="button" id="langEn">English</button>
  </div>
</div>
        <div class="badges">
          <div class="badge" id="bMode"><span class="dot"></span><span>Mod: KO→RO</span></div>
          <div class="badge ok" id="bCorrect"><span class="dot"></span><span>Corecte: 0</span></div>
          <div class="badge" id="bTotal"><span class="dot"></span><span>Total: 0</span></div>
          <div class="badge" id="bStreak"><span class="dot"></span><span>Streak: 0</span></div>
        </div>
      </div>

      <div class="meter" title="Progres sesiune">
        <div id="meterFill"></div>
      </div>

      <button id="soundBtn" class="soundBtn" type="button" aria-label="Sunet">
        🔊
      </button>
    </div>
<div class="card exercise-question-card">
  <label><b>Tip exercițiu</b></label>
<select id="type">
  <option value="ko-ro">KO → RO / EN</option>
  <option value="ro-ko">RO / EN → KO</option>
</select>
</div>
<div class="card exercise-question-card">
  <div class="question" id="question"></div>
  <div class="helper" id="helper"></div>
<div id="badge" style="display:inline-flex;gap:8px;align-items:center;margin-bottom:12px"></div>
  <div class="answers" id="answers"></div>

  <div id="puzzleUI" style="display:none">
    <div class="puzzle-bank" id="bank"></div>
    <div class="puzzle-line" id="line"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="controls">
    <button class="primary" id="check">Verifică</button>
    <button id="next">Următorul</button>
  </div>
</div>

</div>
  <script>
const pageTitleEl = document.getElementById("pageTitle");
const pageSubtitleEl = document.getElementById("pageSubtitle");
const langRoBtn = document.getElementById("langRo");
const langEnBtn = document.getElementById("langEn");

const typeSelect = document.getElementById("type");
const questionEl = document.getElementById("question");
const helperEl = document.getElementById("helper");
const badgeEl = document.getElementById("badge");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const checkBtn = document.getElementById("check");
const nextBtn = document.getElementById("next");

const bMode = document.getElementById("bMode");
const bCorrect = document.getElementById("bCorrect");
const bTotal = document.getElementById("bTotal");
const bStreak = document.getElementById("bStreak");
const meterFill = document.getElementById("meterFill");

const lessonParam = new URLSearchParams(window.location.search).get("lesson");

let currentLang = localStorage.getItem("RK_LANG") || "ro";
let allExercises = { "ko-ro": [], "ro-ko": [] };
let currentList = [];
let currentIndex = 0;
let selectedAnswer = null;
let answered = false;

let total = 0;
let correct = 0;
let streak = 0;

const UI_TEXT = {
  ro: {
    title: "Exerciții TOPIK",
    subtitle: "Quiz bilingv • Lecții TOPIK • Română / English",
    mode: "Mod",
    correct: "Corecte",
    total: "Total",
    streak: "Streak",
    chooseAnswer: "Alege un răspuns.",
    chooseCorrectTranslation: "Alege traducerea corectă.",
    chooseCorrectKorean: "Alege propoziția coreeană corectă.",
    correctAnswer: "✅ Corect",
    wrongAnswer: "❌ Greșit",
    answerFirst: "Alege mai întâi un răspuns.",
    noExercises: "Nu există exerciții pentru acest mod.",
    noLessonExercises: "Nu există exerciții pentru această lecție.",
    next: "Următorul",
    check: "Verifică",
    topik: "TOPIK",
    lesson: "Lecția",
    modeKoRo: "KO → RO / EN",
    modeRoKo: "RO / EN → KO",
    loadError: "Nu am putut încărca exercises.json"
  },
  en: {
    title: "TOPIK Exercises",
    subtitle: "Bilingual quiz • TOPIK lessons • Romanian / English",
    mode: "Mode",
    correct: "Correct",
    total: "Total",
    streak: "Streak",
    chooseAnswer: "Choose an answer.",
    chooseCorrectTranslation: "Choose the correct translation.",
    chooseCorrectKorean: "Choose the correct Korean sentence.",
    correctAnswer: "✅ Correct",
    wrongAnswer: "❌ Incorrect",
    answerFirst: "Choose an answer first.",
    noExercises: "No exercises available for this mode.",
    noLessonExercises: "No exercises available for this lesson.",
    next: "Next",
    check: "Check",
    topik: "TOPIK",
    lesson: "Lesson",
    modeKoRo: "KO → RO / EN",
    modeRoKo: "RO / EN → KO",
    loadError: "Could not load exercises.json"
  }
};

function t(key){
  return UI_TEXT[currentLang][key];
}

function updateLanguageButtons(){
  const activeStyle = "linear-gradient(135deg,#22d3ee,#7c3aed)";
  const inactiveStyle = "rgba(10, 8, 28, .55)";

  if(currentLang === "ro"){
    langRoBtn.style.background = activeStyle;
    langRoBtn.style.color = "#000";
    langEnBtn.style.background = inactiveStyle;
    langEnBtn.style.color = "var(--text)";
  } else {
    langEnBtn.style.background = activeStyle;
    langEnBtn.style.color = "#000";
    langRoBtn.style.background = inactiveStyle;
    langRoBtn.style.color = "var(--text)";
  }
}

function modeLabel(type){
  return type === "ko-ro" ? t("modeKoRo") : t("modeRoKo");
}

function updateStaticTexts(){
  pageTitleEl.textContent = t("title");
  pageSubtitleEl.textContent = t("subtitle");
  checkBtn.textContent = t("check");
  nextBtn.textContent = t("next");

  const label = document.querySelector('label b');
  if(label){
    label.textContent = currentLang === "ro" ? "Tip exercițiu" : "Exercise type";
  }

  const optionKoRo = typeSelect.querySelector('option[value="ko-ro"]');
  const optionRoKo = typeSelect.querySelector('option[value="ro-ko"]');

  if(optionKoRo) optionKoRo.textContent = t("modeKoRo");
  if(optionRoKo) optionRoKo.textContent = t("modeRoKo");
}

function updateBadges(){
  if(bMode) bMode.querySelector("span:last-child").textContent = `${t("mode")}: ${modeLabel(typeSelect.value)}`;
  if(bCorrect) bCorrect.querySelector("span:last-child").textContent = `${t("correct")}: ${correct}`;
  if(bTotal) bTotal.querySelector("span:last-child").textContent = `${t("total")}: ${total}`;
  if(bStreak) bStreak.querySelector("span:last-child").textContent = `${t("streak")}: ${streak}`;

  const percent = total === 0 ? 0 : Math.round((correct / total) * 100);
  if(meterFill) meterFill.style.width = percent + "%";
}

function setLanguage(lang){
  currentLang = lang;
  localStorage.setItem("RK_LANG", lang);
  updateLanguageButtons();
  updateStaticTexts();
  updateBadges();
  render();
}

function shuffle(array){
  return [...array].sort(() => Math.random() - 0.5);
}

async function loadExercises(){
  try {
    const response = await fetch("./data/exercises.json");
    const data = await response.json();

    allExercises = {
      "ko-ro": Array.isArray(data["ko-ro"]) ? data["ko-ro"] : [],
      "ro-ko": Array.isArray(data["ro-ko"]) ? data["ro-ko"] : []
    };

    render();
  } catch (error) {
    console.error("Exercises load error:", error);
    questionEl.textContent = t("loadError");
    helperEl.textContent = "";
    answersEl.innerHTML = "";
    feedbackEl.textContent = "";
  }
}

function getFilteredList(){
  const type = typeSelect.value;
  let list = allExercises[type] || [];

  if(lessonParam){
    list = list.filter(item => item.lessonId === lessonParam);
  }

  return list;
}

function renderInfoBadge(item){
  const parts = [];

  if(item.topik){
    parts.push(`
      <span style="padding:6px 10px;border-radius:999px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.22);font-weight:900">
        ${t("topik")} ${item.topik}
      </span>
    `);
  }

  if(item.lessonId){
    parts.push(`
      <span style="padding:6px 10px;border-radius:999px;background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.20);font-weight:900">
        ${t("lesson")}: ${item.lessonId}
      </span>
    `);
  }

  parts.push(`
    <span style="padding:6px 10px;border-radius:999px;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.20);font-weight:900">
      #${currentIndex + 1}/${currentList.length}
    </span>
  `);

  badgeEl.innerHTML = parts.join("");
}

function render(){
  selectedAnswer = null;
  answered = false;
  feedbackEl.textContent = "";
  answersEl.innerHTML = "";

  currentList = getFilteredList();

  if(currentList.length === 0){
    questionEl.textContent = lessonParam ? t("noLessonExercises") : t("noExercises");
    helperEl.textContent = "";
    badgeEl.innerHTML = "";
    answersEl.innerHTML = "";
    return;
  }

  if(currentIndex >= currentList.length){
    currentIndex = 0;
  }

  const item = currentList[currentIndex];
  renderInfoBadge(item);

  let questionText = "";
  let helperText = "";
  let options = [];

  if(typeSelect.value === "ko-ro"){
    questionText = item.q;
    helperText = t("chooseCorrectTranslation");
    options = shuffle(item.answers[currentLang] || []);
  } else {
    questionText = item.prompt[currentLang];
    helperText = t("chooseCorrectKorean");
    options = shuffle(item.options || []);
  }

  questionEl.textContent = questionText;
  helperEl.textContent = helperText;

  options.forEach(option => {
    const el = document.createElement("div");
    el.className = "answer";
    el.textContent = option;

    el.addEventListener("click", () => {
      if(answered) return;

      document.querySelectorAll("#answers .answer").forEach(node => {
        node.classList.remove("selected");
      });

      el.classList.add("selected");
      selectedAnswer = option;
    });

    answersEl.appendChild(el);
  });

  updateBadges();
}

function getCorrectAnswer(item){
  if(typeSelect.value === "ko-ro"){
    return item.correct[currentLang];
  }
  return item.correct;
}

function checkCurrentAnswer(){
  if(answered) return;

  if(!selectedAnswer){
    feedbackEl.textContent = t("answerFirst");
    return;
  }

  const item = currentList[currentIndex];
  const correctAnswer = getCorrectAnswer(item);
  const answerNodes = [...document.querySelectorAll("#answers .answer")];

  answerNodes.forEach(node => {
    if(node.textContent === correctAnswer){
      node.classList.add("correct");
    }
  });

  const selectedNode = answerNodes.find(node => node.classList.contains("selected"));
  const isCorrect = selectedAnswer === correctAnswer;

  if(selectedNode && !isCorrect){
    selectedNode.classList.add("wrong");
  }

  feedbackEl.textContent = isCorrect
    ? t("correctAnswer")
    : `${t("wrongAnswer")} — ${correctAnswer}`;

  total++;

  if(isCorrect){
    correct++;
    streak++;
  } else {
    streak = 0;
  }

  answered = true;
  updateBadges();
}

function nextQuestion(){
  if(currentList.length === 0) return;
  currentIndex = (currentIndex + 1) % currentList.length;
  render();
}

typeSelect.addEventListener("change", () => {
  currentIndex = 0;
  render();
});

checkBtn.addEventListener("click", checkCurrentAnswer);
nextBtn.addEventListener("click", nextQuestion);
langRoBtn.addEventListener("click", () => setLanguage("ro"));
langEnBtn.addEventListener("click", () => setLanguage("en"));

updateLanguageButtons();
updateStaticTexts();
updateBadges();
loadExercises();
</script>
 
</body>
</html>
