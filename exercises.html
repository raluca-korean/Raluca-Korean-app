<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Exercises</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#c84b2f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./exercises.css">
</head>
<body class="theme-anime exercise-page">

<!-- Effects layer (preserved for fireworks + heart) -->
<div class="heartFx" id="heartFx" aria-hidden="true">❤️</div>
<canvas id="fxCanvas"></canvas>

<!-- LUMINA Living Field — animated background organisms -->
<div class="lmn-field" aria-hidden="true">
  <div class="lmn-orb lmn-orb-1"></div>
  <div class="lmn-orb lmn-orb-2"></div>
  <div class="lmn-orb lmn-orb-3"></div>
  <div class="lmn-orb lmn-orb-4"></div>
  <div class="lmn-orb lmn-orb-5"></div>
</div>

<!-- Main viewport -->
<div class="lmn-viewport">

  <!-- Luminous progress thread — top edge of field -->
  <div class="lmn-thread-wrap" title="Progres sesiune">
    <div id="meterFill" class="lmn-thread-fill"></div>
  </div>

  <!-- Meridian — ambient top bar -->
  <header class="lmn-meridian">
    <div class="lmn-title-atom">
      <h1 id="pageTitle">Exerciții TOPIK</h1>
      <div class="sub" id="pageSubtitle">Quiz bilingv · TOPIK · Română / English</div>
    </div>
    <div class="lmn-stats-ring">
      <div class="badge ok" id="bCorrect"><span class="dot"></span><span>Corecte: 0</span></div>
      <div class="badge" id="bTotal"><span class="dot"></span><span>Total: 0</span></div>
      <div class="badge" id="bStreak"><span class="dot"></span><span>Streak: 0</span></div>
      <div class="badge xp-badge" id="bXP"><span class="dot"></span><span>⭐ 0 XP</span></div>
      <div class="badge timer-badge" id="bTimer"><span class="dot"></span><span>⏱ --</span></div>
    </div>
    <div class="lmn-nav-atom">
      <div id="pageControls"></div>
    </div>
  </header>

  <!-- Level suggestion banner (theme-anime.css handles styles) -->
  <div id="lvlBanner" class="lvl-banner"></div>

  <!-- NUCLEUS — the gravitational center of the knowledge field -->
  <main class="lmn-nucleus" id="lmn-nucleus">

    <!-- Aura rings (pure CSS, no JS) -->
    <div class="lmn-aura lmn-aura-1" aria-hidden="true"></div>
    <div class="lmn-aura lmn-aura-2" aria-hidden="true"></div>

    <!-- Sound control (floats in nucleus) -->
    <button id="soundBtn" class="lmn-sound-node" type="button" aria-label="Sunet">🔊</button>

    <!-- Question crystallization zone -->
    <div class="lmn-question-zone">
      <div id="badge" class="lmn-info-cluster"></div>
      <div class="question" id="question"></div>
      <div class="helper" id="helper"></div>
      <div id="drillContext" style="display:none;margin-bottom:14px"></div>
    </div>

    <!-- Answer field — morphic capsule array -->
    <div class="answers" id="answers"></div>

    <!-- Puzzle / Chain UI -->
    <div id="puzzleUI" style="display:none">
      <div class="puzzle-bank" id="bank"></div>
      <button type="button" id="hintBtn" class="hint-btn" style="display:none">💡 Hint</button>
      <div class="puzzle-line" id="line"></div>
    </div>

    <!-- MC hint button (for multiple-choice types) -->
    <button type="button" id="hintBtnMC" class="hint-btn" style="display:none">💡 Hint</button>

    <!-- Resonance feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Action membrane -->
    <div class="lmn-action-membrane">
      <button class="primary" id="check">Verifică</button>
      <button id="next">Următorul</button>
      <button id="learnBtn"
        onclick="toggleLearnedEx(typeSelect.value, currentList[currentIndex])"
        style="display:none">○ Marchează</button>
      <button type="button" id="wrongBtn" style="display:none">❌ Greșeli (0)</button>
    </div>

  </main><!-- end .lmn-nucleus -->

  <!-- Config emergence panel — type + level selector -->
  <div class="lmn-config" id="lmn-config">
    <button class="lmn-config-trigger" type="button" id="lmn-config-trigger"
            onclick="document.getElementById('lmn-config').classList.toggle('lmn-config--open')"
            aria-label="Configurare exerciții" aria-expanded="false">
      <span class="lmn-config-glyph">⊙</span>
      <span class="lmn-config-readout" id="lmn-config-readout">KO → RO · T1</span>
    </button>
    <div class="lmn-config-body" role="region" aria-label="Setări exerciții">
      <div class="lmn-config-row">
        <label class="lmn-field-label"><b id="labelType">Tip exercițiu</b></label>
        <select id="type">
          <option value="ko-ro">KO → RO</option>
          <option value="ro-ko">RO → KO</option>
          <option value="particle">Particulă (1)</option>
          <option value="particlePlus">Particule multiple</option>
          <option value="conjug">Conjugare</option>
          <option value="puzzle">Puzzle</option>
          <option value="chain">Chain</option>
          <option value="drill-conjug">🔤 Drill Conjugare</option>
          <option value="drill-ext">🔗 Drill Extindere</option>
        </select>
        <div id="typeStats" class="lmn-type-stats"></div>
      </div>
      <div id="levelRow" class="lmn-config-row">
        <label class="lmn-field-label"><b id="labelLevel">Nivel TOPIK</b></label>
        <div id="levelBtns" class="lmn-level-nodes">
          <button type="button" data-level="1">1</button>
          <button type="button" data-level="2">2</button>
          <button type="button" data-level="3">3</button>
          <button type="button" data-level="4">4</button>
          <button type="button" data-level="5">5</button>
          <button type="button" data-level="6">6</button>
          <button type="button" data-level="test" id="btnTest">TEST</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- end .lmn-viewport -->

<!-- Gamification UI (theme-anime.css handles most styles) -->
<div id="xpToast" class="xp-toast" aria-live="assertive"></div>
<div id="questCompleteToast" class="quest-complete-toast" aria-live="assertive"></div>
<div id="badgeNotif" class="badge-notif" role="status">
  <div class="badge-notif-icon" id="badgeNotifIcon"></div>
  <div class="badge-notif-text">
    <div class="badge-notif-label" id="badgeNotifLabel"></div>
    <div class="badge-notif-title" id="badgeNotifTitle"></div>
  </div>
</div>
<div id="levelupOverlay" class="levelup-overlay" role="dialog" aria-modal="true">
  <div class="levelup-card">
    <div class="levelup-label" id="levelupLabel">NIVEL NOU!</div>
    <div class="levelup-num" id="levelupNum">2</div>
    <div class="levelup-title" id="levelupTitle"></div>
    <button class="levelup-btn" onclick="document.getElementById('levelupOverlay').classList.remove('show')">OK! 🎉</button>
  </div>
</div>

<script src="./js/core/storage.js"></script>
<script src="./js/core/gamification.js"></script>
<script src="./js/core/conjugation.js"></script>
<script src="./js/core/grammar-color.js?v=18"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/exercises.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>

<script>
/* Config readout updater — cosmetic only, no interaction with exercises.js */
(function () {
  function updateReadout() {
    var el = document.getElementById('lmn-config-readout');
    if (!el) return;
    var typeEl = document.getElementById('type');
    var typeTxt = typeEl ? typeEl.options[typeEl.selectedIndex].text.slice(0, 12) : '';
    var activeBtn = document.querySelector('#levelBtns button.lmn-level-active');
    var lvl = activeBtn ? 'T' + (activeBtn.dataset.level === 'test' ? '∞' : activeBtn.dataset.level) : '';
    el.textContent = typeTxt + (lvl ? ' · ' + lvl : '');
  }
  function markActiveLevel() {
    document.querySelectorAll('#levelBtns button[data-level]').forEach(function (b) {
      b.classList.remove('lmn-level-active');
    });
    var stored = localStorage.getItem('RK_LEVEL') || '1';
    var active = document.querySelector('#levelBtns button[data-level="' + stored + '"]');
    if (active) active.classList.add('lmn-level-active');
    updateReadout();
  }
  document.addEventListener('DOMContentLoaded', function () {
    markActiveLevel();
    var typeEl = document.getElementById('type');
    if (typeEl) typeEl.addEventListener('change', updateReadout);
    var levelBtnsEl = document.getElementById('levelBtns');
    if (levelBtnsEl) levelBtnsEl.addEventListener('click', function (e) {
      if (e.target.dataset.level) setTimeout(markActiveLevel, 30);
    });
    /* close config on outside click */
    document.addEventListener('pointerdown', function (e) {
      var cfg = document.getElementById('lmn-config');
      if (cfg && !cfg.contains(e.target)) cfg.classList.remove('lmn-config--open');
    });
  });
})();
</script>
</body>
</html>
