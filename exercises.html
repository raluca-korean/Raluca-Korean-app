
<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Exercises</title>
  <link rel="stylesheet" href="/Raluca-Korean-app/theme-anime.css">
  <style>
:root{
  --bg:#fdf4ff;
  --bg2:#fce7f3;

  --card: rgba(255,255,255,.97);
  --stroke: rgba(219,39,119,.13);

  --text:#1a0533;
  --muted: rgba(126,58,110,.80);

  --neon1:#db2777;
  --neon2:#7c3aed;
  --neon3:#0ea5e9;
  --ok:#059669;
  --bad:#e11d48;

  --shadow: 0 16px 40px rgba(219,39,119,.13);
  --shadow2: 0 8px 20px rgba(219,39,119,.09);
  --radius: 22px;
}

*{box-sizing:border-box}
html, body { height: 100%; }

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:var(--text);
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(219,39,119,.22) 0%, transparent 45%),
    radial-gradient(ellipse at 100% 0%,  rgba(14,165,233,.18)  0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.16)  0%, transparent 45%),
    linear-gradient(180deg, #fce7f3 0%, #fdf4ff 40%, #eff6ff 100%);
  overflow-x:hidden;
}

.app{
  width:100%;
  max-width: 980px;
  margin: 0 auto;
  padding-left: 18px;
  padding-right: 18px;
  padding-top: calc(22px + env(safe-area-inset-top));
  padding-bottom: calc(22px + env(safe-area-inset-bottom));
}

.card{
  position:relative;
  margin: 18px 0;
  border-radius: var(--radius);
  padding: 18px;
  background: var(--card);
  border: 1.5px solid var(--stroke);
  box-shadow: var(--shadow);
}

.card::before{ display:none; }
.card::after{ display:none; }

h1{
  margin:0;
  font-size:22px;
  letter-spacing:.3px;
  color:var(--text);
}
.sub{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
}

label b{
  font-size:13px;
  color:var(--text);
}

select{
  width:100%;
  padding:12px 14px;
  border-radius: 16px;
  border: 1.5px solid rgba(219,39,119,.18);
  background: #fff;
  color: var(--text);
  font-size:15px;
  outline:none;
  box-shadow: var(--shadow2);
}

.question{
  font-size:26px;
  font-weight:900;
  margin-bottom:6px;
  letter-spacing:.3px;
  background:linear-gradient(135deg,#db2777,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.helper{
  font-size:13px;
  color:var(--muted);
  margin-bottom:14px;
}

.answers{
  display:grid;
  gap:10px;
  margin-bottom:14px;
}

.answer{
  padding:14px 14px;
  border-radius: 16px;
  border: 1.5px solid rgba(219,39,119,.12);
  background: linear-gradient(160deg,#fff,#fdf4ff);
  color: var(--text);
  font-weight:900;
  cursor:pointer;
  box-shadow: var(--shadow2);
  transition: transform .10s ease, box-shadow .10s ease, border-color .10s ease;
  user-select:none;
}

.answer:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 32px rgba(219,39,119,.16);
  border-color: rgba(219,39,119,.32);
}

.answer.selected{
  background: linear-gradient(135deg,rgba(219,39,119,.10),rgba(124,58,237,.08));
  border-color: rgba(219,39,119,.45);
  box-shadow: 0 0 0 2px rgba(219,39,119,.15), var(--shadow2);
}

.answer.correct{
  background: linear-gradient(135deg,rgba(5,150,105,.10),rgba(16,185,129,.06));
  border-color: rgba(5,150,105,.55);
  color: #065f46;
  box-shadow: 0 0 0 2px rgba(5,150,105,.18), 0 8px 20px rgba(5,150,105,.12);
}

.answer.wrong{
  background: linear-gradient(135deg,rgba(225,29,72,.08),rgba(251,113,133,.06));
  border-color: rgba(225,29,72,.50);
  color: #9f1239;
  box-shadow: 0 0 0 2px rgba(225,29,72,.12), 0 8px 20px rgba(225,29,72,.10);
}

.feedback{
  min-height:24px;
  font-weight:900;
  letter-spacing:.2px;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

button{
  padding:11px 16px;
  border-radius: 999px;
  border: 1.5px solid rgba(219,39,119,.18);
  background: #fff;
  color: var(--text);
  font-weight:900;
  cursor:pointer;
  box-shadow: var(--shadow2);
  transition: transform .10s ease, box-shadow .10s ease;
}

button:hover{
  transform: translateY(-1px);
  box-shadow: 0 14px 32px rgba(219,39,119,.18);
}

.primary{
  border:none;
  color:#fff;
  background: linear-gradient(135deg, #db2777, #7c3aed);
  box-shadow: 0 10px 28px rgba(219,39,119,.30);
}

.primary:hover{
  box-shadow: 0 14px 36px rgba(219,39,119,.38);
}

button:active,.answer:active,.chip:active{
  transform: translateY(0px) scale(.99);
}

/* PUZZLE */
.puzzle-bank,.puzzle-line{
  border: 1.5px dashed rgba(219,39,119,.22);
  border-radius: 18px;
  padding: 12px;
  min-height: 56px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  background: rgba(253,244,255,.60);
  box-shadow: var(--shadow2);
}

.chip{
  padding: 10px 14px;
  border-radius: 999px;
  background: linear-gradient(135deg,rgba(219,39,119,.10),rgba(124,58,237,.08));
  border: 1.5px solid rgba(219,39,119,.25);
  color: var(--text);
  font-weight:900;
  cursor:pointer;
  user-select:none;
  transition: transform .10s ease, box-shadow .10s ease;
  box-shadow: 0 6px 16px rgba(219,39,119,.10);
}

.chip:hover{
  transform: translateY(-1px);
  box-shadow: 0 12px 28px rgba(219,39,119,.18);
}

select:focus, button:focus{
  outline: 2px solid rgba(219,39,119,.45);
  outline-offset: 2px;
}

@media (max-width:520px){
  .question{font-size:22px}
  .answer{padding:12px}
}

.headerRow{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.titleWrap{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  letter-spacing:.2px;
  background: linear-gradient(135deg,#fff0f9,#f5f0ff);
  border:1.5px solid rgba(219,39,119,.18);
  box-shadow: var(--shadow2);
  user-select:none;
  color:var(--text);
}

.badge .dot{
  width:10px;height:10px;border-radius:999px;
  background: linear-gradient(135deg, #db2777, #7c3aed);
  box-shadow: 0 0 8px rgba(219,39,119,.35);
}

.badge.ok .dot{ background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,.35); }
.badge.bad .dot{ background: #f43f5e; box-shadow: 0 0 8px rgba(244,63,94,.35); }

.meter{
  margin-top:10px;
  height:10px;
  border-radius:999px;
  background: rgba(219,39,119,.08);
  border:1px solid rgba(219,39,119,.14);
  overflow:hidden;
}
.meter > div{
  height:100%;
  width:0%;
  border-radius:999px;
  background: linear-gradient(90deg, #db2777, #7c3aed, #0ea5e9);
  transition: width .25s ease;
}

@media (max-width:520px){
  .headerRow{flex-direction:column}
  .badges{justify-content:flex-start}
}

.fxFlash{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .18s ease;
  z-index:9999;
}
.fxFlash.ok{
  background: radial-gradient(circle at 20% 10%, rgba(16,185,129,.15), transparent 55%);
}
.fxFlash.bad{
  background: radial-gradient(circle at 25% 15%, rgba(244,63,94,.12), transparent 55%);
}

@keyframes shakeX{
  0%{transform:translateX(0)}
  15%{transform:translateX(-8px)}
  30%{transform:translateX(8px)}
  45%{transform:translateX(-6px)}
  60%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  90%{transform:translateX(4px)}
  100%{transform:translateX(0)}
}
.shake{ animation: shakeX .45s ease; }

@keyframes neonPulse{
  0%{ box-shadow: var(--shadow2); transform:translateY(0) }
  40%{ box-shadow: 0 0 0 2px rgba(219,39,119,.20), 0 14px 32px rgba(219,39,119,.18); transform:translateY(-1px) }
  100%{ box-shadow: var(--shadow2); transform:translateY(0) }
}
.glow{ animation: neonPulse .55s ease; }

.headerCard{ position:relative; }

.soundBtn{
  position:absolute;
  top:14px;
  right:14px;
  width:46px;height:46px;
  border-radius:999px;
  border:1.5px solid rgba(219,39,119,.18);
  background:#fff;
  font-size:22px;
  font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow: var(--shadow2);
}
.soundBtn.off{opacity:.55}
</style>
 
</head>
  <body class="theme-anime exercise-page">
  <div class="app">

    <div class="card headerCard">
      <div class="headerRow">
<div class="titleWrap">
  <h1 id="pageTitle">Exerciții TOPIK</h1>
  <div class="sub" id="pageSubtitle">Quiz bilingv • Lecții TOPIK • Română / English</div>

  <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
    <button type="button" id="langRo">Română</button>
    <button type="button" id="langEn">English</button>
  </div>
</div>
        <div class="badges">
          <div class="badge" id="bMode"><span class="dot"></span><span>Mod: KO→RO</span></div>
          <div class="badge ok" id="bCorrect"><span class="dot"></span><span>Corecte: 0</span></div>
          <div class="badge" id="bTotal"><span class="dot"></span><span>Total: 0</span></div>
          <div class="badge" id="bStreak"><span class="dot"></span><span>Streak: 0</span></div>
        </div>
      </div>

      <div class="meter" title="Progres sesiune">
        <div id="meterFill"></div>
      </div>

      <button id="soundBtn" class="soundBtn" type="button" aria-label="Sunet">
        🔊
      </button>
    </div>
<div class="card">
  <label><b>Tip exercițiu</b></label>
<select id="type">
  <option value="ko-ro">KO → RO / EN</option>
  <option value="ro-ko">RO / EN → KO</option>
  <option value="particle">Particulă (1)</option>
  <option value="particlePlus">Particule multiple</option>
</select>
</div>

<div class="card">
  <div class="question" id="question"></div>
  <div class="helper" id="helper"></div>
<div id="badge" style="display:inline-flex;gap:8px;align-items:center;margin-bottom:12px"></div>
  <div class="answers" id="answers"></div>

  <div id="puzzleUI" style="display:none">
    <div class="puzzle-bank" id="bank"></div>
    <div class="puzzle-line" id="line"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="controls">
    <button class="primary" id="check">Verifică</button>
    <button id="next">Următorul</button>
  </div>
</div>

</div>
  <script>
const pageTitleEl = document.getElementById("pageTitle");
const pageSubtitleEl = document.getElementById("pageSubtitle");
const langRoBtn = document.getElementById("langRo");
const langEnBtn = document.getElementById("langEn");

const typeSelect = document.getElementById("type");
const questionEl = document.getElementById("question");
const helperEl = document.getElementById("helper");
const badgeEl = document.getElementById("badge");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const checkBtn = document.getElementById("check");
const nextBtn = document.getElementById("next");

const bMode = document.getElementById("bMode");
const bCorrect = document.getElementById("bCorrect");
const bTotal = document.getElementById("bTotal");
const bStreak = document.getElementById("bStreak");
const meterFill = document.getElementById("meterFill");

const lessonParam = new URLSearchParams(window.location.search).get("lesson");

let currentLang = localStorage.getItem("RK_LANG") || "ro";
let allExercises = { "ko-ro": [], "ro-ko": [] };
let currentList = [];
let currentIndex = 0;
let selectedAnswer = null;
let answered = false;

let total = 0;
let correct = 0;
let streak = 0;

const UI_TEXT = {
  ro: {
    title: "Exerciții TOPIK",
    subtitle: "Quiz bilingv • Lecții TOPIK • Română / English",
    mode: "Mod",
    correct: "Corecte",
    total: "Total",
    streak: "Streak",
    chooseAnswer: "Alege un răspuns.",
    chooseCorrectTranslation: "Alege traducerea corectă.",
    chooseCorrectKorean: "Alege propoziția coreeană corectă.",
    correctAnswer: "✅ Corect",
    wrongAnswer: "❌ Greșit",
    answerFirst: "Alege mai întâi un răspuns.",
    noExercises: "Nu există exerciții pentru acest mod.",
    noLessonExercises: "Nu există exerciții pentru această lecție.",
    next: "Următorul",
    check: "Verifică",
    topik: "TOPIK",
    lesson: "Lecția",
    modeKoRo: "KO → RO / EN",
    modeRoKo: "RO / EN → KO",
    loadError: "Nu am putut încărca exercises.json"
  },
  en: {
    title: "TOPIK Exercises",
    subtitle: "Bilingual quiz • TOPIK lessons • Romanian / English",
    mode: "Mode",
    correct: "Correct",
    total: "Total",
    streak: "Streak",
    chooseAnswer: "Choose an answer.",
    chooseCorrectTranslation: "Choose the correct translation.",
    chooseCorrectKorean: "Choose the correct Korean sentence.",
    correctAnswer: "✅ Correct",
    wrongAnswer: "❌ Incorrect",
    answerFirst: "Choose an answer first.",
    noExercises: "No exercises available for this mode.",
    noLessonExercises: "No exercises available for this lesson.",
    next: "Next",
    check: "Check",
    topik: "TOPIK",
    lesson: "Lesson",
    modeKoRo: "KO → RO / EN",
    modeRoKo: "RO / EN → KO",
    loadError: "Could not load exercises.json"
  }
};

function t(key){
  return UI_TEXT[currentLang][key];
}

function updateLanguageButtons(){
  const activeStyle = "linear-gradient(135deg,#f472b6,#a855f7,#6366f1)";
  const inactiveStyle = "linear-gradient(160deg,#fff,#fdf4ff)";
  const activeShadow = "0 8px 20px rgba(168,85,247,.25)";
  const inactiveShadow = "0 4px 12px rgba(219,39,119,.10)";

  if(currentLang === "ro"){
    langRoBtn.style.background = activeStyle;
    langRoBtn.style.color = "#fff";
    langRoBtn.style.boxShadow = activeShadow;
    langEnBtn.style.background = inactiveStyle;
    langEnBtn.style.color = "var(--text)";
    langEnBtn.style.boxShadow = inactiveShadow;
  } else {
    langEnBtn.style.background = activeStyle;
    langEnBtn.style.color = "#fff";
    langEnBtn.style.boxShadow = activeShadow;
    langRoBtn.style.background = inactiveStyle;
    langRoBtn.style.color = "var(--text)";
    langRoBtn.style.boxShadow = inactiveShadow;
  }
}

function modeLabel(type){
  return type === "ko-ro" ? t("modeKoRo") : t("modeRoKo");
}

function updateStaticTexts(){
  pageTitleEl.textContent = t("title");
  pageSubtitleEl.textContent = t("subtitle");
  checkBtn.textContent = t("check");
  nextBtn.textContent = t("next");

  const label = document.querySelector('label b');
  if(label){
    label.textContent = currentLang === "ro" ? "Tip exercițiu" : "Exercise type";
  }

  const optionKoRo = typeSelect.querySelector('option[value="ko-ro"]');
  const optionRoKo = typeSelect.querySelector('option[value="ro-ko"]');

  if(optionKoRo) optionKoRo.textContent = t("modeKoRo");
  if(optionRoKo) optionRoKo.textContent = t("modeRoKo");
}

function updateBadges(){
  if(bMode) bMode.querySelector("span:last-child").textContent = `${t("mode")}: ${modeLabel(typeSelect.value)}`;
  if(bCorrect) bCorrect.querySelector("span:last-child").textContent = `${t("correct")}: ${correct}`;
  if(bTotal) bTotal.querySelector("span:last-child").textContent = `${t("total")}: ${total}`;
  if(bStreak) bStreak.querySelector("span:last-child").textContent = `${t("streak")}: ${streak}`;

  const percent = total === 0 ? 0 : Math.round((correct / total) * 100);
  if(meterFill) meterFill.style.width = percent + "%";
}

function setLanguage(lang){
  currentLang = lang;
  localStorage.setItem("RK_LANG", lang);
  updateLanguageButtons();
  updateStaticTexts();
  updateBadges();
  render();
}

function shuffle(array){
  return [...array].sort(() => Math.random() - 0.5);
}

async function loadExercises(){
  try {
    const response = await fetch("./data/exercises.json");
    const data = await response.json();

    allExercises = {
      "ko-ro": Array.isArray(data["ko-ro"]) ? data["ko-ro"] : [],
      "ro-ko": Array.isArray(data["ro-ko"]) ? data["ro-ko"] : []
    };

    render();
  } catch (error) {
    console.error("Exercises load error:", error);
    questionEl.textContent = t("loadError");
    helperEl.textContent = "";
    answersEl.innerHTML = "";
    feedbackEl.textContent = "";
  }
}

function getFilteredList(){
  const type = typeSelect.value;
  let list = allExercises[type] || [];

  if(lessonParam){
    list = list.filter(item => item.lessonId === lessonParam);
  }

  return list;
}

function renderInfoBadge(item){
  const parts = [];

  if(item.topik){
    parts.push(`
      <span style="padding:6px 10px;border-radius:999px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.22);font-weight:900">
        ${t("topik")} ${item.topik}
      </span>
    `);
  }

  if(item.lessonId){
    parts.push(`
      <span style="padding:6px 10px;border-radius:999px;background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.20);font-weight:900">
        ${t("lesson")}: ${item.lessonId}
      </span>
    `);
  }

  parts.push(`
    <span style="padding:6px 10px;border-radius:999px;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.20);font-weight:900">
      #${currentIndex + 1}/${currentList.length}
    </span>
  `);

  badgeEl.innerHTML = parts.join("");
}

function render(){
  selectedAnswer = null;
  answered = false;
  feedbackEl.textContent = "";
  answersEl.innerHTML = "";

  currentList = getFilteredList();

  if(currentList.length === 0){
    questionEl.textContent = lessonParam ? t("noLessonExercises") : t("noExercises");
    helperEl.textContent = "";
    badgeEl.innerHTML = "";
    answersEl.innerHTML = "";
    return;
  }

  if(currentIndex >= currentList.length){
    currentIndex = 0;
  }

  const item = currentList[currentIndex];
  renderInfoBadge(item);

  let questionText = "";
  let helperText = "";
  let options = [];

  if(typeSelect.value === "ko-ro"){
    questionText = item.q;
    helperText = t("chooseCorrectTranslation");
    options = shuffle(item.answers[currentLang] || []);
  } else {
    questionText = item.prompt[currentLang];
    helperText = t("chooseCorrectKorean");
    options = shuffle(item.options || []);
  }

  questionEl.textContent = questionText;
  helperEl.textContent = helperText;

  options.forEach(option => {
    const el = document.createElement("div");
    el.className = "answer";
    el.textContent = option;

    el.addEventListener("click", () => {
      if(answered) return;

      document.querySelectorAll("#answers .answer").forEach(node => {
        node.classList.remove("selected");
      });

      el.classList.add("selected");
      selectedAnswer = option;
    });

    answersEl.appendChild(el);
  });

  updateBadges();
}

function getCorrectAnswer(item){
  if(typeSelect.value === "ko-ro"){
    return item.correct[currentLang];
  }
  return item.correct;
}

function checkCurrentAnswer(){
  if(answered) return;

  if(!selectedAnswer){
    feedbackEl.textContent = t("answerFirst");
    return;
  }

  const item = currentList[currentIndex];
  const correctAnswer = getCorrectAnswer(item);
  const answerNodes = [...document.querySelectorAll("#answers .answer")];

  answerNodes.forEach(node => {
    if(node.textContent === correctAnswer){
      node.classList.add("correct");
    }
  });

  const selectedNode = answerNodes.find(node => node.classList.contains("selected"));
  const isCorrect = selectedAnswer === correctAnswer;

  if(selectedNode && !isCorrect){
    selectedNode.classList.add("wrong");
  }

  feedbackEl.textContent = isCorrect
    ? t("correctAnswer")
    : `${t("wrongAnswer")} — ${correctAnswer}`;

  total++;

  if(isCorrect){
    correct++;
    streak++;
  } else {
    streak = 0;
  }

  answered = true;
  updateBadges();
}

function nextQuestion(){
  if(currentList.length === 0) return;
  currentIndex = (currentIndex + 1) % currentList.length;
  render();
}

typeSelect.addEventListener("change", () => {
  currentIndex = 0;
  render();
});

checkBtn.addEventListener("click", checkCurrentAnswer);
nextBtn.addEventListener("click", nextQuestion);
langRoBtn.addEventListener("click", () => setLanguage("ro"));
langEnBtn.addEventListener("click", () => setLanguage("en"));

updateLanguageButtons();
updateStaticTexts();
updateBadges();
loadExercises();
</script>
 
</body>
</html>
