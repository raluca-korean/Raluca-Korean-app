<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Exercises</title>
  <link rel="stylesheet" href="./theme-anime.css">
  <style>
:root{
  --bg:#070617;
  --bg2:#0b0a1f;

  --card: rgba(16, 14, 40, .72);
  --stroke: rgba(255,255,255,.10);

  --text:#f3f4ff;
  --muted: rgba(243,244,255,.72);

  --neon1:#a855f7; /* violet */
  --neon2:#22d3ee; /* cyan */
  --neon3:#fb7185; /* pink */
  --ok:#34d399;
  --bad:#fb7185;

  --shadow: 0 18px 55px rgba(0,0,0,.45);
  --shadow2: 0 12px 28px rgba(0,0,0,.35);
  --radius: 22px;
}

*{box-sizing:border-box}
html, body { height: 100%; }

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:var(--text);
  background:
    radial-gradient(1200px 700px at 15% 10%, rgba(140,70,255,.35), transparent 60%),
    radial-gradient(1200px 700px at 85% 20%, rgba(0,210,255,.25), transparent 60%),
    linear-gradient(135deg, #090818, #071425);
  overflow-x:hidden;
}

/* containerul care centrează tot conținutul */
.app{
  width:100%;
  max-width: 980px;
  margin: 0 auto;
  padding-left: 18px;
  padding-right: 18px;
  padding-top: calc(22px + env(safe-area-inset-top));
  padding-bottom: calc(22px + env(safe-area-inset-bottom));
}

/* cardurile */
.card{
  position:relative; /* ✅ IMPORTANT: ancorează ::before/::after */
  margin: 18px 0;
  border-radius: var(--radius);
  padding: 18px;
  background: var(--card);
  border: 1px solid var(--stroke);
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  overflow:hidden; /* ✅ taie perfect overlay-urile */
}

.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius: calc(var(--radius) + 2px); /* ✅ */
  background:
    radial-gradient(600px 140px at 20% 0%, rgba(168,85,247,.22), transparent 60%),
    radial-gradient(600px 140px at 85% 0%, rgba(34,211,238,.18), transparent 60%),
    radial-gradient(700px 160px at 60% 120%, rgba(251,113,133,.14), transparent 65%);
  pointer-events:none;
  z-index:0;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius: var(--radius);
  background:
    linear-gradient(135deg,
      rgba(168,85,247,.25),
      rgba(34,211,238,.18),
      rgba(251,113,133,.12)
    );
  opacity:.20;
  mix-blend-mode: screen;
  pointer-events:none;
  z-index:0;
}

/* conținutul mereu deasupra overlay-urilor */
.card > *{ position:relative; z-index:1; }

h1{
  margin:0;
  font-size:22px;
  letter-spacing:.3px;
}
.sub{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
}

label b{
  font-size:13px;
  color:rgba(243,244,255,.85);
}

select{
  width:100%;
  padding:12px 14px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(10, 8, 28, .65);
  color: var(--text);
  font-size:15px;
  outline:none;
  box-shadow: var(--shadow2);
}

.question{
  font-size:26px;
  font-weight:900;
  margin-bottom:6px;
  letter-spacing:.3px;
  text-shadow: 0 0 22px rgba(168,85,247,.18);
}

.helper{
  font-size:13px;
  color:var(--muted);
  margin-bottom:14px;
}

.answers{
  display:grid;
  gap:10px;
  margin-bottom:14px;
}

.answer{
  padding:14px 14px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(10, 8, 28, .55);
  color: var(--text);
  font-weight:900;
  cursor:pointer;
  box-shadow: var(--shadow2);
  transition: transform .10s ease, box-shadow .10s ease, border-color .10s ease, filter .10s ease;
  user-select:none;
}

.answer:hover{
  transform: translateY(-1px);
  box-shadow: 0 18px 40px rgba(0,0,0,.45);
  border-color: rgba(34,211,238,.30);
  filter: brightness(1.05);
}

.answer.selected{
  background: rgba(168,85,247,.16);
  border-color: rgba(168,85,247,.45);
  box-shadow: 0 0 0 1px rgba(168,85,247,.18), var(--shadow2);
}

.answer.correct{
  background: rgba(52,211,153,.12);
  border-color: rgba(52,211,153,.55);
  box-shadow:
    0 0 0 1px rgba(52,211,153,.25),
    0 0 24px rgba(52,211,153,.18);
}

.answer.wrong{
  background: rgba(251,113,133,.10);
  border-color: rgba(251,113,133,.60);
  box-shadow: 0 0 0 1px rgba(251,113,133,.18), 0 0 26px rgba(251,113,133,.12);
}

.feedback{
  min-height:24px;
  font-weight:900;
  letter-spacing:.2px;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

button{
  padding:11px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(10, 8, 28, .55);
  color: var(--text);
  font-weight:900;
  cursor:pointer;
  box-shadow: var(--shadow2);
  transition: transform .10s ease, box-shadow .10s ease, filter .10s ease;
}

button:hover{
  transform: translateY(-1px);
  box-shadow: 0 18px 40px rgba(0,0,0,.45);
  filter: brightness(1.06);
}

.primary{
  border:none;
  color:#0b071a;
  background: linear-gradient(135deg, var(--neon2), var(--neon1));
  box-shadow:
    0 18px 45px rgba(34,211,238,.18),
    0 14px 40px rgba(168,85,247,.18);
}

.primary:hover{
  box-shadow:
    0 22px 55px rgba(34,211,238,.22),
    0 18px 50px rgba(168,85,247,.22);
}

button:active,.answer:active,.chip:active{
  transform: translateY(0px) scale(.99);
}

/* PUZZLE */
.puzzle-bank,.puzzle-line{
  border: 1px dashed rgba(255,255,255,.18);
  border-radius: 18px;
  padding: 12px;
  min-height: 56px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  background: rgba(10, 8, 28, .45);
  box-shadow: var(--shadow2);
}

.chip{
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(34,211,238,.10);
  border: 1px solid rgba(34,211,238,.28);
  color: var(--text);
  font-weight:900;
  cursor:pointer;
  user-select:none;
  transition: transform .10s ease, box-shadow .10s ease, filter .10s ease;
  box-shadow: 0 10px 26px rgba(0,0,0,.28);
}

.chip:hover{
  transform: translateY(-1px);
  box-shadow: 0 18px 40px rgba(0,0,0,.42);
  filter: brightness(1.08);
}

/* Focus ring */
select:focus, button:focus{
  outline: 2px solid rgba(34,211,238,.55);
  outline-offset: 2px;
}

/* Responsive */
@media (max-width:520px){
  .question{font-size:22px}
  .answer{padding:12px}
}

/* ====== NEON HEADER + BADGES ====== */
.headerRow{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.titleWrap{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  letter-spacing:.2px;
  background: rgba(10, 8, 28, .55);
  border:1px solid rgba(255,255,255,.12);
  box-shadow: 0 12px 28px rgba(0,0,0,.35);
  user-select:none;
}

.badge .dot{
  width:10px;height:10px;border-radius:999px;
  background: linear-gradient(135deg, var(--neon2), var(--neon1));
  box-shadow: 0 0 18px rgba(34,211,238,.25), 0 0 18px rgba(168,85,247,.22);
}

.badge.ok .dot{ background: var(--ok); box-shadow: 0 0 18px rgba(52,211,153,.25); }
.badge.bad .dot{ background: var(--bad); box-shadow: 0 0 18px rgba(251,113,133,.25); }

.meter{
  margin-top:10px;
  height:10px;
  border-radius:999px;
  background: rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
  overflow:hidden;
  box-shadow: 0 12px 28px rgba(0,0,0,.25);
}
.meter > div{
  height:100%;
  width:0%;
  border-radius:999px;
  background: linear-gradient(90deg, var(--neon2), var(--neon1), var(--neon3));
  box-shadow: 0 0 24px rgba(34,211,238,.14), 0 0 24px rgba(168,85,247,.12);
  transition: width .25s ease;
}

@media (max-width:520px){
  .headerRow{flex-direction:column}
  .badges{justify-content:flex-start}
}

/* ====== SHAKE + GLOW ====== */
.fxFlash{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .18s ease;
  z-index:9999;
}
.fxFlash.ok{
  background: radial-gradient(circle at 20% 10%, rgba(52,211,153,.22), transparent 55%),
              radial-gradient(circle at 80% 70%, rgba(34,211,238,.14), transparent 60%);
}
.fxFlash.bad{
  background: radial-gradient(circle at 25% 15%, rgba(251,113,133,.20), transparent 55%),
              radial-gradient(circle at 85% 70%, rgba(168,85,247,.10), transparent 60%);
}

@keyframes shakeX{
  0%{transform:translateX(0)}
  15%{transform:translateX(-8px)}
  30%{transform:translateX(8px)}
  45%{transform:translateX(-6px)}
  60%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  90%{transform:translateX(4px)}
  100%{transform:translateX(0)}
}
.shake{ animation: shakeX .45s ease; }

@keyframes neonPulse{
  0%{ box-shadow:0 12px 30px rgba(0,0,0,.12); transform:translateY(0) }
  40%{ box-shadow:0 0 0 1px rgba(34,211,238,.25),
               0 0 26px rgba(34,211,238,.18),
               0 0 22px rgba(168,85,247,.16),
               0 18px 42px rgba(0,0,0,.22);
        transform:translateY(-1px)
  }
  100%{ box-shadow:0 12px 30px rgba(0,0,0,.12); transform:translateY(0) }
}
.glow{ animation: neonPulse .55s ease; }

/* Sound button */
.headerCard{ position:relative; }

.soundBtn{
  position:absolute;
  top:14px;
  right:14px;
  width:46px;height:46px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  backdrop-filter: blur(8px);
  font-size:22px;
  font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.soundBtn.off{opacity:.55}
</style>
 
</head>
<body>
  <body class="theme-anime exercise-page">
  <div class="app">

    <div class="card headerCard">
      <div class="headerRow">
<div class="titleWrap">
  <h1 id="pageTitle">Exerciții TOPIK</h1>
  <div class="sub" id="pageSubtitle">Quiz bilingv • Lecții TOPIK • Română / English</div>

  <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
    <button type="button" id="langRo">Română</button>
    <button type="button" id="langEn">English</button>
  </div>
</div>
        <div class="badges">
          <div class="badge" id="bMode"><span class="dot"></span><span>Mod: KO→RO</span></div>
          <div class="badge ok" id="bCorrect"><span class="dot"></span><span>Corecte: 0</span></div>
          <div class="badge" id="bTotal"><span class="dot"></span><span>Total: 0</span></div>
          <div class="badge" id="bStreak"><span class="dot"></span><span>Streak: 0</span></div>
        </div>
      </div>

      <div class="meter" title="Progres sesiune">
        <div id="meterFill"></div>
      </div>

      <button id="soundBtn" class="soundBtn" type="button" aria-label="Sunet">
        🔊
      </button>
    </div>
<div class="card">
  <label><b>Tip exercițiu</b></label>
<select id="type">
  <option value="ko-ro">KO → RO / EN</option>
  <option value="ro-ko">RO / EN → KO</option>
</select>
</div>

<div class="card">
  <div class="question" id="question"></div>
  <div class="helper" id="helper"></div>
<div id="badge" style="display:inline-flex;gap:8px;align-items:center;margin-bottom:12px"></div>
  <div class="answers" id="answers"></div>

  <div id="puzzleUI" style="display:none">
    <div class="puzzle-bank" id="bank"></div>
    <div class="puzzle-line" id="line"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="controls">
    <button class="primary" id="check">Verifică</button>
    <button id="next">Următorul</button>
  </div>
</div>

</div>
  <script>
const pageTitleEl = document.getElementById("pageTitle");
const pageSubtitleEl = document.getElementById("pageSubtitle");
const langRoBtn = document.getElementById("langRo");
const langEnBtn = document.getElementById("langEn");

const typeSelect = document.getElementById("type");
const questionEl = document.getElementById("question");
const helperEl = document.getElementById("helper");
const badgeEl = document.getElementById("badge");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const checkBtn = document.getElementById("check");
const nextBtn = document.getElementById("next");

const bMode = document.getElementById("bMode");
const bCorrect = document.getElementById("bCorrect");
const bTotal = document.getElementById("bTotal");
const bStreak = document.getElementById("bStreak");
const meterFill = document.getElementById("meterFill");

const lessonParam = new URLSearchParams(window.location.search).get("lesson");

let currentLang = localStorage.getItem("RK_LANG") || "ro";
let allExercises = { "ko-ro": [], "ro-ko": [] };
let currentList = [];
let currentIndex = 0;
let selectedAnswer = null;
let answered = false;

let total = 0;
let correct = 0;
let streak = 0;

const UI_TEXT = {
  ro: {
    title: "Exerciții TOPIK",
    subtitle: "Quiz bilingv • Lecții TOPIK • Română / English",
    mode: "Mod",
    correct: "Corecte",
    total: "Total",
    streak: "Streak",
    chooseAnswer: "Alege un răspuns.",
    chooseCorrectTranslation: "Alege traducerea corectă.",
    chooseCorrectKorean: "Alege propoziția coreeană corectă.",
    correctAnswer: "✅ Corect",
    wrongAnswer: "❌ Greșit",
    answerFirst: "Alege mai întâi un răspuns.",
    noExercises: "Nu există exerciții pentru acest mod.",
    noLessonExercises: "Nu există exerciții pentru această lecție.",
    next: "Următorul",
    check: "Verifică",
    topik: "TOPIK",
    lesson: "Lecția",
    modeKoRo: "KO → RO / EN",
    modeRoKo: "RO / EN → KO",
    loadError: "Nu am putut încărca exercises.json"
  },
  en: {
    title: "TOPIK Exercises",
    subtitle: "Bilingual quiz • TOPIK lessons • Romanian / English",
    mode: "Mode",
    correct: "Correct",
    total: "Total",
    streak: "Streak",
    chooseAnswer: "Choose an answer.",
    chooseCorrectTranslation: "Choose the correct translation.",
    chooseCorrectKorean: "Choose the correct Korean sentence.",
    correctAnswer: "✅ Correct",
    wrongAnswer: "❌ Incorrect",
    answerFirst: "Choose an answer first.",
    noExercises: "No exercises available for this mode.",
    noLessonExercises: "No exercises available for this lesson.",
    next: "Next",
    check: "Check",
    topik: "TOPIK",
    lesson: "Lesson",
    modeKoRo: "KO → RO / EN",
    modeRoKo: "RO / EN → KO",
    loadError: "Could not load exercises.json"
  }
};

function t(key){
  return UI_TEXT[currentLang][key];
}

function updateLanguageButtons(){
  const activeStyle = "linear-gradient(135deg,#22d3ee,#7c3aed)";
  const inactiveStyle = "rgba(10, 8, 28, .55)";

  if(currentLang === "ro"){
    langRoBtn.style.background = activeStyle;
    langRoBtn.style.color = "#000";
    langEnBtn.style.background = inactiveStyle;
    langEnBtn.style.color = "var(--text)";
  } else {
    langEnBtn.style.background = activeStyle;
    langEnBtn.style.color = "#000";
    langRoBtn.style.background = inactiveStyle;
    langRoBtn.style.color = "var(--text)";
  }
}

function modeLabel(type){
  return type === "ko-ro" ? t("modeKoRo") : t("modeRoKo");
}

function updateStaticTexts(){
  pageTitleEl.textContent = t("title");
  pageSubtitleEl.textContent = t("subtitle");
  checkBtn.textContent = t("check");
  nextBtn.textContent = t("next");

  const label = document.querySelector('label b');
  if(label){
    label.textContent = currentLang === "ro" ? "Tip exercițiu" : "Exercise type";
  }

  const optionKoRo = typeSelect.querySelector('option[value="ko-ro"]');
  const optionRoKo = typeSelect.querySelector('option[value="ro-ko"]');

  if(optionKoRo) optionKoRo.textContent = t("modeKoRo");
  if(optionRoKo) optionRoKo.textContent = t("modeRoKo");
}

function updateBadges(){
  if(bMode) bMode.querySelector("span:last-child").textContent = `${t("mode")}: ${modeLabel(typeSelect.value)}`;
  if(bCorrect) bCorrect.querySelector("span:last-child").textContent = `${t("correct")}: ${correct}`;
  if(bTotal) bTotal.querySelector("span:last-child").textContent = `${t("total")}: ${total}`;
  if(bStreak) bStreak.querySelector("span:last-child").textContent = `${t("streak")}: ${streak}`;

  const percent = total === 0 ? 0 : Math.round((correct / total) * 100);
  if(meterFill) meterFill.style.width = percent + "%";
}

function setLanguage(lang){
  currentLang = lang;
  localStorage.setItem("RK_LANG", lang);
  updateLanguageButtons();
  updateStaticTexts();
  updateBadges();
  render();
}

function shuffle(array){
  return [...array].sort(() => Math.random() - 0.5);
}

async function loadExercises(){
  try {
    const response = await fetch("./data/exercises.json");
    const data = await response.json();

    allExercises = {
      "ko-ro": Array.isArray(data["ko-ro"]) ? data["ko-ro"] : [],
      "ro-ko": Array.isArray(data["ro-ko"]) ? data["ro-ko"] : []
    };

    render();
  } catch (error) {
    console.error("Exercises load error:", error);
    questionEl.textContent = t("loadError");
    helperEl.textContent = "";
    answersEl.innerHTML = "";
    feedbackEl.textContent = "";
  }
}

function getFilteredList(){
  const type = typeSelect.value;
  let list = allExercises[type] || [];

  if(lessonParam){
    list = list.filter(item => item.lessonId === lessonParam);
  }

  return list;
}

function renderInfoBadge(item){
  const parts = [];

  if(item.topik){
    parts.push(`
      <span style="padding:6px 10px;border-radius:999px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.22);font-weight:900">
        ${t("topik")} ${item.topik}
      </span>
    `);
  }

  if(item.lessonId){
    parts.push(`
      <span style="padding:6px 10px;border-radius:999px;background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.20);font-weight:900">
        ${t("lesson")}: ${item.lessonId}
      </span>
    `);
  }

  parts.push(`
    <span style="padding:6px 10px;border-radius:999px;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.20);font-weight:900">
      #${currentIndex + 1}/${currentList.length}
    </span>
  `);

  badgeEl.innerHTML = parts.join("");
}

function render(){
  selectedAnswer = null;
  answered = false;
  feedbackEl.textContent = "";
  answersEl.innerHTML = "";

  currentList = getFilteredList();

  if(currentList.length === 0){
    questionEl.textContent = lessonParam ? t("noLessonExercises") : t("noExercises");
    helperEl.textContent = "";
    badgeEl.innerHTML = "";
    answersEl.innerHTML = "";
    return;
  }

  if(currentIndex >= currentList.length){
    currentIndex = 0;
  }

  const item = currentList[currentIndex];
  renderInfoBadge(item);

  let questionText = "";
  let helperText = "";
  let options = [];

  if(typeSelect.value === "ko-ro"){
    questionText = item.q;
    helperText = t("chooseCorrectTranslation");
    options = shuffle(item.answers[currentLang] || []);
  } else {
    questionText = item.prompt[currentLang];
    helperText = t("chooseCorrectKorean");
    options = shuffle(item.options || []);
  }

  questionEl.textContent = questionText;
  helperEl.textContent = helperText;

  options.forEach(option => {
    const el = document.createElement("div");
    el.className = "answer";
    el.textContent = option;

    el.addEventListener("click", () => {
      if(answered) return;

      document.querySelectorAll("#answers .answer").forEach(node => {
        node.classList.remove("selected");
      });

      el.classList.add("selected");
      selectedAnswer = option;
    });

    answersEl.appendChild(el);
  });

  updateBadges();
}

function getCorrectAnswer(item){
  if(typeSelect.value === "ko-ro"){
    return item.correct[currentLang];
  }
  return item.correct;
}

function checkCurrentAnswer(){
  if(answered) return;

  if(!selectedAnswer){
    feedbackEl.textContent = t("answerFirst");
    return;
  }

  const item = currentList[currentIndex];
  const correctAnswer = getCorrectAnswer(item);
  const answerNodes = [...document.querySelectorAll("#answers .answer")];

  answerNodes.forEach(node => {
    if(node.textContent === correctAnswer){
      node.classList.add("correct");
    }
  });

  const selectedNode = answerNodes.find(node => node.classList.contains("selected"));
  const isCorrect = selectedAnswer === correctAnswer;

  if(selectedNode && !isCorrect){
    selectedNode.classList.add("wrong");
  }

  feedbackEl.textContent = isCorrect
    ? t("correctAnswer")
    : `${t("wrongAnswer")} — ${correctAnswer}`;

  total++;

  if(isCorrect){
    correct++;
    streak++;
  } else {
    streak = 0;
  }

  answered = true;
  updateBadges();
}

function nextQuestion(){
  if(currentList.length === 0) return;
  currentIndex = (currentIndex + 1) % currentList.length;
  render();
}

typeSelect.addEventListener("change", () => {
  currentIndex = 0;
  render();
});

checkBtn.addEventListener("click", checkCurrentAnswer);
nextBtn.addEventListener("click", nextQuestion);
langRoBtn.addEventListener("click", () => setLanguage("ro"));
langEnBtn.addEventListener("click", () => setLanguage("en"));

updateLanguageButtons();
updateStaticTexts();
updateBadges();
