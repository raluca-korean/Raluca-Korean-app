<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#db2777"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background fills the whole 1024x1024 — @capacitor/assets adds rounded corners -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- RK text centered -->
  <text x="512" y="600" text-anchor="middle"
        font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-weight="900" font-size="400" fill="white"
        letter-spacing="-16">RK</text>
</svg>
