<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <radialGradient id="bg1" cx="15%" cy="10%" r="60%">
      <stop offset="0%" style="stop-color:rgba(139,92,246,0.22)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="15%" r="60%">
      <stop offset="0%" style="stop-color:rgba(34,197,94,0.14)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#f0f4ff"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#db2777"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="2732" height="2732" fill="url(#bg3)"/>
  <rect width="2732" height="2732" fill="url(#bg1)"/>
  <rect width="2732" height="2732" fill="url(#bg2)"/>
  <!-- Logo circle -->
  <circle cx="1366" cy="1200" r="320" fill="url(#logo)"/>
  <!-- RK text in circle -->
  <text x="1366" y="1280" text-anchor="middle"
        font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-weight="900" font-size="280" fill="white"
        letter-spacing="-10">RK</text>
  <!-- App name -->
  <text x="1366" y="1680" text-anchor="middle"
        font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-weight="900" font-size="120" fill="#1b1630">Raluca Korean</text>
  <!-- Tagline -->
  <text x="1366" y="1820" text-anchor="middle"
        font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-weight="500" font-size="72" fill="#7e3a6e">Învață coreeana pentru TOPIK</text>
</svg>
