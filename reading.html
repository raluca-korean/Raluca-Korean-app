<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Texte de Lectură</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7c3aed">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<style>
/* ── READING PAGE ─────────────────────────────────────────────── */

body.theme-anime { min-height: 100vh; overflow-x: hidden; }

/* Viewport */
.rd-viewport {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ── HEADER ───────────────────────────────────────────────────── */
.rd-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--rk-card);
  border-bottom: 2px solid var(--rk-stroke);
  padding: 12px 0 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
body.dark-mode .rd-header {
  background: #16002e;
  border-color: rgba(124,58,237,.3);
}

.rd-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.rd-title-block h1 {
  font-size: 18px;
  font-weight: 900;
  color: var(--rk-violet);
  line-height: 1.2;
}
.rd-title-block .rd-sub {
  font-size: 12px;
  color: var(--rk-muted-ui);
  margin-top: 2px;
}

/* Level tabs */
.rd-levels {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.rd-lvl-btn {
  padding: 5px 13px;
  border-radius: 20px;
  border: 2px solid var(--rk-stroke);
  background: transparent;
  font-size: 13px;
  font-weight: 700;
  color: var(--rk-muted-ui);
  cursor: pointer;
  transition: all .18s ease;
  font-family: inherit;
}
.rd-lvl-btn:hover {
  border-color: var(--rk-violet);
  color: var(--rk-violet);
}
.rd-lvl-btn.active {
  background: var(--rk-violet);
  border-color: var(--rk-violet);
  color: #fff;
  box-shadow: 0 2px 10px rgba(124,58,237,.35);
}
.rd-lvl-btn[data-level="1"].active  { background: #58CC02; border-color: #58CC02; box-shadow: 0 2px 10px rgba(88,204,2,.35); }
.rd-lvl-btn[data-level="2"].active  { background: #1CB0F6; border-color: #1CB0F6; box-shadow: 0 2px 10px rgba(28,176,246,.35); }
.rd-lvl-btn[data-level="3"].active  { background: #FF9600; border-color: #FF9600; box-shadow: 0 2px 10px rgba(255,150,0,.35); }
.rd-lvl-btn[data-level="4"].active  { background: #db2777; border-color: #db2777; box-shadow: 0 2px 10px rgba(219,39,119,.35); }
.rd-lvl-btn[data-level="5"].active  { background: #7c3aed; border-color: #7c3aed; box-shadow: 0 2px 10px rgba(124,58,237,.35); }
.rd-lvl-btn[data-level="6"].active  { background: #CE82FF; border-color: #CE82FF; box-shadow: 0 2px 10px rgba(206,130,255,.35); }

/* Controls row */
.rd-controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

/* ── TEXT CARDS ───────────────────────────────────────────────── */
.rd-main {
  padding-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.rd-card {
  background: var(--rk-card);
  border: 2px solid var(--rk-stroke);
  border-bottom: 4px solid var(--rk-stroke-b);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 4px 24px var(--rk-shadow);
  transition: box-shadow .2s ease;
}
.rd-card:hover {
  box-shadow: 0 6px 32px rgba(124,58,237,.12);
}
body.dark-mode .rd-card {
  background: #1a003a;
  border-color: rgba(124,58,237,.25);
}

.rd-card-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--rk-stroke);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
body.dark-mode .rd-card-header {
  border-color: rgba(124,58,237,.2);
}

.rd-card-icon {
  font-size: 32px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
}

.rd-card-meta { flex: 1; min-width: 0; }

.rd-card-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--rk-heading);
  margin-bottom: 4px;
}

.rd-card-desc {
  font-size: 13px;
  color: var(--rk-muted-ui);
  line-height: 1.5;
}

.rd-level-badge {
  flex-shrink: 0;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  align-self: flex-start;
  margin-top: 2px;
}

/* ── SENTENCES ────────────────────────────────────────────────── */
.rd-sentences {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.rd-sentence {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.rd-sound-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s ease;
  color: var(--rk-muted-ui);
  margin-top: 3px;
  flex-shrink: 0;
}
.rd-sound-btn:hover {
  background: var(--rk-violet);
  border-color: var(--rk-violet);
  color: #fff;
  transform: scale(1.08);
}
.rd-sound-btn.speaking {
  background: var(--rk-violet);
  border-color: var(--rk-violet);
  color: #fff;
  animation: rd-pulse .8s ease-in-out infinite;
}
@keyframes rd-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

.rd-tokens {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 4px;
  align-items: baseline;
  line-height: 1.8;
}

/* Each clickable word */
.rd-token {
  display: inline-flex;
  align-items: center;
  padding: 3px 7px;
  border-radius: 8px;
  background: transparent;
  border: 1.5px solid transparent;
  cursor: pointer;
  font-size: var(--rd-tok-size, 17px);
  font-weight: 600;
  color: var(--rk-heading);
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s ease;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.rd-token:hover {
  background: rgba(124,58,237,.08);
  border-color: rgba(124,58,237,.3);
  color: var(--rk-violet);
  transform: translateY(-1px);
}
.rd-token.active {
  background: rgba(124,58,237,.13);
  border-color: var(--rk-violet);
  color: var(--rk-violet);
  box-shadow: 0 2px 10px rgba(124,58,237,.2);
}
body.dark-mode .rd-token {
  color: rgba(255,255,255,.88);
}
body.dark-mode .rd-token:hover,
body.dark-mode .rd-token.active {
  color: #CE82FF;
  background: rgba(124,58,237,.22);
  border-color: rgba(206,130,255,.5);
}

/* Dot under words that have notes */
.rd-token.has-note::after {
  content: '';
  display: block;
  position: absolute;
  bottom: 1px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--rk-violet);
  opacity: .6;
}

/* ── WORD POPUP ───────────────────────────────────────────────── */
.rd-popup {
  position: fixed;
  z-index: 9999;
  width: min(340px, calc(100vw - 32px));
  background: var(--rk-card);
  border: 2px solid var(--rk-violet);
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(124,58,237,.28), 0 2px 12px rgba(0,0,0,.12);
  padding: 16px 18px 14px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px) scale(.97);
  transition: opacity .18s ease, transform .18s ease;
  font-family: 'Noto Sans KR', sans-serif;
}
.rd-popup.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}
body.dark-mode .rd-popup {
  background: #1e0040;
  border-color: #CE82FF;
  box-shadow: 0 8px 40px rgba(206,130,255,.25), 0 2px 12px rgba(0,0,0,.3);
}

/* Close button */
.rd-popup-close {
  position: absolute;
  top: 8px;
  right: 10px;
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--rk-muted-ui);
  padding: 2px 4px;
  line-height: 1;
  border-radius: 4px;
  transition: color .12s;
}
.rd-popup-close:hover { color: var(--rk-red); }

/* Korean word */
.rd-popup-ko {
  font-size: 26px;
  font-weight: 900;
  color: var(--rk-violet);
  line-height: 1.2;
  margin-bottom: 6px;
  padding-right: 28px;
}
body.dark-mode .rd-popup-ko { color: #CE82FF; }

/* Translation */
.rd-popup-trans {
  font-size: 15px;
  font-weight: 600;
  color: var(--rk-heading);
  margin-bottom: 8px;
  line-height: 1.4;
}

/* Note / explanation */
.rd-popup-note {
  display: none;
  font-size: 13px;
  color: var(--rk-muted);
  background: rgba(124,58,237,.06);
  border-left: 3px solid var(--rk-violet);
  border-radius: 0 8px 8px 0;
  padding: 8px 10px;
  line-height: 1.55;
  margin-bottom: 10px;
}
.rd-popup-note.has-content { display: block; }
body.dark-mode .rd-popup-note {
  background: rgba(124,58,237,.15);
  color: rgba(255,255,255,.75);
}

/* Sound button in popup */
.rd-popup-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.rd-popup-sound {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--rk-muted-ui);
  transition: all .15s ease;
  font-family: inherit;
}
.rd-popup-sound:hover {
  background: var(--rk-violet);
  border-color: var(--rk-violet);
  color: #fff;
}

/* ── EMPTY STATE ──────────────────────────────────────────────── */
.rd-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--rk-muted-ui);
  font-size: 15px;
}
.rd-empty .rd-empty-icon { font-size: 48px; margin-bottom: 12px; }

/* ── DARK MODE OVERRIDES ──────────────────────────────────────── */
body.dark-mode .rd-card-title { color: rgba(255,255,255,.9); }
body.dark-mode .rd-card-desc  { color: rgba(255,255,255,.5); }
body.dark-mode .rd-title-block h1 { color: #CE82FF; }

/* ── RESPONSIVE ───────────────────────────────────────────────── */
@media (max-width: 600px) {
  .rd-viewport { padding: 0 10px 80px; }
  .rd-card-header { padding: 14px 14px 12px; gap: 10px; }
  .rd-card-icon { font-size: 26px; }
  .rd-card-title { font-size: 15px; }
  .rd-sentences { padding: 12px 14px; gap: 14px; }
  .rd-token { font-size: var(--rd-tok-size, 17px); padding: 3px 5px; }
  .rd-popup { width: calc(100vw - 24px); }
  .rd-popup-ko { font-size: 22px; }
  .rd-header-top { flex-wrap: wrap; }
}

/* ── LEVEL BADGE COLORS ───────────────────────────────────────── */
.lvl-badge-1 { background: #58CC02; }
.lvl-badge-2 { background: #1CB0F6; }
.lvl-badge-3 { background: #FF9600; }
.lvl-badge-4 { background: #db2777; }
.lvl-badge-5 { background: #7c3aed; }
.lvl-badge-6 { background: #CE82FF; }

/* ── SENTENCE BODY (translation wrapper) ─────────────────────── */
.rd-sent-body { flex: 1; min-width: 0; }
.rd-tokens-row { display: flex; align-items: flex-start; gap: 6px; }

/* Translation toggle button */
.rd-trans-btn {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1.5px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  color: var(--rk-muted-ui);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  margin-top: 3px;
  line-height: 1;
  font-family: inherit;
}
.rd-trans-btn:hover { border-color: var(--rk-violet); color: var(--rk-violet); background: rgba(124,58,237,.07); }
.rd-trans-btn.active { border-color: var(--rk-violet); color: var(--rk-violet); background: rgba(124,58,237,.12); }

/* Translation reveal */
.rd-translation {
  display: none;
  font-size: 14px;
  color: var(--rk-muted);
  font-style: italic;
  margin-top: 7px;
  padding: 7px 11px;
  background: rgba(124,58,237,.05);
  border-left: 3px solid var(--rk-violet);
  border-radius: 0 8px 8px 0;
  line-height: 1.55;
  animation: rd-slide-in .15s ease;
}
.rd-translation.visible { display: block; }
@keyframes rd-slide-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
body.dark-mode .rd-translation { background: rgba(124,58,237,.14); color: rgba(255,255,255,.62); }

/* ── SAVE WORD BUTTON (popup) ─────────────────────────────────── */
.rd-popup-save {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 13px; font-weight: 600;
  color: var(--rk-muted-ui);
  transition: all .15s;
  font-family: inherit;
}
.rd-popup-save:hover { border-color: #58CC02; color: #58CC02; }
.rd-popup-save.saved { background: #58CC02; border-color: #58CC02; color: #fff; }

/* ── CARD FOOTER (read progress) ─────────────────────────────── */
.rd-card-footer {
  padding: 10px 20px;
  border-top: 1px solid var(--rk-stroke);
  display: flex; align-items: center; justify-content: flex-end;
}
body.dark-mode .rd-card-footer { border-color: rgba(124,58,237,.2); }

.rd-read-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 2px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 12px; font-weight: 700;
  color: var(--rk-muted-ui);
  transition: all .18s;
  font-family: inherit;
}
.rd-read-btn:hover { border-color: #58CC02; color: #58CC02; }
.rd-read-btn.read { background: #58CC02; border-color: #58CC02; color: #fff; }

/* ── HEADER EXTRAS (progress + font) ─────────────────────────── */
.rd-mode-spacer { flex: 1; min-width: 4px; }

.rd-progress-badge {
  font-size: 11px; font-weight: 700;
  color: var(--rk-muted-ui);
  white-space: nowrap;
  background: rgba(124,58,237,.07);
  padding: 3px 8px;
  border-radius: 20px;
  border: 1.5px solid var(--rk-stroke);
}

.rd-font-btn {
  padding: 3px 8px;
  border-radius: 6px;
  border: 1.5px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 11px; font-weight: 800;
  color: var(--rk-muted-ui);
  transition: all .15s;
  font-family: inherit; line-height: 1.4;
}
.rd-font-btn:hover { border-color: var(--rk-violet); color: var(--rk-violet); }

/* Page controls injection area */
#pageControls {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

/* ── RECORDING BUTTON ─────────────────────────────────────────── */
.rd-rec-btn {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--rk-stroke);
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s ease;
  color: var(--rk-muted-ui);
  margin-top: 3px;
  font-family: inherit;
}
.rd-rec-btn:hover {
  background: #db2777;
  border-color: #db2777;
  color: #fff;
  transform: scale(1.08);
}
.rd-rec-btn.recording {
  background: #db2777;
  border-color: #db2777;
  color: #fff;
  animation: rd-rec-pulse .9s ease-in-out infinite;
}
.rd-rec-btn.has-rec {
  border-color: #db2777;
  color: #db2777;
}
@keyframes rd-rec-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(219,39,119,.5); }
  50%       { box-shadow: 0 0 0 7px rgba(219,39,119,0); }
}

/* ── INLINE WAVEFORM BARS ─────────────────────────────────────── */
.rd-wavebars {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 22px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  flex-shrink: 0;
  margin-top: 5px;
  margin-right: 4px;
}
.rd-wavebars.on { opacity: 1; }
.rd-wbar {
  width: 3px;
  background: #db2777;
  border-radius: 2px;
  animation: rd-wbar .75s ease-in-out infinite;
}
.rd-wbar:nth-child(1) { height: 6px;  animation-delay: 0s; }
.rd-wbar:nth-child(2) { height: 13px; animation-delay: .12s; }
.rd-wbar:nth-child(3) { height: 20px; animation-delay: .24s; }
.rd-wbar:nth-child(4) { height: 13px; animation-delay: .36s; }
.rd-wbar:nth-child(5) { height: 6px;  animation-delay: .48s; }
@keyframes rd-wbar {
  0%, 100% { transform: scaleY(1); opacity: .75; }
  50% { transform: scaleY(.28); opacity: 1; }
}

/* ── SPEECH FEEDBACK ──────────────────────────────────────────── */
.rd-speech-feedback {
  display: none;
  font-size: 12px; font-weight: 700;
  margin-top: 5px; padding: 3px 10px;
  border-radius: 20px;
  width: fit-content;
  animation: rd-slide-in .15s ease;
}
.rd-speech-feedback.ok {
  display: inline-block;
  background: rgba(88,204,2,.12);
  color: #58CC02;
  border: 1.5px solid rgba(88,204,2,.4);
}
.rd-speech-feedback.err {
  display: inline-block;
  background: rgba(219,39,119,.1);
  color: #db2777;
  border: 1.5px solid rgba(219,39,119,.35);
}

</style>
</head>
<body class="theme-anime">

<!-- Animated background orbs (from LUMINA) -->
<div class="lmn-field" aria-hidden="true">
  <div class="lmn-orb lmn-orb-1"></div>
  <div class="lmn-orb lmn-orb-2"></div>
  <div class="lmn-orb lmn-orb-3"></div>
  <div class="lmn-orb lmn-orb-4"></div>
  <div class="lmn-orb lmn-orb-5"></div>
</div>

<div class="rd-viewport">

  <!-- HEADER -->
  <header class="rd-header">
    <div class="rd-header-top">
      <div class="rd-title-block">
        <h1 id="pageTitle">Texte de Lectură</h1>
        <div class="rd-sub" id="pageSub">Apasă pe fiecare cuvânt · TOPIK 1–6</div>
      </div>
      <div id="pageControls"></div>
    </div>
    <!-- Level buttons + progress + font size -->
    <div class="rd-controls-row">
      <div class="rd-levels" id="levelBtns" role="tablist" aria-label="Nivel TOPIK">
        <button class="rd-lvl-btn active" data-level="1" role="tab" aria-selected="true">T1</button>
        <button class="rd-lvl-btn" data-level="2" role="tab" aria-selected="false">T2</button>
        <button class="rd-lvl-btn" data-level="3" role="tab" aria-selected="false">T3</button>
        <button class="rd-lvl-btn" data-level="4" role="tab" aria-selected="false">T4</button>
        <button class="rd-lvl-btn" data-level="5" role="tab" aria-selected="false">T5</button>
        <button class="rd-lvl-btn" data-level="6" role="tab" aria-selected="false">T6</button>
      </div>
      <div class="rd-mode-spacer"></div>
      <span class="rd-progress-badge" id="rdProgress">0/12</span>
      <button class="rd-font-btn" id="fontDecBtn" title="Micșorează textul">A−</button>
      <button class="rd-font-btn" id="fontIncBtn" title="Mărește textul">A+</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="rd-main" id="rdMain">
    <div class="rk-spinner" id="rdSpinner">Se încarcă textele…</div>
  </main>

</div><!-- .rd-viewport -->

<!-- WORD POPUP -->
<div id="wordPopup" class="rd-popup" role="tooltip" aria-hidden="true">
  <button class="rd-popup-close" id="popClose" aria-label="Închide">✕</button>
  <div class="rd-popup-ko" id="popKo"></div>
  <div class="rd-popup-trans" id="popTrans"></div>
  <div class="rd-popup-note" id="popNote"></div>
  <div class="rd-popup-actions">
    <button class="rd-popup-save" id="popSave" type="button">
      🔖 <span id="popSaveLabel">Salvează</span>
    </button>
    <button class="rd-popup-sound" id="popSound" type="button">
      🔊 <span id="popSoundLabel">Pronunță</span>
    </button>
  </div>
</div>

<script src="./js/core/storage.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script>
(function () {
  'use strict';

  /* ── STATE ───────────────────────────────────────────────────── */
  var allTexts    = [];
  var currentLvl  = 1;
  var currentLang = 'ro';
  var activeToken = null;
  var popupToken  = null;

  var FONT_SIZES   = [15, 17, 19, 22];
  var fontIdx      = 1;
  var RD_FONT_KEY  = 'RK_RD_FONT';
  var RD_SAVED_KEY = 'RK_RD_SAVED';
  var RD_READ_KEY  = 'RK_RD_READ';

  var LEVEL_LABELS = {
    ro: ['', 'TOPIK 1 · Începător', 'TOPIK 2 · Elementar', 'TOPIK 3 · Mediu-Inferior',
             'TOPIK 4 · Mediu-Superior', 'TOPIK 5 · Avansat-Inferior', 'TOPIK 6 · Avansat-Superior'],
    en: ['', 'TOPIK 1 · Beginner', 'TOPIK 2 · Elementary', 'TOPIK 3 · Intermediate-Low',
             'TOPIK 4 · Intermediate-High', 'TOPIK 5 · Advanced-Low', 'TOPIK 6 · Advanced-High']
  };

  /* ── INIT ────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    currentLang = RKLang.get();
    RKLang.init(function (lang) {
      currentLang = lang;
      updateLangUI();
      renderTexts();
    });

    fontIdx = parseInt(localStorage.getItem(RD_FONT_KEY) || '1', 10);
    applyFontSize();
    wireLevel();
    wireFontSize();
    wirePopup();
    loadData();
  });

  /* ── DATA ────────────────────────────────────────────────────── */
  function loadData() {
    fetch('./data/reading-texts.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        allTexts = data;
        document.getElementById('rdSpinner').style.display = 'none';
        updateProgress();
        renderTexts();
      })
      .catch(function () {
        document.getElementById('rdSpinner').textContent =
          'Eroare la încărcarea textelor.';
      });
  }

  /* ── RENDER ──────────────────────────────────────────────────── */
  function renderTexts() {
    var main  = document.getElementById('rdMain');
    var texts = allTexts.filter(function (t) { return t.topik === currentLvl; });

    var oldCards = main.querySelectorAll('.rd-card');
    oldCards.forEach(function (c) { c.remove(); });

    /* level label */
    var lbl = document.getElementById('levelLabel');
    if (lbl) lbl.textContent = LEVEL_LABELS[currentLang][currentLvl] || '';

    /* subtitle */
    var sub = document.getElementById('pageSub');
    if (sub) sub.textContent = currentLang === 'ro'
      ? 'Apasă pe fiecare cuvânt · TOPIK 1–6'
      : 'Tap each word · TOPIK 1–6';

    if (!texts.length) {
      main.insertAdjacentHTML('beforeend',
        '<div class="rd-empty"><div class="rd-empty-icon">📭</div>' +
        (currentLang === 'ro' ? 'Nu există texte pentru acest nivel.' : 'No texts for this level.') +
        '</div>');
      return;
    }

    texts.forEach(function (text) {
      main.appendChild(buildCard(text));
    });
  }

  function buildCard(text) {
    var card = document.createElement('div');
    card.className = 'rd-card';
    card.setAttribute('data-id', text.id);

    /* Header */
    var hdr = document.createElement('div');
    hdr.className = 'rd-card-header';

    var badge = document.createElement('span');
    badge.className = 'rd-level-badge lvl-badge-' + text.topik;
    badge.textContent = 'T' + text.topik;

    var icon = document.createElement('div');
    icon.className = 'rd-card-icon';
    icon.textContent = text.icon || '📄';

    var meta = document.createElement('div');
    meta.className = 'rd-card-meta';

    var title = document.createElement('div');
    title.className = 'rd-card-title';
    title.textContent = text.title[currentLang] || text.title.ro;

    var desc = document.createElement('div');
    desc.className = 'rd-card-desc';
    desc.textContent = text.description[currentLang] || text.description.ro;

    meta.appendChild(title);
    meta.appendChild(desc);
    hdr.appendChild(icon);
    hdr.appendChild(meta);
    hdr.appendChild(badge);
    card.appendChild(hdr);

    /* Sentences */
    var sentWrap = document.createElement('div');
    sentWrap.className = 'rd-sentences';

    text.sentences.forEach(function (sent) {
      sentWrap.appendChild(buildSentence(sent));
    });

    card.appendChild(sentWrap);

    /* Footer — read progress */
    var footer = document.createElement('div');
    footer.className = 'rd-card-footer';
    var readTexts = getReadTexts();
    var isRead = readTexts.indexOf(text.id) !== -1;
    var readBtn = document.createElement('button');
    readBtn.className = 'rd-read-btn' + (isRead ? ' read' : '');
    readBtn.type = 'button';
    readBtn.textContent = isRead
      ? (currentLang === 'ro' ? '✓ Citit' : '✓ Read')
      : (currentLang === 'ro' ? '○ Marchează citit' : '○ Mark as read');
    readBtn.addEventListener('click', function () {
      var nowRead = toggleRead(text.id);
      readBtn.classList.toggle('read', nowRead);
      readBtn.textContent = nowRead
        ? (currentLang === 'ro' ? '✓ Citit' : '✓ Read')
        : (currentLang === 'ro' ? '○ Marchează citit' : '○ Mark as read');
    });
    footer.appendChild(readBtn);
    card.appendChild(footer);

    return card;
  }

  function buildSentence(sent) {
    var row = document.createElement('div');
    row.className = 'rd-sentence';
    row.setAttribute('data-full', sent.full);

    /* Sound button */
    var sndBtn = document.createElement('button');
    sndBtn.className = 'rd-sound-btn';
    sndBtn.type = 'button';
    sndBtn.title = currentLang === 'ro' ? 'Ascultă propoziția' : 'Listen to sentence';
    sndBtn.innerHTML = '🔊';
    sndBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      speakText(sent.full, sndBtn);
    });

    /* Record button */
    var recBtn = document.createElement('button');
    recBtn.className = 'rd-rec-btn';
    recBtn.type = 'button';
    recBtn.title = currentLang === 'ro' ? 'Practică pronunția' : 'Practice pronunciation';
    recBtn.innerHTML = '🎙';
    (function(capturedSent, capturedRecBtn) {
      capturedRecBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        rdHandleRecClick(capturedSent.full, capturedRecBtn, capturedRecBtn._waveBars, capturedRecBtn._feedbackEl);
      });
    })(sent, recBtn);

    /* Sentence body */
    var sentBody = document.createElement('div');
    sentBody.className = 'rd-sent-body';

    /* Tokens row */
    var tokRow = document.createElement('div');
    tokRow.className = 'rd-tokens-row';

    var tokWrap = document.createElement('div');
    tokWrap.className = 'rd-tokens';

    sent.tokens.forEach(function (tok) {
      var span = document.createElement('span');
      span.className = 'rd-token';
      if (tok.note) span.classList.add('has-note');
      span.textContent = tok.ko;
      span.setAttribute('data-ko', tok.ko);
      span.setAttribute('data-ro', tok.ro || '');
      span.setAttribute('data-en', tok.en || '');
      if (tok.note) {
        span.setAttribute('data-note-ro', tok.note.ro || '');
        span.setAttribute('data-note-en', tok.note.en || '');
      }
      span.addEventListener('click', function (e) {
        e.stopPropagation();
        openPopup(span, tok);
      });
      tokWrap.appendChild(span);
    });

    /* Waveform bars (inside tokens row, shown when recording) */
    var waveBars = document.createElement('div');
    waveBars.className = 'rd-wavebars';
    for (var wi = 0; wi < 5; wi++) {
      var wb = document.createElement('div');
      wb.className = 'rd-wbar';
      waveBars.appendChild(wb);
    }
    tokRow.appendChild(waveBars);
    tokRow.appendChild(tokWrap);

    /* Speech feedback */
    var feedbackEl = document.createElement('div');
    feedbackEl.className = 'rd-speech-feedback';

    /* Link waveform + feedback to recBtn for click handler access */
    recBtn._waveBars  = waveBars;
    recBtn._feedbackEl = feedbackEl;

    /* Translation toggle (Feature 1) */
    if (sent.translation) {
      var transBtn = document.createElement('button');
      transBtn.className = 'rd-trans-btn';
      transBtn.type = 'button';
      transBtn.title = currentLang === 'ro' ? 'Arată traducerea' : 'Show translation';
      transBtn.innerHTML = '≡';

      var tranDiv = document.createElement('div');
      tranDiv.className = 'rd-translation';
      tranDiv.setAttribute('data-ro', sent.translation.ro);
      tranDiv.setAttribute('data-en', sent.translation.en);
      tranDiv.textContent = currentLang === 'ro' ? sent.translation.ro : sent.translation.en;

      transBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = tranDiv.classList.toggle('visible');
        transBtn.classList.toggle('active', open);
        transBtn.title = open
          ? (currentLang === 'ro' ? 'Ascunde traducerea' : 'Hide translation')
          : (currentLang === 'ro' ? 'Arată traducerea' : 'Show translation');
      });

      tokRow.appendChild(transBtn);
      sentBody.appendChild(tokRow);
      sentBody.appendChild(tranDiv);
      sentBody.appendChild(feedbackEl);
    } else {
      sentBody.appendChild(tokRow);
      sentBody.appendChild(feedbackEl);
    }

    row.appendChild(sndBtn);
    row.appendChild(recBtn);
    row.appendChild(sentBody);
    return row;
  }

  /* ── POPUP ───────────────────────────────────────────────────── */
  var popup        = null;
  var popKo        = null;
  var popTrans     = null;
  var popNote      = null;
  var popSound     = null;
  var popSoundLabel = null;
  var popSave      = null;
  var popSaveLabel = null;

  function wirePopup() {
    popup         = document.getElementById('wordPopup');
    popKo         = document.getElementById('popKo');
    popTrans      = document.getElementById('popTrans');
    popNote       = document.getElementById('popNote');
    popSound      = document.getElementById('popSound');
    popSoundLabel = document.getElementById('popSoundLabel');
    popSave       = document.getElementById('popSave');
    popSaveLabel  = document.getElementById('popSaveLabel');

    document.getElementById('popClose').addEventListener('click', closePopup);

    popSound.addEventListener('click', function (e) {
      e.stopPropagation();
      if (popupToken) speakText(popupToken.ko, null);
    });

    popSave.addEventListener('click', function (e) {
      e.stopPropagation();
      if (!popupToken) return;
      var saved = toggleSaveWord(popupToken);
      updateSaveBtnState(saved);
    });

    /* Close on outside click / scroll */
    document.addEventListener('pointerdown', function (e) {
      if (popup && !popup.contains(e.target) &&
          !e.target.classList.contains('rd-token')) {
        closePopup();
      }
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closePopup();
    });
    window.addEventListener('scroll', closePopup, { passive: true });
  }

  function openPopup(spanEl, tok) {
    /* deactivate previous token */
    if (activeToken && activeToken !== spanEl) {
      activeToken.classList.remove('active');
    }
    spanEl.classList.add('active');
    activeToken = spanEl;
    popupToken  = tok;

    /* fill content */
    popKo.textContent    = tok.ko;
    popTrans.textContent = (currentLang === 'en' ? tok.en : tok.ro) || tok.ro;
    popSoundLabel.textContent = currentLang === 'ro' ? 'Pronunță' : 'Pronounce';

    var noteText = tok.note ? (currentLang === 'en' ? tok.note.en : tok.note.ro) : '';
    if (noteText) {
      popNote.textContent = noteText;
      popNote.classList.add('has-content');
    } else {
      popNote.textContent = '';
      popNote.classList.remove('has-content');
    }

    /* save button state */
    if (popSave) updateSaveBtnState(isWordSaved(tok.ko));

    popup.setAttribute('aria-hidden', 'false');

    /* position popup */
    positionPopup(spanEl);

    /* show */
    popup.classList.add('visible');
  }

  function positionPopup(spanEl) {
    var rect     = spanEl.getBoundingClientRect();
    var popW     = popup.offsetWidth  || 340;
    var popH     = popup.offsetHeight || 180;
    var vw       = window.innerWidth;
    var vh       = window.innerHeight;
    var margin   = 10;

    /* default: below the word */
    var top  = rect.bottom + 8;
    var left = rect.left + rect.width / 2 - popW / 2;

    /* flip up if not enough space below */
    if (top + popH + margin > vh) {
      top = rect.top - popH - 8;
    }

    /* clamp horizontally */
    if (left < margin) left = margin;
    if (left + popW > vw - margin) left = vw - popW - margin;

    popup.style.top  = top  + 'px';
    popup.style.left = left + 'px';
  }

  function closePopup() {
    if (!popup) return;
    popup.classList.remove('visible');
    popup.setAttribute('aria-hidden', 'true');
    if (activeToken) {
      activeToken.classList.remove('active');
      activeToken = null;
    }
    popupToken = null;
  }

  /* ── SPEECH ──────────────────────────────────────────────────── */
  var speakTimer = null;

  function speakText(text, btn) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();

    var utt = new SpeechSynthesisUtterance(text);
    utt.lang  = 'ko-KR';
    utt.rate  = 0.85;
    utt.pitch = 1;

    if (btn) {
      btn.classList.add('speaking');
      utt.onend = utt.onerror = function () {
        btn.classList.remove('speaking');
      };
      /* safety fallback */
      speakTimer = setTimeout(function () {
        btn.classList.remove('speaking');
      }, Math.max(3000, text.length * 300));
    }

    window.speechSynthesis.speak(utt);
  }

  /* ── FONT SIZE ───────────────────────────────────────────────── */
  function applyFontSize() {
    var sz = FONT_SIZES[fontIdx] || 17;
    document.documentElement.style.setProperty('--rd-tok-size', sz + 'px');
  }

  function wireFontSize() {
    document.getElementById('fontDecBtn').addEventListener('click', function () {
      if (fontIdx > 0) { fontIdx--; applyFontSize(); localStorage.setItem(RD_FONT_KEY, fontIdx); }
    });
    document.getElementById('fontIncBtn').addEventListener('click', function () {
      if (fontIdx < FONT_SIZES.length - 1) { fontIdx++; applyFontSize(); localStorage.setItem(RD_FONT_KEY, fontIdx); }
    });
  }

  /* ── LEVEL SWITCHING ─────────────────────────────────────────── */
  function wireLevel() {
    var btns = document.querySelectorAll('.rd-lvl-btn');
    btns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var lvl = parseInt(btn.getAttribute('data-level'), 10);
        if (lvl === currentLvl) return;
        currentLvl = lvl;
        closePopup();

        /* update active state */
        btns.forEach(function (b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');

        renderTexts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  /* ── LANG UI UPDATE ──────────────────────────────────────────── */
  function updateLangUI() {
    /* update visible sentence translations */
    document.querySelectorAll('.rd-translation').forEach(function (div) {
      div.textContent = currentLang === 'ro' ? div.getAttribute('data-ro') : div.getAttribute('data-en');
    });

    /* update read buttons */
    document.querySelectorAll('.rd-read-btn').forEach(function (btn) {
      var card = btn.closest('.rd-card');
      var id   = card ? card.getAttribute('data-id') : null;
      if (!id) return;
      var read = getReadTexts().indexOf(id) !== -1;
      btn.textContent = read
        ? (currentLang === 'ro' ? '✓ Citit' : '✓ Read')
        : (currentLang === 'ro' ? '○ Marchează citit' : '○ Mark as read');
    });

    /* update font buttons titles */
    var fontDecBtn = document.getElementById('fontDecBtn');
    var fontIncBtn = document.getElementById('fontIncBtn');
    if (fontDecBtn) fontDecBtn.title = currentLang === 'ro' ? 'Micșorează textul' : 'Decrease font';
    if (fontIncBtn) fontIncBtn.title = currentLang === 'ro' ? 'Mărește textul' : 'Increase font';

    /* update open popup */
    if (popupToken && popup && popup.classList.contains('visible')) {
      popTrans.textContent = (currentLang === 'en' ? popupToken.en : popupToken.ro) || popupToken.ro;
      var noteText = popupToken.note
        ? (currentLang === 'en' ? popupToken.note.en : popupToken.note.ro) : '';
      if (noteText) { popNote.textContent = noteText; popNote.classList.add('has-content'); }
      else          { popNote.textContent = ''; popNote.classList.remove('has-content'); }
      popSoundLabel.textContent = currentLang === 'ro' ? 'Pronunță' : 'Pronounce';
      if (popSaveLabel) {
        var saved = isWordSaved(popupToken.ko);
        popSaveLabel.textContent = saved
          ? (currentLang === 'ro' ? 'Salvat' : 'Saved')
          : (currentLang === 'ro' ? 'Salvează' : 'Save');
      }
    }
  }

  /* ── SAVE WORDS (Feature 2) ──────────────────────────────────── */
  function getSavedWords() {
    try { return JSON.parse(localStorage.getItem(RD_SAVED_KEY) || '[]'); } catch (e) { return []; }
  }
  function isWordSaved(ko) {
    return getSavedWords().some(function (w) { return w.ko === ko; });
  }
  function toggleSaveWord(tok) {
    var words = getSavedWords();
    var idx   = words.findIndex ? words.findIndex(function (w) { return w.ko === tok.ko; })
                                : (function () { for (var i=0;i<words.length;i++) if (words[i].ko===tok.ko) return i; return -1; })();
    if (idx !== -1) { words.splice(idx, 1); }
    else            { words.push({ ko: tok.ko, ro: tok.ro || '', en: tok.en || '' }); }
    localStorage.setItem(RD_SAVED_KEY, JSON.stringify(words));
    return idx === -1; /* true = just saved */
  }
  function updateSaveBtnState(saved) {
    if (!popSave || !popSaveLabel) return;
    popSave.classList.toggle('saved', saved);
    popSaveLabel.textContent = saved
      ? (currentLang === 'ro' ? 'Salvat' : 'Saved')
      : (currentLang === 'ro' ? 'Salvează' : 'Save');
  }

  /* ── READ PROGRESS (Feature 3) ───────────────────────────────── */
  function getReadTexts() {
    try { return JSON.parse(localStorage.getItem(RD_READ_KEY) || '[]'); } catch (e) { return []; }
  }
  function toggleRead(id) {
    var list = getReadTexts();
    var idx  = list.indexOf(id);
    if (idx !== -1) { list.splice(idx, 1); }
    else            { list.push(id); }
    localStorage.setItem(RD_READ_KEY, JSON.stringify(list));
    updateProgress();
    return idx === -1; /* true = marked as read */
  }
  function updateProgress() {
    var badge = document.getElementById('rdProgress');
    if (!badge) return;
    var total = allTexts.length || 18;
    var done  = getReadTexts().length;
    badge.textContent = done + '/' + total;
    badge.style.color = done === total && total > 0 ? '#58CC02' : '';
    badge.style.borderColor = done === total && total > 0 ? '#58CC02' : '';
  }

  /* ── SPEAKING / RECORDING ─────────────────────────────────────── */
  var rdCurrentAudio = null;
  var rdRec = {
    active:    false,
    sessId:    0,
    recog:     null,
    mrec:      null,
    stream:    null,
    recBtn:    null,
    waveBars:  null,
    feedbackEl: null,
    targetFull: null
  };

  function rdHandleRecClick(sentFull, recBtn, waveBars, feedbackEl) {
    /* Stop active recording for this button */
    if (rdRec.active && rdRec.recBtn === recBtn) {
      rdStopRec(false);
      return;
    }
    /* Play back existing recording for this button */
    if (recBtn._recUrl) {
      if (rdCurrentAudio) { rdCurrentAudio.pause(); rdCurrentAudio.currentTime = 0; }
      rdCurrentAudio = new Audio(recBtn._recUrl);
      rdCurrentAudio.play().catch(function () {});
      return;
    }
    /* Reset previous recording button if different */
    if (rdRec.recBtn && rdRec.recBtn !== recBtn) {
      var prev = rdRec.recBtn;
      prev.classList.remove('recording', 'has-rec');
      prev.innerHTML = '🎙';
      prev.title = currentLang === 'ro' ? 'Practică pronunția' : 'Practice pronunciation';
      if (prev._recUrl) { URL.revokeObjectURL(prev._recUrl); prev._recUrl = null; }
      if (prev._waveBars) prev._waveBars.classList.remove('on');
    }
    rdStopRec(false);
    rdStartRec(sentFull, recBtn, waveBars, feedbackEl);
  }

  function rdStartRec(sentFull, recBtn, waveBars, feedbackEl) {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      rdShowFeedback(feedbackEl, false,
        currentLang === 'ro' ? 'Folosiți Chrome pentru vorbire' : 'Use Chrome for speech');
      return;
    }

    rdRec.active     = true;
    rdRec.targetFull = sentFull;
    rdRec.recBtn     = recBtn;
    rdRec.waveBars   = waveBars;
    rdRec.feedbackEl = feedbackEl;
    var mySession    = ++rdRec.sessId;

    recBtn.classList.add('recording');
    recBtn.innerHTML = '⏹';
    waveBars.classList.add('on');

    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(function (stream) {
        if (rdRec.sessId !== mySession) { stream.getTracks().forEach(function (t) { t.stop(); }); return; }
        rdRec.stream = stream;

        var mime = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg']
          .filter(function (t) { return MediaRecorder.isTypeSupported(t); })[0] || '';
        try {
          var mchunks = [];
          var m = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
          rdRec.mrec = m;
          m.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) mchunks.push(e.data);
          };
          m.onstop = function () {
            if (rdRec.stream === stream) { stream.getTracks().forEach(function (t) { t.stop(); }); rdRec.stream = null; }
            if (mchunks.length && rdRec.recBtn === recBtn && rdRec.sessId === mySession) {
              recBtn._recUrl = URL.createObjectURL(new Blob(mchunks, { type: m.mimeType || 'audio/webm' }));
              recBtn.innerHTML = '▶';
              recBtn.classList.add('has-rec');
              recBtn.title = currentLang === 'ro' ? 'Redă înregistrarea' : 'Play recording';
            }
          };
          m.start(100);
        } catch (e) { rdRec.mrec = null; }

        setTimeout(function () {
          if (rdRec.sessId !== mySession) return;
          var r = new SR();
          rdRec.recog = r;
          r.lang = 'ko-KR'; r.continuous = false; r.interimResults = false;
          r.onresult = function (e) {
            if (rdRec.recog !== r) return;
            rdRec.recog = null;
            rdFinishMrec();
            rdEvaluate(e.results[0][0].transcript, mySession);
          };
          r.onend = function () {
            if (rdRec.recog === r && rdRec.sessId === mySession) {
              rdRec.recog = null;
              rdFinishMrec();
              rdStopUi();
            }
          };
          r.onerror = function (e) {
            if (rdRec.recog !== r) return;
            rdRec.recog = null;
            rdFinishMrec(); rdStopUi();
            if (e.error !== 'no-speech' && e.error !== 'aborted')
              rdShowFeedback(feedbackEl, false, e.error);
          };
          try { r.start(); } catch (e) { rdRec.recog = null; rdFinishMrec(); rdStopUi(); }
        }, 80);
      })
      .catch(function () {
        rdRec.active = false;
        recBtn.classList.remove('recording');
        recBtn.innerHTML = '🎙';
        waveBars.classList.remove('on');
        rdShowFeedback(feedbackEl, false,
          currentLang === 'ro' ? 'Microfon refuzat' : 'Mic denied');
      });
  }

  function rdFinishMrec() {
    if (rdRec.mrec && rdRec.mrec.state !== 'inactive') {
      try { rdRec.mrec.requestData(); } catch (e) {}
      var m = rdRec.mrec;
      setTimeout(function () { if (m.state !== 'inactive') try { m.stop(); } catch (e) {} }, 60);
    }
  }

  function rdStopUi() {
    rdRec.active = false;
    if (rdRec.waveBars) rdRec.waveBars.classList.remove('on');
    if (rdRec.recBtn) {
      rdRec.recBtn.classList.remove('recording');
      if (!rdRec.recBtn._recUrl) rdRec.recBtn.innerHTML = '🎙';
    }
  }

  function rdStopRec(resetBtn) {
    rdRec.sessId++;
    rdRec.active = false;
    if (rdRec.recog) { try { rdRec.recog.abort(); } catch (e) {} rdRec.recog = null; }
    rdFinishMrec();
    if (rdRec.waveBars) rdRec.waveBars.classList.remove('on');
    if (resetBtn && rdRec.recBtn) {
      rdRec.recBtn.classList.remove('recording');
      rdRec.recBtn.innerHTML = '🎙';
    } else if (rdRec.recBtn) {
      rdRec.recBtn.classList.remove('recording');
    }
  }

  function rdEvaluate(transcript, sessionId) {
    if (rdRec.sessId !== sessionId) return;
    rdStopUi();
    var target     = rdRec.targetFull;
    var feedbackEl = rdRec.feedbackEl;
    if (!target || !feedbackEl) return;

    var clean = function (s) { return s.replace(/[^가-힣]/g, ''); };
    var tClean = clean(target);
    var hClean = clean(transcript);

    /* character overlap score */
    var overlap = 0;
    var hArr = hClean.split('');
    tClean.split('').forEach(function (ch) {
      var i = hArr.indexOf(ch);
      if (i !== -1) { overlap++; hArr.splice(i, 1); }
    });
    var score = tClean.length > 0 ? Math.round((overlap / tClean.length) * 100) : 0;
    var ok = score >= 65 || transcript.includes(target) || hClean === tClean;

    if (ok) {
      rdShowFeedback(feedbackEl, true,
        (currentLang === 'ro' ? '✓ Excelent! ' : '✓ Excellent! ') + score + '%');
    } else {
      var heard = transcript.length > 22 ? transcript.slice(0, 22) + '…' : transcript;
      rdShowFeedback(feedbackEl, false,
        (currentLang === 'ro' ? 'Auzit: ' : 'Heard: ') + (heard || '—'));
    }
  }

  function rdShowFeedback(el, ok, msg) {
    if (!el) return;
    el.textContent = msg;
    el.className = 'rd-speech-feedback ' + (ok ? 'ok' : 'err');
    clearTimeout(el._hideT);
    el._hideT = setTimeout(function () { el.className = 'rd-speech-feedback'; }, 4500);
  }

})();
</script>
