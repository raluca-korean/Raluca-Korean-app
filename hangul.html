<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Hangul</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#818CF8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./hangul.css">
</head>
<body class="theme-anime">

<!-- ══════════════════════════════════════════════════════════════
     MORPHIC RESONANCE SPACE  ·  Paradigm: Living Alphabet Field
     Knowledge doesn't unfold — it resonates.
     Characters don't display — they breathe.
══════════════════════════════════════════════════════════════ -->
<div class="mrs-field" id="mrsField">

  <!-- Background depth layer -->
  <canvas class="mrs-bg" id="mrsBg"></canvas>

  <!-- Nav: home + language (top right) -->
  <div id="pageControls">
    <a href="./index.html" class="mrs-nav-btn" aria-label="Acasă">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <button class="mrs-nav-btn" id="btnLang">ro</button>
  </div>

  <!-- Night mode toggle (bottom left) -->
  <button class="mrs-night-btn" id="mrsThemeBtn" title="Light / Dark"></button>

  <!-- Zone labels (whispers in space) -->
  <div class="mrs-zone mrs-zone-cons" id="mrsZoneCons">consonants</div>
  <div class="mrs-zone mrs-zone-tensed" id="mrsZoneTensed">tensed</div>
  <div class="mrs-zone mrs-zone-vowels" id="mrsZoneVowels">vowels</div>

  <!-- The Cosmos — living character field -->
  <div class="mrs-cosmos" id="mrsCosmos"></div>

  <!-- ── VORTEX OVERLAY (character focus) ──────────────────────── -->
  <div class="mrs-vortex" id="mrsVortex" role="dialog" aria-modal="true">
    <div class="mrs-v-ring mrs-v-ring-3"></div>
    <div class="mrs-v-ring mrs-v-ring-2"></div>
    <div class="mrs-v-ring mrs-v-ring-1"></div>
    <div class="mrs-v-core" id="mrsVCore">
      <div class="mrs-v-glyph" id="mrsVGlyph"></div>
      <div class="mrs-v-rom"   id="mrsVRom"></div>
      <div class="mrs-v-type"  id="mrsVType"></div>
    </div>
    <div class="mrs-v-nodes" id="mrsVNodes"></div>
    <div class="mrs-v-echo"  id="mrsVEcho"></div>
    <div class="mrs-v-btns">
      <button class="mrs-v-action" id="mrsVWrite">✍ <span id="mrsVWriteLbl">Write</span></button>
    </div>
    <button class="mrs-v-close" id="mrsVClose" aria-label="Close">✕</button>
  </div>

  <!-- ── QUIZ (ATTUNEMENT) ──────────────────────────────────────── -->
  <div class="mrs-quiz" id="mrsQuiz">
    <div class="mrs-q-ring mrs-q-ring-2"></div>
    <div class="mrs-q-ring mrs-q-ring-1"></div>
    <div class="mrs-q-center">
      <div class="mrs-q-char"   id="mrsQChar">?</div>
      <div class="mrs-q-prompt" id="mrsQPrompt"></div>
    </div>
    <div class="mrs-q-opts" id="mrsQOpts"></div>
    <div class="mrs-q-feedback" id="mrsQFeedback"></div>
    <div class="mrs-q-hud">
      <span class="mrs-q-badge" id="mrsQOk">✦ 0</span>
      <div class="mrs-q-bar"><div class="mrs-q-fill" id="mrsQFill"></div></div>
      <span class="mrs-q-badge" id="mrsQStreak">⚡ 0</span>
    </div>
    <button class="mrs-ctrl mrs-q-exit" id="mrsQExit">✕</button>
  </div>

  <!-- ── RULES STREAM PANEL ─────────────────────────────────────── -->
  <div class="mrs-rules" id="mrsRules">
    <div class="mrs-rules-head">
      <span class="mrs-rules-title" id="mrsRulesTitle">Knowledge Stream</span>
      <input class="mrs-rules-search" id="mrsRulesSearch" type="search" placeholder="…">
      <button class="mrs-ctrl mrs-rules-close" id="mrsRulesClose">✕</button>
    </div>
    <div class="mrs-rules-list" id="mrsRulesList"></div>
  </div>

  <!-- ── SYLLABLE STRUCTURE PANEL ──────────────────────────────── -->
  <div class="mrs-syl-panel" id="mrsSylPanel">
    <button class="mrs-ctrl mrs-syl-close" id="mrsSylClose">✕</button>
    <div class="mrs-syl-content" id="mrsSylContent"></div>
  </div>

  <!-- ── WRITING RITUAL OVERLAY ────────────────────────────────── -->
  <div class="mrs-write-overlay" id="mrsWriteOverlay">
    <div class="mrs-write-box">
      <div class="mrs-write-head">
        <span class="mrs-write-char" id="mrsWriteChar"></span>
        <span class="mrs-write-rom"  id="mrsWriteRom"></span>
        <div class="mrs-write-actions">
          <button onclick="speakKo(currentItem&&currentItem.speak)">▶</button>
          <button onclick="clearBoard()">↺</button>
          <button id="mrsWriteClose">✕</button>
        </div>
      </div>
      <div class="mrs-write-board">
        <div  class="mrs-write-guide"  id="mrsWriteGuide"></div>
        <svg  class="mrs-write-arrows" id="mWriteArrows" viewBox="0 0 200 200"></svg>
        <canvas class="mrs-write-canvas" id="wCanvas" width="280" height="280"></canvas>
      </div>
      <div class="mrs-write-hint" id="mrsWriteHint"></div>
    </div>
  </div>

</div><!-- /mrs-field -->

<script src="./js/core/storage.js"></script>
<script src="./js/core/register-sw.js"></script>
<script src="./js/hangul.js"></script>
</body>
</html>
