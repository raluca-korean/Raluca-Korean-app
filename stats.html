<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Raluca Korean — Statistici</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RK Korean">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="stylesheet" href="./theme-anime.css">
<style>
:root{
  --card:rgba(255,255,255,.97);
  --stroke:rgba(219,39,119,.13);
  --text:#1a0533;
  --muted:rgba(126,58,110,.80);
  --radius:22px;
  --shadow:0 16px 40px rgba(219,39,119,.13);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(219,39,119,.22) 0%, transparent 45%),
    radial-gradient(ellipse at 100% 0%,  rgba(14,165,233,.18)  0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.16)  0%, transparent 45%),
    linear-gradient(180deg, #fce7f3 0%, #fdf4ff 40%, #eff6ff 100%);
  color:var(--text);
}
.app{max-width:760px;margin:0 auto;padding:20px}
.card{
  background:var(--card);
  border:1.5px solid var(--stroke);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
h1{margin:0 0 4px;font-size:22px}
h2{margin:0 0 14px;font-size:17px;font-weight:900}
.sub{font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.grid2{grid-template-columns:1fr}}
.stat-box{
  background:linear-gradient(160deg,#fff8fc,#f5f0ff);
  border:1.5px solid rgba(219,39,119,.15);
  border-radius:16px;
  padding:16px;
  text-align:center;
}
.stat-num{
  font-size:36px;
  font-weight:900;
  background:linear-gradient(135deg,#db2777,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;font-weight:700}
.bar-wrap{margin-bottom:12px}
.bar-label{
  display:flex;justify-content:space-between;
  font-size:13px;font-weight:700;margin-bottom:4px;
}
.bar-track{
  height:10px;border-radius:999px;
  background:rgba(219,39,119,.10);
  overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,#f472b6,#a855f7);
  transition:width .5s ease;
}
.empty{color:var(--muted);font-size:14px;padding:20px 0;text-align:center}

body.dark-mode{
  --card:rgba(32,6,55,.95);
  --stroke:rgba(244,114,182,.18);
  --text:#f0e8ff;
  --muted:rgba(210,170,240,.70);
}
body.dark-mode .stat-box{
  background:linear-gradient(160deg,rgba(40,10,65,.90),rgba(28,3,52,.96)) !important;
  border-color:rgba(244,114,182,.20) !important;
}
</style>
</head>
<body class="theme-anime">
<div class="app">

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <h1 id="pageTitle">📊 Statistici</h1>
      <div class="sub" id="pageSubtitle">Progresul tău de învățare</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="./index.html" class="homeBtn">🏠</a>
      <button type="button" id="langRo">ro</button>
      <button type="button" id="langEn">en</button>
    </div>
  </div>
</div>

<div id="mainStats"></div>

</div>
<script>
let currentLang = localStorage.getItem("RK_LANG") || "ro";

const UI = {
  ro:{
    title:"📊 Statistici", subtitle:"Progresul tău de învățare",
    today:"Azi", allTime:"Total",
    exercises:"Exerciții", correct:"Corecte", accuracy:"Acuratețe",
    bestStreak:"Best Streak", favorites:"Favorite",
    byType:"Per tip de exercițiu",
    noData:"Nu există date încă. Fă câteva exerciții mai întâi!",
    goExercise:"Mergi la exerciții →",
    types:{ "ko-ro":"KO→RO","ro-ko":"RO→KO","particle":"Particulă","particlePlus":"Particule +","conjug":"Conjugare","puzzle":"Puzzle","chain":"Chain" }
  },
  en:{
    title:"📊 Statistics", subtitle:"Your learning progress",
    today:"Today", allTime:"All Time",
    exercises:"Exercises", correct:"Correct", accuracy:"Accuracy",
    bestStreak:"Best Streak", favorites:"Favorites",
    byType:"Per exercise type",
    noData:"No data yet. Do some exercises first!",
    goExercise:"Go to exercises →",
    types:{ "ko-ro":"KO→RO","ro-ko":"RO→KO","particle":"Particle","particlePlus":"Particles +","conjug":"Conjugation","puzzle":"Puzzle","chain":"Chain" }
  }
};

function t(k){ return UI[currentLang][k]; }

function pct(c, tot){ return tot === 0 ? 0 : Math.round(c/tot*100); }

function render(){
  document.getElementById("pageTitle").textContent = t("title");
  document.getElementById("pageSubtitle").textContent = t("subtitle");

  let s;
  try { s = JSON.parse(localStorage.getItem("RK_STATS") || "null"); } catch(e){ s = null; }
  const favCount = (JSON.parse(localStorage.getItem("FAV_WORDS") || "[]")).length;
  const el = document.getElementById("mainStats");

  if(!s || s.total === 0){
    el.innerHTML = `
      <div class="card">
        <div class="empty">${t("noData")}</div>
        <div style="text-align:center;margin-top:12px">
          <a href="./exercises.html" style="color:#db2777;font-weight:900">${t("goExercise")}</a>
        </div>
      </div>`;
    return;
  }

  const todayDate = new Date().toISOString().slice(0,10);
  const todayTotal = s.today === todayDate ? s.todayTotal : 0;
  const todayCorrect = s.today === todayDate ? s.todayCorrect : 0;

  el.innerHTML = `
    <div class="card">
      <h2>${t("today")}</h2>
      <div class="grid2">
        <div class="stat-box">
          <div class="stat-num">${todayTotal}</div>
          <div class="stat-label">${t("exercises")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${todayTotal ? pct(todayCorrect,todayTotal)+"%" : "—"}</div>
          <div class="stat-label">${t("accuracy")}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>${t("allTime")}</h2>
      <div class="grid2">
        <div class="stat-box">
          <div class="stat-num">${s.total}</div>
          <div class="stat-label">${t("exercises")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${pct(s.correct,s.total)}%</div>
          <div class="stat-label">${t("accuracy")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${s.bestStreak}</div>
          <div class="stat-label">${t("bestStreak")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${favCount}</div>
          <div class="stat-label">${t("favorites")}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>${t("byType")}</h2>
      ${Object.entries(s.byType || {}).map(([type, d]) => `
        <div class="bar-wrap">
          <div class="bar-label">
            <span>${t("types")[type] || type}</span>
            <span>${d.correct}/${d.total} (${pct(d.correct,d.total)}%)</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct(d.correct,d.total)}%"></div>
          </div>
        </div>
      `).join("")}
    </div>`;
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("RK_LANG", lang);
  updateLangBtns();
  render();
}

function updateLangBtns(){
  const on = "linear-gradient(135deg,#f472b6,#a855f7,#6366f1)";
  const off = "linear-gradient(160deg,#fff,#fdf4ff)";
  document.getElementById("langRo").style.background = currentLang==="ro" ? on : off;
  document.getElementById("langRo").style.color = currentLang==="ro" ? "#fff" : "var(--text)";
  document.getElementById("langEn").style.background = currentLang==="en" ? on : off;
  document.getElementById("langEn").style.color = currentLang==="en" ? "#fff" : "var(--text)";
}

document.getElementById("langRo").addEventListener("click", () => setLang("ro"));
document.getElementById("langEn").addEventListener("click", () => setLang("en"));
updateLangBtns();
render();
</script>
