<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Statistici</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
:root{
  --card:#ffffff;
  --stroke:#e5e5e5;
  --text:#3c3c3c;
  --muted:#afafaf;
  --green:#58CC02;
  --green-dk:#45A800;
  --blue:#1CB0F6;
  --yellow:#FFC800;
  --red:#FF4B4B;
  --purple:#CE82FF;
  --radius:16px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#f0f4f8;
  color:var(--text);
}
.app{max-width:760px;margin:0 auto;padding:20px}
.card{
  background:var(--card);
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:14px;
  box-shadow:none;
}
h1{margin:0 0 4px;font-size:22px;font-weight:900;color:var(--text)}
h2{margin:0 0 14px;font-size:17px;font-weight:900;color:var(--text)}
.sub{font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.grid2{grid-template-columns:1fr}}

/* Stat boxes cu culori distincte */
.stat-box{
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  border-radius:14px;
  padding:16px;
  text-align:center;
  background:#fff;
}
.stat-box:nth-child(1){ border-top:4px solid var(--green); }
.stat-box:nth-child(2){ border-top:4px solid var(--blue); }
.stat-box:nth-child(3){ border-top:4px solid var(--yellow); }
.stat-box:nth-child(4){ border-top:4px solid var(--purple); }

.stat-num{
  font-size:36px;
  font-weight:900;
  color:var(--text);
  line-height:1.1;
}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

.bar-wrap{margin-bottom:12px}
.bar-label{
  display:flex;justify-content:space-between;
  font-size:13px;font-weight:700;margin-bottom:6px;
  color:var(--text);
}
.bar-track{
  height:12px;border-radius:999px;
  background:#e5e5e5;
  overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:999px;
  background:var(--green);
  transition:width .5s ease;
}
.empty{color:var(--muted);font-size:14px;padding:20px 0;text-align:center}

/* Buttons */
.homeBtn,button{
  border:2px solid var(--stroke) !important;
  border-bottom:4px solid #d0d0d0 !important;
  background:#fff !important;
  color:var(--text) !important;
  border-radius:12px !important;
  box-shadow:none !important;
  font-weight:800 !important;
}
button:hover{ border-color:#b0b0b0 !important; }

body.dark-mode{
  background:#1a1a2e;
  color:#e0e0e0;
}
body.dark-mode .card{ background:#16213e !important; border-color:#2a2a4a !important; border-bottom-color:#111130 !important; }
body.dark-mode .stat-box{ background:#16213e !important; border-color:#2a2a4a !important; }
body.dark-mode h1,body.dark-mode h2{ color:#e0e0e0 !important; }
body.dark-mode .stat-num{ color:#e0e0e0 !important; }
body.dark-mode .bar-track{ background:#2a2a4a !important; }
body.dark-mode button{ background:#16213e !important; border-color:#2a2a4a !important; color:#e0e0e0 !important; }
</style>
</head>
<body class="theme-anime">
<div class="app">

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <h1 id="pageTitle">📊 Statistici</h1>
      <div class="sub" id="pageSubtitle">Progresul tău de învățare</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="./index.html" class="homeBtn">🏠</a>
      <button type="button" id="langRo">ro</button>
      <button type="button" id="langEn">en</button>
    </div>
  </div>
</div>

<div id="mainStats"></div>

</div>
<script src="./js/core/lang.js"></script>
<script>
let currentLang = RKLang.current;

const UI = {
  ro:{
    title:"📊 Statistici", subtitle:"Progresul tău de învățare",
    today:"Azi", allTime:"Total",
    exercises:"Exerciții", correct:"Corecte", accuracy:"Acuratețe",
    bestStreak:"Cel mai lung streak", favorites:"Favorite",
    byType:"Per tip de exercițiu",
    noData:"Nu există date încă. Fă câteva exerciții mai întâi!",
    goExercise:"Mergi la exerciții →",
    types:{ "ko-ro":"KO→RO","ro-ko":"RO→KO","particle":"Particulă (1)","particlePlus":"Particule multiple","conjug":"Conjugare","puzzle":"Puzzle","chain":"Chain" }
  },
  en:{
    title:"📊 Statistics", subtitle:"Your learning progress",
    today:"Today", allTime:"All Time",
    exercises:"Exercises", correct:"Correct", accuracy:"Accuracy",
    bestStreak:"Best Streak", favorites:"Favorites",
    byType:"Per exercise type",
    noData:"No data yet. Do some exercises first!",
    goExercise:"Go to exercises →",
    types:{ "ko-ro":"KO→RO","ro-ko":"RO→KO","particle":"Particle (1)","particlePlus":"Multiple particles","conjug":"Conjugation","puzzle":"Puzzle","chain":"Chain" }
  }
};

function t(k){ return UI[currentLang][k]; }

function pct(c, tot){ return tot === 0 ? 0 : Math.round(c/tot*100); }

function render(){
  document.getElementById("pageTitle").textContent = t("title");
  document.getElementById("pageSubtitle").textContent = t("subtitle");

  let s;
  try { s = JSON.parse(localStorage.getItem("RK_STATS") || "null"); } catch(e){ s = null; }
  const favCount = (JSON.parse(localStorage.getItem("FAV_WORDS") || "[]")).length;
  const el = document.getElementById("mainStats");

  if(!s || s.total === 0){
    el.innerHTML = `
      <div class="card">
        <div class="empty">${t("noData")}</div>
        <div style="text-align:center;margin-top:12px">
          <a href="./exercises.html" style="color:#db2777;font-weight:900">${t("goExercise")}</a>
        </div>
      </div>`;
    return;
  }

  const todayDate = new Date().toISOString().slice(0,10);
  const todayTotal = s.today === todayDate ? s.todayTotal : 0;
  const todayCorrect = s.today === todayDate ? s.todayCorrect : 0;

  el.innerHTML = `
    <div class="card">
      <h2>${t("today")}</h2>
      <div class="grid2">
        <div class="stat-box">
          <div class="stat-num">${todayTotal}</div>
          <div class="stat-label">${t("exercises")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${todayTotal ? pct(todayCorrect,todayTotal)+"%" : "—"}</div>
          <div class="stat-label">${t("accuracy")}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>${t("allTime")}</h2>
      <div class="grid2">
        <div class="stat-box">
          <div class="stat-num">${s.total}</div>
          <div class="stat-label">${t("exercises")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${pct(s.correct,s.total)}%</div>
          <div class="stat-label">${t("accuracy")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${s.bestStreak}</div>
          <div class="stat-label">${t("bestStreak")}</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${favCount}</div>
          <div class="stat-label">${t("favorites")}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>${t("byType")}</h2>
      ${Object.entries(s.byType || {}).map(([type, d]) => `
        <div class="bar-wrap">
          <div class="bar-label">
            <span>${t("types")[type] || type}</span>
            <span>${d.correct}/${d.total} (${pct(d.correct,d.total)}%)</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct(d.correct,d.total)}%"></div>
          </div>
        </div>
      `).join("")}
    </div>`;
}

function setLang(lang){
  currentLang = lang;
  RKLang.set(lang);
  render();
}

RKLang.init(setLang);
render();
</script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
