<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Study App</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(139,92,246,.22), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(34,197,94,.14), transparent 55%),
    radial-gradient(600px 600px at 50% 90%, rgba(219,39,119,.13), transparent 55%),
    linear-gradient(180deg, #faf5ff, #f0f4ff);
  color: #1b1630;
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 12px;
}

/* Steagul Coreei ca fundal blurat */
body::before {
  content: '';
  position: fixed;
  inset: -6%;
  background: url('./flag.svg') center / cover no-repeat;
  filter: blur(3px);
  opacity: .45;
  z-index: 0;
  pointer-events: none;
}

body.dark-mode::before {
  opacity: .10;
  filter: blur(6px) brightness(.6);
}

/* ── LANG BAR ───────────────────────────── */
.home-lang-bar {
  position: fixed;
  top: 14px;
  right: 16px;
  display: flex;
  gap: 6px;
  z-index: 100;
}

.home-lang-bar button {
  padding: 5px 13px;
  border-radius: 999px;
  border: 1.5px solid rgba(219,39,119,.25);
  background: rgba(255,255,255,.90);
  color: #7c3aed;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
  transition: background .15s, color .15s;
  backdrop-filter: blur(6px);
}

.home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
  border-color: transparent;
}

body.dark-mode .home-lang-bar button {
  background: rgba(32,6,55,.85);
  color: #f0e8ff;
  border-color: rgba(244,114,182,.25);
}

body.dark-mode .home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
}

/* ── BLOB SCENE ─────────────────────────────── */
/* Container 760×630, centru (380,315), 8 blobs la 45° interval, dist 200px */
.blob-scene {
  position: relative;
  z-index: 1;
  width: 760px;
  height: 630px;
  flex-shrink: 0;
}

/* ── CENTER BLOB ────────────────────────────── */
.blob-center {
  position: absolute;
  width: 172px;
  height: 132px;
  top: 249px;
  left: 294px;
  border-radius: 52% 48% 46% 54% / 50% 54% 46% 50%;
  background: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #0891b2 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
  padding: 14px 10px;
  box-shadow:
    0 0 0 14px rgba(139,92,246,.10),
    0 0 0 28px rgba(219,39,119,.05),
    0 22px 56px rgba(124,58,237,.42);
  z-index: 3;
  user-select: none;
  animation: pop-in .38s cubic-bezier(.34,1.56,.64,1) both;
}

.c-logo  { font-size: 34px; font-weight: 900; line-height: 1; }
.c-title { font-size: 12px; font-weight: 800; margin-top: 5px; opacity: .93; letter-spacing: .4px; }
.c-sub   { font-size: 10px; opacity: .62; margin-top: 2px; }

/* ── OUTER BLOBS ────────────────────────────── */
.blob {
  position: absolute;
  text-decoration: none;
  color: #1b1630;
  z-index: 2;
}

.blob-inner {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px 8px;
  color: #fff;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
}

.blob:hover .blob-inner { transform: translateY(-4px); }
.blob:active .blob-inner { transform: translateY(2px); }

/* Culori individuale per blob — stil Duolingo */
.blob-1 .blob-inner { background: linear-gradient(150deg,#FF9600,#FF6500); box-shadow: 0 6px 0 #C24E00, 0 10px 24px rgba(255,101,0,.30); border-radius: inherit; }
.blob-2 .blob-inner { background: linear-gradient(150deg,#58CC02,#3CAD00); box-shadow: 0 6px 0 #258700, 0 10px 24px rgba(88,204,2,.28); border-radius: inherit; }
.blob-3 .blob-inner { background: linear-gradient(150deg,#1CB0F6,#009FDE); box-shadow: 0 6px 0 #007AAB, 0 10px 24px rgba(28,176,246,.28); border-radius: inherit; }
.blob-4 .blob-inner { background: linear-gradient(150deg,#CE82FF,#A855F7); box-shadow: 0 6px 0 #7C3ACA, 0 10px 24px rgba(168,85,247,.28); border-radius: inherit; }
.blob-5 .blob-inner { background: linear-gradient(150deg,#FF4B4B,#E00000); box-shadow: 0 6px 0 #A80000, 0 10px 24px rgba(255,75,75,.28); border-radius: inherit; }
.blob-6 .blob-inner { background: linear-gradient(150deg,#00CD9C,#00A87E); box-shadow: 0 6px 0 #007A5C, 0 10px 24px rgba(0,205,156,.28); border-radius: inherit; }
.blob-7 .blob-inner { background: linear-gradient(150deg,#FF86D0,#E0449A); box-shadow: 0 6px 0 #A8286E, 0 10px 24px rgba(224,68,154,.28); border-radius: inherit; }
.blob-8 .blob-inner { background: linear-gradient(150deg,#FFC800,#E6A000); box-shadow: 0 6px 0 #A87700, 0 10px 24px rgba(255,200,0,.28); border-radius: inherit; }
.blob-9 .blob-inner { background: linear-gradient(150deg,#22D3EE,#06B6D4); box-shadow: 0 6px 0 #0E7490, 0 10px 24px rgba(6,182,212,.28); border-radius: inherit; }

/* Radial simetric: centru (380,315), distanta 200px, 40° per blob (9 blobs) */

/* 0° — Builder: centru (380, 115) */
.blob-1 { width: 138px; height: 100px; top:  65px; left: 311px; animation: pop-in .38s .04s cubic-bezier(.34,1.56,.64,1) both; }
.blob-1 .blob-inner { border-radius: 62% 38% 68% 32% / 42% 64% 36% 58%; }

/* 80° — Exercises: centru (577, 280) */
.blob-2 { width: 148px; height: 106px; top: 227px; left: 503px; animation: pop-in .38s .12s cubic-bezier(.34,1.56,.64,1) both; }
.blob-2 .blob-inner { border-radius: 42% 58% 32% 68% / 60% 36% 64% 40%; }

/* 120° — Lessons: centru (553, 415) */
.blob-3 { width: 144px; height: 102px; top: 364px; left: 481px; animation: pop-in .38s .16s cubic-bezier(.34,1.56,.64,1) both; }
.blob-3 .blob-inner { border-radius: 56% 44% 40% 60% / 44% 62% 48% 52%; }

/* 160° — Glossary: centru (448, 503) */
.blob-4 { width: 148px; height: 100px; top: 453px; left: 374px; animation: pop-in .38s .20s cubic-bezier(.34,1.56,.64,1) both; }
.blob-4 .blob-inner { border-radius: 68% 32% 58% 42% / 36% 56% 44% 64%; }

/* 200° — Drill: centru (312, 503) */
.blob-5 { width: 140px; height: 100px; top: 453px; left: 242px; animation: pop-in .38s .20s cubic-bezier(.34,1.56,.64,1) both; }
.blob-5 .blob-inner { border-radius: 46% 54% 58% 42% / 62% 40% 58% 42%; }

/* 240° — Stats: centru (207, 415) */
.blob-6 { width: 138px; height: 100px; top: 365px; left: 138px; animation: pop-in .38s .16s cubic-bezier(.34,1.56,.64,1) both; }
.blob-6 .blob-inner { border-radius: 60% 40% 50% 50% / 50% 56% 44% 54%; }

/* 280° — Hanja Book: centru (183, 280) */
.blob-7 { width: 142px; height: 102px; top: 229px; left: 112px; animation: pop-in .38s .12s cubic-bezier(.34,1.56,.64,1) both; }
.blob-7 .blob-inner { border-radius: 54% 46% 44% 56% / 48% 58% 42% 52%; }

/* 320° — Hangul: centru (251, 162) */
.blob-8 { width: 138px; height: 100px; top: 112px; left: 182px; animation: pop-in .38s .08s cubic-bezier(.34,1.56,.64,1) both; }
.blob-8 .blob-inner { border-radius: 48% 52% 62% 38% / 56% 44% 60% 40%; }

/* 40° — Speaking/Pronunciation: centru (509, 162) */
.blob-9 { width: 140px; height: 100px; top: 112px; left: 439px; animation: pop-in .38s .08s cubic-bezier(.34,1.56,.64,1) both; }
.blob-9 .blob-inner { border-radius: 52% 48% 38% 62% / 48% 62% 38% 52%; }

/* Animatie intrare */
@keyframes pop-in {
  from { opacity: 0; transform: scale(.75) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Text inside blobs */
.blob-icon  { font-size: 26px; line-height: 1; margin-bottom: 5px; filter: drop-shadow(0 2px 3px rgba(0,0,0,.18)); }
.blob-title { font-size: 13px; font-weight: 900; line-height: 1.2; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.20); }
.blob-feat  { font-size: 9.5px; color: rgba(255,255,255,.78); margin-top: 2px; font-weight: 700; line-height: 1.3; }

/* ── MOBILE ─────────────────────────────────── */
@media (max-width: 780px) {
  body {
    align-items: flex-start;
    justify-content: flex-start;
    padding: 16px 14px 40px;
  }

  .blob-scene {
    width: 100%;
    height: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .blob-center {
    position: static;
    width: 100%;
    height: auto;
    border-radius: 20px;
    padding: 18px 20px;
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 12px;
    justify-content: flex-start;
    text-align: left;
    box-shadow: 0 12px 32px rgba(124,58,237,.28);
    animation: none;
  }

  .blob {
    position: static;
    width: 100%;
    height: auto;
    animation: none;
  }

  .blob-inner {
    height: 106px;
    border-radius: 18px !important;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  .blob:hover .blob-inner { transform: translateY(-2px) scale(1.02); }

  .blob-icon  { font-size: 22px; }
  .blob-title { font-size: 12px; }
  .blob-feat  { font-size: 9.5px; }

  /* Speaking blob spans full width on mobile (9th item, would be alone) */
  .blob-9 { grid-column: 1 / -1; }
  .blob-9 .blob-inner { height: 86px; flex-direction: row; gap: 14px; justify-content: center; }
}

/* ── DARK MODE ──────────────────────────────── */
body.dark-mode {
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(100,0,70,.24), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(0,30,80,.18), transparent 55%),
    linear-gradient(180deg, #0e0020, #060012);
  color: #f0e8ff;
}

body.dark-mode .blob-title { color: #fff !important; }
body.dark-mode .blob-feat  { color: rgba(255,255,255,.75) !important; }
</style>
</head>

<body>

<!-- Butoane limbă -->
<div class="home-lang-bar">

  <!-- Builder -->

  <!-- Glossary -->
  <a class="blob blob-4" href="glossary.html">

<script>
var currentLang = localStorage.getItem('RK_LANG') || 'ro';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('RK_LANG', lang);
  document.querySelectorAll('[data-ro][data-en]').forEach(function(el) {
    el.textContent = el.dataset[lang];
  });
  document.getElementById('langRo').classList.toggle('active', lang === 'ro');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang;
}

document.getElementById('langRo').addEventListener('click', function() { applyLang('ro'); });
document.getElementById('langEn').addEventListener('click', function() { applyLang('en'); });

applyLang(currentLang);
</script>

<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
