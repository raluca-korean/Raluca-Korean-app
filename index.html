<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Study App</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2877">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  background:#f5f5f7;
  color:#1d1d1f;
  min-height:100vh;
}

/* Override the anime gradient on this page */
body.dark-mode{
  background:#09090b !important;
  color:#f5f5f7;
}

/* ── LAYOUT ───────────────────────────── */
.page{
  max-width:580px;
  margin:0 auto;
  padding:28px 18px 44px;
}

/* ── HEADER ───────────────────────────── */
.site-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:28px;
}

.logo-lockup{
  display:flex;
  align-items:center;
  gap:13px;
}

.logo-mark{
  width:48px; height:48px;
  border-radius:11px;
  background:linear-gradient(140deg,#7c3aed 0%,#db2877 100%);
  color:#fff;
  font-size:16px; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  letter-spacing:-.5px;
  user-select:none;
}

.logo-text h1{
  font-size:22px; font-weight:900;
  margin:0; line-height:1.15;
  color:#1d1d1f;
  letter-spacing:-.4px;
}

.logo-text p{
  font-size:12px;
  color:#86868b;
  margin:3px 0 0;
  font-weight:600;
}

.header-controls{
  display:flex;
  align-items:center;
  gap:6px;
  padding-top:6px;
  flex-shrink:0;
}

/* ── NAV GRID ─────────────────────────── */
.nav-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* ── NAV CARD ─────────────────────────── */
.nav-card{
  background:#fff;
  border:1px solid #e6e6eb;
  border-radius:12px;
  border-top:3px solid var(--accent,#aaa);
  overflow:hidden;
}

.nav-card-head{
  padding:13px 14px 10px;
  display:flex;
  align-items:center;
  gap:7px;
}

.nav-card-icon{
  font-size:17px; line-height:1;
}

.nav-card-label{
  font-size:10.5px; font-weight:900;
  letter-spacing:.65px; text-transform:uppercase;
  color:var(--accent,#888);
}

/* ── LINKS ────────────────────────────── */
.nav-links{
  border-top:1px solid #f0f0f2;
}

.nav-link{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  font-size:13.5px; font-weight:700;
  color:#1d1d1f;
  text-decoration:none;
  border-top:1px solid #f0f0f2;
  transition:background .08s;
}
.nav-link:first-child{ border-top:none; }
.nav-link:hover{ background:#f5f5f7; }
.nav-link:active{ background:#ebebed; }

.nav-link-icon{ font-size:14px; line-height:1; flex-shrink:0; }
.nav-link-name{ flex:1; }
.nav-link-arrow{ color:#c7c7cc; font-size:13px; font-weight:600; flex-shrink:0; }

/* ── STATS FOOTER ─────────────────────── */
.stats-footer{
  display:flex;
  flex-wrap:wrap;
  gap:0;
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid #e6e6eb;
}

.mini-stat{
  font-size:12px; font-weight:600;
  color:#86868b;
  padding-right:18px;
  white-space:nowrap;
  line-height:1.6;
}

.mini-stat b{ color:#1d1d1f; font-weight:800; }

/* ── DARK MODE ────────────────────────── */
body.dark-mode .logo-text h1{ color:#f5f5f7; }
body.dark-mode .logo-text p { color:#636366; }

body.dark-mode .nav-card{
  background:#1c1c1e;
  border-color:#2c2c2e;
}

body.dark-mode .nav-links{ border-color:#2c2c2e; }

body.dark-mode .nav-link{
  color:#f5f5f7;
  border-color:#2c2c2e;
}
body.dark-mode .nav-link:hover{ background:#2c2c2e; }
body.dark-mode .nav-link:active{ background:#3a3a3c; }
body.dark-mode .nav-link-arrow{ color:#48484a; }

body.dark-mode .stats-footer{ border-color:#2c2c2e; }
body.dark-mode .mini-stat{ color:#636366; }
body.dark-mode .mini-stat b{ color:#aeaeb2; }

/* Override injected homeBtn style for this clean page */
.header-controls .homeBtn{
  background:#fff !important;
  border:1px solid #e6e6eb !important;
  border-bottom:1px solid #e6e6eb !important;
  border-radius:8px !important;
  color:#1d1d1f !important;
  font-size:12px !important; font-weight:700 !important;
  padding:6px 12px !important;
  box-shadow:none !important;
}
.header-controls .homeBtn:hover{ background:#f5f5f7 !important; }
body.dark-mode .header-controls .homeBtn{
  background:#1c1c1e !important;
  border-color:#3a3a3c !important;
  color:#f5f5f7 !important;
}

/* ── NOTIFICATION BUTTON ──────────────── */
.rk-notif-btn{
  font-size:12px; font-weight:700;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  white-space:nowrap;
  transition:background .1s;
}
.rk-notif-btn[data-state="granted"]{
  background:#d1fae5 !important;
  border-color:#6ee7b7 !important;
  color:#065f46 !important;
}
.rk-notif-btn[data-state="denied"]{
  background:#fef2f2 !important;
  border-color:#fca5a5 !important;
  color:#991b1b !important;
}
body.dark-mode .rk-notif-btn[data-state="granted"]{
  background:rgba(6,95,70,.35) !important;
  border-color:rgba(110,231,183,.3) !important;
  color:#6ee7b7 !important;
}
body.dark-mode .rk-notif-btn[data-state="denied"]{
  background:rgba(153,27,27,.3) !important;
  border-color:rgba(252,165,165,.3) !important;
  color:#fca5a5 !important;
}

/* ── STREAK REMINDER BANNER ───────────── */
.streak-banner{
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border:1px solid #fbbf24;
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:14px;
  font-size:13px; font-weight:700;
  color:#92400e;
}
.streak-banner-icon{ font-size:20px; flex-shrink:0; }
.streak-banner-text{ flex:1; }
.streak-banner-close{
  background:none !important; border:none !important;
  font-size:16px; cursor:pointer; color:#92400e !important;
  padding:0 2px; line-height:1; flex-shrink:0;
  box-shadow:none !important;
}
body.dark-mode .streak-banner{
  background:linear-gradient(135deg,rgba(120,53,15,.5),rgba(146,64,14,.4));
  border-color:#92400e;
  color:#fde68a;
}
body.dark-mode .streak-banner-close{ color:#fde68a !important; }

/* ── MOBILE ───────────────────────────── */
@media(max-width:460px){
  .page{ padding:20px 14px 36px; }
  .nav-grid{ grid-template-columns:1fr; }
  .nav-link{ font-size:14.5px; padding:12px 14px; }
}
</style>
</head>

<script>
var currentLang = RKLang.get();

var STATS_LABELS = {
  ro: {today:'Azi', acc:'Acuratețe', streak:'Streak', favs:'Favorite'},
  en: {today:'Today', acc:'Accuracy', streak:'Streak', favs:'Favorites'}
};

function renderMiniStats(lang) {
  var el = document.getElementById('miniStats');
  if(!el) return;
  var s;
  try { s = JSON.parse(localStorage.getItem('RK_STATS') || 'null'); } catch(e){ s = null; }
  if(!s || s.total === 0){ el.style.display = 'none'; return; }
  var favCount = (JSON.parse(localStorage.getItem('RK_FAV_WORDS') || '[]')).length;
  var today = new Date().toISOString().slice(0, 10);
  var todayEx = s.today === today ? s.todayTotal : 0;
  var pct = s.total ? Math.round(s.correct / s.total * 100) : 0;
  var L = STATS_LABELS[lang];
  var xpStr = '';
  if(window.RKGamification){
    var xpData = RKGamification.getXPData();
    var lvl = RKGamification.getLevelInfo(xpData.total);
    xpStr = '<span class="mini-stat">XP: <b>' + xpData.total + ' · Lv.' + lvl.current.level + '</b></span>';
  }
  el.style.display = '';
  el.innerHTML =
    '<span class="mini-stat">' + L.today + ': <b>' + todayEx + '</b></span>' +
    '<span class="mini-stat">' + L.acc   + ': <b>' + pct + '%</b></span>' +
    '<span class="mini-stat">' + L.streak+ ': <b>🔥' + (s.bestStreak||0) + '</b></span>' +
    '<span class="mini-stat">' + L.favs  + ': <b>⭐' + favCount + '</b></span>' +
    xpStr;
}

function renderQuestWidget(lang) {
  var el = document.getElementById('questWidget');
  if(!el || !window.RKGamification) return;
  var q = RKGamification.getQuestData();
  var GOAL = RKGamification.DAILY_GOAL;
  var pct = Math.min(100, Math.round(q.done / GOAL * 100));
  var done = q.done >= GOAL;
  el.style.display = '';
  el.classList.toggle('done', done);
  var labelEl = document.getElementById('questWidgetLabel');
  var goalEl  = document.getElementById('questWidgetGoal');
  var xpEl    = document.getElementById('questWidgetXP');
  var barEl   = document.getElementById('questWidgetBar');
  if(labelEl) labelEl.textContent = done
    ? (lang === 'ro' ? '✅ Misiunea zilei' : '✅ Daily Quest')
    : (lang === 'ro' ? 'Misiunea zilei'    : 'Daily Quest');
  if(goalEl) goalEl.textContent = q.done + ' / ' + GOAL +
    (done ? (lang === 'ro' ? ' — Completată!' : ' — Done!') : '');
  if(xpEl) xpEl.textContent = done ? '✓ +50 XP' : '+50 XP';
  if(barEl) barEl.style.width = pct + '%';
}

function applyLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-ro][data-en]').forEach(function(el) {
    el.textContent = el.dataset[lang];
  });
  document.documentElement.lang = lang;
  renderMiniStats(lang);
  renderQuestWidget(lang);
}

applyLang(currentLang);
renderQuestWidget(currentLang);
RKLang.init(applyLang);

// Notification toggle button
if (window.RKNotifications) RKNotifications.renderToggle('notifBtnWrap');

// In-app streak reminder — shown if not studied today and user has a streak
(function() {
  var banner = document.getElementById('streakBanner');
  var bannerText = document.getElementById('streakBannerText');
  var closeBtn = document.getElementById('streakBannerClose');
  if (!banner || !bannerText) return;
  var dismissed = sessionStorage.getItem('RK_STREAK_BANNER_DISMISSED');
  if (dismissed) return;
  var s;
  try { s = JSON.parse(localStorage.getItem('RK_STATS') || 'null'); } catch(e){ s = null; }
  if (!s || !s.bestStreak) return;
  var today = new Date().toISOString().slice(0, 10);
  if (s.today === today && s.todayTotal > 0) return; // already studied today
  var streak = s.bestStreak || 0;
  var lang = localStorage.getItem('RK_LANG') || 'ro';
  bannerText.textContent = streak > 0
    ? (lang === 'ro'
        ? 'Streakul tău de ' + streak + (streak === 1 ? ' zi' : ' zile') + ' e în pericol! Studiază acum 🔥'
        : 'Your ' + streak + '-day streak is at risk! Study now 🔥')
    : (lang === 'ro' ? 'Nu ai studiat azi. Continuă! 💪' : "You haven't studied today. Keep going! 💪");
  banner.style.display = '';
  closeBtn.addEventListener('click', function() {
    banner.style.display = 'none';
    sessionStorage.setItem('RK_STREAK_BANNER_DISMISSED', '1');
  });
})();
</script>
