<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Study App</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(139,92,246,.22), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(34,197,94,.14), transparent 55%),
    radial-gradient(600px 600px at 50% 90%, rgba(219,39,119,.13), transparent 55%),
    linear-gradient(180deg, #faf5ff, #f0f4ff);
  color: #1b1630;
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 12px;
}

body::before {
  content: '';
  position: fixed;
  inset: -6%;
  background: url('./flag.svg') center / cover no-repeat;
  filter: blur(3px);
  opacity: .45;
  z-index: 0;
  pointer-events: none;
}

body.dark-mode::before { opacity: .10; filter: blur(6px) brightness(.6); }

/* ── LANG BAR ─────────────────────────── */
.home-lang-bar {
  position: fixed;
  top: 14px; right: 16px;
  display: flex; gap: 6px;
  z-index: 100;
}

.home-lang-bar button {
  padding: 5px 13px;
  border-radius: 999px;
  border: 1.5px solid rgba(219,39,119,.25);
  background: rgba(255,255,255,.90);
  color: #7c3aed;
  font-weight: 800; font-size: 12px;
  cursor: pointer;
  transition: background .15s, color .15s;
  backdrop-filter: blur(6px);
}

.home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff; border-color: transparent;
}

body.dark-mode .home-lang-bar button {
  background: rgba(32,6,55,.85); color: #f0e8ff;
  border-color: rgba(244,114,182,.25);
}
body.dark-mode .home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
}

/* ── BLOB SCENE ──────────────────────── */
/* container 820×690, centru (410, 345) */
.blob-scene {
  position: relative;
  z-index: 1;
  width: 820px;
  height: 690px;
  flex-shrink: 0;
}

/* ── CENTER — RK oval ────────────────── */
.blob-center {
  position: absolute;
  width: 206px; height: 192px;
  top: 249px; left: 307px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #0891b2 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; text-align: center;
  z-index: 3;
  box-shadow:
    0 0 0 14px rgba(139,92,246,.11),
    0 0 0 28px rgba(219,39,119,.06),
    0 22px 52px rgba(124,58,237,.46);
  animation: pop-in .38s cubic-bezier(.34,1.56,.64,1) both;
  user-select: none;
}

.c-logo  { font-size: 38px; font-weight: 900; line-height: 1; }
.c-title { font-size: 11px; font-weight: 800; margin-top: 5px; opacity: .90; letter-spacing: .5px; }
.c-sub   { font-size: 9px; opacity: .60; margin-top: 2px; }

/* ── CATEGORY OVALS ──────────────────── */
.blob {
  position: absolute;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  color: #fff;
  z-index: 2;
  padding: 20px 26px;
  transition: filter .15s;
}
.blob:hover { filter: brightness(1.07); }

/* Fundamentale — near-circle, top-left */
.blob-1 {
  width: 262px; height: 258px;
  top: 22px; left: 28px;
  background: linear-gradient(150deg,#FF9600,#FF6500);
  box-shadow: 0 8px 0 #C24E00, 0 14px 32px rgba(255,101,0,.32);
  animation: pop-in .38s .06s cubic-bezier(.34,1.56,.64,1) both;
}

/* Studiu — wide horizontal oval, top-right */
.blob-2 {
  width: 322px; height: 246px;
  top: 18px; left: 474px;
  background: linear-gradient(150deg,#1CB0F6,#009FDE);
  box-shadow: 0 8px 0 #007AAB, 0 14px 32px rgba(28,176,246,.30);
  animation: pop-in .38s .10s cubic-bezier(.34,1.56,.64,1) both;
}

/* Practică — horizontal oval, bottom-left */
.blob-3 {
  width: 308px; height: 232px;
  top: 436px; left: 16px;
  background: linear-gradient(150deg,#58CC02,#3CAD00);
  box-shadow: 0 8px 0 #258700, 0 14px 32px rgba(88,204,2,.30);
  animation: pop-in .38s .14s cubic-bezier(.34,1.56,.64,1) both;
}

/* Abilități & Progres — widest oval, bottom-right */
.blob-4 {
  width: 344px; height: 238px;
  top: 432px; left: 458px;
  background: linear-gradient(150deg,#CE82FF,#A855F7);
  box-shadow: 0 8px 0 #7C3ACA, 0 14px 32px rgba(168,85,247,.30);
  animation: pop-in .38s .18s cubic-bezier(.34,1.56,.64,1) both;
}

/* ── BLOB CONTENT ────────────────────── */
.b-icon { font-size: 24px; line-height: 1; margin-bottom: 3px; filter: drop-shadow(0 1px 3px rgba(0,0,0,.20)); }
.b-name { font-size: 13px; font-weight: 900; margin-bottom: 7px; text-shadow: 0 1px 3px rgba(0,0,0,.18); }
.b-sep  { width: 75%; height: 1px; background: rgba(255,255,255,.28); margin-bottom: 7px; }

.b-links { display: flex; flex-direction: column; gap: 5px; width: 100%; }

.b-link {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.20);
  color: #fff;
  text-decoration: none;
  font-size: 11px; font-weight: 700;
  transition: background .12s, transform .12s;
}
.b-link:hover  { background: rgba(255,255,255,.38); transform: scale(1.05); }
.b-link:active { transform: scale(.97); }

.b-link-icon { font-size: 12px; line-height: 1; }
.b-link-name { flex: 1; text-align: left; }

/* ── ANIMATION ────────────────────────── */
@keyframes pop-in {
  from { opacity: 0; transform: scale(.78) translateY(10px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}

/* ── DARK MODE ────────────────────────── */
body.dark-mode {
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(100,0,70,.24), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(0,30,80,.18), transparent 55%),
    linear-gradient(180deg, #0e0020, #060012);
  color: #f0e8ff;
}

/* ── MOBILE ───────────────────────────── */
@media (max-width: 840px) {
  body { align-items: flex-start; justify-content: flex-start; padding: 16px 14px 48px; }

  .blob-scene {
    width: 100%; height: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .blob-center {
    position: static;
    width: 100%; height: auto;
    border-radius: 24px;
    padding: 18px 20px;
    grid-column: 1 / -1;
    flex-direction: row; gap: 12px;
    justify-content: flex-start; text-align: left;
    animation: none;
    box-shadow: 0 12px 32px rgba(124,58,237,.28);
  }

  .blob {
    position: static;
    width: 100%; height: auto;
    border-radius: 28px !important;
    padding: 16px;
    animation: none;
  }
}
</style>
</head>

<body>

<div class="home-lang-bar">
  <button id="langRo" class="active">ro</button>
  <button id="langEn">en</button>
</div>

<div class="blob-scene">

  <!-- CENTER -->

    <div class="c-logo">RK</div>
    <div class="c-title">Raluca Korean</div>
    <div class="c-sub">Study App</div>
  </div>

  <!-- 1 · Fundamentale — top-left -->
  <div class="blob blob-1">
    <div class="b-icon">가</div>
    <div class="b-name" data-ro="Fundamentale" data-en="Fundamentals"></div>
    <div class="b-sep"></div>
    <div class="b-links">
      <a href="hangul.html" class="b-link">
        <span class="b-link-icon">가</span>
        <span class="b-link-name">Hangul</span>
      </a>
      <a href="hanja-book.html" class="b-link">
        <span class="b-link-icon">📖</span>
        <span class="b-link-name">Hanja Book</span>
      </a>
    </div>
  </div>

  <!-- 2 · Studiu — top-right -->
  <div class="blob blob-2">
    <div class="b-icon">📗</div>
    <div class="b-name" data-ro="Studiu" data-en="Study"></div>
    <div class="b-sep"></div>
    <div class="b-links">
      <a href="lessons.html" class="b-link">
        <span class="b-link-icon">📗</span>
        <span class="b-link-name">Lessons</span>
      </a>
      <a href="glossary.html" class="b-link">
        <span class="b-link-icon">📚</span>
        <span class="b-link-name">Glossary</span>
      </a>
      <a href="flashcards.html" class="b-link">
        <span class="b-link-icon">🃏</span>
        <span class="b-link-name">Flashcards</span>
      </a>
    </div>
  </div>

  <!-- 3 · Practică — bottom-left -->
  <div class="blob blob-3">
    <div class="b-icon">🎯</div>
    <div class="b-name" data-ro="Practică" data-en="Practice"></div>
    <div class="b-sep"></div>
    <div class="b-links">
      <a href="exercises.html" class="b-link">
        <span class="b-link-icon">📝</span>
        <span class="b-link-name">Exercises</span>

      <a href="drill.html" class="b-link">
        <span class="b-link-icon">🎯</span>

  <!-- 4 · Abilități & Progres — bottom-right -->

    <div class="b-sep"></div>
    <div class="b-links">
      <a href="pronunciation.html" class="b-link">

        <span class="b-link-icon">✏️</span>

      <a href="stats.html" class="b-link">

</div>

<script>
var currentLang = localStorage.getItem('RK_LANG') || 'ro';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('RK_LANG', lang);
  document.querySelectorAll('[data-ro][data-en]').forEach(function(el) {
    el.textContent = el.dataset[lang];
  });
  document.getElementById('langRo').classList.toggle('active', lang === 'ro');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang;
}

document.getElementById('langRo').addEventListener('click', function() { applyLang('ro'); });
document.getElementById('langEn').addEventListener('click', function() { applyLang('en'); });

applyLang(currentLang);
</script>

<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
