<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Study App</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(139,92,246,.20), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(34,197,94,.14), transparent 55%),
    radial-gradient(600px 600px at 50% 90%, rgba(219,39,119,.12), transparent 55%),
    linear-gradient(180deg, #faf5ff, #f0f4ff);
  color: #1b1630;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ── ORBIT CONTAINER ───────────────────────── */
.orbit-wrap {
  position: relative;
  width: 560px;
  height: 560px;
  flex-shrink: 0;
}

/* SVG lines */
.orbit-svg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── CENTER NODE ───────────────────────────── */
.center-node {
  position: absolute;
  top: 50%; left: 50%;
  width: 148px; height: 148px;
  margin: -74px 0 0 -74px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #db2777, #0891b2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  box-shadow: 0 0 0 10px rgba(139,92,246,.12), 0 20px 50px rgba(124,58,237,.35);
  z-index: 3;
  text-align: center;
  padding: 16px 10px;
  user-select: none;
}

.center-logo {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
}

.center-title {
  font-size: 12px;
  font-weight: 800;
  margin-top: 5px;
  opacity: .92;
  letter-spacing: .3px;
}

.center-sub {
  font-size: 10px;
  opacity: .65;
  margin-top: 2px;
}

/* ── ORBIT POSITIONS ───────────────────────── */
/* Each <a> wraps the visible circle; the <a> itself handles orbital placement */
.orbit-pos {
  position: absolute;
  top: 50%; left: 50%;
  width: 128px; height: 128px;
  margin: -64px 0 0 -64px;
  text-decoration: none;
  z-index: 2;
}

/* 6 positions, 60° apart, starting from top (rotate 0 = up) */
.orbit-pos:nth-child(3)  { transform: rotate(0deg)   translateY(-218px) rotate(0deg);    }
.orbit-pos:nth-child(4)  { transform: rotate(60deg)  translateY(-218px) rotate(-60deg);  }
.orbit-pos:nth-child(5)  { transform: rotate(120deg) translateY(-218px) rotate(-120deg); }
.orbit-pos:nth-child(6)  { transform: rotate(180deg) translateY(-218px) rotate(-180deg); }
.orbit-pos:nth-child(7)  { transform: rotate(240deg) translateY(-218px) rotate(-240deg); }
.orbit-pos:nth-child(8)  { transform: rotate(300deg) translateY(-218px) rotate(-300deg); }

/* Visual circle inside each position wrapper */
.orbit-circle {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: rgba(255,255,255,.97);
  border: 2px solid rgba(219,39,119,.16);
  box-shadow: 0 10px 28px rgba(139,92,246,.14);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #1b1630;
  text-align: center;
  padding: 8px 6px;
  transition: transform .20s cubic-bezier(.34,1.56,.64,1), box-shadow .20s ease;
}

.orbit-pos:hover .orbit-circle {
  transform: scale(1.12);
  box-shadow: 0 18px 42px rgba(219,39,119,.24);
}

.node-icon  { font-size: 24px; line-height: 1; margin-bottom: 4px; }
.node-title { font-size: 12px; font-weight: 900; line-height: 1.2; color: #1b1630; }
.node-feat  { font-size: 9.5px; color: rgba(90,40,100,.58); margin-top: 2px; line-height: 1.3; font-weight: 600; }

/* ── MOBILE LAYOUT ─────────────────────────── */
@media (max-width: 600px) {
  body { justify-content: flex-start; padding: 20px 14px 40px; }

  .orbit-wrap {
    width: 100%;
    height: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .orbit-svg { display: none; }

  .center-node {
    position: static;
    width: 100%;
    height: auto;
    border-radius: 20px;
    margin: 0;
    flex-direction: row;
    gap: 12px;
    padding: 18px 20px;
    grid-column: 1 / -1;
    box-shadow: 0 14px 36px rgba(124,58,237,.28);
    justify-content: flex-start;
    text-align: left;
  }

  .center-logo { font-size: 30px; }
  .center-title { font-size: 15px; margin-top: 2px; }
  .center-sub { font-size: 11px; }

  .orbit-pos {
    position: static;
    width: 100%;
    height: auto;
    margin: 0;
    transform: none !important;
  }

  .orbit-circle {
    border-radius: 18px;
    height: 110px;
    flex-direction: column;
  }

  .orbit-pos:hover .orbit-circle {
    transform: translateY(-2px) scale(1.02);
  }

  .node-icon  { font-size: 22px; }
  .node-title { font-size: 13px; }
  .node-feat  { font-size: 10px; }
}

/* ── DARK MODE ─────────────────────────────── */
body.dark-mode {
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(100,0,70,.24), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(0,30,80,.18), transparent 55%),
    linear-gradient(180deg, #0e0020, #060012);
  color: #f0e8ff;
}

body.dark-mode .orbit-circle {
  background: rgba(32,6,55,.96) !important;
  border-color: rgba(244,114,182,.20) !important;
  box-shadow: 0 10px 28px rgba(0,0,0,.35) !important;
}

body.dark-mode .node-title { color: #f0e8ff !important; }
body.dark-mode .node-feat  { color: rgba(210,170,240,.55) !important; }

body.dark-mode .orbit-pos:hover .orbit-circle {
  box-shadow: 0 18px 42px rgba(244,114,182,.20) !important;
}
</style>
</head>

<body>
<div class="orbit-wrap">

  <!-- dashed connector lines -->
  <svg class="orbit-svg" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(139,92,246,.20)" stroke-width="1.5" stroke-dasharray="6 4">
      <!-- top -->
      <line x1="280" y1="280" x2="280" y2="62"/>
      <!-- top-right -->
      <line x1="280" y1="280" x2="469" y2="168"/>
      <!-- bottom-right -->
      <line x1="280" y1="280" x2="469" y2="392"/>
      <!-- bottom -->
      <line x1="280" y1="280" x2="280" y2="498"/>
      <!-- bottom-left -->
      <line x1="280" y1="280" x2="91"  y2="392"/>
      <!-- top-left -->
      <line x1="280" y1="280" x2="91"  y2="168"/>
    </g>
  </svg>

  <!-- center -->
  <div class="center-node">
    <div class="center-logo">RK</div>
    <div>
      <div class="center-title">Raluca Korean</div>
      <div class="center-sub">Study App</div>
    </div>
  </div>

  <!-- Builder — top -->
  <a class="orbit-pos" href="builder.html">
    <div class="orbit-circle">
      <div class="node-icon">🏗️</div>

      <div class="node-feat">Construiești fraze KO</div>
      <div class="node-feat">Audio + particule</div>
    </div>
  </a>

  <!-- Exercises — top-right -->
  <a class="orbit-pos" href="exercises.html">
    <div class="orbit-circle">
      <div class="node-icon">📝</div>
      <div class="node-title">Exercises</div>
      <div class="node-feat">7 tipuri de quiz</div>
      <div class="node-feat">TOPIK 1–6</div>
    </div>
  </a>

  <!-- Lessons — bottom-right -->
  <a class="orbit-pos" href="lessons.html">
    <div class="orbit-circle">
      <div class="node-icon">📗</div>
      <div class="node-title">Lessons</div>
      <div class="node-feat">Gramatică TOPIK</div>
      <div class="node-feat">Exemple + exerciții</div>
    </div>
  </a>

  <!-- Glossary — bottom -->
  <a class="orbit-pos" href="glossary.html">
    <div class="orbit-circle">
      <div class="node-icon">📚</div>
      <div class="node-title">Glossary</div>
      <div class="node-feat">Glosar KO–RO–EN</div>
      <div class="node-feat">Favorite + quiz zilnic</div>
    </div>
  </a>

  <!-- Flashcards — bottom-left -->
  <a class="orbit-pos" href="flashcards.html">
    <div class="orbit-circle">
      <div class="node-icon">🃏</div>
      <div class="node-title">Flashcards</div>
      <div class="node-feat">Flip animat</div>
      <div class="node-feat">Știu / Nu știu</div>
    </div>
  </a>

  <!-- Stats — top-left -->
  <a class="orbit-pos" href="stats.html">
    <div class="orbit-circle">
      <div class="node-icon">📊</div>
      <div class="node-title">Stats</div>
      <div class="node-feat">Progres zilnic</div>
      <div class="node-feat">Streak + acuratețe</div>
    </div>
  </a>

</div>

<script src="./js/core/vocab-widget.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
