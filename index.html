<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Study App</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(139,92,246,.22), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(34,197,94,.14), transparent 55%),
    radial-gradient(600px 600px at 50% 90%, rgba(219,39,119,.13), transparent 55%),
    linear-gradient(180deg, #faf5ff, #f0f4ff);
  color: #1b1630;
  min-height: 100%;
  padding: 24px 12px 48px;
}

body::before {
  content: '';
  position: fixed;
  inset: -6%;
  background: url('./flag.svg') center / cover no-repeat;
  filter: blur(3px);
  opacity: .45;
  z-index: 0;
  pointer-events: none;
}

body.dark-mode::before {
  opacity: .10;
  filter: blur(6px) brightness(.6);
}

/* ── LANG BAR ─────────────────────────── */
.home-lang-bar {
  position: fixed;
  top: 14px;
  right: 16px;
  display: flex;
  gap: 6px;
  z-index: 100;
}

.home-lang-bar button {
  padding: 5px 13px;
  border-radius: 999px;
  border: 1.5px solid rgba(219,39,119,.25);
  background: rgba(255,255,255,.90);
  color: #7c3aed;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
  transition: background .15s, color .15s;
  backdrop-filter: blur(6px);
}

.home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
  border-color: transparent;
}

body.dark-mode .home-lang-bar button {
  background: rgba(32,6,55,.85);
  color: #f0e8ff;
  border-color: rgba(244,114,182,.25);
}

body.dark-mode .home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
}

/* ── MAIN WRAP ────────────────────────── */
.page-wrap {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
}

/* ── APP HEADER ───────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 22px 28px;
  background: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #0891b2 100%);
  border-radius: 26px;
  color: #fff;
  margin-bottom: 22px;
  box-shadow: 0 12px 40px rgba(124,58,237,.38);
  animation: pop-in .38s cubic-bezier(.34,1.56,.64,1) both;
}

.app-logo  { font-size: 46px; font-weight: 900; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,.25)); }
.app-title { font-size: 22px; font-weight: 900; }
.app-sub   { font-size: 13px; opacity: .72; margin-top: 3px; }

/* ── CATEGORIES GRID ─────────────────── */
.cats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ── CATEGORY CARD ───────────────────── */
.cat-card {
  border-radius: 22px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 6px 28px rgba(0,0,0,.09);
  animation: pop-in .38s cubic-bezier(.34,1.56,.64,1) both;
}

.cat-card:nth-child(1) { animation-delay: .06s; }
.cat-card:nth-child(2) { animation-delay: .10s; }
.cat-card:nth-child(3) { animation-delay: .14s; }
.cat-card:nth-child(4) { animation-delay: .18s; }

body.dark-mode .cat-card { background: rgba(20,5,42,.88); }

/* Category header bar */
.cat-head {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 16px 18px;
  color: #fff;
}

.cat-1 .cat-head { background: linear-gradient(135deg,#FF9600,#FF6500); box-shadow: inset 0 -4px 0 rgba(0,0,0,.14); }
.cat-2 .cat-head { background: linear-gradient(135deg,#1CB0F6,#009FDE); box-shadow: inset 0 -4px 0 rgba(0,0,0,.14); }
.cat-3 .cat-head { background: linear-gradient(135deg,#58CC02,#3CAD00); box-shadow: inset 0 -4px 0 rgba(0,0,0,.14); }
.cat-4 .cat-head { background: linear-gradient(135deg,#CE82FF,#A855F7); box-shadow: inset 0 -4px 0 rgba(0,0,0,.14); }

.cat-icon { font-size: 28px; line-height: 1; filter: drop-shadow(0 2px 3px rgba(0,0,0,.22)); flex-shrink: 0; }
.cat-name { font-size: 14px; font-weight: 900; }
.cat-desc { font-size: 10px; opacity: .80; margin-top: 2px; font-weight: 600; }

/* ── PAGE LINKS ───────────────────────── */
.page-links {
  padding: 10px 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.page-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 13px;
  text-decoration: none;
  color: #1b1630;
  background: rgba(0,0,0,.04);
  transition: background .14s, transform .14s;
}

.page-link:hover  { background: rgba(0,0,0,.09); transform: translateX(4px); }
.page-link:active { transform: translateX(2px); }

body.dark-mode .page-link       { color: #f0e8ff; background: rgba(255,255,255,.07); }
body.dark-mode .page-link:hover { background: rgba(255,255,255,.13); }

.cat-1 .page-link { border-left: 3px solid rgba(255,101,0,.30); }
.cat-2 .page-link { border-left: 3px solid rgba(0,159,222,.30); }
.cat-3 .page-link { border-left: 3px solid rgba(60,173,0,.30); }
.cat-4 .page-link { border-left: 3px solid rgba(168,85,247,.30); }

.pl-icon { font-size: 20px; line-height: 1; flex-shrink: 0; }
.pl-name { font-size: 13px; font-weight: 800; flex: 1; }
.pl-desc { font-size: 10px; color: #6b7280; font-weight: 600; text-align: right; }

body.dark-mode .pl-desc { color: rgba(240,232,255,.50); }

/* ── ANIMATION ────────────────────────── */
@keyframes pop-in {
  from { opacity: 0; transform: scale(.92) translateY(8px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}

/* ── DARK MODE ────────────────────────── */
body.dark-mode {
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(100,0,70,.24), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(0,30,80,.18), transparent 55%),
    linear-gradient(180deg, #0e0020, #060012);
  color: #f0e8ff;
}

/* ── MOBILE ───────────────────────────── */
@media (max-width: 600px) {
  body { padding: 16px 12px 40px; }
  .cats-grid { grid-template-columns: 1fr; }
  .app-header { padding: 16px 20px; gap: 14px; }
  .app-logo  { font-size: 36px; }
  .app-title { font-size: 19px; }
}
</style>
</head>

<body>

<div class="home-lang-bar">
  <button id="langRo" class="active">ro</button>
  <button id="langEn">en</button>
</div>

<div class="page-wrap">

    <div class="app-logo">RK</div>
    <div>
      <div class="app-title">Raluca Korean</div>

    </div>
  </header>

  <div class="cats-grid">

    <!-- 1 · Fundamentale -->
    <div class="cat-card cat-1">
      <div class="cat-head">
        <div class="cat-icon">가</div>
        <div>
          <div class="cat-name" data-ro="Fundamentale" data-en="Fundamentals"></div>
          <div class="cat-desc" data-ro="Alfabet · Hanja" data-en="Alphabet · Hanja"></div>
        </div>
      </div>
      <div class="page-links">
        <a href="hangul.html" class="page-link">

        </a>
        <a href="hanja-book.html" class="page-link">

          <span class="pl-desc" data-ro="Caractere Hanja" data-en="Hanja characters"></span>

      </div>
    </div>

    <!-- 2 · Studiu -->
    <div class="cat-card cat-2">
      <div class="cat-head">
        <div class="cat-icon">📗</div>
        <div>
          <div class="cat-name" data-ro="Studiu" data-en="Study"></div>
          <div class="cat-desc" data-ro="Lecții · Glosar · Flashcards" data-en="Lessons · Glossary · Flashcards"></div>
        </div>
      </div>
      <div class="page-links">
        <a href="lessons.html" class="page-link">
          <span class="pl-icon">📗</span>
          <span class="pl-name">Lessons</span>
          <span class="pl-desc" data-ro="Gramatică TOPIK" data-en="TOPIK Grammar"></span>
        </a>
        <a href="glossary.html" class="page-link">

        </a>
        <a href="flashcards.html" class="page-link">
          <span class="pl-icon">🃏</span>
          <span class="pl-name">Flashcards</span>
          <span class="pl-desc" data-ro="Flip · Memorare" data-en="Flip · Memorize"></span>
        </a>
      </div>
    </div>

    <!-- 3 · Practică -->
    <div class="cat-card cat-3">
      <div class="cat-head">
        <div class="cat-icon">🎯</div>
        <div>
          <div class="cat-name" data-ro="Practică" data-en="Practice"></div>
          <div class="cat-desc" data-ro="Exerciții · Drill · Builder" data-en="Exercises · Drill · Builder"></div>

    <!-- 4 · Abilități & Progres -->
    <div class="cat-card cat-4">
      <div class="cat-head">

          <div class="cat-name" data-ro="Abilități & Progres" data-en="Skills & Progress"></div>
          <div class="cat-desc" data-ro="Vorbire · Scris · Statistici" data-en="Speaking · Writing · Stats"></div>

  </div>
</div>

<script>
var currentLang = localStorage.getItem('RK_LANG') || 'ro';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('RK_LANG', lang);
  document.querySelectorAll('[data-ro][data-en]').forEach(function(el) {
    el.textContent = el.dataset[lang];
  });
  document.getElementById('langRo').classList.toggle('active', lang === 'ro');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang;
}

document.getElementById('langRo').addEventListener('click', function() { applyLang('ro'); });
document.getElementById('langEn').addEventListener('click', function() { applyLang('en'); });

applyLang(currentLang);
</script>

<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
