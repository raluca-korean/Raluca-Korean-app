<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Study App</title>

<link rel="stylesheet" href="./theme-anime.css">
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(139,92,246,.22), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(34,197,94,.14), transparent 55%),
    radial-gradient(600px 600px at 50% 90%, rgba(219,39,119,.13), transparent 55%),
    linear-gradient(180deg, #faf5ff, #f0f4ff);
  color: #1b1630;
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 12px;
}

/* Steagul Coreei ca fundal blurat */
body::before {
  content: '';
  position: fixed;
  inset: -6%;
  background: url('./flag.svg') center / cover no-repeat;
  filter: blur(3px);
  opacity: .45;
  z-index: 0;
  pointer-events: none;
}

body.dark-mode::before {
  opacity: .10;
  filter: blur(6px) brightness(.6);
}

.blob-scene { position: relative; z-index: 1; }

/* ── LANG BAR ───────────────────────────── */
.home-lang-bar {
  position: fixed;
  top: 14px;
  right: 16px;
  display: flex;
  gap: 6px;
  z-index: 100;
}

.home-lang-bar button {
  padding: 5px 13px;
  border-radius: 999px;
  border: 1.5px solid rgba(219,39,119,.25);
  background: rgba(255,255,255,.90);
  color: #7c3aed;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
  transition: background .15s, color .15s;
  backdrop-filter: blur(6px);
}

.home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
  border-color: transparent;
}

body.dark-mode .home-lang-bar button {
  background: rgba(32,6,55,.85);
  color: #f0e8ff;
  border-color: rgba(244,114,182,.25);
}

body.dark-mode .home-lang-bar button.active {
  background: linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color: #fff;
}

/* ── BLOB SCENE ─────────────────────────────── */
.blob-scene {
  position: relative;
  width: 640px;
  height: 560px;
  flex-shrink: 0;
}

/* ── CENTER BLOB ────────────────────────────── */
.blob-center {
  position: absolute;
  width: 158px;
  height: 122px;
  top: 200px;
  left: 242px;
  border-radius: 55% 45% 50% 50% / 48% 54% 46% 52%;
  background: linear-gradient(135deg, #7c3aed, #db2777, #0891b2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
  padding: 14px 10px;
  box-shadow: 0 0 0 10px rgba(139,92,246,.12), 0 18px 48px rgba(124,58,237,.38);
  z-index: 3;
  user-select: none;
}

.c-logo  { font-size: 30px; font-weight: 900; line-height: 1; }
.c-title { font-size: 12px; font-weight: 800; margin-top: 4px; opacity: .92; }
.c-sub   { font-size: 10px; opacity: .65; margin-top: 1px; }

/* ── OUTER BLOBS ────────────────────────────── */
.blob {
  position: absolute;
  text-decoration: none;
  color: #1b1630;
  z-index: 2;
}

.blob-inner {
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,.97);
  border: 2px solid rgba(219,39,119,.15);
  box-shadow: 0 10px 28px rgba(139,92,246,.13);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px 8px;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;
}

.blob:hover .blob-inner {
  transform: scale(1.10);
  box-shadow: 0 18px 44px rgba(219,39,119,.22);
}

/* Builder — top, ușor stânga, oval mic înclinat */
.blob-1 {
  width: 120px; height: 92px;
  top: 12px; left: 186px;
}
.blob-1 .blob-inner {
  border-radius: 58% 42% 63% 37% / 44% 60% 40% 56%;
}

/* Exercises — dreapta sus, oval larg */
.blob-2 {
  width: 162px; height: 102px;
  top: 55px; left: 428px;
}
.blob-2 .blob-inner {
  border-radius: 42% 58% 38% 62% / 56% 42% 58% 44%;
}

/* Lessons — dreapta mijloc */
.blob-3 {
  width: 134px; height: 106px;
  top: 234px; left: 488px;
}
.blob-3 .blob-inner {
  border-radius: 50% 50% 46% 54% / 54% 46% 54% 46%;
}

/* Glossary — jos dreapta, lat */
.blob-4 {
  width: 166px; height: 94px;
  top: 394px; left: 392px;
}
.blob-4 .blob-inner {
  border-radius: 40% 60% 48% 52% / 58% 42% 58% 42%;
}

/* Flashcards — jos stânga, rotund */
.blob-5 {
  width: 150px; height: 110px;
  top: 380px; left: 78px;
}
.blob-5 .blob-inner {
  border-radius: 54% 46% 52% 48% / 44% 58% 42% 56%;
}

/* Stats — stânga mijloc, oval mic */
.blob-6 {
  width: 118px; height: 94px;
  top: 166px; left: 6px;
}
.blob-6 .blob-inner {
  border-radius: 48% 52% 60% 40% / 52% 46% 54% 48%;
}

/* Hanja Book — sus stânga */
.blob-7 {
  width: 124px; height: 92px;
  top: 42px; left: 58px;
}
.blob-7 .blob-inner {
  border-radius: 52% 48% 44% 56% / 46% 54% 46% 54%;
}

/* Hangul — jos centru */
.blob-8 {
  width: 138px; height: 96px;
  top: 420px; left: 252px;
}
.blob-8 .blob-inner {
  border-radius: 46% 54% 52% 48% / 54% 46% 56% 44%;
}

/* Text inside blobs */
.blob-icon  { font-size: 22px; line-height: 1; margin-bottom: 3px; }
.blob-title { font-size: 12px; font-weight: 900; line-height: 1.2; }
.blob-feat  { font-size: 9.5px; color: rgba(90,40,100,.58); margin-top: 2px; font-weight: 600; line-height: 1.3; }

/* ── MOBILE ─────────────────────────────────── */
@media (max-width: 680px) {
  body {
    align-items: flex-start;
    justify-content: flex-start;
    padding: 16px 14px 40px;
  }

  .blob-scene {
    width: 100%;
    height: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .blob-center {
    position: static;
    width: 100%;
    height: auto;
    border-radius: 20px;
    padding: 18px 20px;
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 12px;
    justify-content: flex-start;
    text-align: left;
    box-shadow: 0 12px 32px rgba(124,58,237,.28);
  }

  .blob {
    position: static;
    width: 100%;
    height: auto;
  }

  .blob-inner {
    height: 110px;
    border-radius: 18px !important;
  }

  .blob:hover .blob-inner {
    transform: translateY(-2px) scale(1.02);
  }

  .blob-icon  { font-size: 24px; }
  .blob-title { font-size: 13px; }
  .blob-feat  { font-size: 10.5px; }
}

/* ── DARK MODE ──────────────────────────────── */
body.dark-mode {
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(100,0,70,.24), transparent 55%),
    radial-gradient(900px 500px at 85% 15%, rgba(0,30,80,.18), transparent 55%),
    linear-gradient(180deg, #0e0020, #060012);
  color: #f0e8ff;
}

body.dark-mode .blob-inner {
  background: rgba(32,6,55,.96) !important;
  border-color: rgba(244,114,182,.20) !important;
  box-shadow: 0 10px 28px rgba(0,0,0,.38) !important;
}

body.dark-mode .blob-title { color: #f0e8ff !important; }
body.dark-mode .blob-feat  { color: rgba(210,170,240,.52) !important; }

body.dark-mode .blob:hover .blob-inner {
  box-shadow: 0 18px 44px rgba(244,114,182,.18) !important;
}
</style>
</head>

<script>
var currentLang = localStorage.getItem('RK_LANG') || 'ro';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('RK_LANG', lang);
  document.querySelectorAll('[data-ro][data-en]').forEach(function(el) {
    el.textContent = el.dataset[lang];
  });
  document.getElementById('langRo').classList.toggle('active', lang === 'ro');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang;
}

document.getElementById('langRo').addEventListener('click', function() { applyLang('ro'); });
document.getElementById('langEn').addEventListener('click', function() { applyLang('en'); });

applyLang(currentLang);
</script>
