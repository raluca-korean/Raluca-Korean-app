<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
    :root{
      --bg:#f6f7fd;
      --bg2:#eef2ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.08);
      --line2:rgba(15,23,42,.14);
      --primary:#6d5efc;
      --primary2:#8b5cf6;
      --shadow:0 16px 40px rgba(15,23,42,.07);
      --shadow-sm:0 8px 20px rgba(15,23,42,.05);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:16px;
      --transition:180ms ease;
      --c-relative:#f4e0ff;
      --c-subject:#dcecff;
      --c-time:#ffe8be;
      --c-location:#dff7df;
      --c-object:#ffdede;
      --c-description:#ece8ff;
      --c-verb:#ffe9cf;
      --c-connector:#e4ddff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(139,92,246,.10), transparent 22%),
        linear-gradient(180deg,var(--bg2) 0%, var(--bg) 34%, #fbfcfe 100%);
      padding:16px;
    }
    .app{max-width:1180px;margin:0 auto}
    .panel{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .title{margin:0;font-size:clamp(16px,2vw,24px);line-height:1.1;letter-spacing:-.02em;font-weight:900}
    .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pill,.tinyBtn,.topicOption,.iconBtn,.cardToggle,.cardMain{appearance:none;-webkit-appearance:none;border:none;font:inherit;transition:transform var(--transition),box-shadow var(--transition),background var(--transition),border-color var(--transition),opacity var(--transition),color var(--transition)}
    .pill:hover,.tinyBtn:hover,.topicOption:hover,.iconBtn:hover,.cardToggle:hover,.cardMain:hover{transform:translateY(-1px)}
    .pill,.tinyBtn,.iconBtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;cursor:pointer;background:#fff;color:var(--text);border:1px solid var(--line);border-radius:999px;box-shadow:0 8px 18px rgba(15,23,42,.04);font-weight:800}
    .pill{padding:9px 13px;font-size:13px;min-height:40px}
    .pill.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 14px 24px rgba(109,94,252,.22)}
    .tinyBtn{padding:8px 12px;font-size:12px;min-height:36px}
    .iconBtn{width:40px;height:40px;padding:0;font-size:15px;cursor:pointer}
    .iconBtn.recording{color:#fff;border-color:transparent;background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 14px 24px rgba(220,38,38,.22)}
    .topicMenu{position:relative}
    .topicMenu summary{list-style:none;cursor:pointer}
    .topicMenu summary::-webkit-details-marker{display:none}
    .topicBubble{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 14px 24px rgba(109,94,252,.22);user-select:none}
    .topicDot{width:7px;height:7px;border-radius:999px;background:#fff;opacity:.95;flex:0 0 auto}
    .topicDropdown{position:absolute;right:0;top:calc(100% + 9px);z-index:30;min-width:160px;display:grid;gap:7px;padding:10px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow-sm)}
    .topicOption{cursor:pointer;text-align:left;padding:10px 11px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:800;color:var(--text)}
    .topicOption.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary2))}
    textarea{width:100%;min-height:96px;resize:vertical;border:1px solid var(--line2);border-radius:18px;padding:15px 16px;background:#fff;color:var(--text);outline:none;font:inherit;font-size:18px;font-weight:800;line-height:1.5;box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}
    textarea:focus{border-color:rgba(109,94,252,.42);box-shadow:0 0 0 4px rgba(109,94,252,.08)}
    .previewBar{display:flex;justify-content:flex-end;margin-bottom:12px}
    .previewTools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sentenceBox{width:100%;border:1px solid rgba(109,94,252,.12);border-radius:18px;background:radial-gradient(circle at top left, rgba(109,94,252,.10), transparent 42%),linear-gradient(180deg,#fff 0%,#f8fafc 100%);padding:16px;box-shadow:var(--shadow-sm);cursor:pointer}
    .sentenceWords{display:flex;flex-wrap:wrap;gap:6px 8px;min-height:40px;align-items:center}
    .word{font-size:clamp(22px,3.2vw,34px);line-height:1.12;font-weight:900;letter-spacing:-.02em;color:#2563eb;padding:2px 4px;border-radius:10px;transition:background var(--transition), box-shadow var(--transition), transform var(--transition)}
    .word.active{background:linear-gradient(135deg, rgba(109,94,252,.16), rgba(139,92,246,.10));box-shadow:0 8px 18px rgba(109,94,252,.10);transform:translateY(-1px)}
    .translationBox{margin-top:12px;width:100%;min-height:58px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px 16px;box-shadow:0 8px 18px rgba(15,23,42,.04);display:flex;align-items:center}
    .translationText{font-size:18px;line-height:1.5;font-weight:800}
    .recordBox{margin-top:12px;display:none}
    .recordBox.show{display:block}
    .recordedLabel{font-size:12px;font-weight:900;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
    audio{width:100%;display:block;border-radius:14px}
    .clauseList{display:flex;flex-direction:column;gap:12px}
    .clauseRow{width:100%;border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:var(--shadow-sm);padding:12px}
    .clauseHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .clauseTitle{font-size:13px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .clauseGrid{display:grid;grid-template-columns:repeat(8,minmax(120px,1fr));gap:10px}
    .fieldCard{position:relative;min-height:126px;border:1px solid rgba(15,23,42,.08);border-radius:18px;box-shadow:0 8px 18px rgba(15,23,42,.05);overflow:hidden}
    .fieldCard[data-kind="relative"]{background:linear-gradient(180deg,var(--c-relative),#fff)}
    .fieldCard[data-kind="subject"]{background:linear-gradient(180deg,var(--c-subject),#fff)}
    .fieldCard[data-kind="time"]{background:linear-gradient(180deg,var(--c-time),#fff)}
    .fieldCard[data-kind="location"]{background:linear-gradient(180deg,var(--c-location),#fff)}
    .fieldCard[data-kind="object"]{background:linear-gradient(180deg,var(--c-object),#fff)}
    .fieldCard[data-kind="description"]{background:linear-gradient(180deg,var(--c-description),#fff)}
    .fieldCard[data-kind="verb"]{background:linear-gradient(180deg,var(--c-verb),#fff)}
    .fieldCard[data-kind="connector"]{background:linear-gradient(180deg,var(--c-connector),#fff)}
    .fieldCard.off{opacity:.46;filter:saturate(.85)}
    .cardToggle{position:absolute;top:8px;right:8px;z-index:3;width:24px;height:24px;border-radius:999px;border:1px solid rgba(15,23,42,.10);background:#fff;color:#64748b;cursor:pointer;display:grid;place-items:center;box-shadow:0 6px 14px rgba(15,23,42,.05);font-size:12px;font-weight:900;line-height:1;padding:0}
    .cardToggle.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary2))}
    .cardMain{width:100%;height:100%;background:transparent;cursor:pointer;text-align:left;padding:11px 12px 12px;display:flex;flex-direction:column;justify-content:flex-start;gap:8px}
    .cardTop{display:flex;align-items:center;gap:7px;padding-right:26px;margin-top:1px}
    .cardDot{width:7px;height:7px;border-radius:999px;background:rgba(15,23,42,.48);flex:0 0 auto}
    .cardLabel{font-size:10px;line-height:1.25;font-weight:900;letter-spacing:.11em;text-transform:uppercase;color:#334155}
    .cardPrompt{font-size:12px;line-height:1.35;color:#64748b;font-weight:700;min-height:16px;margin-top:1px}
    .cardValue{font-size:24px;line-height:1.08;font-weight:900;letter-spacing:-.02em;color:#0f172a;word-break:keep-all;margin-top:auto}
    .cardMeta{font-size:11px;line-height:1.32;color:#64748b;font-weight:800;margin-top:6px;min-height:14px}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(12px);min-width:min(92vw,560px);max-width:92vw;padding:13px 15px;border-radius:16px;background:#fff;border:1px solid rgba(15,23,42,.10);box-shadow:0 18px 40px rgba(15,23,42,.16);font-size:14px;line-height:1.5;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:100}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media (max-width:980px){.clauseGrid{grid-template-columns:repeat(4,minmax(120px,1fr))}}
    @media (max-width:720px){body{padding:12px}.panel{padding:13px}.title{font-size:16px}textarea{min-height:88px;font-size:16px}.translationText{font-size:16px}.word{font-size:20px}.cardValue{font-size:21px}.clauseGrid{grid-template-columns:repeat(2,minmax(120px,1fr))}}
  </style>
</head>

    <section class="panel">
      <div class="clauseList" id="clauseList"></div>
    </section>
  </div>

  const VERB_FINITE_MAP = {

  function makeField(enabled, index){

  }

  function makeClause(subjectIndex = 0, enableSubject = true){
    return {
      relative: makeField(false, 0),
      subject: makeField(enableSubject, subjectIndex),
      time: makeField(false, 0),
      location: makeField(false, 0),
      object: makeField(false, 0),
      description: makeField(false, 0),
      verb: makeField(true, 0),
      connector: makeField(true, 0)
    };
  }

  function safeParseJSON(raw, fallback){

      return data ?? fallback;
    }catch{
      return fallback;
    }

  const savedClauses = safeParseJSON(localStorage.getItem("rk_builder_clauses"), null);

  function normalize(str){
    return String(str || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^\p{L}\p{N}\s]/gu, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function datasetFor(fieldKey){
    if(fieldKey === "relative") return DATA.relative;
    if(fieldKey === "subject") return DATA.subject;
    if(fieldKey === "time") return DATA.time;
    if(fieldKey === "location") return DATA.location;
    if(fieldKey === "object") return DATA.object;
    if(fieldKey === "description") return DATA.description;
    if(fieldKey === "verb") return DATA.verbs;
    if(fieldKey === "connector") return DATA.connectors;
    return [];
  }

  function itemOf(clause, fieldKey){
    const list = datasetFor(fieldKey);
    const idx = Math.max(0, Math.min(list.length - 1, clause[fieldKey].index || 0));
    return list[idx];
  }

  function connectorKey(clause){
    const item = itemOf(clause, "connector");
    return clause.connector.enabled ? item.key : "none";
  }

  function ensureChainLength(){
    let required = 1;

    for(let i = 0; i < state.clauses.length; i++){
      const clause = state.clauses[i];
      if(i >= required) break;
      if(connectorKey(clause) !== "none") required += 1;
    }

    while(state.clauses.length < required){
      const prev = state.clauses[state.clauses.length - 1];
      const next = makeClause(prev.subject.index, false);
      state.clauses.push(next);
    }

    if(state.clauses.length > required){
      state.clauses = state.clauses.slice(0, required);
    }
  }

  function findIndexInDataset(fieldKey, text){
    const list = datasetFor(fieldKey);
    const n = normalize(text);

    for(let i = 1; i < list.length; i++){
      const item = list[i];
      const bag = [item.ko, item.ro, item.en, ...(item.aliases || [])]
        .filter(Boolean)
        .map(normalize);

      if(bag.some(entry => entry && n.includes(entry))) return i;
    }

    return -1;
  }

  function connectorIndexByKey(key){
    return DATA.connectors.findIndex(c => c.key === key);
  }

  function splitIntoSegments(text){
    let working = normalize(text);

    const markers = [
      { key:"cause1", phrases:["pentru ca", "pentru că", "because"] },
      { key:"cause2", phrases:["fiindca", "fiindcă", "since"] },
      { key:"condition", phrases:["daca", "dacă", "if"] },
      { key:"contrast1", phrases:["dar", "insa", "însă", "but", "however"] },
      { key:"contrast2", phrases:["iar", "while"] },
      { key:"purpose", phrases:["ca sa", "ca să", "in order to"] },
      { key:"seq", phrases:["si apoi", "și apoi", "and then"] }
    ];

    markers.forEach(marker => {
      marker.phrases.forEach(p => {
        const safe = p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        working = working.replace(new RegExp(`\\b${safe}\\b`, "g"), ` |||${marker.key}||| `);
      });
    });

    working = working.replace(/,/g, " |||none||| ");

    const parts = working.split("|||").map(x => x.trim()).filter(Boolean);
    const segments = [];
    let currentText = "";

    for(let i = 0; i < parts.length; i++){
      const part = parts[i];
      const isConnector = DATA.connectors.some(c => c.key === part);

      if(!isConnector){
        currentText = currentText ? currentText + " " + part : part;
      }else{
        segments.push({ text: currentText.trim(), connector: part });
        currentText = "";
      }
    }

    if(currentText.trim()) segments.push({ text: currentText.trim(), connector: "none" });
    if(!segments.length) segments.push({ text: working.trim(), connector: "none" });

    return segments;
  }

  function parseTextIntoClauses(){
    const raw = state.text.trim();

    if(!raw){
      state.clauses = [makeClause()];
      ensureChainLength();
      return;
    }

    const segments = splitIntoSegments(raw);
    const clauses = [];

    segments.forEach((seg, idx) => {
      const prev = clauses[idx - 1];
      const clause = makeClause(prev ? prev.subject.index : 0, idx === 0);

      FIELD_DEFS.forEach(def => {
        if(def.key === "connector") return;

        const found = findIndexInDataset(def.key, seg.text);

        if(found > -1){
          clause[def.key].enabled = true;
          clause[def.key].index = found;
        }else if(def.key === "verb"){
          clause.verb.enabled = true;
          clause.verb.index = prev ? prev.verb.index : 0;
        }else if(def.key === "subject" && idx > 0){
          clause.subject.enabled = false;
        }else{
          clause[def.key].enabled = false;
          clause[def.key].index = 0;
        }
      });

      const connIndex = connectorIndexByKey(seg.connector);
      clause.connector.enabled = true;
      clause.connector.index = connIndex > -1 ? connIndex : 0;

      clauses.push(clause);
    });

    state.clauses = clauses.length ? clauses : [makeClause()];
    ensureChainLength();
  }

  function randomNonZero(length){
    return length <= 1 ? 0 : Math.floor(Math.random() * (length - 1)) + 1;
  }

  function refreshSentences(){
    state.clauses.forEach((clause, idx) => {
      FIELD_DEFS.forEach(def => {
        const field = clause[def.key];
        const list = datasetFor(def.key);

        if(!field.enabled) return;

        if(def.key === "connector"){
          field.index = (field.index + 1) % list.length;
          return;
        }

        if(list.length > 1){
          field.index = (field.index + 1) % list.length;
          if(field.index === 0) field.index = 1;
        }
      });

      if(idx === 0){
        clause.subject.enabled = true;
      }
    });

    ensureChainLength();
    saveState();
    renderAll();
  }

  function buildClauseSurface(clause, index, previousClause){
    const partsKo = [];
    const partsTr = [];

    const relative = itemOf(clause, "relative");
    const subject = itemOf(clause, "subject");
    const time = itemOf(clause, "time");
    const location = itemOf(clause, "location");
    const object = itemOf(clause, "object");
    const description = itemOf(clause, "description");
    const verb = itemOf(clause, "verb");
    const connector = itemOf(clause, "connector");

    if(clause.relative.enabled && relative.ko){
      partsKo.push(relative.ko);
      partsTr.push(relative[state.lang] || "");
    }

    const repeatedSubject =
      previousClause &&
      previousClause.subject.enabled &&
      clause.subject.enabled &&
      itemOf(previousClause, "subject").ko === subject.ko;

    if(clause.subject.enabled && subject.ko && !repeatedSubject){
      partsKo.push(subject.ko);
      partsTr.push(subject[state.lang] || "");
    }

    if(clause.time.enabled && time.ko){
      partsKo.push(time.ko);
      partsTr.push(time[state.lang] || "");
    }

    if(clause.location.enabled && location.ko){
      partsKo.push(location.ko);
      partsTr.push(location[state.lang] || "");
    }

    if(clause.object.enabled && object.ko){
      partsKo.push(object.ko);
      partsTr.push(object[state.lang] || "");
    }

    if(clause.description.enabled && description.ko){
      partsKo.push(description.ko);
      partsTr.push(description[state.lang] || "");
    }

    if(clause.verb.enabled){
      if(clause.connector.enabled && connector.key !== "none"){
        partsKo.push(verb.forms[connector.key] || verb.final || verb.ko);
        partsTr.push(`${finiteVerbText(verb)} ${connector[state.lang] || ""}`.trim());
      } else {
        partsKo.push(verb.final || verb.ko);
        partsTr.push(finiteVerbText(verb));
      }
    }

    return {
      ko: partsKo.join(" ").replace(/\s+/g, " ").trim(),
      tr: partsTr.join(" ").replace(/\s+/g, " ").trim()
    };
  }

  function buildFullOutput(){
    const clauseOutputs = [];
    let prev = null;

    state.clauses.forEach((clause, idx) => {
      const built = buildClauseSurface(clause, idx, prev);
      if(built.ko) clauseOutputs.push(built);
      prev = clause;
    });

    return {
      korean: clauseOutputs.map(x => x.ko).join(" ").replace(/\s+/g, " ").trim(),
      translation: clauseOutputs.map(x => x.tr).join(", ").replace(/\s+/g, " ").trim()
    };
  }

  function renderPreview(){
    const built = buildFullOutput();
    const words = built.korean ? built.korean.split(/\s+/) : ["저는", "공부해요"];

    els.sentenceWords.innerHTML = words
      .map(w => `<span class="word">${escapeHtml(w)}</span>`)
      .join("");

    els.translationText.textContent = built.translation || currentUI().defaultTranslation;
  }

  function fieldValueText(clause, key){
    const item = itemOf(clause, key);

    if(key === "connector") return item.ko || "—";

    if(key === "verb"){
      const connector = itemOf(clause, "connector");
      if(clause.connector.enabled && connector.key !== "none"){
        return item.forms[connector.key] || item.final || item.ko;
      }
      return item.final || item.ko || "—";
    }

    return item.ko || "—";
  }

  function fieldMetaText(clause, key){
    return itemOf(clause, key)[state.lang] || "";
  }

  function renderClauses(){
    els.clauseList.innerHTML = state.clauses.map((clause, idx) => {
      return `
        <div class="clauseRow" data-clause="${idx}">
          <div class="clauseHead">
            <div class="clauseTitle">${escapeHtml(currentUI().clause)} ${idx + 1}</div>
          </div>
          <div class="clauseGrid">
            ${FIELD_DEFS.map(def => `
              <div class="fieldCard ${clause[def.key].enabled ? "" : "off"}" data-kind="${def.kind}">
                <button class="cardToggle ${clause[def.key].enabled ? "active" : ""}" data-toggle="${idx}:${def.key}" type="button">✓</button>
                <button class="cardMain" data-cycle="${idx}:${def.key}" type="button">
                  <div class="cardTop">

                </button>

            `).join("")}
          </div>
        </div>
      `;
    }).join("");

    els.clauseList.querySelectorAll("[data-cycle]").forEach(btn => {
      btn.addEventListener("click", () => {
        const [idx, key] = btn.dataset.cycle.split(":");
        cycleField(Number(idx), key);
      });
    });

    els.clauseList.querySelectorAll("[data-toggle]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const [idx, key] = btn.dataset.toggle.split(":");
        toggleField(Number(idx), key);
      });
    });
  }

  function cycleField(clauseIndex, key){
    const clause = state.clauses[clauseIndex];
    const field = clause[key];

    if(!field.enabled) return;

    const list = datasetFor(key);
    field.index = (field.index + 1) % list.length;

    ensureChainLength();
    saveState();
    renderAll();
  }

  function toggleField(clauseIndex, key){
    const clause = state.clauses[clauseIndex];
    const field = clause[key];

    if(key === "verb" || key === "connector") return;

    field.enabled = !field.enabled;

    if(!field.enabled){
      field.index = 0;
    }else if(field.index === 0 && datasetFor(key).length > 1){
      field.index = 1;
    }

    saveState();
    renderAll();
  }

  function playCurrent(){
    const built = buildFullOutput();

    if(!built.korean.trim()){
      showToast(currentUI().noSpeech);
      return;
    }

    if(!("speechSynthesis" in window)){
      showToast(currentUI().noSpeech);
      return;
    }

    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(built.korean);
    utter.lang = "ko-KR";
    utter.rate = 0.9;

    let activeIndex = -1;
    const wordEls = [...els.sentenceWords.querySelectorAll(".word")];

    utter.onboundary = () => {
      activeIndex += 1;
      wordEls.forEach((el, idx) => el.classList.toggle("active", idx === activeIndex));
    };

    utter.onend = () => {
      wordEls.forEach(el => el.classList.remove("active"));
    };

    window.speechSynthesis.speak(utter);
  }

  async function toggleRecording(){
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || typeof MediaRecorder === "undefined"){
      showToast(currentUI().recordUnsupported);
      return;
    }

    if(mediaRecorder && mediaRecorder.state === "recording"){
      mediaRecorder.stop();
      els.recordBtn.classList.remove("recording");
      showToast(currentUI().recordStop);
      return;
    }

    try{
      recordedChunks = [];
      recordedStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const preferredTypes = [
        "audio/mp4",
        "audio/webm;codecs=opus",
        "audio/webm"
      ];

      let chosenType = "";
      if(window.MediaRecorder && MediaRecorder.isTypeSupported){
        chosenType = preferredTypes.find(type => MediaRecorder.isTypeSupported(type)) || "";
      }

      mediaRecorder = chosenType
        ? new MediaRecorder(recordedStream, { mimeType: chosenType })
        : new MediaRecorder(recordedStream);

      mediaRecorder.ondataavailable = event => {
        if(event.data && event.data.size > 0){
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = () => {
        const finalType = chosenType || (recordedChunks[0] && recordedChunks[0].type) || "audio/mp4";
        const blob = new Blob(recordedChunks, { type: finalType });
        const url = URL.createObjectURL(blob);

        els.recordedAudio.pause();
        els.recordedAudio.removeAttribute("src");
        els.recordedAudio.load();

        els.recordedAudio.src = url;
        els.recordBox.classList.add("show");

        if(recordedStream){
          recordedStream.getTracks().forEach(track => track.stop());
          recordedStream = null;
        }
      };

      mediaRecorder.start();
      els.recordBtn.classList.add("recording");
      showToast(currentUI().recordStart);
    }catch(err){
      showToast(currentUI().recordUnsupported);
    }
  }

  function bindEvents(){
    els.btnRo.addEventListener("click", () => setLang("ro"));
    els.btnEn.addEventListener("click", () => setLang("en"));

    [...els.topicDropdown.querySelectorAll(".topicOption")].forEach(btn => {
      btn.addEventListener("click", () => setLevel(Number(btn.dataset.level)));
    });

    els.freeText.addEventListener("input", () => {
      state.text = els.freeText.value;
      parseTextIntoClauses();
      saveState();
      renderAll();
    });

    els.refreshBtn.addEventListener("click", refreshSentences);
    els.playBtn.addEventListener("click", playCurrent);
    els.recordBtn.addEventListener("click", toggleRecording);

    els.sentenceBox.addEventListener("click", playCurrent);
    els.sentenceBox.addEventListener("keydown", e => {
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        playCurrent();
      }
    });
  }

  function escapeHtml(str){
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function init(){
    els.freeText.value = state.text;
    els.freeText.placeholder = currentUI().placeholder;
    setLevel(state.level);
    setLang(state.lang);

    if(state.text.trim()){
      parseTextIntoClauses();
    }else{
      ensureChainLength();
    }

    bindEvents();
    renderAll();
  }

  init();
</script>
