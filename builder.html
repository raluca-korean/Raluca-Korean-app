<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raluca Korean – Builder</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4f0ff;
}

.app{
  max-width:900px;
  margin:auto;
  padding:12px;
}

.table-horizontal{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.col{
  min-width:110px;
  padding:8px;
  border-radius:12px;
  background:white;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.col-header{
  font-size:11px;
  font-weight:700;
  margin-bottom:4px;
}

.col-body-main{
  font-size:16px;
  font-weight:700;
}

.preview{
  margin-top:16px;
  padding:14px;
  background:white;
  border-radius:16px;
  text-align:center;
}

.preview-ko{
  font-size:22px;
  font-weight:800;
}

.preview-ro{
  font-size:14px;
  opacity:0.7;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#7b5fff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="app">

<h2>Builder propoziții</h2>

<div id="tableP1" class="table-horizontal"></div>

<div class="preview">
  <div id="previewKo" class="preview-ko"></div>
  <div id="previewRo" class="preview-ro"></div>
</div>

<button id="randomBtn">Random</button>

</div>

<script>

/* ===============================
   VOCABULAR MINIM (extensibil)
================================ */
const vocab = {
  subject:[
    {ko:"저는", ro:"eu"},
    {ko:"그는", ro:"el"}
  ],
  time:[
    {ko:"오늘", ro:"azi"},
    {ko:"내일", ro:"mâine"}
  ],
  place:[
    {ko:"학교에서", ro:"la școală"},
    {ko:"집에서", ro:"acasă"}
  ],
  object:[
    {ko:"밥을", ro:"mâncare"},
    {ko:"책을", ro:"carte"}
  ],
  verb:[
    {ko:"먹어요", ro:"mănânc"},
    {ko:"읽어요", ro:"citesc"}
  ]
};

/* ===============================
   STATE
================================ */
let state = {
  subject:0,
  time:0,
  place:0,
  object:0,
  verb:0
};

/* ===============================
   BUILD UI
================================ */
function buildTable(){
  const table = document.getElementById("tableP1");
  table.innerHTML = "";

  Object.keys(vocab).forEach(key=>{
    const col = document.createElement("div");
    col.className = "col";

    col.innerHTML = `
      <div class="col-header">${key.toUpperCase()}</div>
      <div class="col-body-main">${vocab[key][state[key]].ko}</div>
    `;

    col.onclick = ()=>{
      state[key] = (state[key]+1) % vocab[key].length;
      buildTable();
      updatePreview();
    };

    table.appendChild(col);
  });
}

/* ===============================
   PREVIEW
================================ */
function updatePreview(){
  const ko = `
    ${vocab.subject[state.subject].ko}
    ${vocab.time[state.time].ko}
    ${vocab.place[state.place].ko}
    ${vocab.object[state.object].ko}
    ${vocab.verb[state.verb].ko}
  `;

  const ro = `
    ${vocab.subject[state.subject].ro}
    ${vocab.verb[state.verb].ro}
    ${vocab.object[state.object].ro}
    ${vocab.place[state.place].ro}
    ${vocab.time[state.time].ro}
  `;

  document.getElementById("previewKo").innerText = ko;
  document.getElementById("previewRo").innerText = ro;
}

/* ===============================
   RANDOM
================================ */
document.getElementById("randomBtn").onclick = ()=>{
  Object.keys(state).forEach(k=>{
    state[k] = Math.floor(Math.random()*vocab[k].length);
  });
  buildTable();
  updatePreview();
};

/* ===============================
   INIT
================================ */
buildTable();
updatePreview();

</script>

</body>
</html>
