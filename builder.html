<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Raluca Korean – Builder v4</title>

<style>
  :root{
    --bg:#f4f0ff;
    --card:#ffffff;
    --accent:#7b5fff;
    --accent-2:#5f46e8;
    --text:#1f1f1f;
    --muted:#6f6f7a;
    --border:#e8e4fb;
    --shadow:0 8px 24px rgba(78,52,176,0.08);
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .app{
    max-width:1280px;
    margin:0 auto;
    padding:20px;
  }

  h1{
    text-align:center;
    margin:8px 0 18px;
    font-size:32px;
  }

  .toolbar,
  .input-card,
  .preview-card,
  .clause-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow);
  }

  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:14px;
    justify-content:center;
    margin-bottom:14px;
  }

  button{
    border:none;
    background:var(--accent);
    color:#fff;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
  }

  button:hover{ background:var(--accent-2); }

  .ghost{
    background:#ece8ff;
    color:#3f2bb8;
  }

  .input-card{
    padding:16px;
    margin-bottom:16px;
  }

  .input-top{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:10px;
  }

  .lang-switch{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .lang-chip{
    background:#f1eeff;
    color:#4f39cb;
    padding:8px 12px;
    border-radius:999px;
    font-weight:700;
    cursor:pointer;
    border:1px solid #ddd6ff;
  }

  .lang-chip.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }

  textarea{
    width:100%;
    min-height:110px;
    resize:vertical;
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    font-size:15px;
    outline:none;
  }

  .preview-card{
    padding:20px;
    margin-bottom:18px;
    text-align:center;
  }

  .preview-ko{
    font-size:30px;
    font-weight:800;
    line-height:1.6;
    margin-bottom:14px;
    white-space:pre-wrap;
  }

  .preview-ro,
  .preview-en{
    font-size:18px;
    color:var(--muted);
    line-height:1.55;
    white-space:pre-wrap;
  }

  .clauses-wrap{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .clause-card{
    padding:14px;
  }

  .clause-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }

  .clause-title{
    font-size:18px;
    font-weight:800;
  }

  .clause-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .table{
    display:grid;
    grid-template-columns:repeat(7,minmax(120px,1fr));
    gap:8px;
  }

  .col{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px;
    cursor:pointer;
    min-height:88px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

  .col:hover{
    background:#faf8ff;
  }

  .col-header{
    font-size:11px;
    font-weight:800;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--muted);
  }

  .col-body-main{
    font-size:20px;
    font-weight:800;
    line-height:1.25;
    word-break:break-word;
  }

  .col-body-sub{
    font-size:12px;
    color:var(--muted);
    line-height:1.3;
  }

  @media (max-width: 980px){
    .table{
      grid-template-columns:repeat(3,minmax(110px,1fr));
    }
  }

  @media (max-width: 640px){
    .table{
      grid-template-columns:repeat(2,minmax(110px,1fr));
    }
    .preview-ko{ font-size:24px; }
    .preview-ro,.preview-en{ font-size:16px; }
  }
</style>
</head>
<body>
<div class="app">

  <h1>Raluca Korean – Builder v4</h1>

  <div class="toolbar">
    <button onclick="addClause()">+ Propoziție</button>
    <button onclick="randomAll()">Random</button>
    <button class="ghost" onclick="clearAll()">Reset</button>
  </div>

  <div class="input-card">
    <div class="input-top">
      <div class="lang-switch">
        <div id="langRO" class="lang-chip active" onclick="setInputLang('ro')">Input RO</div>
        <div id="langEN" class="lang-chip" onclick="setInputLang('en')">Input EN</div>
        <div id="langAUTO" class="lang-chip" onclick="setInputLang('auto')">Auto</div>
      </div>
      <button onclick="parseFreeText()">Parse text</button>
    </div>

    <textarea id="freeInput" placeholder="Ex: Astăzi merg la școală, citesc o carte și apoi mănânc.
Ex: Today I go to school, read a book, and then eat."></textarea>
  </div>

  <div class="preview-card">
    <div id="previewKo" class="preview-ko"></div>
    <div id="previewRo" class="preview-ro"></div>
    <div id="previewEn" class="preview-en"></div>
  </div>

  <div id="clausesWrap" class="clauses-wrap"></div>

</div>
  <script> 
    function addClause(){
  sentences.push(makeEmptySentence());
  actives.push(makeAllActive());
  renderAll();
}

function randomAll(){
  sentences.forEach((s, i) => {
    columns.forEach(col=>{
      const arr = col.data.filter(Boolean);
      if(arr.length){
        s[col.key] = arr[Math.floor(Math.random()*arr.length)];
      }
    });
  });
  renderAll();
}

function clearAll(){
  sentences = [makeEmptySentence()];
  actives = [makeAllActive()];
  renderAll();
}
 </script>
  <script src="builder.js"></script>
</html>
