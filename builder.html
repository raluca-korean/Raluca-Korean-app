
<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#db2777">
  <link rel="stylesheet" href="./theme-anime.css">
  <style>
  :root{
    --bg:#fdf4ff;
    --bg2:#fce7f3;
    --card:#ffffff;
    --text:#1a0533;
    --muted:#7e3a6e;
    --line:rgba(219,39,119,.13);
    --line2:rgba(219,39,119,.22);
    --primary:#db2777;
    --primary2:#7c3aed;
    --accent:#0ea5e9;
    --shadow:0 16px 40px rgba(219,39,119,.14);
    --shadow-sm:0 8px 20px rgba(219,39,119,.09);
    --radius-xl:24px;
    --radius-lg:18px;
    --radius-md:16px;
    --transition:180ms ease;

    --c-subject:#bfdbfe;
    --c-time:#fde68a;
    --c-location:#6ee7b7;
    --c-object:#fca5a5;
    --c-description:#c4b5fd;
    --c-verb:#fdba74;
    --c-connector:#a5f3fc;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}

  body{
    min-height:100vh;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background: #f0f4f8;
    padding:16px;
  }

  .app{
    max-width:1180px;
    margin:0 auto;
  }

  .panel{
    width:100%;
    background:#fff;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    border-radius:var(--radius-lg);
    box-shadow:none;
    padding:16px;
    margin-bottom:14px;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }

  .title{
    margin:0;
    font-size:clamp(16px,2vw,24px);
    line-height:1.1;
    letter-spacing:-.02em;
    font-weight:900;
  }

  .toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .pill,
  .tinyBtn,
  .topicOption,
  .iconBtn,
  .tableMainBtn,
  .tableToggle,
  .vocabSheetClose,
  .vocabItem{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    font:inherit;
    transition:
      transform var(--transition),
      box-shadow var(--transition),
      background var(--transition),
      border-color var(--transition),
      opacity var(--transition),
      color var(--transition);
  }

  .pill:hover,
  .tinyBtn:hover,
  .topicOption:hover,
  .iconBtn:hover,
  .tableMainBtn:hover,
  .vocabSheetClose:hover,
  .vocabItem:hover{
    transform:translateY(-1px);
  }

  .pill,
  .tinyBtn,
  .iconBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    cursor:pointer;
    background:#fff;
    color:var(--text);
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    border-radius:12px;
    box-shadow:none;
    font-weight:800;
  }

  .pill{
    padding:9px 13px;
    font-size:13px;
    min-height:40px;
  }

  .tinyBtn{
    padding:8px 12px;
    font-size:12px;
    min-height:36px;
  }

  .iconBtn{
    width:40px;
    height:40px;
    padding:0;
    font-size:15px;
    cursor:pointer;
  }

  .pill.active{
    color:#fff;
    background:#1CB0F6;
    border-color:#1CB0F6;
    border-bottom-color:#009AC7;
    box-shadow:none;
  }

  .pillSep{
    color:var(--line2);
    font-size:16px;
    opacity:.4;
    margin:0 2px;
    user-select:none;
  }

  .iconBtn.recording{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(135deg,#f43f5e,#e11d48);
    box-shadow:0 10px 24px rgba(244,63,94,.35);
  }

  .topicMenu{position:relative}
  .topicMenu summary{list-style:none;cursor:pointer}
  .topicMenu summary::-webkit-details-marker{display:none}

  .topicBubble{
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-height:38px;
    padding:8px 14px;
    border-radius:12px;
    font-size:12px;
    font-weight:900;
    color:#fff;
    background:#CE82FF;
    border:2px solid #CE82FF;
    border-bottom:4px solid #A855CA;
    box-shadow:none;
    user-select:none;
  }

  .topicDot{
    width:7px;
    height:7px;
    border-radius:999px;
    background:#fff;
    opacity:.95;
    flex:0 0 auto;
  }

  .topicDropdown{
    position:absolute;
    right:0;
    top:calc(100% + 9px);
    z-index:30;
    min-width:160px;
    display:grid;
    gap:7px;
    padding:10px;
    border:1px solid var(--line);
    border-radius:16px;
    background:#fff;
    box-shadow:var(--shadow-sm);
  }

  .topicOption{
    cursor:pointer;
    text-align:left;
    padding:10px 11px;
    border-radius:12px;
    background:#fff;
    border:1px solid var(--line);
    font-size:13px;
    font-weight:800;
    color:var(--text);
  }

  .topicOption.active{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(135deg,#f472b6,#a855f7);
  }

  textarea{
    width:100%;
    min-height:96px;
    resize:vertical;
    border:2px solid #e5e5e5;
    border-radius:14px;
    padding:15px 16px;
    background:#fff;
    color:var(--text);
    outline:none;
    font:inherit;
    font-size:18px;
    font-weight:800;
    line-height:1.5;
  }

  textarea:focus{
    border-color:#1CB0F6;
  }

  .previewBar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:12px;
  }

  .previewTools{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }

  .sentenceBox{
    width:100%;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    border-radius:14px;
    background:#fff;
    padding:16px;
    box-shadow:none;
    cursor:pointer;
  }

  .sentenceWords{
    display:flex;
    flex-wrap:wrap;
    gap:6px 8px;
    min-height:40px;
    align-items:center;
  }

  .word{
    font-size:clamp(22px,3.2vw,34px);
    line-height:1.12;
    font-weight:900;
    letter-spacing:-.02em;
    background:linear-gradient(135deg,#db2777,#7c3aed);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    padding:2px 4px;
    border-radius:10px;
    transition:background var(--transition), box-shadow var(--transition), transform var(--transition);
  }

  .word.active{
    background:linear-gradient(135deg,#f43f5e,#a855f7,#0ea5e9);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 8px rgba(219,39,119,.30));
    transform:translateY(-2px) scale(1.04);
  }

  .translationBox{
    margin-top:12px;
    width:100%;
    min-height:58px;
    border:1px solid var(--line);
    border-radius:16px;
    background:#fff;
    padding:14px 16px;
    box-shadow:0 8px 18px rgba(15,23,42,.04);
    display:flex;
    align-items:center;
  }

  .translationText{
    font-size:18px;
    line-height:1.5;
    font-weight:800;
  }

  .recordBox{
    margin-top:12px;
    display:none;
  }

  .recordBox.show{
    display:block;
  }

  .recordedLabel{
    font-size:12px;
    font-weight:900;
    color:var(--muted);
    letter-spacing:.12em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  audio{
    width:100%;
    display:block;
    border-radius:14px;
  }

  .clauseList{
    display:block;
  }

  .builderTableWrap{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    border:2px solid #e5e5e5;
    border-radius:14px;
    background:#fff;
    box-shadow:none;
  }

  .builderTable{
    width:max-content;
    min-width:100%;
    border-collapse:separate;
    border-spacing:0;
    table-layout:fixed;
  }

  .builderTable thead{
    display:none;
  }

  .builderTable tbody td{
    padding:8px;
    vertical-align:top;
    border-bottom:1px solid rgba(15,23,42,.06);
    background:#fff;
  }

  .builderTable tbody tr:nth-child(odd) td{
    background:#fcfdff;
  }

  .builderTable tbody tr:last-child td{
    border-bottom:none;
  }

  .builderTable.builderTableCompact td{
    width:132px;
    min-width:132px;
    max-width:132px;
  }

  .tableField{
    position:relative;
    min-height:96px;
    height:96px;
    display:flex;
  }

  .tableField.off{
    opacity:.42;
    filter:saturate(.78);
  }

  .tableMainBtn{
    position:relative;
    width:100%;
    min-height:96px;
    height:96px;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    border-radius:14px;
    background:#fff;
    box-shadow:none;
    text-align:left;
    padding:9px 10px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:flex-start;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }

  .tableMainBtn[data-kind="subject"]{
    background:#dbeafe;
    border-color:#93c5fd;
    border-bottom-color:#60a5fa;
  }

  .tableMainBtn[data-kind="time"]{
    background:#fef9c3;
    border-color:#fde047;
    border-bottom-color:#facc15;
  }

  .tableMainBtn[data-kind="location"]{
    background:#dcfce7;
    border-color:#86efac;
    border-bottom-color:#4ade80;
  }

  .tableMainBtn[data-kind="object"]{
    background:#fee2e2;
    border-color:#fca5a5;
    border-bottom-color:#f87171;
  }

  .tableMainBtn[data-kind="description"]{
    background:#ede9fe;
    border-color:#c4b5fd;
    border-bottom-color:#a78bfa;
  }

  .tableMainBtn[data-kind="verb"]{
    background:#ffedd5;
    border-color:#fdba74;
    border-bottom-color:#fb923c;
  }

  .tableMainBtn[data-kind="connector"]{
    background:#cffafe;
    border-color:#67e8f9;
    border-bottom-color:#22d3ee;
  }

  .tableMainBtn.is-empty .tableValue{
    color:#94a3b8;
  }

  .tableValue{
    font-size:16px;
    line-height:1.05;
    font-weight:900;
    letter-spacing:-.02em;
    color:#0f172a;
    word-break:keep-all;
    overflow-wrap:anywhere;
    margin-top:auto;
  }

  .tableMeta{
    font-size:10px;
    font-weight:900;
    color:var(--muted);
    letter-spacing:.1em;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:5px;
  }

  .tableToggle{
    position:absolute;
    top:4px;
    right:4px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:rgba(255,255,255,.75);
    border:1.5px solid rgba(0,0,0,.12);
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:2;
  }

  .clauseTag{
    font-size:9px;
    font-weight:900;
    padding:3px 6px;
    border-radius:6px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:rgba(0,0,0,.06);
    color:var(--muted);
    margin-top:auto;
  }

  .clausePickerWrap{
    display:grid;
    gap:7px;
    padding:12px 0 0;
  }

  .clausePickerRow{
    display:flex;
    gap:7px;
  }

  .clausePickerBtn{
    flex:1;
    padding:10px 8px;
    border-radius:12px;
    background:#fff;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    font-size:13px;
    font-weight:800;
    color:var(--text);
    cursor:pointer;
    text-align:center;
    transition:background var(--transition),border-color var(--transition),transform var(--transition);
    appearance:none;
    -webkit-appearance:none;
    min-height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .clausePickerBtn:hover{
    transform:translateY(-1px);
  }

  .clausePickerBtn.active{
    background:#1CB0F6;
    border-color:#1CB0F6;
    border-bottom-color:#009AC7;
    color:#fff;
  }

  .modalBg{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:200;
    align-items:flex-end;
    justify-content:center;
  }

  .modalBg.show{
    display:flex;
  }

  .modalSheet{
    width:100%;
    max-width:540px;
    background:#fff;
    border-radius:28px 28px 0 0;
    padding:22px 20px 36px;
    box-shadow:0 -8px 32px rgba(0,0,0,.13);
    max-height:90vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .modalTitle{
    font-size:16px;
    font-weight:900;
    text-align:center;
    color:var(--text);
    letter-spacing:-.01em;
  }

  .modalSearchRow{
    display:flex;
    gap:8px;
    align-items:center;
  }

  .modalSearch{
    flex:1;
    padding:10px 14px;
    border:2px solid #e5e5e5;
    border-radius:12px;
    font:inherit;
    font-size:14px;
    font-weight:700;
    color:var(--text);
    outline:none;
    background:#fff;
  }

  .modalSearch:focus{
    border-color:#1CB0F6;
  }

  .searchSuggestions{
    display:grid;
    gap:7px;
  }

  .suggItem{
    padding:12px 14px;
    border-radius:12px;
    background:#fff;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:3px;
    transition:transform var(--transition),background var(--transition);
  }

  .suggItem:hover{
    transform:translateY(-1px);
    background:#f8faff;
  }

  .suggKo{
    font-size:17px;
    font-weight:900;
    color:#0f172a;
    letter-spacing:-.01em;
  }

  .suggGloss{
    font-size:12px;
    font-weight:700;
    color:var(--muted);
  }

  .modalClearBtn{
    flex:0 0 auto;
    padding:10px 14px;
    border-radius:12px;
    background:#fff;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    font:inherit;
    font-size:13px;
    font-weight:800;
    color:var(--text);
    cursor:pointer;
    white-space:nowrap;
  }

  .vocabSheetBg{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:300;
    align-items:flex-end;
    justify-content:center;
  }

  .vocabSheetBg.show{
    display:flex;
  }

  .vocabSheet{
    width:100%;
    max-width:540px;
    background:#fff;
    border-radius:28px 28px 0 0;
    padding:18px 16px 32px;
    box-shadow:0 -8px 32px rgba(0,0,0,.13);
    max-height:85vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .vocabSheetHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .vocabSheetTitle{
    font-size:15px;
    font-weight:900;
    color:var(--text);
  }

  .vocabSheetClose{
    width:34px;
    height:34px;
    border-radius:50%;
    background:#f1f5f9;
    border:none;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }

  .vocabList{
    display:grid;
    gap:6px;
  }

  .vocabItem{
    padding:10px 12px;
    border-radius:12px;
    background:#fff;
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    display:flex;
    flex-direction:column;
    gap:2px;
    cursor:pointer;
    text-align:left;
  }

  .vocabKo{
    font-size:16px;
    font-weight:900;
    color:#0f172a;
  }

  .vocabGloss{
    font-size:12px;
    font-weight:700;
    color:var(--muted);
  }

  .toast{
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#1CB0F6;
    color:#fff;
    padding:12px 22px;
    border-radius:20px;
    font-size:14px;
    font-weight:800;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s,transform .25s;
    z-index:9999;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* ── Long-press lang picker ── */
  .langPickerWrap{
    position:relative;
    display:inline-block;
  }
  .langPickerBtn{
    min-width:52px;
    padding:9px 13px;
    font-size:13px;
    font-weight:800;
    min-height:40px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    cursor:pointer;
    background:#fff;
    color:var(--text);
    border:2px solid #e5e5e5;
    border-bottom:4px solid #d0d0d0;
    border-radius:12px;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    appearance:none;
    -webkit-appearance:none;
    transition:
      transform var(--transition),
      box-shadow var(--transition),
      background var(--transition),
      border-color var(--transition);
  }
  .langPickerBtn:hover{transform:translateY(-1px);}
  .langPickerMenu{
    display:none;
    position:absolute;
    right:0;
    top:calc(100% + 7px);
    z-index:50;
    background:#fff;
    border:2px solid #e5e5e5;
    border-radius:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
    overflow:hidden;
    min-width:90px;
    flex-direction:column;
  }
  .langPickerMenu.open{display:flex;}
  .langPickerItem{
    padding:11px 16px;
    font-size:13px;
    font-weight:800;
    color:var(--text);
    cursor:pointer;
    text-align:center;
    border:none;
    background:transparent;
    appearance:none;
    -webkit-appearance:none;
    transition:background var(--transition);
    white-space:nowrap;
  }
  .langPickerItem:hover{background:#f1f5f9;}
  .langPickerItem.active{
    background:#1CB0F6;
    color:#fff;
  }
  .langPickerItem + .langPickerItem{
    border-top:1px solid #e5e5e5;
  }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="panel">
    <div class="topbar">
      <h1 class="title">🌸 Korean Builder</h1>
      <div class="toolbar">
        <a href="index.html" class="homeBtn" title="Home">🏠</a>

        <!-- Long-press lang picker -->
        <div class="langPickerWrap" id="langPickerWrap">
          <button class="langPickerBtn" id="langPickerBtn"
                  title="Tap to cycle language · Hold to pick">
            <span id="langPickerLabel">ro</span> ▾
          </button>
          <div class="langPickerMenu" id="langPickerMenu">
            <button class="langPickerItem" data-lang="ro">🇷🇴 Română</button>
            <button class="langPickerItem" data-lang="en">🇬🇧 English</button>
          </div>
        </div>

        <details class="topicMenu" id="topicMenu">
          <summary>
            <div class="topicBubble" id="topicBubble">
              <span class="topicDot"></span>
              <span id="topicLabel">General</span>
            </div>
          </summary>
          <div class="topicDropdown" id="topicDropdown"></div>
        </details>

        <button class="iconBtn" id="vocabBtn" title="Vocabular">📖</button>
        <button class="iconBtn" id="micBtn" title="Microfon">🎙️</button>
      </div>
    </div>
  </div>

  <!-- CLAUSE BUILDER TABLE -->
  <div class="panel">
    <div class="builderTableWrap">
      <table class="builderTable builderTableCompact" id="builderTable">
        <thead><tr id="builderHead"></tr></thead>
        <tbody id="builderBody"></tbody>
      </table>
    </div>
    <div class="clausePickerWrap" id="clausePickerWrap"></div>
  </div>

  <!-- PREVIEW -->
  <div class="panel">
    <div class="previewBar">
      <div class="previewTools">
        <button class="tinyBtn" id="speakBtn">🔊 Ascultă</button>
        <button class="tinyBtn" id="copyBtn">📋 Copiază</button>
        <button class="tinyBtn" id="resetBtn">🔄 Reset</button>
      </div>
    </div>
    <div class="sentenceBox" id="sentenceBox">
      <div class="sentenceWords" id="sentenceWords"></div>
    </div>
    <div class="translationBox">
      <span class="translationText" id="translationText">—</span>
    </div>
    <div class="recordBox" id="recordBox">
      <div class="recordedLabel">Înregistrare</div>
      <audio id="audioPlayback" controls></audio>
    </div>
  </div>

  <!-- INPUT -->
  <div class="panel">
    <textarea id="inputArea" placeholder="Scrie sau lipește o propoziție în coreeană…" rows="3"></textarea>
  </div>

</div>
