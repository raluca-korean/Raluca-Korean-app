<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
    :root{
      --bg:#f6f7fd;
      --bg2:#eef2ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.08);
      --line-2:rgba(15,23,42,.14);
      --primary:#6d5efc;
      --primary2:#8b5cf6;
      --shadow:0 16px 40px rgba(15,23,42,.07);
      --shadow-sm:0 8px 22px rgba(15,23,42,.05);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:16px;
      --radius-sm:14px;
      --transition:180ms ease;

      --c-relative:#f3dfff;
      --c-subject:#dcecff;
      --c-time:#ffe8bd;
      --c-location:#dff7df;
      --c-object:#ffdede;
      --c-description:#ece7ff;
      --c-verb:#ffe8cf;
      --c-connector:#e4ddff;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(139,92,246,.10), transparent 22%),
        linear-gradient(180deg,var(--bg2) 0%, var(--bg) 34%, #fbfcfe 100%);
      padding:16px;
    }

    .app{
      max-width:1180px;
      margin:0 auto;
    }

    .panel{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .title{
      margin:0;
      font-size:clamp(16px,2vw,24px);
      line-height:1.1;
      letter-spacing:-.02em;
      font-weight:900;
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill,
    .tinyBtn,
    .topicOption,
    .iconBtn,
    .cardToggle,
    .cardMain{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      font:inherit;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition),
        border-color var(--transition),
        opacity var(--transition),
        color var(--transition);
    }

    .pill:hover,
    .tinyBtn:hover,
    .topicOption:hover,
    .iconBtn:hover,
    .cardToggle:hover,
    .cardMain:hover{
      transform:translateY(-1px);
    }

    .pill,
    .tinyBtn,
    .iconBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      font-weight:800;
    }

    .pill{
      padding:9px 13px;
      font-size:13px;
      min-height:40px;
    }

    .pill.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.22);
    }

    .tinyBtn{
      padding:8px 12px;
      font-size:12px;
      min-height:36px;
    }

    .iconBtn{
      width:38px;
      height:38px;
      padding:0;
      font-size:15px;
      cursor:pointer;
    }

    .topicMenu{position:relative}
    .topicMenu summary{
      list-style:none;
      cursor:pointer;
    }
    .topicMenu summary::-webkit-details-marker{display:none}

    .topicBubble{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.22);
      user-select:none;
    }

    .topicDot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:#fff;
      opacity:.95;
      flex:0 0 auto;
    }

    .topicDropdown{
      position:absolute;
      right:0;
      top:calc(100% + 9px);
      z-index:30;
      min-width:160px;
      display:grid;
      gap:7px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:var(--shadow-sm);
    }

    .topicOption{
      cursor:pointer;
      text-align:left;
      padding:10px 11px;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .topicOption.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
    }

    textarea{
      width:100%;
      min-height:96px;
      resize:vertical;
      border:1px solid var(--line-2);
      border-radius:18px;
      padding:15px 16px;
      background:#fff;
      color:var(--text);
      outline:none;
      font:inherit;
      font-size:18px;
      font-weight:800;
      line-height:1.5;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
    }

    textarea:focus{
      border-color:rgba(109,94,252,.42);
      box-shadow:0 0 0 4px rgba(109,94,252,.08);
    }

    .previewBar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:12px;
    }

    .previewTools{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .sentenceBox{
      width:100%;
      border:1px solid rgba(109,94,252,.12);
      border-radius:18px;
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.10), transparent 42%),
        linear-gradient(180deg,#fff 0%,#f8fafc 100%);
      padding:16px;
      box-shadow:var(--shadow-sm);
      cursor:pointer;
    }

    .sentenceWords{
      display:flex;
      flex-wrap:wrap;
      gap:6px 8px;
      min-height:40px;
      align-items:center;
    }

    .word{
      font-size:clamp(22px,3.2vw,34px);
      line-height:1.12;
      font-weight:900;
      letter-spacing:-.02em;
      color:#2563eb;
      padding:2px 4px;
      border-radius:10px;
      transition:background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .word.active{
      background:linear-gradient(135deg, rgba(109,94,252,.16), rgba(139,92,246,.10));
      box-shadow:0 8px 18px rgba(109,94,252,.10);
      transform:translateY(-1px);
    }

    .translationBox{
      margin-top:12px;
      width:100%;
      min-height:58px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:14px 16px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      display:flex;
      align-items:center;
    }

    .translationText{
      font-size:18px;
      line-height:1.5;
      font-weight:800;
    }

    .boardWrap{
      overflow-x:auto;
      overflow-y:hidden;
      padding-bottom:2px;
    }

    .board{
      display:flex;
      gap:10px;
      align-items:stretch;
      min-width:max-content;
    }

    .builderCard{
      position:relative;
      width:152px;
      min-height:132px;
      border:1px solid rgba(15,23,42,.08);
      border-radius:18px;
      box-shadow:0 8px 18px rgba(15,23,42,.05);
      overflow:hidden;
      flex:0 0 auto;
    }

    .builderCard[data-kind="relative"]{background:linear-gradient(180deg,var(--c-relative),#fff)}
    .builderCard[data-kind="subject"]{background:linear-gradient(180deg,var(--c-subject),#fff)}
    .builderCard[data-kind="time"]{background:linear-gradient(180deg,var(--c-time),#fff)}
    .builderCard[data-kind="location"]{background:linear-gradient(180deg,var(--c-location),#fff)}
    .builderCard[data-kind="object"]{background:linear-gradient(180deg,var(--c-object),#fff)}
    .builderCard[data-kind="description"]{background:linear-gradient(180deg,var(--c-description),#fff)}
    .builderCard[data-kind="verb"]{background:linear-gradient(180deg,var(--c-verb),#fff)}
    .builderCard[data-kind="connector"]{background:linear-gradient(180deg,var(--c-connector),#fff)}

    .builderCard.off{
      opacity:.44;
      filter:saturate(.8);
    }

    .builderCard.hiddenAuto{
      opacity:.24;
    }

    .cardToggle{
      position:absolute;
      top:8px;
      right:8px;
      z-index:3;
      width:24px;
      height:24px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      background:#fff;
      color:#64748b;
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow:0 6px 14px rgba(15,23,42,.05);
      font-size:12px;
      font-weight:900;
      line-height:1;
      padding:0;
    }

    .cardToggle.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
    }

    .cardMain{
      width:100%;
      height:100%;
      background:transparent;
      cursor:pointer;
      text-align:left;
      padding:11px 12px 12px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:8px;
    }

    .cardTop{
      display:flex;
      align-items:center;
      gap:7px;
      padding-right:26px;
      margin-top:1px;
    }

    .cardDot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:rgba(15,23,42,.48);
      flex:0 0 auto;
    }

    .cardLabel{
      font-size:10px;
      line-height:1.25;
      font-weight:900;
      letter-spacing:.11em;
      text-transform:uppercase;
      color:#334155;
    }

    .cardPrompt{
      font-size:12px;
      line-height:1.35;
      color:#64748b;
      font-weight:700;
      min-height:16px;
      margin-top:1px;
    }

    .cardValue{
      font-size:25px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.02em;
      color:#0f172a;
      word-break:keep-all;
      margin-top:auto;
    }

    .cardMeta{
      font-size:11px;
      line-height:1.32;
      color:#64748b;
      font-weight:800;
      margin-top:6px;
      min-height:14px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(12px);
      min-width:min(92vw,560px);
      max-width:92vw;
      padding:13px 15px;
      border-radius:16px;
      background:#fff;
      border:1px solid rgba(15,23,42,.10);
      box-shadow:0 18px 40px rgba(15,23,42,.16);
      font-size:14px;
      line-height:1.5;
      font-weight:800;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:100;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:720px){
      body{padding:12px}
      .panel{padding:13px}
      .title{font-size:16px}
      .builderCard{
        width:138px;
        min-height:126px;
        border-radius:16px;
      }
      .cardValue{font-size:22px}
      .translationText{font-size:16px}
      .word{font-size:20px}
      textarea{
        min-height:88px;
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="topbar">
        <h1 class="title">Raluca Korean — Builder</h1>

        <div class="toolbar">
          <a href="./index.html" class="tinyBtn">← Index</a>

          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble" id="topicSummary">
              <span class="topicDot"></span>
              <span id="topicSummaryText">TOPIK 6 ▾</span>
            </summary>
            <div class="topicDropdown" id="topicDropdown">
              <button class="topicOption" data-level="1" type="button">TOPIK 1</button>
              <button class="topicOption" data-level="2" type="button">TOPIK 2</button>
              <button class="topicOption" data-level="3" type="button">TOPIK 3</button>
              <button class="topicOption" data-level="4" type="button">TOPIK 4</button>
              <button class="topicOption" data-level="5" type="button">TOPIK 5</button>
              <button class="topicOption" data-level="6" type="button">TOPIK 6</button>
            </div>
          </details>

          <button id="btnRo" class="pill active" type="button">Română</button>
          <button id="btnEn" class="pill" type="button">English</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <textarea id="freeText" placeholder="Scrie aici o propoziție sau un lanț de propoziții..."></textarea>
    </section>

    <section class="panel">
      <div class="previewBar">
        <div class="previewTools">
          <button class="iconBtn" id="playBtn" type="button" title="Pronunție">🔊</button>
          <button class="iconBtn" id="speakBtn" type="button" title="Exersează vorbirea">🎤</button>
        </div>
      </div>

      <div class="sentenceBox" id="sentenceBox" role="button" tabindex="0" aria-label="Play sentence">
        <div class="sentenceWords" id="sentenceWords"></div>
      </div>

      <div class="translationBox">
        <div class="translationText" id="translationText"></div>
      </div>
    </section>

    <section class="panel">
      <div class="boardWrap">
        <div class="board" id="board"></div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

        {ko:"천천히", ro:"încet", en:"slowly", aliases:["încet","incet","slowly"]},
        {ko:"열심히", ro:"cu sârguință", en:"diligently", aliases:["serios","din greu","diligently","hard"]},
        {ko:"조용히", ro:"în liniște", en:"quietly", aliases:["liniște","liniste","quietly"]},
        {ko:"같이", ro:"împreună", en:"together", aliases:["împreună","impreuna","together"]},
        {ko:"혼자", ro:"singur", en:"alone", aliases:["singur","alone"]},
        {ko:"다시", ro:"din nou", en:"again", aliases:["din nou","again"]},
        {ko:"미리", ro:"dinainte", en:"in advance", aliases:["dinainte","in advance"]},
        {ko:"정말", ro:"foarte / chiar", en:"really", aliases:["foarte","chiar","really"]},
        {ko:"조금", ro:"puțin", en:"a little", aliases:["puțin","putin","little"]},
        {ko:"자주", ro:"des", en:"often", aliases:["des","often"]}
      ],

      verbs: [
        {ko:"공부하다", ro:"a studia", en:"to study", aliases:["studiez","studia","study","learn"], final:"공부해요", forms:{none:"공부해요",seq:"공부하고",cause1:"공부해서",cause2:"공부하니까",condition:"공부하면",contrast1:"공부하지만",contrast2:"공부하는데",purpose:"공부하려고",result:"공부하게 되다"}},
        {ko:"먹다", ro:"a mânca", en:"to eat", aliases:["mănânc","mananc","eat"], final:"먹어요", forms:{none:"먹어요",seq:"먹고",cause1:"먹어서",cause2:"먹으니까",condition:"먹으면",contrast1:"먹지만",contrast2:"먹는데",purpose:"먹으려고",result:"먹게 되다"}},
        {ko:"가다", ro:"a merge", en:"to go", aliases:["merg","merge","go"], final:"가요", forms:{none:"가요",seq:"가고",cause1:"가서",cause2:"가니까",condition:"가면",contrast1:"가지만",contrast2:"가는데",purpose:"가려고",result:"가게 되다"}},
        {ko:"오다", ro:"a veni", en:"to come", aliases:["vin","veni","come"], final:"와요", forms:{none:"와요",seq:"오고",cause1:"와서",cause2:"오니까",condition:"오면",contrast1:"오지만",contrast2:"오는데",purpose:"오려고",result:"오게 되다"}},
        {ko:"보다", ro:"a vedea", en:"to see", aliases:["văd","vad","see","watch"], final:"봐요", forms:{none:"봐요",seq:"보고",cause1:"봐서",cause2:"보니까",condition:"보면",contrast1:"보지만",contrast2:"보는데",purpose:"보려고",result:"보게 되다"}},
        {ko:"읽다", ro:"a citi", en:"to read", aliases:["citesc","read"], final:"읽어요", forms:{none:"읽어요",seq:"읽고",cause1:"읽어서",cause2:"읽으니까",condition:"읽으면",contrast1:"읽지만",contrast2:"읽는데",purpose:"읽으려고",result:"읽게 되다"}},
        {ko:"쓰다", ro:"a scrie", en:"to write", aliases:["scriu","write"], final:"써요", forms:{none:"써요",seq:"쓰고",cause1:"써서",cause2:"쓰니까",condition:"쓰면",contrast1:"쓰지만",contrast2:"쓰는데",purpose:"쓰려고",result:"쓰게 되다"}},
        {ko:"만나다", ro:"a întâlni", en:"to meet", aliases:["întâlnesc","intalnesc","meet"], final:"만나요", forms:{none:"만나요",seq:"만나고",cause1:"만나서",cause2:"만나니까",condition:"만나면",contrast1:"만나지만",contrast2:"만나는데",purpose:"만나려고",result:"만나게 되다"}},
        {ko:"쉬다", ro:"a se odihni", en:"to rest", aliases:["odihnesc","rest"], final:"쉬어요", forms:{none:"쉬어요",seq:"쉬고",cause1:"쉬어서",cause2:"쉬니까",condition:"쉬면",contrast1:"쉬지만",contrast2:"쉬는데",purpose:"쉬려고",result:"쉬게 되다"}},
        {ko:"일하다", ro:"a lucra", en:"to work", aliases:["lucrez","work"], final:"일해요", forms:{none:"일해요",seq:"일하고",cause1:"일해서",cause2:"일하니까",condition:"일하면",contrast1:"일하지만",contrast2:"일하는데",purpose:"일하려고",result:"일하게 되다"}},
        {ko:"운동하다", ro:"a face sport", en:"to exercise", aliases:["exercise","sport"], final:"운동해요", forms:{none:"운동해요",seq:"운동하고",cause1:"운동해서",cause2:"운동하니까",condition:"운동하면",contrast1:"운동하지만",contrast2:"운동하는데",purpose:"운동하려고",result:"운동하게 되다"}},
        {ko:"준비하다", ro:"a pregăti", en:"to prepare", aliases:["pregătesc","pregatesc","prepare"], final:"준비해요", forms:{none:"준비해요",seq:"준비하고",cause1:"준비해서",cause2:"준비하니까",condition:"준비하면",contrast1:"준비하지만",contrast2:"준비하는데",purpose:"준비하려고",result:"준비하게 되다"}},
        {ko:"배우다", ro:"a învăța", en:"to learn", aliases:["învăț","invat","learn"], final:"배워요", forms:{none:"배워요",seq:"배우고",cause1:"배워서",cause2:"배우니까",condition:"배우면",contrast1:"배우지만",contrast2:"배우는데",purpose:"배우려고",result:"배우게 되다"}},
        {ko:"듣다", ro:"a asculta", en:"to listen", aliases:["ascult","listen"], final:"들어요", forms:{none:"들어요",seq:"듣고",cause1:"들어서",cause2:"들으니까",condition:"들으면",contrast1:"듣지만",contrast2:"듣는데",purpose:"들으려고",result:"듣게 되다"}},
        {ko:"만들다", ro:"a face / a crea", en:"to make", aliases:["fac","creează","creeaza","make","create"], final:"만들어요", forms:{none:"만들어요",seq:"만들고",cause1:"만들어서",cause2:"만드니까",condition:"만들면",contrast1:"만들지만",contrast2:"만드는데",purpose:"만들려고",result:"만들게 되다"}}
      ],

      connectors: [
        {key:"none", ko:"—", ro:"fără conector", en:"no connector", aliases:[]},
        {key:"seq", ko:"고", ro:"și apoi", en:"and then", aliases:["și","si","and","then","apoi"]},
        {key:"cause1", ko:"아/어서", ro:"pentru că", en:"because", aliases:["pentru că","pentru ca","because"]},
        {key:"cause2", ko:"(으)니까", ro:"fiindcă", en:"since / because", aliases:["fiindcă","fiindca","since"]},
        {key:"condition", ko:"(으)면", ro:"dacă", en:"if", aliases:["dacă","daca","if"]},
        {key:"contrast1", ko:"지만", ro:"dar", en:"but", aliases:["dar","însă","insa","but","however"]},
        {key:"contrast2", ko:"는데", ro:"iar / însă", en:"while / but", aliases:["iar","while"]},
        {key:"purpose", ko:"(으)려고", ro:"ca să", en:"in order to", aliases:["ca să","ca sa","in order to","to"]},
        {key:"result", ko:"게 되다", ro:"ajunge să", en:"end up / come to", aliases:["ajunge să","ajunge sa","end up","become"]}
      ]
    };

    const CARD_ORDER = [
      {key:"relative", kind:"relative"},
      {key:"subject", kind:"subject"},
      {key:"time", kind:"time"},
      {key:"location", kind:"location"},
      {key:"object", kind:"object"},
      {key:"description", kind:"description"},
      {key:"verb1", kind:"verb"},
      {key:"connector1", kind:"connector"},
      {key:"verb2", kind:"verb"},
      {key:"connector2", kind:"connector"},
      {key:"verb3", kind:"verb"},
      {key:"connector3", kind:"connector"},
      {key:"finalVerb", kind:"verb"}
    ];

    const state = {
      lang: localStorage.getItem("rk_builder_lang") || "ro",
      level: Number(localStorage.getItem("rk_builder_level") || 6),
      text: localStorage.getItem("rk_builder_text") || "",
      cards: {
        relative: {enabled:false, index:0},
        subject: {enabled:true, index:0},
        time: {enabled:false, index:0},
        location: {enabled:false, index:0},
        object: {enabled:false, index:0},
        description: {enabled:false, index:0},
        verb1: {enabled:true, index:0},
        connector1: {enabled:true, index:0},
        verb2: {enabled:false, index:1},
        connector2: {enabled:false, index:0},
        verb3: {enabled:false, index:2},
        connector3: {enabled:false, index:0},
        finalVerb: {enabled:false, index:3}
      }
    };

    const els = {
      btnRo: document.getElementById("btnRo"),
      btnEn: document.getElementById("btnEn"),
      topicMenu: document.getElementById("topicMenu"),
      topicSummaryText: document.getElementById("topicSummaryText"),
      topicDropdown: document.getElementById("topicDropdown"),
      freeText: document.getElementById("freeText"),
      playBtn: document.getElementById("playBtn"),
      speakBtn: document.getElementById("speakBtn"),
      sentenceBox: document.getElementById("sentenceBox"),
      sentenceWords: document.getElementById("sentenceWords"),
      translationText: document.getElementById("translationText"),
      board: document.getElementById("board"),
      toast: document.getElementById("toast")
    };

    let toastTimer = null;
    let currentUtterance = null;

    function ui(){
      return UI[state.lang];
    }

    function saveState(){
      localStorage.setItem("rk_builder_lang", state.lang);
      localStorage.setItem("rk_builder_level", String(state.level));
      localStorage.setItem("rk_builder_text", state.text);
    }

    function showToast(message){
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = setTimeout(() => {
        els.toast.classList.remove("show");
      }, 2400);
    }

    function setLang(lang){
      state.lang = lang;
      els.btnRo.classList.toggle("active", lang === "ro");
      els.btnEn.classList.toggle("active", lang === "en");
      els.freeText.placeholder = ui().placeholder;
      saveState();
      renderAll();
    }

    function setLevel(level){
      state.level = level;
      els.topicSummaryText.textContent = `TOPIK ${level} ▾`;
      [...els.topicDropdown.querySelectorAll(".topicOption")].forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.level) === level);
      });
      saveState();
    }

    function datasetName(cardKey){
      if(cardKey === "relative") return "relative";
      if(cardKey === "subject") return "subject";
      if(cardKey === "time") return "time";
      if(cardKey === "location") return "location";
      if(cardKey === "object") return "object";
      if(cardKey === "description") return "description";
      if(cardKey.startsWith("verb") || cardKey === "finalVerb") return "verbs";
      if(cardKey.startsWith("connector")) return "connectors";
      return null;
    }

    function listFor(cardKey){
      return DATA[datasetName(cardKey)] || [];
    }

    function cardItem(cardKey){
      const list = listFor(cardKey);
      const idx = state.cards[cardKey].index % list.length;
      return list[idx];
    }

    function isDependentDimmed(cardKey){
      const c1 = cardItem("connector1").key;
      const c2 = cardItem("connector2").key;
      const c3 = cardItem("connector3").key;

      if(cardKey === "verb2" || cardKey === "connector2") return c1 === "none";
      if(cardKey === "verb3" || cardKey === "connector3") return c1 === "none" || c2 === "none";
      if(cardKey === "finalVerb") return c1 === "none" || c2 === "none" || c3 === "none";
      return false;
    }

    function syncConnectorDependencies(){
      const c1 = cardItem("connector1").key;
      const c2 = cardItem("connector2").key;
      const c3 = cardItem("connector3").key;

      if(c1 !== "none"){
        state.cards.verb2.enabled = true;
        state.cards.connector2.enabled = true;
      } else {
        state.cards.verb2.enabled = false;
        state.cards.connector2.enabled = false;
        state.cards.connector2.index = 0;
        state.cards.verb3.enabled = false;
        state.cards.connector3.enabled = false;
        state.cards.connector3.index = 0;
        state.cards.finalVerb.enabled = false;
      }

      if(c1 !== "none" && c2 !== "none"){
        state.cards.verb3.enabled = true;
        state.cards.connector3.enabled = true;
      } else {
        state.cards.verb3.enabled = false;
        state.cards.connector3.enabled = false;
        state.cards.connector3.index = 0;
        state.cards.finalVerb.enabled = false;
      }

      if(c1 !== "none" && c2 !== "none" && c3 !== "none"){
        state.cards.finalVerb.enabled = true;
      } else {
        state.cards.finalVerb.enabled = false;
      }
    }

    function displayCardValue(cardKey){
      const item = cardItem(cardKey);
      if(cardKey.startsWith("connector")) return item.ko || "—";
      if(cardKey.startsWith("verb") || cardKey === "finalVerb") return item.final || item.ko || "—";
      return item.ko || "—";
    }

    function displayCardMeta(cardKey){
      const item = cardItem(cardKey);
      return item[state.lang] || "";
    }

    function cycleCard(cardKey){
      if(isDependentDimmed(cardKey)) return;
      const slot = state.cards[cardKey];
      if(!slot.enabled) return;

      const list = listFor(cardKey);
      if(!list.length) return;
      slot.index = (slot.index + 1) % list.length;

      syncConnectorDependencies();
      saveState();
      renderAll();
    }

    function toggleCard(cardKey){
      state.cards[cardKey].enabled = !state.cards[cardKey].enabled;

      if(!state.cards[cardKey].enabled){
        if(listFor(cardKey).length) state.cards[cardKey].index = 0;
      } else {
        if(state.cards[cardKey].index === 0 && listFor(cardKey).length > 1){
          state.cards[cardKey].index = 1;
        }
      }

      if(cardKey.startsWith("connector")){
        syncConnectorDependencies();
      }
      saveState();
      renderAll();
    }

    function normalize(str){
      return (str || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^\p{L}\p{N}\s]/gu," ")
        .replace(/\s+/g," ")
        .trim();
    }

    function findIndexByText(cardKey, text){
      const list = listFor(cardKey);
      const n = normalize(text);
      for(let i=1;i<list.length;i++){
        const item = list[i];
        const bag = [item.ro, item.en, item.ko, ...(item.aliases || [])]
          .filter(Boolean)
          .map(normalize);
        if(bag.some(x => x && n.includes(x))) return i;
      }
      return -1;
    }

    function parseFreeText(){
      const text = state.text;
      if(!text.trim()) return;

      ["relative","subject","time","location","object","description","verb1","connector1","verb2","connector2","verb3","connector3","finalVerb"].forEach(key => {
        const idx = findIndexByText(key, text);
        if(idx > -1){
          state.cards[key].enabled = true;
          state.cards[key].index = idx;
        }
      });

      syncConnectorDependencies();
    }

    function buildSentenceData(){
      const partsKo = [];
      const partsTr = [];

      function pushCard(key){
        if(!state.cards[key].enabled) return;
        if(isDependentDimmed(key)) return;
        const item = cardItem(key);
        if(!item) return;

        if(key.startsWith("connector")){
          if(item.key === "none") return;
          partsKo.push(item.ko);
          partsTr.push(item[state.lang] || "");
          return;
        }

        if(key.startsWith("verb") || key === "finalVerb"){
          const nextConnectorKey =
            key === "verb1" ? "connector1" :
            key === "verb2" ? "connector2" :
            key === "verb3" ? "connector3" : null;

          if(nextConnectorKey && state.cards[nextConnectorKey].enabled && !isDependentDimmed(nextConnectorKey)){
            const conn = cardItem(nextConnectorKey);
            if(conn && conn.key !== "none"){
              partsKo.push(item.forms[conn.key] || item.final || item.ko);
              partsTr.push(`${item[state.lang] || ""} ${conn[state.lang] || ""}`.trim());
              return;
            }
          }

          partsKo.push(item.final || item.ko);
          partsTr.push(item[state.lang] || "");
          return;
        }

        if(item.ko){
          partsKo.push(item.ko);
          partsTr.push(item[state.lang] || "");
        }
      }

      pushCard("relative");
      pushCard("subject");
      pushCard("time");
      pushCard("location");
      pushCard("object");
      pushCard("description");
      pushCard("verb1");

      if(cardItem("connector1").key !== "none"){
        pushCard("verb2");
      }
      if(cardItem("connector1").key !== "none" && cardItem("connector2").key !== "none"){
        pushCard("verb3");
      }
      if(cardItem("connector1").key !== "none" && cardItem("connector2").key !== "none" && cardItem("connector3").key !== "none"){
        pushCard("finalVerb");
      }

      return {
        korean: partsKo.join(" ").replace(/\s+/g," ").trim(),
        translation: partsTr.join(" ").replace(/\s+/g," ").trim()
      };
    }

    function renderPreview(){
      const built = buildSentenceData();
      const words = built.korean ? built.korean.split(/\s+/) : ["한국어를","공부해요"];

      els.sentenceWords.innerHTML = words.map(w => `<span class="word">${escapeHtml(w)}</span>`).join("");
      els.translationText.textContent = built.translation || ui().defaultTranslation;
    }

    function renderBoard(){
      els.board.innerHTML = CARD_ORDER.map(def => {
        const enabled = state.cards[def.key].enabled;
        const dimmed = isDependentDimmed(def.key);
        return `
          <div class="builderCard ${enabled ? "" : "off"} ${dimmed ? "hiddenAuto" : ""}" data-kind="${def.kind}">
            <button class="cardToggle ${enabled ? "active" : ""}" type="button" data-toggle="${def.key}" aria-label="toggle ${def.key}">
              ✓
            </button>
            <button class="cardMain" type="button" data-cycle="${def.key}">
              <div class="cardTop">
                <span class="cardDot"></span>
                <span class="cardLabel">${escapeHtml(ui().labels[def.key])}</span>
              </div>
              <div class="cardPrompt">${escapeHtml(ui().prompts[def.key])}</div>
              <div class="cardValue">${escapeHtml(displayCardValue(def.key))}</div>
              <div class="cardMeta">${escapeHtml(displayCardMeta(def.key))}</div>
            </button>
          </div>
        `;
      }).join("");

      els.board.querySelectorAll("[data-cycle]").forEach(btn => {
        btn.addEventListener("click", () => cycleCard(btn.dataset.cycle));
      });

      els.board.querySelectorAll("[data-toggle]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleCard(btn.dataset.toggle);
        });
      });
    }

    function renderAll(){
      renderPreview();
      renderBoard();
    }

    function speakText(text){
      if(!("speechSynthesis" in window)){
        showToast(ui().playMissing);
        return;
      }
      if(!text.trim()){
        showToast(ui().playMissing);
        return;
      }

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ko-KR";
      utter.rate = 0.9;
      currentUtterance = utter;

      const wordEls = [...els.sentenceWords.querySelectorAll(".word")];
      let activeIndex = -1;

      utter.onboundary = (event) => {
        if(event.name === "word" || typeof event.charIndex === "number"){
          activeIndex++;
          wordEls.forEach((el, idx) => el.classList.toggle("active", idx === activeIndex));
        }
      };

      utter.onend = () => {
        wordEls.forEach(el => el.classList.remove("active"));
      };

      window.speechSynthesis.speak(utter);
    }

    function playCurrent(){
      const built = buildSentenceData();
      speakText(built.korean);
    }

    function startSpeechPractice(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){
        showToast(ui().noSpeech);
        return;
      }

      const recognition = new SR();
      recognition.lang = "ko-KR";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      showToast(ui().listening);

      recognition.onresult = (event) => {
        const heard = event.results[0][0].transcript || "";
        const target = buildSentenceData().korean;
        const ok = normalize(heard).replace(/\s/g,"") === normalize(target).replace(/\s/g,"");
        showToast(`${ui().heard}: ${heard}${ok ? " — " + ui().speakOk : " — " + ui().speakTry}`);
      };

      recognition.onerror = () => {
        showToast(ui().speakTry);
      };

      recognition.start();
    }

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function bindEvents(){
      els.btnRo.addEventListener("click", () => setLang("ro"));
      els.btnEn.addEventListener("click", () => setLang("en"));

      [...els.topicDropdown.querySelectorAll(".topicOption")].forEach(btn => {
        btn.addEventListener("click", () => {
          setLevel(Number(btn.dataset.level));
          els.topicMenu.removeAttribute("open");
        });
      });

      els.freeText.addEventListener("input", () => {
        state.text = els.freeText.value;
        parseFreeText();
        saveState();
        renderAll();
      });

      els.playBtn.addEventListener("click", playCurrent);
      els.speakBtn.addEventListener("click", startSpeechPractice);
      els.sentenceBox.addEventListener("click", playCurrent);
      els.sentenceBox.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          playCurrent();
        }
      });
    }

    function init(){
      els.freeText.value = state.text;
      els.freeText.placeholder = ui().placeholder;
      setLevel(state.level);
      setLang(state.lang);
      parseFreeText();
      syncConnectorDependencies();
      bindEvents();
      renderAll();
    }

    init();
  </script>
</body>
</html>
