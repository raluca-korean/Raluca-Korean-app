<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
    :root{
      --bg:#f6f7fd;
      --bg2:#eef2ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.08);
      --line-strong:rgba(15,23,42,.14);
      --primary:#6d5efc;
      --primary2:#8b5cf6;
      --shadow:0 16px 40px rgba(15,23,42,.07);
      --shadow-sm:0 8px 22px rgba(15,23,42,.05);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:16px;
      --radius-sm:14px;
      --transition:180ms ease;

      --c-relative:#f4e0ff;
      --c-subject:#dcecff;
      --c-time:#ffe8be;
      --c-location:#dff7df;
      --c-object:#ffdede;
      --c-description:#ece8ff;
      --c-verb:#ffe9cf;
      --c-connector:#e4ddff;

      --toast-bg:#ffffff;
      --toast-border:rgba(15,23,42,.10);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(139,92,246,.10), transparent 22%),
        linear-gradient(180deg,var(--bg2) 0%, var(--bg) 34%, #fbfcfe 100%);
      padding:16px;
    }

    .app{
      max-width:1180px;
      margin:0 auto;
    }

    .panel{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .title{
      margin:0;
      font-size:clamp(16px,2vw,24px);
      line-height:1.1;
      letter-spacing:-.02em;
      font-weight:900;
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill,
    .tinyBtn,
    .topicOption,
    .iconBtn,
    .cardToggle,
    .cardMain{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      font:inherit;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition),
        border-color var(--transition),
        opacity var(--transition),
        color var(--transition);
    }

    .pill:hover,
    .tinyBtn:hover,
    .topicOption:hover,
    .iconBtn:hover,
    .cardToggle:hover,
    .cardMain:hover{
      transform:translateY(-1px);
    }

    .pill,
    .tinyBtn,
    .iconBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      font-weight:800;
    }

    .pill{
      padding:9px 13px;
      font-size:13px;
      min-height:40px;
    }

    .pill.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.22);
    }

    .tinyBtn{
      padding:8px 12px;
      font-size:12px;
      min-height:36px;
    }

    .iconBtn{
      width:38px;
      height:38px;
      padding:0;
      font-size:15px;
    }

    .topicMenu{
      position:relative;
    }

    .topicMenu summary{
      list-style:none;
      cursor:pointer;
    }

    .topicMenu summary::-webkit-details-marker{
      display:none;
    }

    .topicBubble{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.22);
      user-select:none;
    }

    .topicDot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:#fff;
      opacity:.92;
      flex:0 0 auto;
    }

    .topicDropdown{
      position:absolute;
      right:0;
      top:calc(100% + 9px);
      z-index:30;
      min-width:160px;
      display:grid;
      gap:7px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:var(--shadow-sm);
    }

    .topicOption{
      cursor:pointer;
      text-align:left;
      padding:10px 11px;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .topicOption.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
    }

    .inputWrap{
      display:block;
    }

    textarea{
      width:100%;
      min-height:100px;
      resize:vertical;
      border:1px solid var(--line-strong);
      border-radius:18px;
      padding:15px 16px;
      background:#fff;
      color:var(--text);
      outline:none;
      font:inherit;
      font-size:18px;
      font-weight:800;
      line-height:1.5;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
    }

    textarea:focus{
      border-color:rgba(109,94,252,.42);
      box-shadow:0 0 0 4px rgba(109,94,252,.08);
    }

    .previewBar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .previewTools{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .sentenceBox{
      width:100%;
      border:1px solid rgba(109,94,252,.12);
      border-radius:18px;
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.10), transparent 42%),
        linear-gradient(180deg,#fff 0%,#f8fafc 100%);
      padding:16px;
      box-shadow:var(--shadow-sm);
      cursor:pointer;
    }

    .sentenceWords{
      display:flex;
      flex-wrap:wrap;
      gap:6px 8px;
      min-height:40px;
      align-items:center;
    }

    .word{
      font-size:clamp(22px,3.2vw,34px);
      line-height:1.12;
      font-weight:900;
      letter-spacing:-.02em;
      color:#2563eb;
      padding:2px 4px;
      border-radius:10px;
      transition:background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .word.active{
      background:linear-gradient(135deg, rgba(109,94,252,.16), rgba(139,92,246,.10));
      box-shadow:0 8px 18px rgba(109,94,252,.10);
      transform:translateY(-1px);
    }

    .translationBox{
      margin-top:12px;
      width:100%;
      min-height:58px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:14px 16px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      display:flex;
      align-items:center;
    }

    .translationText{
      font-size:18px;
      line-height:1.5;
      font-weight:800;
    }

    .boardWrap{
      overflow-x:auto;
      overflow-y:hidden;
      padding-bottom:2px;
    }

    .board{
      display:flex;
      gap:10px;
      align-items:stretch;
      min-width:max-content;
    }

    .builderCard{
      position:relative;
      width:152px;
      min-height:132px;
      border:1px solid rgba(15,23,42,.08);
      border-radius:18px;
      box-shadow:0 8px 18px rgba(15,23,42,.05);
      overflow:hidden;
      flex:0 0 auto;
    }

    .builderCard[data-kind="relative"]{background:linear-gradient(180deg,var(--c-relative),#fff)}
    .builderCard[data-kind="subject"]{background:linear-gradient(180deg,var(--c-subject),#fff)}
    .builderCard[data-kind="time"]{background:linear-gradient(180deg,var(--c-time),#fff)}
    .builderCard[data-kind="location"]{background:linear-gradient(180deg,var(--c-location),#fff)}
    .builderCard[data-kind="object"]{background:linear-gradient(180deg,var(--c-object),#fff)}
    .builderCard[data-kind="description"]{background:linear-gradient(180deg,var(--c-description),#fff)}
    .builderCard[data-kind="verb"]{background:linear-gradient(180deg,var(--c-verb),#fff)}
    .builderCard[data-kind="connector"]{background:linear-gradient(180deg,var(--c-connector),#fff)}

    .builderCard.off{
      opacity:.44;
      filter:saturate(.8);
    }

    .builderCard.hiddenAuto{
      opacity:.22;
    }

    .cardToggle{
      position:absolute;
      top:8px;
      right:8px;
      z-index:3;
      width:24px;
      height:24px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      background:#fff;
      color:#64748b;
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow:0 6px 14px rgba(15,23,42,.05);
      font-size:12px;
      font-weight:900;
      line-height:1;
      padding:0;
    }

    .cardToggle.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
    }

    .cardMain{
      width:100%;
      height:100%;
      background:transparent;
      cursor:pointer;
      text-align:left;
      padding:11px 12px 12px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:8px;
    }

    .cardTop{
      display:flex;
      align-items:center;
      gap:7px;
      padding-right:26px;
      margin-top:1px;
    }

    .cardDot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:rgba(15,23,42,.48);
      flex:0 0 auto;
    }

    .cardLabel{
      font-size:10px;
      line-height:1.25;
      font-weight:900;
      letter-spacing:.11em;
      text-transform:uppercase;
      color:#334155;
    }

    .cardPrompt{
      font-size:12px;
      line-height:1.35;
      color:#64748b;
      font-weight:700;
      min-height:16px;
      margin-top:1px;
    }

    .cardValue{
      font-size:25px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.02em;
      color:#0f172a;
      word-break:keep-all;
      margin-top:auto;
    }

    .cardMeta{
      font-size:11px;
      line-height:1.32;
      color:#64748b;
      font-weight:800;
      margin-top:6px;
      min-height:14px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(12px);
      min-width:min(92vw,560px);
      max-width:92vw;
      padding:13px 15px;
      border-radius:16px;
      background:var(--toast-bg);
      border:1px solid var(--toast-border);
      box-shadow:0 18px 40px rgba(15,23,42,.16);
      font-size:14px;
      line-height:1.5;
      font-weight:800;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:100;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 720px){
      body{padding:12px}
      .panel{padding:13px}
      .title{font-size:16px}
      .builderCard{
        width:138px;
        min-height:126px;
        border-radius:16px;
      }
      .cardValue{
        font-size:22px;
      }
      .translationText{
        font-size:16px;
      }
      .word{
        font-size:20px;
      }
      textarea{
        min-height:88px;
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="topbar">
        <h1 class="title">Raluca Korean — Builder</h1>

        <div class="toolbar">
          <a href="./index.html" class="tinyBtn">← Index</a>

          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble" id="topicSummary">
              <span class="topicDot"></span>
              <span id="topicSummaryText">TOPIK 6 ▾</span>
            </summary>
            <div class="topicDropdown" id="topicDropdown">
              <button class="topicOption" data-level="1" type="button">TOPIK 1</button>
              <button class="topicOption" data-level="2" type="button">TOPIK 2</button>
              <button class="topicOption" data-level="3" type="button">TOPIK 3</button>
              <button class="topicOption" data-level="4" type="button">TOPIK 4</button>
              <button class="topicOption" data-level="5" type="button">TOPIK 5</button>
              <button class="topicOption" data-level="6" type="button">TOPIK 6</button>
            </div>
          </details>

          <button id="btnRo" class="pill active" type="button">Română</button>
          <button id="btnEn" class="pill" type="button">English</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="inputWrap">
        <textarea id="freeText" placeholder="Scrie aici o propoziție sau un lanț de propoziții..."></textarea>
      </div>
    </section>

    <section class="panel">
      <div class="previewBar">
        <div></div>
        <div class="previewTools">
          <button class="iconBtn" id="playBtn" type="button" title="Pronunție">🔊</button>
          <button class="iconBtn" id="speakBtn" type="button" title="Exersează vorbirea">🎤</button>
        </div>
      </div>

      <div class="sentenceBox" id="sentenceBox" role="button" tabindex="0" aria-label="Play sentence">
        <div class="sentenceWords" id="sentenceWords"></div>
      </div>

      <div class="translationBox">
        <div class="translationText" id="translationText"></div>
      </div>
    </section>

    <section class="panel">
      <div class="boardWrap">
        <div class="board" id="board"></div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

    function getDataForCard(cardKey){
      const def = CARD_ORDER.find(x => x.key === cardKey);
      return DATA[def.dataset];
    }

    function getCardItem(cardKey){
      const list = getDataForCard(cardKey);
      const idx = state.cards[cardKey].index % list.length;
      return list[idx];
    }

    function cycleCard(cardKey){
      const slot = state.cards[cardKey];
      if(!slot.enabled && CARD_ORDER.find(c => c.key === cardKey).optional) return;
      if(isAutoHidden(cardKey)) return;
      const list = getDataForCard(cardKey);
      slot.index = (slot.index + 1) % list.length;
      autoExpandFromConnectors();
      buildFromTextSoftSync();
      render();
    }

    function toggleCard(cardKey){
      const def = CARD_ORDER.find(c => c.key === cardKey);
      if(!def.optional) return;
      state.cards[cardKey].enabled = !state.cards[cardKey].enabled;
      if(!state.cards[cardKey].enabled){
        state.cards[cardKey].index = 0;
      } else if(state.cards[cardKey].index === 0 && getDataForCard(cardKey).length > 1){
        state.cards[cardKey].index = 1;
      }
      render();
    }

    function isAutoHidden(cardKey){
      const c1 = getCardItem("connector1").key;
      const c2 = getCardItem("connector2").key;
      const c3 = getCardItem("connector3").key;

      if(cardKey === "verb2" || cardKey === "connector2"){
        return c1 === "none";
      }
      if(cardKey === "verb3" || cardKey === "connector3"){
        return c1 === "none" || c2 === "none";
      }
      if(cardKey === "finalVerb"){
        return c1 === "none" || c2 === "none" || c3 === "none";
      }
      return false;
    }

    function autoExpandFromConnectors(){
      const c1 = getCardItem("connector1").key;
      const c2 = getCardItem("connector2").key;
      const c3 = getCardItem("connector3").key;

      if(c1 !== "none"){
        state.cards.verb2.enabled = true;
        state.cards.connector2.enabled = true;
      } else {
        state.cards.verb2.enabled = false;
        state.cards.connector2.enabled = false;
        state.cards.connector2.index = 0;
        state.cards.verb3.enabled = false;
        state.cards.connector3.enabled = false;
        state.cards.connector3.index = 0;
        state.cards.finalVerb.enabled = false;
      }

      if(c1 !== "none" && c2 !== "none"){
        state.cards.verb3.enabled = true;
        state.cards.connector3.enabled = true;
      } else {
        state.cards.verb3.enabled = false;
        state.cards.connector3.enabled = false;
        state.cards.connector3.index = 0;
        state.cards.finalVerb.enabled = false;
      }

      if(c1 !== "none" && c2 !== "none" && c3 !== "none"){
        state.cards.finalVerb.enabled = true;
      } else {
        state.cards.finalVerb.enabled = false;
      }
    }

    function displayValue(cardKey){
      const item = getCardItem(cardKey);
      if(cardKey.startsWith("connector")){
        return item.ko || "—";
      }
      if(cardKey === "verb1" || cardKey === "verb2" || cardKey === "verb3" || cardKey === "finalVerb"){
        return item.final;
      }
      return item.ko || "—";
    }

    function displayMeta(cardKey){
      const item = getCardItem(cardKey);
      const lang = state.lang;
      if(cardKey.startsWith("connector")){
        return item[lang] || "";
      }
      return item[lang] || "";
    }
