<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
  :root{
    --bg:#f6f7fd;
    --bg2:#eef2ff;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --line:rgba(15,23,42,.08);
    --line2:rgba(15,23,42,.14);
    --primary:#6d5efc;
    --primary2:#8b5cf6;
    --shadow:0 16px 40px rgba(15,23,42,.07);
    --shadow-sm:0 8px 20px rgba(15,23,42,.05);
    --radius-xl:24px;
    --radius-lg:18px;
    --radius-md:16px;
    --transition:180ms ease;
    --c-relative:#f4e0ff;
    --c-subject:#dcecff;
    --c-time:#ffe8be;
    --c-location:#dff7df;
    --c-object:#ffdede;
    --c-description:#ece8ff;
    --c-verb:#ffe9cf;
    --c-connector:#e4ddff;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}

  body{
    min-height:100vh;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, rgba(109,94,252,.12), transparent 24%),
      radial-gradient(circle at top right, rgba(139,92,246,.10), transparent 22%),
      linear-gradient(180deg,var(--bg2) 0%, var(--bg) 34%, #fbfcfe 100%);
    padding:16px;
  }

  .app{max-width:1180px;margin:0 auto}

  .panel{
    width:100%;
    background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
    border:1px solid var(--line);
    border-radius:var(--radius-xl);
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }

  .title{
    margin:0;
    font-size:clamp(16px,2vw,24px);
    line-height:1.1;
    letter-spacing:-.02em;
    font-weight:900;
  }

  .toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .pill,.tinyBtn,.topicOption,.iconBtn,.tableMainBtn{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    font:inherit;
    transition:
      transform var(--transition),
      box-shadow var(--transition),
      background var(--transition),
      border-color var(--transition),
      opacity var(--transition),
      color var(--transition);
  }

  .pill:hover,.tinyBtn:hover,.topicOption:hover,.iconBtn:hover,.tableMainBtn:hover{
    transform:translateY(-1px);
  }

  .pill,.tinyBtn,.iconBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    cursor:pointer;
    background:#fff;
    color:var(--text);
    border:1px solid var(--line);
    border-radius:999px;
    box-shadow:0 8px 18px rgba(15,23,42,.04);
    font-weight:800;
  }

  .pill{padding:9px 13px;font-size:13px;min-height:40px}
  .tinyBtn{padding:8px 12px;font-size:12px;min-height:36px}
  .iconBtn{width:40px;height:40px;padding:0;font-size:15px;cursor:pointer}

  .pill.active{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    box-shadow:0 14px 24px rgba(109,94,252,.22);
  }

  .iconBtn.recording{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    box-shadow:0 14px 24px rgba(220,38,38,.22);
  }

  .topicMenu{position:relative}
  .topicMenu summary{list-style:none;cursor:pointer}
  .topicMenu summary::-webkit-details-marker{display:none}

  .topicBubble{
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-height:38px;
    padding:8px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    box-shadow:0 14px 24px rgba(109,94,252,.22);
    user-select:none;
  }

  .topicDot{
    width:7px;
    height:7px;
    border-radius:999px;
    background:#fff;
    opacity:.95;
    flex:0 0 auto;
  }

  .topicDropdown{
    position:absolute;
    right:0;
    top:calc(100% + 9px);
    z-index:30;
    min-width:160px;
    display:grid;
    gap:7px;
    padding:10px;
    border:1px solid var(--line);
    border-radius:16px;
    background:#fff;
    box-shadow:var(--shadow-sm);
  }

  .topicOption{
    cursor:pointer;
    text-align:left;
    padding:10px 11px;
    border-radius:12px;
    background:#fff;
    border:1px solid var(--line);
    font-size:13px;
    font-weight:800;
    color:var(--text);
  }

  .topicOption.active{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
  }

  textarea{
    width:100%;
    min-height:96px;
    resize:vertical;
    border:1px solid var(--line2);
    border-radius:18px;
    padding:15px 16px;
    background:#fff;
    color:var(--text);
    outline:none;
    font:inherit;
    font-size:18px;
    font-weight:800;
    line-height:1.5;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
  }

  textarea:focus{
    border-color:rgba(109,94,252,.42);
    box-shadow:0 0 0 4px rgba(109,94,252,.08);
  }

  .previewBar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:12px;
  }

  .previewTools{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }

  .sentenceBox{
    width:100%;
    border:1px solid rgba(109,94,252,.12);
    border-radius:18px;
    background:
      radial-gradient(circle at top left, rgba(109,94,252,.10), transparent 42%),
      linear-gradient(180deg,#fff 0%,#f8fafc 100%);
    padding:16px;
    box-shadow:var(--shadow-sm);
    cursor:pointer;
  }

  .sentenceWords{
    display:flex;
    flex-wrap:wrap;
    gap:6px 8px;
    min-height:40px;
    align-items:center;
  }

  .word{
    font-size:clamp(22px,3.2vw,34px);
    line-height:1.12;
    font-weight:900;
    letter-spacing:-.02em;
    color:#2563eb;
    padding:2px 4px;
    border-radius:10px;
    transition:background var(--transition), box-shadow var(--transition), transform var(--transition);
  }

  .word.active{
    background:linear-gradient(135deg, rgba(109,94,252,.16), rgba(139,92,246,.10));
    box-shadow:0 8px 18px rgba(109,94,252,.10);
    transform:translateY(-1px);
  }

  .translationBox{
    margin-top:12px;
    width:100%;
    min-height:58px;
    border:1px solid var(--line);
    border-radius:16px;
    background:#fff;
    padding:14px 16px;
    box-shadow:0 8px 18px rgba(15,23,42,.04);
    display:flex;
    align-items:center;
  }

  .translationText{
    font-size:18px;
    line-height:1.5;
    font-weight:800;
  }

  .recordBox{margin-top:12px;display:none}
  .recordBox.show{display:block}

  .recordedLabel{
    font-size:12px;
    font-weight:900;
    color:var(--muted);
    letter-spacing:.12em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  audio{
    width:100%;
    display:block;
    border-radius:14px;
  }

  .clauseList{display:block}

  .builderTableWrap{
    width:100%;
    overflow:auto;
    border:1px solid var(--line);
    border-radius:20px;
    background:#fff;
    box-shadow:var(--shadow-sm);
  }

  .builderTable{
    width:100%;
    min-width:2210px;
    border-collapse:separate;
    border-spacing:0;
    table-layout:fixed;
  }

  .builderTable th,
  .builderTable td{
    width:170px;
    min-width:170px;
    max-width:170px;
  }

  .builderTable thead th{
    position:sticky;
    top:0;
    z-index:2;
    padding:12px;
    text-align:left;
    font-size:11px;
    line-height:1.25;
    letter-spacing:.11em;
    text-transform:uppercase;
    font-weight:900;
    color:#475569;
    background:linear-gradient(180deg,#fafbff,#f3f5ff);
    border-bottom:1px solid rgba(15,23,42,.08);
    white-space:normal;
    word-break:keep-all;
  }

  .builderTable tbody td{
    padding:10px;
    vertical-align:top;
    border-bottom:1px solid rgba(15,23,42,.06);
    background:#fff;
  }

  .builderTable tbody tr:nth-child(odd) td{background:#fcfdff}
  .builderTable tbody tr:last-child td{border-bottom:none}

  .tableField{
    position:relative;
    min-height:132px;
    height:132px;
    display:flex;
  }

  .tableMainBtn{
    position:relative;
    width:100%;
    min-height:132px;
    height:132px;
    border:1px solid rgba(15,23,42,.08);
    border-radius:18px;
    background:linear-gradient(180deg,#fff,#f8fafc);
    box-shadow:0 8px 18px rgba(15,23,42,.04);
    text-align:left;
    padding:11px 12px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:flex-start;
    cursor:pointer;
  }

  .tableMainBtn[data-kind="subject"]{
    background:linear-gradient(180deg,var(--c-subject),#fff);
  }
  .tableMainBtn[data-kind="time"]{
    background:linear-gradient(180deg,var(--c-time),#fff);
  }
  .tableMainBtn[data-kind="location"]{
    background:linear-gradient(180deg,var(--c-location),#fff);
  }
  .tableMainBtn[data-kind="object"]{
    background:linear-gradient(180deg,var(--c-object),#fff);
  }
  .tableMainBtn[data-kind="description"]{
    background:linear-gradient(180deg,var(--c-description),#fff);
  }
  .tableMainBtn[data-kind="verb"]{
    background:linear-gradient(180deg,var(--c-verb),#fff);
  }
  .tableMainBtn[data-kind="connector"]{
    background:linear-gradient(180deg,var(--c-connector),#fff);
  }

  .tableMainBtn.is-empty .tableValue{
    color:#94a3b8;
  }

  .tableValue{
    font-size:21px;
    line-height:1.06;
    font-weight:900;
    letter-spacing:-.02em;
    color:#0f172a;
    word-break:keep-all;
    margin-top:auto;
  }

  .tableMeta{
    font-size:11px;
    line-height:1.35;
    color:#64748b;
    font-weight:800;
    min-height:14px;
  }

  .tablePickedDot{
    position:absolute;
    top:12px;
    right:12px;
    width:26px;
    height:26px;
    border-radius:999px;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    color:#fff;
    font-size:13px;
    font-weight:900;
    box-shadow:0 8px 16px rgba(109,94,252,.20);
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%) translateY(12px);
    min-width:min(92vw,560px);
    max-width:92vw;
    padding:13px 15px;
    border-radius:16px;
    background:#fff;
    border:1px solid rgba(15,23,42,.10);
    box-shadow:0 18px 40px rgba(15,23,42,.16);
    font-size:14px;
    line-height:1.5;
    font-weight:800;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:100;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .vocabSheet{
    position:fixed;
    inset:0;
    z-index:9999;
    display:none;
  }

  .vocabSheet.open{
    display:block;
  }

  .vocabSheetBackdrop{
    position:absolute;
    inset:0;
    background:rgba(15,23,42,.38);
  }

  .vocabSheetPanel{
    position:absolute;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    width:min(920px,100%);
    max-height:78vh;
    background:#fff;
    border-radius:24px 24px 0 0;
    box-shadow:0 -20px 50px rgba(15,23,42,.20);
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .vocabSheetHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  .vocabSheetTitle{
    font-size:18px;
    font-weight:900;
    color:#0f172a;
  }

  .vocabSheetClose{
    width:42px;
    height:42px;
    border-radius:999px;
    border:1px solid rgba(15,23,42,.08);
    background:#fff;
    cursor:pointer;
    font-size:18px;
    font-weight:900;
  }

  .vocabSheetSearchWrap{width:100%}

  .vocabSheetSearch{
    width:100%;
    height:48px;
    border-radius:14px;
    border:1px solid rgba(15,23,42,.10);
    padding:0 14px;
    font:inherit;
    font-size:15px;
    font-weight:700;
    outline:none;
    background:#fff;
  }

  .vocabSheetSearch:focus{
    border-color:rgba(109,94,252,.42);
    box-shadow:0 0 0 4px rgba(109,94,252,.08);
  }

  .vocabSheetList{
    overflow:auto;
    display:grid;
    gap:10px;
    padding-bottom:8px;
  }

  .vocabItem{
    width:100%;
    text-align:left;
    border:1px solid rgba(15,23,42,.08);
    border-radius:16px;
    padding:14px 16px;
    background:#fff;
    cursor:pointer;
  }

  .vocabItem:hover{
    background:#f8fafc;
  }

  .vocabItemKo{
    font-size:18px;
    font-weight:900;
    color:#0f172a;
    margin-bottom:4px;
  }

  .vocabItemMeta{
    font-size:13px;
    line-height:1.3;
    color:#64748b;
    font-weight:700;
  }

  .vocabEmpty{
    padding:18px;
    border:1px dashed rgba(15,23,42,.14);
    border-radius:16px;
    color:#64748b;
    font-weight:800;
  }

  @media (max-width:980px){
    .builderTable{min-width:2210px}
  }

  @media (max-width:720px){
    body{padding:12px}
    .panel{padding:13px}
    .title{font-size:16px}
    textarea{min-height:88px;font-size:16px}
    .translationText{font-size:16px}
    .word{font-size:20px}

    .builderTable{
      min-width:2080px;
    }

    .builderTable th,
    .builderTable td{
      width:160px;
      min-width:160px;
      max-width:160px;
      padding:9px;
    }

    .tableField,
    .tableMainBtn{
      min-height:124px;
      height:124px;
    }

    .tableValue{font-size:18px}
  }
   .builderTable thead{
  display:none;
}

.tableField.off{
  opacity:.42;
  filter:saturate(.78);
}

.tableToggle{
  position:absolute;
  top:10px;
  right:10px;
  width:28px;
  height:28px;
  border-radius:999px;
  border:1px solid rgba(15,23,42,.10);
  background:#fff;
  color:#64748b;
  cursor:pointer;
  display:grid;
  place-items:center;
  box-shadow:0 6px 14px rgba(15,23,42,.05);
  font-size:13px;
  font-weight:900;
  line-height:1;
  padding:0;
  z-index:3;
}

.tableToggle.active{
  color:#fff;
  border-color:transparent;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
}

.tableMainBtn{
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}
 
</style>

</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="topbar">
        <h1 class="title">Raluca Korean — Builder</h1>
        <div class="toolbar">
          <a href="./index.html" class="tinyBtn">🏠</a>
          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble">
              <span class="topicDot"></span>
              <span id="topicSummaryText">T1 ▾</span>
            </summary>
            <div class="topicDropdown" id="topicDropdown">
              <button class="topicOption" data-level="1" type="button">T1</button>
              <button class="topicOption" data-level="2" type="button">T2</button>
              <button class="topicOption" data-level="3" type="button">T3</button>
              <button class="topicOption" data-level="4" type="button">T4</button>
              <button class="topicOption" data-level="5" type="button">T5</button>
              <button class="topicOption" data-level="6" type="button">T6</button>
            </div>
          </details>
          <button id="btnRo" class="pill active" type="button">RO</button>
          <button id="btnEn" class="pill" type="button">EN</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <textarea id="freeText" placeholder="Scrie aici o propoziție sau un lanț de propoziții..."></textarea>
    </section>

    <section class="panel">
      <div class="previewBar">
        <div class="previewTools">
          <button class="iconBtn" id="refreshBtn" type="button" title="Refresh">↻</button>
          <button class="iconBtn" id="playBtn" type="button" title="Ascultă propoziția">🔊</button>
          <button class="iconBtn" id="recordBtn" type="button" title="Înregistrează vocea">🎤</button>
        </div>
      </div>
      <div class="sentenceBox" id="sentenceBox" tabindex="0" role="button" aria-label="Play sentence">
        <div class="sentenceWords" id="sentenceWords"></div>
      </div>
      <div class="translationBox">
        <div class="translationText" id="translationText"></div>
      </div>
      <div class="recordBox" id="recordBox">
        <div class="recordedLabel">Înregistrarea ta</div>
        <audio id="recordedAudio" controls playsinline></audio>
      </div>
    </section>

    <section class="panel">
      <div class="clauseList" id="clauseList"></div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

var TOPIK_LAYOUTS = {

function toggleFieldActive(clauseIndex, fieldKey){

function cycleFieldValue(clauseIndex, fieldKey){
  var clause = state.clauses[clauseIndex];
  if(!clause) return;

  var options = getOptionsForField(fieldKey);
  if(!options.length) return;

  if(!isFieldActive(clause, fieldKey)){
    var firstItem = getFirstUsableItem(fieldKey);
    if(firstItem){
      setFieldItem(clause, fieldKey, firstItem);
      if(FIELD_BINDINGS[fieldKey]){
        clause[FIELD_BINDINGS[fieldKey]].enabled = true;
      }
      ensureChainLength();
      renderAll();
    }
    return;
  }

  var current = itemOf(clause, fieldKey);
  var currentIndex = -1;

  for(var i=0;i<options.length;i++){
    if(current && options[i] && options[i].id === current.id && options[i].ko === current.ko){
      currentIndex = i;
      break;
    }
  }

  var nextIndex = currentIndex + 1;
  if(nextIndex >= options.length) nextIndex = 0;

  if(fieldKey !== 'connector'){
    while(options[nextIndex] && !options[nextIndex].ko){
      nextIndex += 1;
      if(nextIndex >= options.length) nextIndex = 0;
      if(nextIndex === currentIndex) break;
    }
  }

  setFieldItem(clause, fieldKey, options[nextIndex] || null);
  ensureChainLength();
  renderAll();

    if(departure && departure.ko) parts.push(departure.ko);

  function buildClauseTranslation(clause){

    var adverb = itemOf(clause, 'adverb');

    var numeral = itemOf(clause, 'numeral');
    var quantifier = itemOf(clause, 'quantifier');
    var beneficiary = itemOf(clause, 'beneficiary');
    var object2 = itemOf(clause, 'object2');

    if(topic) parts.push(translationOf(topic));
    if(associate){

        ? ('with ' + (associate.en || associate.ro || associate.ko))
        : ('cu ' + (associate.ro || associate.en || associate.ko)));

    if(time) parts.push(translationOf(time));

    if(transit) parts.push(translationOf(transit));
    if(numeral) parts.push(translationOf(numeral));

    if(object2) parts.push(translationOf(object2));

    var clause = ensureClauseShape(state.clauses[i]);

    for(var j=0;j<ALL_FIELD_KEYS.length;j++){
      var fieldKey = ALL_FIELD_KEYS[j];
      if(row.fields.indexOf(fieldKey) === -1){
        clearFieldFromClause(clause, fieldKey);
      }
    }
  }
}
  function findBestMatch(fieldKey, text){
    var options = getOptionsForField(fieldKey);
    var normalizedText = normalizeLatin(text);
    if(!normalizedText) return null;

    var best = null;
    var bestLen = 0;

    for(var i=0;i<options.length;i++){
      var item = options[i];
      var candidates = [item.ko, item.ro, item.en, item.key].concat(item.aliases || []);

      for(var j=0;j<candidates.length;j++){
        var candidate = normalizeLatin(candidates[j]);
        if(candidate && normalizedText.indexOf(candidate) !== -1 && candidate.length > bestLen){
          best = item;
          bestLen = candidate.length;
        }
      }
    }

    return best;
  }

  function splitIntoSegments(text){
    var working = ' ' + normalizeLatin(text) + ' ';
    var markers = [
      {key:'cause1', phrases:['pentru ca','pentru că','because']},
      {key:'cause2', phrases:['fiindca','fiindcă','since']},
      {key:'condition', phrases:['daca','dacă','if']},
      {key:'contrast1', phrases:['dar','insa','însă','but','however']},
      {key:'contrast2', phrases:['iar','while']},
      {key:'purpose', phrases:['ca sa','ca să','in order to']},
      {key:'seq', phrases:['si apoi','și apoi','and then','si','și','and','apoi']}
    ];

    for(var i=0;i<markers.length;i++){
      for(var j=0;j<markers[i].phrases.length;j++){
        var phrase = normalizeLatin(markers[i].phrases[j]);
        if(phrase){
          working = working.split(' ' + phrase + ' ').join(' |||' + markers[i].key + '||| ');
        }
      }
    }

    working = working.replace(/,/g, ' |||none||| ');

    var parts = working.split('|||');
    var segments = [];
    var currentText = '';

    for(var k=0;k<parts.length;k++){
      var part = String(parts[k] || '').trim();
      if(!part) continue;

      var isConnector = false;
      for(var c=0;c<DATA.connector.length;c++){
        if(DATA.connector[c].key === part){
          isConnector = true;
          break;
        }
      }

      if(isConnector){
        segments.push({ text: currentText.trim(), connector: part });
        currentText = '';
      }else{
        currentText = currentText ? currentText + ' ' + part : part;
      }
    }

    if(currentText.trim()){
      segments.push({ text: currentText.trim(), connector: 'none' });
    }

    if(!segments.length){
      segments.push({ text: normalizeLatin(text), connector: 'none' });
    }

    return segments;
  }
function parseTextIntoClauses(){
  var raw = state.text || '';

  if(!String(raw).trim()){
    state.clauses = [defaultClause()];
    renderAll();
    return;
  }

  var segments = splitIntoSegments(raw);
  var clauses = [];

  for(var i=0;i<segments.length;i++){
    var seg = segments[i];
    var clause = makeClause(0, i === 0);
    clause.sourceText = seg.text || '';

    var topic = findBestMatch('topic', seg.text);
    var time = findBestMatch('time', seg.text);
    var departure = findBestMatch('departure', seg.text);
    var object1 = findBestMatch('object1', seg.text);
    var adverb = findBestMatch('adverb', seg.text);
    var verb = findBestMatch('verb', seg.text);
    var connector = normalizeItem(
      (DATA.connector.filter(function(item){ return item.key === seg.connector; })[0] || DATA.connector[0]),
      'connector',
      0
    );

    if(topic) setFieldItem(clause, 'topic', topic);
    else if(i === 0) setFieldItem(clause, 'topic', normalizeItem(DATA.subject[0], 'subject', 0));

    if(time) setFieldItem(clause, 'time', time);
    if(departure) setFieldItem(clause, 'departure', departure);
    if(object1) setFieldItem(clause, 'object1', object1);
    if(adverb) setFieldItem(clause, 'adverb', adverb);

    if(verb) setFieldItem(clause, 'verb', verb);
    else setFieldItem(clause, 'verb', normalizeItem(DATA.verb[0], 'verb', 0));

    setFieldItem(clause, 'connector', connector);

    clauses.push(clause);
  }

  state.clauses = clauses.length ? clauses : [defaultClause()];
  ensureChainLength();
  renderAll();
}


  function ensureVocabSheet(){
    if(document.getElementById('vocabSheet')) return;

    var el = document.createElement('div');
    el.id = 'vocabSheet';
    el.className = 'vocabSheet';
    el.innerHTML = `
      <div class="vocabSheetBackdrop" data-close-vocab="1"></div>
      <div class="vocabSheetPanel">
        <div class="vocabSheetHead">
          <div class="vocabSheetTitle" id="vocabSheetTitle">선택</div>
          <button type="button" class="vocabSheetClose" id="vocabSheetClose">✕</button>
        </div>
        <div class="vocabSheetSearchWrap">
          <input id="vocabSheetSearch" class="vocabSheetSearch" type="text" placeholder="검색">
        </div>
        <div id="vocabSheetList" class="vocabSheetList"></div>
      </div>
    `;
    document.body.appendChild(el);
  }

  function renderVocabSheetList(items){
    var list = document.getElementById('vocabSheetList');
    if(!list) return;

    pickerState.filteredItems = items.slice();

    if(!items.length){
      list.innerHTML = '<div class="vocabEmpty">항목이 없습니다</div>';
      return;
    }

    list.innerHTML = items.map(function(item, index){
      return `
        <button type="button" class="vocabItem" data-vocab-index="${index}">
          <div class="vocabItemKo">${escapeHtml(item.ko || '—')}</div>
          <div class="vocabItemMeta">${escapeHtml([item.ro, item.en].filter(Boolean).join(' · '))}</div>
        </button>
      `;
    }).join('');
  }

  function filterVocabSheet(keyword){
    var q = normalizeLatin(keyword);
    if(!q){
      renderVocabSheetList(pickerState.items);
      return;
    }

    var filtered = pickerState.items.filter(function(item){
      var hay = [item.ko || '', item.ro || '', item.en || '', item.key || ''].concat(item.aliases || []).join(' ');
      return normalizeLatin(hay).indexOf(q) !== -1;
    });

    renderVocabSheetList(filtered);
  }

  function openVocabSheet(clauseIndex, fieldKey){
    ensureVocabSheet();

    pickerState.clauseIndex = clauseIndex;
    pickerState.fieldKey = fieldKey;
    pickerState.items = getOptionsForField(fieldKey);

    var root = document.getElementById('vocabSheet');
    var title = document.getElementById('vocabSheetTitle');
    var search = document.getElementById('vocabSheetSearch');

    if(title) title.textContent = TABLE_HEADERS_KO[fieldKey] || '선택';
    if(search) search.value = '';

    renderVocabSheetList(pickerState.items);

    if(root) root.classList.add('open');
    if(search){
      setTimeout(function(){ search.focus(); }, 0);
    }
  }

  function closeVocabSheet(){
    var root = document.getElementById('vocabSheet');
    if(root) root.classList.remove('open');
  }

  function pickVocabItem(index){
    var item = pickerState.filteredItems[index];
    if(!item) return;

    var clause = state.clauses[pickerState.clauseIndex];
    if(!clause) return;

    setFieldItem(clause, pickerState.fieldKey, item);
    ensureChainLength();
    closeVocabSheet();
    renderAll();
  }

  function playCurrent(){
    var built = buildFullOutput();

    if(!built.korean){
      showToast(currentUI().noSpeech);
      return;
    }

    if(!('speechSynthesis' in window)){
      showToast(currentUI().noSpeech);
      return;
    }

    window.speechSynthesis.cancel();

    var utter = new SpeechSynthesisUtterance(built.korean);
    utter.lang = 'ko-KR';
    utter.rate = 0.9;

    var activeIndex = -1;
    var wordEls = els.sentenceWords ? els.sentenceWords.querySelectorAll('.word') : [];

    utter.onboundary = function(){
      activeIndex += 1;
      for(var i=0;i<wordEls.length;i++){
        wordEls[i].classList.toggle('active', i === activeIndex);
      }
    };

    utter.onend = function(){
      for(var i=0;i<wordEls.length;i++){
        wordEls[i].classList.remove('active');
      }
    };

    window.speechSynthesis.speak(utter);
  }

  function detectMimeType(){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported){
      if(MediaRecorder.isTypeSupported('audio/mp4;codecs=mp4a.40.2')) return 'audio/mp4;codecs=mp4a.40.2';
      if(MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
      if(MediaRecorder.isTypeSupported('audio/x-m4a')) return 'audio/x-m4a';
      if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
      if(MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
    }
    return '';
  }

  function toggleRecording(){
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || typeof MediaRecorder === 'undefined'){
      showToast(currentUI().recordUnsupported);
      return;
    }

    if(mediaRecorder && mediaRecorder.state === 'recording'){
      mediaRecorder.stop();
      if(els.recordBtn) els.recordBtn.classList.remove('recording');
      showToast(currentUI().recordStop);
      return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
      recordedChunks = [];
      recordedStream = stream;
      var mime = detectMimeType();
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);

      mediaRecorder.ondataavailable = function(event){
        if(event.data && event.data.size > 0) recordedChunks.push(event.data);
      };

      mediaRecorder.onstop = function(){
        var blobType = mime || (recordedChunks[0] && recordedChunks[0].type) || 'audio/mp4';
        var blob = new Blob(recordedChunks, { type: blobType });

        if(recordedUrl) URL.revokeObjectURL(recordedUrl);
        recordedUrl = URL.createObjectURL(blob);

        if(els.recordedAudio){
          els.recordedAudio.pause();
          els.recordedAudio.removeAttribute('src');
          els.recordedAudio.src = recordedUrl;
          els.recordedAudio.load();
        }

        if(els.recordBox) els.recordBox.classList.add('show');

        if(recordedStream){
          var tracks = recordedStream.getTracks();
          for(var i=0;i<tracks.length;i++) tracks[i].stop();
          recordedStream = null;
        }
      };

      mediaRecorder.start();
      if(els.recordBtn) els.recordBtn.classList.add('recording');
      showToast(currentUI().recordStart);
    }).catch(function(){
      showToast(currentUI().recordUnsupported);
    });
  }

  function resetBuilder(){
    state.text = '';
    if(els.freeText) els.freeText.value = '';
    state.clauses = [defaultClause()];
    if(els.recordBox) els.recordBox.classList.remove('show');
    if(els.recordedAudio){
      els.recordedAudio.pause();
      els.recordedAudio.removeAttribute('src');
      els.recordedAudio.load();
    }
    renderAll();
  }
function bindEvents(){
  if(els.btnRo){
    els.btnRo.addEventListener('click', function(){ setLang('ro'); });
  }

  if(els.btnEn){
    els.btnEn.addEventListener('click', function(){ setLang('en'); });
  }

  if(els.topicDropdown){
    els.topicDropdown.addEventListener('click', function(event){
      var btn = event.target.closest('.topicOption');
      if(!btn) return;
      setLevel(btn.getAttribute('data-level'));
      var details = document.getElementById('topicMenu');
      if(details) details.removeAttribute('open');
    });
  }

  if(els.freeText){
    els.freeText.addEventListener('input', function(){
      state.text = els.freeText.value || '';
      parseTextIntoClauses();
    });
  }

  if(els.refreshBtn){
    els.refreshBtn.addEventListener('click', resetBuilder);
  }

  if(els.playBtn){
    els.playBtn.addEventListener('click', playCurrent);
  }

  if(els.recordBtn){
    els.recordBtn.addEventListener('click', toggleRecording);
  }

  if(els.sentenceBox){
    els.sentenceBox.addEventListener('click', playCurrent);
    els.sentenceBox.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        playCurrent();
      }
    });
  }

  if(els.clauseList){
    els.clauseList.addEventListener('click', function(event){
      var toggleBtn = event.target.closest('[data-toggle-cell]');
      if(toggleBtn){
        event.preventDefault();
        event.stopPropagation();
        var toggleParts = toggleBtn.getAttribute('data-toggle-cell').split(':');
        toggleFieldActive(Number(toggleParts[0]), toggleParts[1]);
        return;
      }

      var pressBtn = event.target.closest('[data-press-field]');
      if(pressBtn){
        event.preventDefault();

        if(pressBtn.getAttribute('data-long-press-opened') === '1'){
          pressBtn.removeAttribute('data-long-press-opened');
          return;
        }

        var parts = pressBtn.getAttribute('data-press-field').split(':');
        cycleFieldValue(Number(parts[0]), parts[1]);
      }
    });

    els.clauseList.addEventListener('pointerdown', function(event){
      var btn = event.target.closest('[data-press-field]');
      if(!btn) return;

      longPressTarget = btn;
      longPressTriggered = false;
      clearTimeout(longPressTimer);

      longPressTimer = setTimeout(function(){
        if(!longPressTarget) return;
        longPressTriggered = true;
        longPressTarget.setAttribute('data-long-press-opened', '1');

        var parts = longPressTarget.getAttribute('data-press-field').split(':');
        openVocabSheet(Number(parts[0]), parts[1]);
      }, LONG_PRESS_MS);
    });

    els.clauseList.addEventListener('pointerup', function(){
      clearTimeout(longPressTimer);
      longPressTimer = null;
      longPressTarget = null;
    });

    els.clauseList.addEventListener('pointerleave', function(){
      clearTimeout(longPressTimer);
      longPressTimer = null;
      longPressTarget = null;
    });

    els.clauseList.addEventListener('pointercancel', function(){
      clearTimeout(longPressTimer);
      longPressTimer = null;
      longPressTarget = null;
    });

    els.clauseList.addEventListener('contextmenu', function(event){
      var btn = event.target.closest('[data-press-field]');
      if(btn){
        event.preventDefault();
      }
    });
  }

  document.addEventListener('click', function(event){
    var closeBtn = event.target.closest('#vocabSheetClose, [data-close-vocab]');
    if(closeBtn){
      closeVocabSheet();
      return;
    }

    var pickBtn = event.target.closest('[data-vocab-index]');
    if(pickBtn){
      pickVocabItem(Number(pickBtn.getAttribute('data-vocab-index')));
    }
  });

  document.addEventListener('input', function(event){
    if(event.target && event.target.id === 'vocabSheetSearch'){
      filterVocabSheet(event.target.value || '');
    }
  });

  document.addEventListener('keydown', function(event){
    if(event.key === 'Escape'){
      closeVocabSheet();
    }
  });
}
  


  function init(){
    ensureVocabSheet();
    bindEvents();
    resetBuilder();
    setLevel(1);
    setLang('ro');

    window.ralucaBuilderState = state;
    window.ralucaBuilderRender = renderAll;
  }

  init();
})();
</script>
