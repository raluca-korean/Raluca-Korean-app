<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
    :root{
      --bg:#f6f7fd;
      --bg2:#eef2ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.10);
      --line2:rgba(15,23,42,.16);
      --primary:#6d5efc;
      --primary2:#8b5cf6;
      --blue:#3b82f6;
      --shadow:0 18px 50px rgba(15,23,42,.08);
      --shadow-sm:0 8px 24px rgba(15,23,42,.06);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
      --radius-sm:12px;
      --transition:180ms ease;

      --c-rel:#f6d8ff;
      --c-sub:#dcecff;
      --c-time:#ffe8b8;
      --c-loc:#d7f8d9;
      --c-obj:#ffdede;
      --c-desc:#ece7ff;
      --c-verb:#ffe6c7;
      --c-conn:#e3dcff;

      --toast-good:#166534;
      --toast-bad:#991b1b;
      --toast-warn:#92400e;
      --toast-info:#4338ca;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.14), transparent 24%),
        radial-gradient(circle at top right, rgba(139,92,246,.10), transparent 20%),
        linear-gradient(180deg,var(--bg2) 0%, var(--bg) 36%, #fbfcfe 100%);
      padding:18px;
    }

    .app{
      max-width:1180px;
      margin:0 auto;
    }

    .panel{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .topHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .title{
      margin:0;
      font-size:clamp(18px,2.3vw,30px);
      line-height:1.1;
      letter-spacing:-.02em;
      font-weight:900;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .chip,.action,.topBtn,.topicOption,.miniSwitch,.slotValueBtn{
      font:inherit;
      appearance:none;
      border:none;
      cursor:pointer;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition),
        border-color var(--transition),
        opacity var(--transition),
        color var(--transition);
    }

    .chip:hover,.action:hover,.topBtn:hover,.topicOption:hover,.miniSwitch:hover,.slotValueBtn:hover{
      transform:translateY(-1px);
    }

    .topBtn{
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      font-weight:800;
      font-size:14px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .chip{
      padding:10px 15px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      font-weight:800;
      font-size:14px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
    }

    .chip.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.24);
    }

    .topicMenu{
      position:relative;
    }

    .topicMenu summary{
      list-style:none;
    }

    .topicMenu summary::-webkit-details-marker{
      display:none;
    }

    .topicBubble{
      padding:10px 16px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      font-weight:900;
      font-size:14px;
      box-shadow:0 14px 24px rgba(109,94,252,.24);
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
      cursor:pointer;
    }

    .topicDropdown{
      position:absolute;
      top:calc(100% + 10px);
      right:0;
      z-index:30;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow-sm);
      padding:10px;
      min-width:170px;
      display:grid;
      gap:8px;
    }

    .topicOption{
      padding:11px 12px;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      text-align:left;
      font-weight:800;
      color:var(--text);
    }

    .topicOption.active{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
    }

    .sectionLabel{
      margin:0 0 10px;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
    }

    textarea{
      width:100%;
      min-height:132px;
      resize:vertical;
      border:1px solid var(--line2);
      border-radius:16px;
      background:#fff;
      color:var(--text);
      padding:16px;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
      font-size:18px;
      font-weight:700;
      line-height:1.5;
      font-family:inherit;
    }

    textarea:focus{
      outline:none;
      border-color:rgba(109,94,252,.42);
      box-shadow:0 0 0 4px rgba(109,94,252,.08);
    }

    .previewCard{
      display:grid;
      gap:14px;
    }

    .sentenceBtn{
      appearance:none;
      width:100%;
      border:none;
      cursor:pointer;
      text-align:left;
      padding:18px;
      border-radius:18px;
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.10), transparent 42%),
        linear-gradient(180deg,#fff 0%, #f8fafc 100%);
      border:1px solid rgba(109,94,252,.12);
      box-shadow:var(--shadow-sm);
    }

    .sentenceWords{
      display:flex;
      flex-wrap:wrap;
      gap:8px 10px;
      min-height:58px;
      align-items:center;
    }

    .word{
      font-size:clamp(24px,3.6vw,40px);
      font-weight:900;
      line-height:1.12;
      letter-spacing:-.02em;
      padding:2px 4px;
      border-radius:10px;
      color:var(--blue);
      transition:background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .word.active{
      background:linear-gradient(135deg, rgba(109,94,252,.16), rgba(139,92,246,.10));
      box-shadow:0 10px 18px rgba(109,94,252,.10);
      transform:translateY(-1px);
    }

    .translationBox{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:#fff;
      min-height:78px;
      box-shadow:0 8px 20px rgba(15,23,42,.04);
      display:flex;
      align-items:center;
    }

    .translationText{
      font-size:20px;
      line-height:1.5;
      font-weight:800;
    }

    .actionBar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .action{
      padding:13px 16px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      font-weight:800;
      font-size:14px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
    }

    .action.primary{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.24);
    }

    .clauseList{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .clauseCard{
      width:100%;
      background:linear-gradient(135deg, rgba(173,216,255,.25), rgba(255,213,236,.20));
      border:1px solid rgba(109,94,252,.12);
      border-radius:22px;
      padding:14px;
      box-shadow:var(--shadow-sm);
    }

    .clauseHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .clauseTitle{
      margin:0;
      font-size:16px;
      font-weight:900;
      letter-spacing:-.01em;
    }

    .slotGrid{
      display:grid;
      grid-template-columns:repeat(8, minmax(150px, 1fr));
      gap:10px;
      overflow-x:auto;
      padding-bottom:4px;
    }

    .slotCard{
      min-height:150px;
      border-radius:18px;
      border:1px solid rgba(15,23,42,.08);
      background:#fff;
      box-shadow:0 8px 18px rgba(15,23,42,.05);
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:150px;
    }

    .slotCard[data-slot="relative"]{ background:linear-gradient(180deg,var(--c-rel),#fff); }
    .slotCard[data-slot="subject"]{ background:linear-gradient(180deg,var(--c-sub),#fff); }
    .slotCard[data-slot="time"]{ background:linear-gradient(180deg,var(--c-time),#fff); }
    .slotCard[data-slot="location"]{ background:linear-gradient(180deg,var(--c-loc),#fff); }
    .slotCard[data-slot="objects"]{ background:linear-gradient(180deg,var(--c-obj),#fff); }
    .slotCard[data-slot="description"]{ background:linear-gradient(180deg,var(--c-desc),#fff); }
    .slotCard[data-slot="verb"]{ background:linear-gradient(180deg,var(--c-verb),#fff); }
    .slotCard[data-slot="connector"]{ background:linear-gradient(180deg,var(--c-conn),#fff); }

    .slotCard.off{
      opacity:.56;
      filter:grayscale(.10);
    }

    .slotTop{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
    }

    .slotLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.11em;
      color:#334155;
      line-height:1.35;
    }

    .miniSwitch{
      width:28px;
      height:28px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(15,23,42,.12);
      color:#475569;
      font-size:14px;
      font-weight:900;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      box-shadow:0 6px 14px rgba(15,23,42,.05);
    }

    .miniSwitch.active{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      border-color:transparent;
    }

    .slotQuestion{
      font-size:13px;
      color:#64748b;
      line-height:1.35;
      font-weight:700;
      min-height:18px;
    }

    .slotValueBtn{
      width:100%;
      min-height:52px;
      border-radius:14px;
      border:1px solid rgba(15,23,42,.14);
      background:rgba(255,255,255,.92);
      color:var(--text);
      padding:11px 12px;
      font-size:18px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
      text-align:left;
    }

    .slotValueBtn.placeholder{
      color:#94a3b8;
      font-weight:700;
    }

    .slotHint{
      color:#94a3b8;
      font-size:12px;
      line-height:1.35;
      margin-top:auto;
      font-weight:700;
      min-height:16px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(12px);
      min-width:min(92vw, 560px);
      max-width:92vw;
      padding:14px 16px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:0 18px 40px rgba(15,23,42,.16);
      font-size:14px;
      font-weight:800;
      line-height:1.5;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:100;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .toast.good{ color:var(--toast-good); background:rgba(22,163,74,.08); border-color:rgba(22,163,74,.18); }
    .toast.bad{ color:var(--toast-bad); background:rgba(220,38,38,.08); border-color:rgba(220,38,38,.18); }
    .toast.warn{ color:var(--toast-warn); background:rgba(217,119,6,.08); border-color:rgba(217,119,6,.18); }
    .toast.info{ color:var(--toast-info); background:rgba(109,94,252,.08); border-color:rgba(109,94,252,.18); }

    @media (max-width: 900px){
      .slotGrid{
        grid-template-columns:repeat(4, minmax(160px, 1fr));
      }
    }

    @media (max-width: 640px){
      body{padding:12px}
      .panel{padding:14px}
      .actionBar{flex-direction:column}
      .action{width:100%}
      .slotGrid{
        grid-template-columns:repeat(2, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <section class="panel">
      <div class="topHead">
        <h1 class="title">Raluca Korean — Clause Builder</h1>

        <div class="row">
          <a href="./index.html" class="topBtn">← Index</a>

          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble" id="topicSummary">TOPIK 6 ▾</summary>
            <div class="topicDropdown" id="topicDropdown">
              <button type="button" class="topicOption" data-level="1">TOPIK 1</button>
              <button type="button" class="topicOption" data-level="2">TOPIK 2</button>
              <button type="button" class="topicOption" data-level="3">TOPIK 3</button>
              <button type="button" class="topicOption" data-level="4">TOPIK 4</button>
              <button type="button" class="topicOption" data-level="5">TOPIK 5</button>
              <button type="button" class="topicOption active" data-level="6">TOPIK 6</button>
            </div>
          </details>

          <button class="chip active" id="btnRo" type="button">Română</button>
          <button class="chip" id="btnEn" type="button">English</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2 class="sectionLabel" id="textLabel">Text de lucru</h2>
      <textarea
        id="freeText"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>
    </section>

    <section class="panel">
      <div class="previewCard">
        <button class="sentenceBtn" id="sentenceBtn" type="button" aria-label="Play Korean sentence">
          <div class="sentenceWords" id="sentenceWords"></div>
        </button>

        <div class="translationBox">
          <div class="translationText" id="translationText"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="actionBar">
        <button class="action primary" id="playBtn" type="button">🔊 Pronunție</button>
        <button class="action" id="speakBtn" type="button">🎤 Exersează vorbirea</button>
        <button class="action" id="addClauseBtn" type="button">＋ Add Clause</button>
        <button class="action" id="removeClauseBtn" type="button">－ Remove Last Clause</button>
      </div>
    </section>

    <section class="panel">
      <div class="clauseList" id="clauseList"></div>
    </section>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

    function normalize(str=""){
      return str.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[’']/g,"")
        .replace(/\s+/g," ")
        .trim();
    }

    function autoSpaceCamelCase(str=""){
      return str
        .replace(/([a-zăâîșț])([A-Z])/g, "$1 $2")
        .replace(/\s+/g, " ");
    }

    function splitItems(str=""){
      return str
        .split(/\s*(?:,|\/|&|\+| și | si | and | 그리고 )\s*/i)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function hasBatchim(word=""){
      const w = word.trim();
      if(!w) return false;
      const ch = w[w.length - 1];
      const code = ch.charCodeAt(0);
      if(code < 0xac00 || code > 0xd7a3) return false;
      return ((code - 0xac00) % 28) !== 0;
    }

    function withTopic(noun=""){
      const n = noun.trim();
      if(!n) return "";
      if(/[은는]$/.test(n)) return n;
      return n + (hasBatchim(n) ? "은" : "는");
    }

    function withObject(noun=""){
      const n = noun.trim();
      if(!n) return "";
      if(/[을를]$/.test(n)) return n;
      return n + (hasBatchim(n) ? "을" : "를");
    }

    function withAnd(noun=""){
      const n = noun.trim();
      if(!n) return "";
      if(/[와과]$/.test(n)) return n;
      return n + (hasBatchim(n) ? "과" : "와");
    }

    function withPlace(noun="", verbBase=""){
      const n = noun.trim();
      if(!n) return "";
      if(/(에서|에)$/.test(n)) return n;
      if(["가다","오다"].includes(verbBase)) return n + "에";
      return n + "에서";
    }

    function looksKorean(str=""){
      return /[가-힣]/.test(str);
    }

    function findEntry(list, raw=""){
      const n = normalize(raw);
      if(!n) return null;
      for(const item of list){
        if(normalize(item.ko) === n) return item;
        if((item.ro || []).some(v => normalize(v) === n)) return item;
        if((item.en || []).some(v => normalize(v) === n)) return item;
      }
      for(const item of list){
        const pool = [item.ko].concat(item.ro || [], item.en || []);
        if(pool.some(v => {
          const nv = normalize(v);
          return nv && (n.includes(nv) || nv.includes(n));
        })) return item;
      }
      return null;
    }

    function findFirstInText(text, list){
      const n = normalize(text);
      for(const item of list){
        const pool = [item.ko].concat(item.ro || [], item.en || []);
        if(pool.some(v => {
          const nv = normalize(v);
          return nv && n.includes(nv);
        })) return item;
      }
      return null;
    }

    function findAllInText(text, list){
      const n = normalize(text);
      const out = [];
      for(const item of list){
        const pool = [item.ko].concat(item.ro || [], item.en || []);
        if(pool.some(v => {
          const nv = normalize(v);
          return nv && n.includes(nv);
        })) out.push(item);
      }
      return out;
    }

    function toKo(raw="", list){
      const v = raw.trim();
      if(!v) return "";
      if(looksKorean(v)) return v;
      const found = findEntry(list, v);
      return found ? found.ko : v;
    }

    function subjectToKo(raw=""){
      const parts = splitItems(raw);
      if(!parts.length) return "";
      return parts.map((part, idx) => {
        const ko = toKo(part, SUGGESTIONS.subjects);
        return idx < parts.length - 1 ? withAnd(ko) : ko;
      }).join(" ");
    }

    function objectsToKo(raw=""){
      const parts = splitItems(raw.replace(/\+/g, " + "));
      if(!parts.length) return "";
      return parts.map((part, idx) => {
        const ko = toKo(part, SUGGESTIONS.objects);
        return idx < parts.length - 1 ? withAnd(ko) : withObject(ko);
      }).join(" ");
    }

    function getVerbEntry(raw=""){
      const v = raw.trim();
      if(!v) return null;
      const found = findEntry(SUGGESTIONS.verbs, v);
      if(found) return found;
      return SUGGESTIONS.verbs.find(item =>
        [item.ko, item.final, item.and, item.cause, item.condition, item.contrast, item.intention, item.result]
          .some(form => normalize(form) === normalize(v))
      ) || null;
    }

    function conjugateVerb(raw="", connector=""){
      const entry = getVerbEntry(raw);
      if(!entry){
        if(looksKorean(raw)) return raw;
        return raw;
      }
      if(!connector) return entry.final;
      return entry[connector] || entry.final;
    }

    function reverseLookup(list, koValue="", lang="ro"){
      const clean = koValue.trim();
      if(!clean) return "";
      const found = list.find(item => clean.includes(item.ko) || item.ko === clean);
      if(!found) return clean;
      const arr = lang === "ro" ? (found.ro || []) : (found.en || []);
      return arr[0] || found.ko;
    }

    function phraseTranslate(slot, value, lang){
      const v = value.trim();
      if(!v) return "";
      if(slot === "subject") return reverseLookup(SUGGESTIONS.subjects, v, lang);
      if(slot === "time") return reverseLookup(SUGGESTIONS.times, v, lang);
      if(slot === "location") return reverseLookup(SUGGESTIONS.locations, v, lang);
      if(slot === "description") return reverseLookup(SUGGESTIONS.descriptions, v, lang);
      if(slot === "verb"){
        const entry = getVerbEntry(v);
        if(!entry) return v;
        return lang === "ro" ? (entry.ro[0] || entry.ko) : (entry.en[0] || entry.ko);
      }
      if(slot === "objects"){
        const cleaned = v.replace(/[+]/g, " ").replace(/[을를와과]/g, " ");
        const parts = cleaned.split(/\s+/).filter(Boolean);
        const translated = parts.map(p => reverseLookup(SUGGESTIONS.objects, p, lang)).filter(Boolean);
        return translated.join(lang === "ro" ? " și " : " and ");
      }
      return v;
    }

    function connectorTranslate(connector, lang){
      const map = {
        ro: {
          and:"și apoi",
          cause:"pentru că",
          condition:"dacă",
          contrast:"dar",
          intention:"ca să",
          result:"ca rezultat"
        },
        en: {
          and:"and then",
          cause:"because",
          condition:"if",
          contrast:"but",
          intention:"in order to",
          result:"as a result"
        }
      };
      return map[lang][connector] || "";
    }

    function createClause(index=0){
      return {
        id: Date.now() + Math.random() + index,
        slots: {
          relative:    { active:false, value:"" },
          subject:     { active:index === 0, value:index === 0 ? "저" : "" },
          time:        { active:false, value:"" },
          location:    { active:false, value:"" },
          objects:     { active:false, value:"" },
          description: { active:false, value:"" },
          verb:        { active:true, value:"가다" },
          connector:   { active:false, value:"" }
        }
      };
    }

    function ensureInitialClause(){
      if(!state.clauses.length){
        state.clauses = [createClause(0)];
      }
    }

    function cycleListForSlot(slotKey){
      if(slotKey === "relative") return [""].concat(SUGGESTIONS.relative);
      if(slotKey === "subject") return SUGGESTIONS.subjects.map(v => v.ko);
      if(slotKey === "time") return [""].concat(SUGGESTIONS.times.map(v => v.ko));
      if(slotKey === "location") return [""].concat(SUGGESTIONS.locations.map(v => v.ko));
      if(slotKey === "objects") return [""].concat(SUGGESTIONS.objects.map(v => v.ko));
      if(slotKey === "description") return [""].concat(SUGGESTIONS.descriptions.map(v => v.ko));
      if(slotKey === "verb") return SUGGESTIONS.verbs.map(v => v.ko);
      if(slotKey === "connector") return SUGGESTIONS.connectors;
      return [""];
    }

    function ensureNextClauseChain(){
      for(let i = 0; i < state.clauses.length; i++){
        const current = state.clauses[i];
        if(current.slots.connector.active && current.slots.connector.value){
          if(i === state.clauses.length - 1){
            const next = createClause(state.clauses.length);
            next.slots.subject.active = false;
            next.slots.subject.value = current.slots.subject.value;
            state.clauses.push(next);
          }
        }
      }
    }

    function buildKorean(){
      const clauses = [];
      let prevSubject = "";

      state.clauses.forEach((clause, index) => {
        const s = clause.slots;
        const parts = [];

        const relative = s.relative.active ? s.relative.value.trim() : "";
        let subject = s.subject.active ? subjectToKo(s.subject.value) : "";
        const time = s.time.active ? toKo(s.time.value, SUGGESTIONS.times) : "";
        const locationRaw = s.location.active ? toKo(s.location.value, SUGGESTIONS.locations) : "";
        const objects = s.objects.active ? objectsToKo(s.objects.value) : "";
        const description = s.description.active ? toKo(s.description.value, SUGGESTIONS.descriptions) : "";
        const verbEntry = getVerbEntry(s.verb.value);
        const verbBase = verbEntry ? verbEntry.ko : s.verb.value.trim();
        const connector = s.connector.active ? s.connector.value : "";
        const verb = conjugateVerb(s.verb.value, connector);

        if(relative) parts.push(relative);

        if(subject && index > 0 && normalize(subject) === normalize(prevSubject)){
          subject = "";
        }

        if(subject) parts.push(withTopic(subject));
        if(time) parts.push(time);
        if(locationRaw) parts.push(withPlace(locationRaw, verbBase));
        if(objects) parts.push(objects);
        if(description) parts.push(description);
        if(verb) parts.push(verb);

        if(subject) prevSubject = subject;

        const line = parts.filter(Boolean).join(" ").replace(/\s+/g, " ").trim();
        if(line) clauses.push(line);
      });

      return clauses.join(" ");
    }

    function buildTranslation(lang){
      const chunks = [];
      let prevSubject = "";

      state.clauses.forEach((clause, index) => {
        const s = clause.slots;
        const parts = [];

        const relative = s.relative.active ? s.relative.value.trim() : "";
        let subject = s.subject.active ? phraseTranslate("subject", s.subject.value, lang) : "";
        const time = s.time.active ? phraseTranslate("time", s.time.value, lang) : "";
        const location = s.location.active ? phraseTranslate("location", s.location.value, lang) : "";
        const objects = s.objects.active ? phraseTranslate("objects", s.objects.value, lang) : "";
        const description = s.description.active ? phraseTranslate("description", s.description.value, lang) : "";
        const verb = s.verb.active ? phraseTranslate("verb", s.verb.value, lang) : "";
        const connector = s.connector.active ? s.connector.value : "";

        if(subject && index > 0 && normalize(subject) === normalize(prevSubject)){
          subject = "";
        }

        if(relative) parts.push(relative);
        if(time) parts.push(time);
        if(subject) parts.push(subject);
        if(location) parts.push(location);
        if(objects) parts.push(objects);
        if(description) parts.push(description);
        if(verb) parts.push(verb);

        let line = parts.filter(Boolean).join(" ").replace(/\s+/g, " ").trim();
        const c = connectorTranslate(connector, lang);
        if(c) line += (line ? ", " : "") + c;

        if(subject) prevSubject = subject;
        if(line) chunks.push(line);
      });

      return chunks.join(". ");
    }

            ${slotCardTemplate({ clauseIndex:index, slotKey:"time", active:clause.slots.time.active, value:clause.slots.time.value })}
            ${slotCardTemplate({ clauseIndex:index, slotKey:"location", active:clause.slots.location.active, value:clause.slots.location.value })}
            ${slotCardTemplate({ clauseIndex:index, slotKey:"objects", active:clause.slots.objects.active, value:clause.slots.objects.value })}
            ${slotCardTemplate({ clauseIndex:index, slotKey:"description", active:clause.slots.description.active, value:clause.slots.description.value })}
            ${slotCardTemplate({ clauseIndex:index, slotKey:"verb", active:clause.slots.verb.active, value:clause.slots.verb.value })}
            ${slotCardTemplate({ clauseIndex:index, slotKey:"connector", active:clause.slots.connector.active, value:clause.slots.connector.value })}

    function renderPreview(){
      const ko = buildKorean();
      const tr = buildTranslation(state.lang);
      renderSentence(ko || "—");
      els.translationText.textContent = tr || t().translationEmpty;
    }

    function renderAll(){
      ensureInitialClause();
      renderLanguageButtons();
      renderTopicMenu();
      renderClauses();
      renderPreview();
      savePrefs();
    }

    function addClause(){
      state.clauses.push(createClause(state.clauses.length));
      renderAll();
    }

    function removeClause(){
      if(state.clauses.length > 1){
        state.clauses.pop();
        renderAll();
      }
    }

    function handleToggle(clauseIndex, slotKey){
      const slot = state.clauses[clauseIndex].slots[slotKey];
      slot.active = !slot.active;

      if(slotKey === "verb") slot.active = true;
      if(slotKey === "connector" && !slot.active) slot.value = "";

      renderAll();
    }

    function handleCycle(clauseIndex, slotKey){
      const slot = state.clauses[clauseIndex].slots[slotKey];
      const list = cycleListForSlot(slotKey);
      let currentIndex = list.findIndex(v => v === slot.value);
      if(currentIndex === -1) currentIndex = 0;
      const nextIndex = (currentIndex + 1) % list.length;
      slot.value = list[nextIndex];

      if(slotKey === "connector"){
        slot.active = slot.value !== "";
      } else if(slotKey === "verb"){
        slot.active = true;
      }

      ensureNextClauseChain();
      renderAll();
    }

    function parseFreeText(){
      let txt = els.freeText.value;
      txt = autoSpaceCamelCase(txt);
      if(txt !== els.freeText.value){
        els.freeText.value = txt;
      }

      state.freeText[state.lang] = txt;
      savePrefs();

      if(!txt.trim()){
        return;
      }

      const pieces = txt.split(/\s*(?:,|;|\.)\s*/).filter(Boolean);
      const clauses = pieces.map((piece, idx) => createClause(idx));

      pieces.forEach((piece, idx) => {
        const clause = clauses[idx];

        const subj = findFirstInText(piece, SUGGESTIONS.subjects);
        if(subj){
          clause.slots.subject.active = idx === 0 || clause.slots.subject.active;
          clause.slots.subject.value = subj.ko;
        } else if(idx > 0){
          clause.slots.subject.active = false;
          clause.slots.subject.value = "";
        }

        const time = findFirstInText(piece, SUGGESTIONS.times);
        if(time){
          clause.slots.time.active = true;
          clause.slots.time.value = time.ko;
        }

        const loc = findFirstInText(piece, SUGGESTIONS.locations);
        if(loc){
          clause.slots.location.active = true;
          clause.slots.location.value = loc.ko;
        }

        const desc = findFirstInText(piece, SUGGESTIONS.descriptions);
        if(desc){
          clause.slots.description.active = true;
          clause.slots.description.value = desc.ko;
        }

        const objMatches = findAllInText(piece, SUGGESTIONS.objects);
        if(objMatches.length){
          clause.slots.objects.active = true;
          clause.slots.objects.value = objMatches.map((item) => item.ko).join(" + ");
        }

        const verb = findFirstInText(piece, SUGGESTIONS.verbs);
        if(verb){
          clause.slots.verb.value = verb.ko;
        } else if(/\bplec\b/i.test(piece) || /\bgo\b/i.test(piece)){
          clause.slots.verb.value = "가다";
        }

        if(idx < pieces.length - 1){
          clause.slots.connector.active = true;
          if(/\bdar\b|\bbut\b/i.test(txt) && idx === 0) clause.slots.connector.value = "contrast";
          else if(/\bpentru că\b|\bbecause\b/i.test(txt) && idx === 0) clause.slots.connector.value = "cause";
          else if(/\bdacă\b|\bif\b/i.test(txt) && idx === 0) clause.slots.connector.value = "condition";
          else clause.slots.connector.value = "and";
        }
      });

      state.clauses = clauses.length ? clauses : [createClause(0)];
      ensureNextClauseChain();
      renderAll();
    }

    function playSentence(){
      const text = buildKorean().trim();
      if(!text) return;

      if(!("speechSynthesis" in window)){
        showToast("warn", t().toastAudio);
        return;
      }

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ko-KR";
      utter.rate = 0.9;
      utter.pitch = 1;

      const words = [...els.sentenceWords.querySelectorAll(".word")];
      words.forEach(w => w.classList.remove("active"));

      let idx = 0;
      utter.onboundary = (event) => {
        if(event.name === "word"){
          words.forEach(w => w.classList.remove("active"));
          if(words[idx]) words[idx].classList.add("active");
          idx++;
        }
      };
      utter.onend = () => words.forEach(w => w.classList.remove("active"));

      window.speechSynthesis.speak(utter);
    }

    function normalizeSpeechCompare(str=""){
      return str.replace(/\s+/g,"").trim();
    }

    function startSpeakingPractice(){
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SpeechRecognition){
        showToast("warn", t().toastMic);
        return;
      }

      const expected = buildKorean().trim();
      if(!expected) return;

      const rec = new SpeechRecognition();
      rec.lang = "ko-KR";
      rec.interimResults = false;
      rec.maxAlternatives = 1;

      els.speakBtn.textContent = t().speakListening;

      rec.onresult = (event) => {
        const heard = (event.results[0] && event.results[0][0] && event.results[0][0].transcript || "").trim();
        const a = normalizeSpeechCompare(heard);
        const b = normalizeSpeechCompare(expected);

        if(a && a === b){
          showToast("good", t().toastCorrect);
        } else {
          showToast("bad", t().toastIncorrect(heard || "—", expected));
        }
      };

      rec.onerror = (event) => {
        if(event.error === "no-speech"){
          showToast("warn", t().toastNoSpeech);
        } else {
          showToast("warn", t().toastVoiceError);
        }
      };

      rec.onend = () => {
        els.speakBtn.textContent = t().speakBtn;
      };

      rec.start();
    }
