<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
<style>
:root{
  --builder-line: rgba(15,23,42,.08);
  --builder-line-soft: rgba(15,23,42,.06);
  --builder-text: #0f172a;
  --builder-muted: #64748b;
  --builder-bg: #ffffff;
  --builder-shadow: 0 10px 24px rgba(15,23,42,.06);
  --builder-shadow-soft: 0 6px 14px rgba(15,23,42,.05);
  --builder-radius: 20px;

  --c-topic: #eef4ff;
  --c-associate: #f6f0ff;
  --c-time: #fff8ea;
  --c-departure: #eefbf5;
  --c-transit: #f2fbff;
  --c-numeral: #fff4ef;
  --c-quantifier: #fdf7e9;
  --c-object1: #fff1f6;
  --c-beneficiary: #f7f3ff;
  --c-object2: #f5f7fb;
  --c-adverb: #f8fafc;
  --c-verb: #fff2d9;
  --c-connector: #efe7ff;

  --picker-backdrop: rgba(15,23,42,.42);
}

.clauseList{
  display:block;
  width:100%;
}

.builderTableWrap{
  width:100%;
  overflow:auto;
  border:1px solid var(--builder-line);
  border-radius:24px;
  background:#fff;
  box-shadow:var(--builder-shadow);
}

.builderTable{
  width:100%;
  min-width:2210px;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}

.builderTable th,
.builderTable td{
  width:170px;
  min-width:170px;
  max-width:170px;
}

.builderTable thead th{
  position:sticky;
  top:0;
  z-index:2;
  height:58px;
  padding:14px 12px;
  text-align:left;
  vertical-align:middle;
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  border-bottom:1px solid var(--builder-line);
  color:#334155;
  font-size:12px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  white-space:normal;
  word-break:keep-all;
}

.builderTable tbody td{
  padding:12px;
  vertical-align:top;
  border-bottom:1px solid var(--builder-line-soft);
  background:#fff;
}

.builderTable tbody tr:last-child td{
  border-bottom:none;
}

.tableField{
  width:100%;
  min-height:132px;
  height:132px;
  display:flex;
}

.tableMainBtn{
  position:relative;
  width:100%;
  min-height:132px;
  height:132px;
  box-sizing:border-box;
  border-radius:20px;
  border:1px solid rgba(15,23,42,.08);
  box-shadow:0 8px 18px rgba(15,23,42,.04);
  padding:13px 13px 12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:flex-start;
  text-align:left;
  cursor:pointer;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  background:linear-gradient(180deg,#fff,#f8fafc);
  color:var(--builder-text);
}

.tableMainBtn:hover{
  transform:translateY(-1px);
  box-shadow:0 12px 22px rgba(15,23,42,.07);
  border-color:rgba(15,23,42,.12);
}

.tableMainBtn:active{
  transform:translateY(0);
}

.tableMainBtn.is-empty .tableValue{
  color:#94a3b8;
}

.tableMainBtn[data-kind="topic"]{background:linear-gradient(180deg,var(--c-topic),#fff);}
.tableMainBtn[data-kind="associate"]{background:linear-gradient(180deg,var(--c-associate),#fff);}
.tableMainBtn[data-kind="time"]{background:linear-gradient(180deg,var(--c-time),#fff);}
.tableMainBtn[data-kind="departure"]{background:linear-gradient(180deg,var(--c-departure),#fff);}
.tableMainBtn[data-kind="transit"]{background:linear-gradient(180deg,var(--c-transit),#fff);}
.tableMainBtn[data-kind="numeral"]{background:linear-gradient(180deg,var(--c-numeral),#fff);}
.tableMainBtn[data-kind="quantifier"]{background:linear-gradient(180deg,var(--c-quantifier),#fff);}
.tableMainBtn[data-kind="object1"]{background:linear-gradient(180deg,var(--c-object1),#fff);}
.tableMainBtn[data-kind="beneficiary"]{background:linear-gradient(180deg,var(--c-beneficiary),#fff);}
.tableMainBtn[data-kind="object2"]{background:linear-gradient(180deg,var(--c-object2),#fff);}
.tableMainBtn[data-kind="adverb"]{background:linear-gradient(180deg,var(--c-adverb),#fff);}
.tableMainBtn[data-kind="verb"]{background:linear-gradient(180deg,var(--c-verb),#fff);}
.tableMainBtn[data-kind="connector"]{background:linear-gradient(180deg,var(--c-connector),#fff);}

.tableMeta{
  font-size:12px;
  line-height:1.1;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#64748b;
}

.tableValue{
  width:100%;
  font-size:18px;
  line-height:1.08;
  font-weight:900;
  color:#0f172a;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

.tableSub{
  font-size:12px;
  line-height:1.2;
  font-weight:800;
  color:#64748b;
}

.tablePickedDot{
  position:absolute;
  top:12px;
  right:12px;
  width:26px;
  height:26px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,#7c5cff,#5b7cff);
  color:#fff;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 16px rgba(109,94,252,.20);
}

.builderControlsRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.is-active-level{
  box-shadow:0 0 0 2px rgba(109,94,252,.16) inset !important;
  border-color:rgba(109,94,252,.34) !important;
}

.vocabSheet{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
}

.vocabSheet.open{
  display:block;
}

.vocabSheetBackdrop{
  position:absolute;
  inset:0;
  background:var(--picker-backdrop);
}

.vocabSheetPanel{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:min(960px, 100%);
  max-height:80vh;
  background:#fff;
  border-radius:28px 28px 0 0;
  box-shadow:0 -24px 60px rgba(15,23,42,.22);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.vocabSheetHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.vocabSheetTitle{
  font-size:18px;
  font-weight:900;
  color:#0f172a;
}

.vocabSheetClose{
  width:42px;
  height:42px;
  border-radius:999px;
  border:1px solid rgba(15,23,42,.08);
  background:#fff;
  color:#0f172a;
  cursor:pointer;
  font-size:18px;
  font-weight:900;
  box-shadow:var(--builder-shadow-soft);
}

.vocabSheetSearch{
  width:100%;
  height:48px;
  border-radius:14px;
  border:1px solid rgba(15,23,42,.10);
  padding:0 14px;
  font:inherit;
  font-size:15px;
  font-weight:800;
  color:#0f172a;
  outline:none;
  background:#fff;
}

.vocabSheetSearch:focus{
  border-color:rgba(109,94,252,.38);
  box-shadow:0 0 0 4px rgba(109,94,252,.08);
}

.vocabSheetList{
  overflow:auto;
  display:grid;
  gap:10px;
  padding-bottom:6px;
}

.vocabItem{
  width:100%;
  border:1px solid rgba(15,23,42,.08);
  border-radius:18px;
  background:#fff;
  padding:14px 16px;
  text-align:left;
  cursor:pointer;
  transition:background .16s ease, transform .16s ease, border-color .16s ease;
}

.vocabItem:hover{
  background:#f8fafc;
  transform:translateY(-1px);
  border-color:rgba(15,23,42,.12);
}

.vocabItemKo{
  font-size:18px;
  line-height:1.12;
  font-weight:900;
  color:#0f172a;
  margin-bottom:4px;
}

.vocabItemMeta{
  font-size:13px;
  line-height:1.3;
  color:#64748b;
  font-weight:700;
}

.vocabEmpty{
  padding:18px;
  border:1px dashed rgba(15,23,42,.14);
  border-radius:16px;
  color:#64748b;
  font-weight:800;
  background:#fff;
}

.recordInlineAudio{
  width:100%;
  margin-top:8px;
}

@media (max-width:1200px){
  .builderTable{
    min-width:2210px;
  }
}

@media (max-width:860px){
  .builderTable th,
  .builderTable td{
    width:160px;
    min-width:160px;
    max-width:160px;
  }

  .tableField,
  .tableMainBtn{
    min-height:124px;
    height:124px;
  }

  .tableValue{
    font-size:17px;
  }
}
</style>

  function escapeHtml(str){
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function normalizeLoose(str){
    return String(str || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\p{L}\p{N}\s]/gu, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function cleanSentenceText(text){
    return String(text || '')
      .replace(/\s+,/g, ',')
      .replace(/\s+/g, ' ')
      .replace(/\s+([,.!?])/g, '$1')
      .trim();
  }

  function makeClause(){
    return {
      topic: null,
      associate: null,
      time: null,
      departure: null,
      transit: null,
      numeral: null,
      quantifier: null,
      object1: null,

      object2: null,
      adverb: null,
      verb: null,
      connector: null,
      sourceText: ''
    };
  }

  function makeDefaultClause(){
    const clause = makeClause();
    clause.topic = normalizeVocabItem(DATA.subject[0], 'subject', 0);
    clause.verb = normalizeVocabItem(DATA.verb[0], 'verb', 0);
    clause.connector = normalizeVocabItem(DATA.connector[0], 'connector', 0);
    return clause;
  }

  function ensureClauseShape(clause){
    if(!clause || typeof clause !== 'object') return makeDefaultClause();
    COLUMN_DEFS.forEach(function(col){
      if(typeof clause[col.key] === 'undefined') clause[col.key] = null;
    });
    if(typeof clause.sourceText !== 'string') clause.sourceText = '';
    return clause;
  }

  function normalizeVocabItem(item, bucket, index){
    if(!item) return null;

    if(typeof item === 'string'){
      return {
        id: bucket + '-' + index + '-' + item,
        key: item,
        bucket: bucket,
        index: index,
        ko: item,
        ro: '',
        en: '',
        aliases: [],
        raw: item
      };
    }

    return {
      id: item.id || item.key || item.value || item.ko || item.kr || item.korean || (bucket + '-' + index),
      key: item.key || item.id || item.value || '',
      bucket: bucket,
      index: index,
      ko: item.ko || item.kr || item.korean || item.surface || item.text || item.value || '',
      ro: item.ro || item.romanian || item.meaningRo || item.meaning || '',
      en: item.en || item.english || item.meaningEn || '',
      aliases: Array.isArray(item.aliases) ? item.aliases.slice() : [],
      final: item.final || '',
      forms: item.forms || null,
      raw: item
    };
  }

    }[fieldKey] || [fieldKey];

  function firstExistingBucket(source, keys){
    for(let i=0;i<keys.length;i++){
      const key = keys[i];
      if(source && Array.isArray(source[key])) return source[key];
      if(source && source[key] && Array.isArray(source[key].items)) return source[key].items;
      if(source && source.data && Array.isArray(source.data[key])) return source.data[key];
      if(source && source.data && source.data[key] && Array.isArray(source.data[key].items)) return source.data[key].items;
    }
    return [];
  }

  function uniqueItems(items){
    const seen = new Set();
    return items.filter(function(item){
      if(!item || !item.ko) return false;
      const key = [item.bucket, item.ko, item.ro, item.en, item.key].join('|');
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function getOptionsForField(fieldKey){
    const globalVocab = getAppVocab();
    let items = [];

    if(globalVocab){
      const bucketNames = globalBucketMap(fieldKey);
      const rawGlobal = firstExistingBucket(globalVocab, bucketNames);
      if(rawGlobal && rawGlobal.length){
        items = rawGlobal.map(function(item, index){
          return normalizeVocabItem(item, fieldKey, index);
        });
      }
    }

    if(!items.length){
      const localKey = bucketToLocalDataKey(getSchema(fieldKey).bucket);
      const rawLocal = DATA[localKey] || [];
      items = rawLocal.map(function(item, index){
        return normalizeVocabItem(item, localKey, index);
      });
    }

    return uniqueItems(items);
  }

  function subjectRoleFromKo(subjectKo){
    if(subjectKo === '저는' || subjectKo === '나는') return 'i';
    if(subjectKo === '우리는') return 'we';
    return 'third';

  function finiteVerbText(verbItem, lang, subjectKo){
    if(!verbItem) return '';
    const hit = VERB_FINITE_MAP[verbItem.ko];
    const role = subjectRoleFromKo(subjectKo || '');
    if(hit && hit[lang] && hit[lang][role]) return hit[lang][role];
    return lang === 'en'
      ? (verbItem.en || verbItem.ro || verbItem.ko || '')
      : (verbItem.ro || verbItem.en || verbItem.ko || '');
  }

  function renderVerbKo(clause){
    if(!clause.verb) return '';
    const cKey = connectorKey(clause.connector);
    if(clause.verb.forms && clause.verb.forms[cKey]) return clause.verb.forms[cKey];
    return clause.verb.final || clause.verb.ko || '';
  }

  function buildKoreanClause(clause){
    const out = [];

    if(clause.topic && clause.topic.ko) out.push(clause.topic.ko);

    if(clause.associate && clause.associate.ko){
      out.push(removeTopicParticle(clause.associate.ko) + '하고');
    }

    if(clause.time && clause.time.ko) out.push(clause.time.ko);
    if(clause.departure && clause.departure.ko) out.push(clause.departure.ko);
    if(clause.transit && clause.transit.ko) out.push(clause.transit.ko);
    if(clause.numeral && clause.numeral.ko) out.push(clause.numeral.ko);
    if(clause.quantifier && clause.quantifier.ko) out.push(clause.quantifier.ko);
    if(clause.object1 && clause.object1.ko) out.push(clause.object1.ko);

    if(clause.beneficiary && clause.beneficiary.ko){
      out.push(removeTopicParticle(clause.beneficiary.ko) + '에게');
    }

    if(clause.object2 && clause.object2.ko) out.push(clause.object2.ko);
    if(clause.adverb && clause.adverb.ko) out.push(clause.adverb.ko);

    const verbKo = renderVerbKo(clause);
    if(verbKo) out.push(verbKo);

    return cleanSentenceText(out.join(' '));
  }

  function buildTranslationClause(clause){
    const out = [];

    if(clause.topic) out.push(translationOf(clause.topic));

    if(clause.associate){
      out.push(state.lang === 'en'
        ? ('with ' + (clause.associate.en || clause.associate.ro || clause.associate.ko))
        : ('cu ' + (clause.associate.ro || clause.associate.en || clause.associate.ko)));
    }

    if(clause.time) out.push(translationOf(clause.time));
    if(clause.departure) out.push(translationOf(clause.departure));
    if(clause.transit) out.push(translationOf(clause.transit));
    if(clause.numeral) out.push(translationOf(clause.numeral));
    if(clause.quantifier) out.push(translationOf(clause.quantifier));
    if(clause.object1) out.push(translationOf(clause.object1));

    if(clause.beneficiary){
      out.push(state.lang === 'en'
        ? ('for ' + (clause.beneficiary.en || clause.beneficiary.ro || clause.beneficiary.ko))
        : ('pentru ' + (clause.beneficiary.ro || clause.beneficiary.en || clause.beneficiary.ko)));
    }

    if(clause.object2) out.push(translationOf(clause.object2));
    if(clause.adverb) out.push(translationOf(clause.adverb));

    if(clause.verb){
      const subjectKo = clause.topic ? clause.topic.ko : '';
      out.push(finiteVerbText(clause.verb, state.lang, subjectKo));
    }

    return cleanSentenceText(out.join(' '));
  }

  function buildFullOutput(){
    const ko = [];
    const tr = [];

    state.clauses.forEach(function(clause){
      const lineKo = buildKoreanClause(clause);
      const lineTr = buildTranslationClause(clause);
      if(lineKo) ko.push(lineKo);
      if(lineTr) tr.push(lineTr);
    });

    return {
      korean: cleanSentenceText(ko.join(' ')),
      translation: cleanSentenceText(tr.join(', '))
    };
  }

  function renderPreview(){
    if(!DOM.sentenceWords || !DOM.translationText) return;

    const built = buildFullOutput();
    const korean = built.korean || buildKoreanClause(makeDefaultClause());
    const words = korean.split(/\s+/).filter(Boolean);

    DOM.sentenceWords.innerHTML = words.map(function(word){
      return '<span class="word">' + escapeHtml(word) + '</span>';
    }).join('');

    DOM.translationText.textContent = built.translation || currentUI().defaultTranslation;
  }

  function cellDisplayValue(item, fieldKey){
    if(!item) return TABLE_PLACEHOLDER_KO[fieldKey] || '선택';
    return item.ko || TABLE_PLACEHOLDER_KO[fieldKey] || '선택';
  }

  function cellDisplayMeta(item){
    if(!item) return '클릭하여 선택';
    return translationOf(item) || '선택됨';
  }

  function renderCell(clauseIndex, col){
    const clause = state.clauses[clauseIndex];
    const item = clause[col.key];
    const value = cellDisplayValue(item, col.key);
    const meta = cellDisplayMeta(item);

    return `
      <div class="tableField">
        <button
          type="button"
          class="tableMainBtn ${item ? '' : 'is-empty'}"
          data-open-picker="${clauseIndex}:${col.key}"
          data-kind="${escapeHtml(col.kind)}"
        >
          <div class="tableMeta">${escapeHtml(TABLE_HEADERS_KO[col.key])}</div>
          <div class="tableValue">${escapeHtml(value || '—')}</div>
          <div class="tableMeta">${escapeHtml(meta || '')}</div>
          ${item ? '<div class="tablePickedDot">✓</div>' : ''}
        </button>
      </div>
    `;
  }

  function renderClauses(){
    if(!DOM.clauseList) return;

    const cols = getVisibleColumns();
    let html = '<div class="builderTableWrap"><table class="builderTable"><thead><tr>';

    cols.forEach(function(col){
      html += '<th>' + escapeHtml(TABLE_HEADERS_KO[col.key]) + '</th>';
    });

    html += '</tr></thead><tbody>';

    state.clauses.forEach(function(clause, clauseIndex){
      html += '<tr>';
      cols.forEach(function(col){
        html += '<td>' + renderCell(clauseIndex, col) + '</td>';
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    DOM.clauseList.innerHTML = html;
  }

  function updateLangButtons(){
    if(DOM.btnRo) DOM.btnRo.classList.toggle('active', state.lang === 'ro');
    if(DOM.btnEn) DOM.btnEn.classList.toggle('active', state.lang === 'en');
    if(DOM.freeText) DOM.freeText.placeholder = currentUI().placeholder;
    const label = DOM.recordBox && DOM.recordBox.querySelector('.recordedLabel');
    if(label) label.textContent = currentUI().recordedLabel;
  }

  function updateLevelButtons(){
    if(DOM.topicSummaryText){
      DOM.topicSummaryText.textContent = 'T' + state.level + ' ▾';
    }

    if(DOM.topicDropdown){
      DOM.topicDropdown.querySelectorAll('.topicOption').forEach(function(btn){
        btn.classList.toggle('active', Number(btn.getAttribute('data-level')) === state.level);
      });
    }
  }

  function renderAll(){
    updateLangButtons();
    updateLevelButtons();
    renderPreview();
    renderClauses();
  }

  function setLang(lang){
    state.lang = lang === 'en' ? 'en' : 'ro';
    renderAll();
  }

  function setLevel(level){
    level = Number(level);
    if(!level || level < 1 || level > 6) level = 1;
    state.level = level;
    renderAll();
  }

  function syncClauseCount(){
    let required = 1;

    state.clauses.forEach(function(clause){
      if(clause.connector && connectorKey(clause.connector) !== 'none'){
        required += 1;
      }
    });

    while(state.clauses.length < required){
      const newClause = makeClause();
      newClause.verb = normalizeVocabItem(DATA.verb[0], 'verb', 0);
      newClause.connector = normalizeVocabItem(DATA.connector[0], 'connector', 0);
      state.clauses.push(newClause);
    }

    while(state.clauses.length > required){
      state.clauses.pop();
    }

    if(!state.clauses.length){
      state.clauses = [makeDefaultClause()];
    }
  }

  function matchEntry(text, item){
    const hay = [
      item.ko || '',
      item.ro || '',
      item.en || '',
      item.key || '',
      item.id || ''
    ].concat(item.aliases || []).join(' ');
    return normalizeLoose(hay) && normalizeLoose(text).includes(normalizeLoose(hay));
  }

  function findBestMatch(fieldKey, text){
    const options = getOptionsForField(fieldKey).filter(function(item){
      return item && (item.ko || item.ro || item.en);
    });

    const normalizedText = normalizeLoose(text);
    if(!normalizedText) return null;

    let best = null;
    let bestLength = 0;

    options.forEach(function(item){
      const candidates = [
        item.ko || '',
        item.ro || '',
        item.en || '',
        item.key || ''
      ].concat(item.aliases || []);

      candidates.forEach(function(candidate){
        const c = normalizeLoose(candidate);
        if(c && normalizedText.includes(c) && c.length > bestLength){
          best = item;
          bestLength = c.length;
        }
      });
    });

    return best;
  }

  function splitIntoSegments(text){
    const normalized = normalizeLoose(text);
    if(!normalized) return [{ text:'', connector:'none' }];

    let working = ' ' + normalized + ' ';
    const connectorDefs = DATA.connector.filter(function(item){
      return item.key !== 'none';
    });

    connectorDefs.forEach(function(conn){
      (conn.aliases || []).forEach(function(alias){
        const clean = normalizeLoose(alias);
        if(clean){
          working = working.split(' ' + clean + ' ').join(' |||' + conn.key + '||| ');
        }
      });
    });

    working = working.replace(/,/g, ' |||none||| ');

    const rawParts = working.split('|||');
    const segments = [];
    let currentText = '';

    rawParts.forEach(function(part){
      const p = String(part || '').trim();
      if(!p) return;

      const isConnector = DATA.connector.some(function(conn){
        return conn.key === p;
      });

      if(isConnector){
        segments.push({ text: currentText.trim(), connector: p });
        currentText = '';
      }else{
        currentText = currentText ? (currentText + ' ' + p) : p;
      }
    });

    if(currentText.trim()){
      segments.push({ text: currentText.trim(), connector:'none' });
    }

    return segments.length ? segments : [{ text: normalized, connector:'none' }];
  }

  function parseTextIntoClauses(){
    const raw = state.text || '';
    if(!String(raw).trim()){
      state.clauses = [makeDefaultClause()];
      renderAll();
      return;
    }

    const segments = splitIntoSegments(raw);
    const clauses = segments.map(function(seg, index){
      const clause = makeClause();
      clause.sourceText = seg.text || '';

      clause.topic = findBestMatch('topic', seg.text) || (index === 0 ? normalizeVocabItem(DATA.subject[0], 'subject', 0) : null);
      clause.associate = findBestMatch('associate', seg.text);
      clause.time = findBestMatch('time', seg.text);
      clause.departure = findBestMatch('departure', seg.text);
      clause.transit = findBestMatch('transit', seg.text);
      clause.numeral = findBestMatch('numeral', seg.text);
      clause.quantifier = findBestMatch('quantifier', seg.text);
      clause.object1 = findBestMatch('object1', seg.text);
      clause.beneficiary = findBestMatch('beneficiary', seg.text);
      clause.object2 = findBestMatch('object2', seg.text);
      clause.adverb = findBestMatch('adverb', seg.text);
      clause.verb = findBestMatch('verb', seg.text) || normalizeVocabItem(DATA.verb[0], 'verb', 0);

      const connectorItem = DATA.connector.find(function(item){
        return item.key === seg.connector;
      }) || DATA.connector[0];
      clause.connector = normalizeVocabItem(connectorItem, 'connector', 0);

      return clause;
    });

    state.clauses = clauses.length ? clauses.map(ensureClauseShape) : [makeDefaultClause()];
    syncClauseCount();
    renderAll();
  }
function ensureVocabSheet(){
  if (document.getElementById('vocabSheet')) return;

  const el = document.createElement('div');
  el.id = 'vocabSheet';
  el.className = 'vocabSheet';

  el.innerHTML = `
    <div class="vocabSheetBackdrop" data-close-vocab="1"></div>
    <div class="vocabSheetPanel">
      <div class="vocabSheetHead">
        <div class="vocabSheetTitle" id="vocabSheetTitle">선택</div>
        <button type="button" class="vocabSheetClose" id="vocabSheetClose" aria-label="Close">✕</button>
      </div>
      <input
        id="vocabSheetSearch"
        class="vocabSheetSearch"
        type="text"
        placeholder="검색"
      >
      <div id="vocabSheetList" class="vocabSheetList"></div>
    </div>
  `;

  document.body.appendChild(el);
}





  
  function renderVocabSheetList(items){
    const list = document.getElementById('vocabSheetList');
    if(!list) return;

    pickerState.filteredItems = items.slice();

    if(!items.length){
      list.innerHTML = '<div class="vocabEmpty">항목이 없습니다</div>';
      return;
    }

    list.innerHTML = items.map(function(item, index){
      const meta = [item.ro, item.en].filter(Boolean).join(' · ');
      return `
        <button type="button" class="vocabItem" data-pick-index="${index}">
          <div class="vocabItemKo">${escapeHtml(item.ko || '—')}</div>
          <div class="vocabItemMeta">${escapeHtml(meta)}</div>
        </button>
      `;
    }).join('');
  }

  function filterVocabSheet(keyword){
    const q = normalizeLoose(keyword);
    if(!q){
      renderVocabSheetList(pickerState.items);
      return;
    }

    const filtered = pickerState.items.filter(function(item){
      const hay = [
        item.ko || '',
        item.ro || '',
        item.en || '',
        item.key || '',
        item.id || ''
      ].concat(item.aliases || []).join(' ');
      return normalizeLoose(hay).includes(q);
    });

    renderVocabSheetList(filtered);
  }

  function openVocabSheet(clauseIndex, fieldKey){
    ensureVocabSheet();

    pickerState.clauseIndex = clauseIndex;
    pickerState.fieldKey = fieldKey;
    pickerState.items = getOptionsForField(fieldKey);

    const root = document.getElementById('vocabSheet');
    const title = document.getElementById('vocabSheetTitle');
    const search = document.getElementById('vocabSheetSearch');

    if(title) title.textContent = TABLE_HEADERS_KO[fieldKey] || '선택';
    if(search) search.value = '';

    renderVocabSheetList(pickerState.items);

    if(root) root.classList.add('open');
    if(search){
      setTimeout(function(){
        search.focus();
      }, 0);
    }
  }

  function closeVocabSheet(){
    const root = document.getElementById('vocabSheet');
    if(root) root.classList.remove('open');
  }

  function pickItem(index){
    const item = pickerState.filteredItems[index];
    if(!item) return;

    const clause = state.clauses[pickerState.clauseIndex];
    if(!clause) return;

    clause[pickerState.fieldKey] = item;
    syncClauseCount();
    closeVocabSheet();
    renderAll();
  }

  function playCurrent(){
    const built = buildFullOutput();

    if(!built.korean){
      showToast(currentUI().noSpeech);
      return;
    }

    if(!('speechSynthesis' in window)){
      showToast(currentUI().noSpeech);
      return;
    }

    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(built.korean);
    utter.lang = 'ko-KR';
    utter.rate = 0.9;

    let activeIndex = -1;
    const wordEls = DOM.sentenceWords ? DOM.sentenceWords.querySelectorAll('.word') : [];

    utter.onboundary = function(event){
      if(typeof event.charIndex !== 'number') return;
      activeIndex += 1;
      for(let i=0;i<wordEls.length;i++){
        wordEls[i].classList.toggle('active', i === activeIndex);
      }
    };

    utter.onend = function(){
      for(let i=0;i<wordEls.length;i++){
        wordEls[i].classList.remove('active');
      }
    };

    window.speechSynthesis.speak(utter);
  }

  function detectMimeType(){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported){
      if(MediaRecorder.isTypeSupported('audio/mp4;codecs=mp4a.40.2')) return 'audio/mp4;codecs=mp4a.40.2';
      if(MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
      if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
      if(MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
    }
    return '';
  }

  function toggleRecording(){
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || typeof MediaRecorder === 'undefined'){
      showToast(currentUI().recordUnsupported);
      return;
    }

    if(mediaRecorder && mediaRecorder.state === 'recording'){
      mediaRecorder.stop();
      if(DOM.recordBtn) DOM.recordBtn.classList.remove('recording');
      showToast(currentUI().recordStop);
      return;
    }

    navigator.mediaDevices.getUserMedia({ audio:true }).then(function(stream){
      recordedChunks = [];
      recordedStream = stream;

      const mime = detectMimeType();
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType:mime }) : new MediaRecorder(stream);

      mediaRecorder.ondataavailable = function(event){
        if(event.data && event.data.size > 0) recordedChunks.push(event.data);
      };

      mediaRecorder.onstop = function(){
        const blobType = mime || (recordedChunks[0] && recordedChunks[0].type) || 'audio/webm';
        const blob = new Blob(recordedChunks, { type:blobType });

        if(recordedUrl) URL.revokeObjectURL(recordedUrl);
        recordedUrl = URL.createObjectURL(blob);

        if(DOM.recordedAudio){
          DOM.recordedAudio.pause();
          DOM.recordedAudio.removeAttribute('src');
          DOM.recordedAudio.src = recordedUrl;
          DOM.recordedAudio.load();
        }

        if(DOM.recordBox) DOM.recordBox.classList.add('show');

        if(recordedStream){
          const tracks = recordedStream.getTracks();
          for(let i=0;i<tracks.length;i++) tracks[i].stop();
          recordedStream = null;
        }
      };

      mediaRecorder.start();
      if(DOM.recordBtn) DOM.recordBtn.classList.add('recording');
      showToast(currentUI().recordStart);
    }).catch(function(){
      showToast(currentUI().recordUnsupported);
    });
  }

  function resetBuilder(){
    state.text = '';
    if(DOM.freeText) DOM.freeText.value = '';
    state.clauses = [makeDefaultClause()];
    if(DOM.recordBox) DOM.recordBox.classList.remove('show');
    if(DOM.recordedAudio){
      DOM.recordedAudio.pause();
      DOM.recordedAudio.removeAttribute('src');
      DOM.recordedAudio.load();
    }
    renderAll();
  }

  function bindEvents(){
    if(DOM.btnRo){
      DOM.btnRo.addEventListener('click', function(){
        setLang('ro');
      });
    }

    if(DOM.btnEn){
      DOM.btnEn.addEventListener('click', function(){
        setLang('en');
      });
    }

    if(DOM.topicDropdown){
      DOM.topicDropdown.addEventListener('click', function(event){
        const btn = event.target.closest('.topicOption');
        if(!btn) return;
        setLevel(btn.getAttribute('data-level'));
        const details = document.getElementById('topicMenu');
        if(details) details.removeAttribute('open');
      });
    }

    if(DOM.freeText){
      DOM.freeText.addEventListener('input', function(){
        state.text = DOM.freeText.value || '';
        parseTextIntoClauses();
      });
    }

    if(DOM.refreshBtn){
      DOM.refreshBtn.addEventListener('click', function(){
        resetBuilder();
      });
    }

    if(DOM.playBtn){
      DOM.playBtn.addEventListener('click', function(){
        playCurrent();
      });
    }

    if(DOM.recordBtn){
      DOM.recordBtn.addEventListener('click', function(){
        toggleRecording();
      });
    }

    if(DOM.sentenceBox){
      DOM.sentenceBox.addEventListener('click', function(){
        playCurrent();
      });

      DOM.sentenceBox.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          playCurrent();
        }
      });
    }

    if(DOM.clauseList){
      DOM.clauseList.addEventListener('click', function(event){
        const openBtn = event.target.closest('[data-open-picker]');
        if(openBtn){
          event.preventDefault();
          const parts = openBtn.getAttribute('data-open-picker').split(':');
          openVocabSheet(Number(parts[0]), parts[1]);
        }
      });
    }

    document.addEventListener('click', function(event){
      const closeBtn = event.target.closest('#vocabSheetClose, [data-close-vocab]');
      if(closeBtn){
        closeVocabSheet();
        return;
      }

      const pickBtn = event.target.closest('[data-pick-index]');
      if(pickBtn){
        pickItem(Number(pickBtn.getAttribute('data-pick-index')));
      }
    });

    document.addEventListener('input', function(event){
      if(event.target && event.target.id === 'vocabSheetSearch'){
        filterVocabSheet(event.target.value || '');
      }
    });

    document.addEventListener('keydown', function(event){
      if(event.key === 'Escape'){
        closeVocabSheet();
      }
    });
  }

  function init(){
    ensureVocabSheet();
    state.clauses = [makeDefaultClause()];

    if(DOM.freeText) DOM.freeText.value = '';
    if(DOM.recordBox) DOM.recordBox.classList.remove('show');

    bindEvents();
    setLevel(1);
    setLang('ro');
    renderAll();

    window.ralucaBuilderState = state;
    window.renderBuilderAll = renderAll;
  }

  init();
})();
