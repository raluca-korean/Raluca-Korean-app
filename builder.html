<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Morphic Syntax Field</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#db2777">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./theme-anime.css">
  <link rel="stylesheet" href="./builder.css">
</head>
<body>

<div class="msf-root">

  <!-- ░░░ LIVING FIELD BACKGROUND (same as exercises page) ░░░ -->
  <div class="lmn-field" aria-hidden="true">
    <div class="lmn-orb lmn-orb-1"></div>
    <div class="lmn-orb lmn-orb-2"></div>
    <div class="lmn-orb lmn-orb-3"></div>
    <div class="lmn-orb lmn-orb-4"></div>
    <div class="lmn-orb lmn-orb-5"></div>
  </div>

  <!-- ░░░ NAVIGATION MEMBRANE ░░░ -->
  <nav class="msf-nav">
    <a href="index.html" class="homeBtn" aria-label="Acasă">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="msf-nav-brand">
      <span class="msf-nav-glyph">韓</span>
      <div class="msf-nav-identity">
        <span class="msf-nav-sub">MORPHIC SYNTAX FIELD</span>
      </div>
    </div>
    <div class="msf-nav-controls">
      <!-- data-no-home prevents lang-picker.js from injecting a duplicate home button -->
      <div id="pageControls" class="msf-lang-zone" data-no-home></div>

      <details class="msf-selector" id="templateMenu">
        <summary class="msf-selector-trigger msf-tpl-trigger">
          <span id="templateSummaryText">S+V ▾</span>
        </summary>
        <div class="msf-selector-panel" id="templateDropdown"></div>
      </details>

      <details class="msf-selector" id="topicMenu">
        <summary class="msf-selector-trigger msf-lvl-trigger">
          <span id="topicSummaryText">T1 ▾</span>
        </summary>
        <div class="msf-selector-panel msf-lvl-panel" id="topicDropdown">
          <button class="topicOption" data-level="1" type="button">T1</button>
          <button class="topicOption" data-level="2" type="button">T2</button>
          <button class="topicOption" data-level="3" type="button">T3</button>
          <button class="topicOption" data-level="4" type="button">T4</button>
          <button class="topicOption" data-level="5" type="button">T5</button>
          <button class="topicOption" data-level="6" type="button">T6</button>
        </div>
      </details>
    </div>
  </nav>

  <!-- ░░░ FREE TEXT INPUT WELL — first below nav ░░░ -->
  <div class="msf-text-well">
    <div class="txtCollapsible msf-text-panel" id="txtCollapsible">
      <textarea
        id="freeText"
        class="msf-free-textarea"
        placeholder="Scrie o propoziție în română sau engleză..."
        autocomplete="off"
        autocapitalize="sentences"
        spellcheck="false"
      ></textarea>
    </div>
  </div>

  <!-- ░░░ CRYSTAL SPINE — Sentence Crystallization Zone ░░░ -->
  <div class="msf-crystal-spine">
    <div class="msf-spine-aura" aria-hidden="true"></div>

    <div class="msf-spine-body">
      <div class="sentenceBox msf-sentence-vessel"
           id="sentenceBox"
           tabindex="0"
           role="button"
           aria-label="Ascultă propoziția">
        <div class="sentenceWords msf-word-stream" id="sentenceWords"></div>
        <div class="msf-vessel-hint" aria-hidden="true">construiește în câmpul de mai jos →</div>
      </div>

      <div class="translationText msf-translation-layer"
           id="translationText"
           contenteditable="true"
           spellcheck="false"
           data-placeholder="traducere..."></div>
    </div>

    <div class="msf-spine-actions">
      <button class="msf-act" id="playBtn" type="button" title="Ascultă" aria-label="Ascultă">
        <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="msf-act msf-act-rec" id="recordBtn" type="button" title="Înregistrează" aria-label="Înregistrează">
        <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><circle cx="12" cy="12" r="7"/></svg>
      </button>
      <button class="msf-act" id="saveBtn" type="button" title="Salvează" aria-label="Salvează">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button class="msf-act msf-act-quiz" id="quizBtn" type="button" title="Quiz" aria-label="Quiz">
        <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      </button>
      <button class="msf-act msf-act-reset" id="refreshBtn" type="button" title="Resetează" aria-label="Resetează">
        <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
  </div>

  <!-- ░░░ QUIZ FIELD ░░░ -->
  <div class="quizBar msf-quiz-field" id="quizBar">
    <div class="msf-quiz-inner">
      <div class="quizLabel msf-quiz-label" id="quizLabelEl"></div>
      <div class="quizTargetTr msf-quiz-target" id="quizTargetTr"></div>
      <div class="msf-quiz-controls">
        <button class="tinyBtn quizCheckBtn" id="quizCheckBtn" type="button"></button>
        <button class="tinyBtn quizExitBtn" id="quizExitBtn" type="button"></button>
      </div>
      <div class="quizResultEl msf-quiz-result" id="quizResultEl"></div>
    </div>
  </div>

  <!-- ░░░ GRAMMAR FIELD — The Resonance Assembly Zone ░░░ -->
  <section class="msf-grammar-field" aria-label="Grammar Field">
    <div class="msf-field-header" aria-hidden="true">
      <div class="msf-field-signature">
        <span class="msf-sig-ko">문법 필드</span>
        <span class="msf-sig-divider"></span>
        <span class="msf-sig-en">RESONANCE ASSEMBLY</span>
      </div>
      <div class="msf-field-legend">
        <span class="msf-legend-dot" style="--lc: var(--c-subject)"></span>
        <span class="msf-legend-dot" style="--lc: var(--c-time)"></span>
        <span class="msf-legend-dot" style="--lc: var(--c-location)"></span>
        <span class="msf-legend-dot" style="--lc: var(--c-object)"></span>
        <span class="msf-legend-dot" style="--lc: var(--c-verb)"></span>
        <span class="msf-legend-dot" style="--lc: var(--c-connector)"></span>
      </div>
    </div>
    <div class="msf-nodes-viewport">
      <div class="clauseList msf-clause-plasma" id="clauseList"></div>
      <div class="tableFadeRight msf-fade-right" id="tableFadeRight"></div>
    </div>
  </section>

  <!-- ░░░ RECORDING CHAMBER ░░░ -->
  <div class="recordBox msf-record-chamber" id="recordBox">
    <div class="recordedLabel msf-record-label">Înregistrarea ta</div>
    <audio id="recordedAudio" controls playsinline></audio>
  </div>

  <!-- ░░░ MEMORY ARCHIVE — Saved Sentences ░░░ -->
  <section class="savedPanel msf-memory-archive" id="savedPanel">
    <div class="msf-archive-header">
      <div class="msf-archive-title-row">
        <span class="msf-archive-icon" aria-hidden="true">◈</span>
        <span id="savedTitle" class="msf-archive-title">Propoziții salvate</span>
      </div>
      <button class="msf-archive-export tinyBtn" id="exportBtn" type="button">⬇ .txt</button>
    </div>
    <div id="savedList" class="msf-archive-list"></div>
  </section>

</div><!-- /msf-root -->

<!-- TOAST -->
<div class="toast" id="toast" aria-live="polite"></div>

<!-- SCRIPTS (all unchanged) -->
<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/core/audio.js"></script>
<script src="./js/core/conjugation.js"></script>
<script src="./js/core/grammar.js"></script>
<script src="./js/core/vocab-data.js"></script>
<script src="./js/core/vocabulary.js"></script>
<script src="./js/core/translations.js"></script>
<script src="./js/core/sentence-builder.js"></script>
<script src="./js/core/parser.js"></script>
<script src="./js/core/grammar-color.js?v=18"></script>
<script src="./js/builder.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
