<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
    :root{
      --bg:#f6f7fd;
      --bg2:#eef2ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.08);
      --line2:rgba(15,23,42,.14);
      --primary:#6d5efc;
      --primary2:#8b5cf6;
      --shadow:0 16px 40px rgba(15,23,42,.07);
      --shadow-sm:0 8px 20px rgba(15,23,42,.05);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:16px;
      --transition:180ms ease;
      --c-relative:#f4e0ff;
      --c-subject:#dcecff;
      --c-time:#ffe8be;
      --c-location:#dff7df;
      --c-object:#ffdede;
      --c-description:#ece8ff;
      --c-verb:#ffe9cf;
      --c-connector:#e4ddff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,94,252,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(139,92,246,.10), transparent 22%),
        linear-gradient(180deg,var(--bg2) 0%, var(--bg) 34%, #fbfcfe 100%);
      padding:16px;
    }
    .app{max-width:1180px;margin:0 auto}
    .panel{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .title{margin:0;font-size:clamp(16px,2vw,24px);line-height:1.1;letter-spacing:-.02em;font-weight:900}
    .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pill,.tinyBtn,.topicOption,.iconBtn,.tableToggle,.tableMainBtn{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      font:inherit;
      transition:transform var(--transition),box-shadow var(--transition),background var(--transition),border-color var(--transition),opacity var(--transition),color var(--transition)
    }
    .pill:hover,.tinyBtn:hover,.topicOption:hover,.iconBtn:hover,.tableToggle:hover,.tableMainBtn:hover{transform:translateY(-1px)}
    .pill,.tinyBtn,.iconBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      font-weight:800
    }
    .pill{padding:9px 13px;font-size:13px;min-height:40px}
    .pill.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 14px 24px rgba(109,94,252,.22)}
    .tinyBtn{padding:8px 12px;font-size:12px;min-height:36px}
    .iconBtn{width:40px;height:40px;padding:0;font-size:15px;cursor:pointer}
    .iconBtn.recording{color:#fff;border-color:transparent;background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 14px 24px rgba(220,38,38,.22)}

    .topicMenu{position:relative}
    .topicMenu summary{list-style:none;cursor:pointer}
    .topicMenu summary::-webkit-details-marker{display:none}
    .topicBubble{
      display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:8px 12px;border-radius:999px;
      font-size:12px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 24px rgba(109,94,252,.22);user-select:none
    }
    .topicDot{width:7px;height:7px;border-radius:999px;background:#fff;opacity:.95;flex:0 0 auto}
    .topicDropdown{
      position:absolute;right:0;top:calc(100% + 9px);z-index:30;min-width:160px;display:grid;gap:7px;padding:10px;
      border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow-sm)
    }
    .topicOption{
      cursor:pointer;text-align:left;padding:10px 11px;border-radius:12px;background:#fff;border:1px solid var(--line);
      font-size:13px;font-weight:800;color:var(--text)
    }
    .topicOption.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary2))}

    textarea{
      width:100%;
      min-height:96px;
      resize:vertical;
      border:1px solid var(--line2);
      border-radius:18px;
      padding:15px 16px;
      background:#fff;
      color:var(--text);
      outline:none;
      font:inherit;
      font-size:18px;
      font-weight:800;
      line-height:1.5;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55)
    }
    textarea:focus{border-color:rgba(109,94,252,.42);box-shadow:0 0 0 4px rgba(109,94,252,.08)}

    .previewBar{display:flex;justify-content:flex-end;margin-bottom:12px}
    .previewTools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sentenceBox{
      width:100%;
      border:1px solid rgba(109,94,252,.12);
      border-radius:18px;
      background:radial-gradient(circle at top left, rgba(109,94,252,.10), transparent 42%),linear-gradient(180deg,#fff 0%,#f8fafc 100%);
      padding:16px;
      box-shadow:var(--shadow-sm);
      cursor:pointer
    }
    .sentenceWords{display:flex;flex-wrap:wrap;gap:6px 8px;min-height:40px;align-items:center}
    .word{
      font-size:clamp(22px,3.2vw,34px);
      line-height:1.12;
      font-weight:900;
      letter-spacing:-.02em;
      color:#2563eb;
      padding:2px 4px;
      border-radius:10px;
      transition:background var(--transition), box-shadow var(--transition), transform var(--transition)
    }
    .word.active{
      background:linear-gradient(135deg, rgba(109,94,252,.16), rgba(139,92,246,.10));
      box-shadow:0 8px 18px rgba(109,94,252,.10);
      transform:translateY(-1px)
    }

    .translationBox{
      margin-top:12px;
      width:100%;
      min-height:58px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:14px 16px;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      display:flex;
      align-items:center
    }
    .translationText{font-size:18px;line-height:1.5;font-weight:800}

    .recordBox{margin-top:12px;display:none}
    .recordBox.show{display:block}
    .recordedLabel{
      font-size:12px;font-weight:900;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px
    }
    audio{width:100%;display:block;border-radius:14px}

    .clauseList{display:block}
    .builderTableWrap{
      width:100%;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:20px;
      background:#fff;
      box-shadow:var(--shadow-sm);
    }
    .builderTable{
      width:100%;
      min-width:1600px;
      border-collapse:separate;
      border-spacing:0;
    }
    .builderTable thead th{
      position:sticky;
      top:0;
      z-index:2;
      padding:12px;
      text-align:left;
      font-size:11px;
      line-height:1.25;
      letter-spacing:.11em;
      text-transform:uppercase;
      font-weight:900;
      color:#475569;
      background:linear-gradient(180deg,#fafbff,#f3f5ff);
      border-bottom:1px solid rgba(15,23,42,.08);
      white-space:nowrap;
    }
    .builderTable tbody td{
      padding:10px;
      vertical-align:top;
      border-bottom:1px solid rgba(15,23,42,.06);
      background:#fff;
      min-width:120px;
    }
    .builderTable tbody tr:nth-child(odd) td{background:#fcfdff}
    .builderTable tbody tr:last-child td{border-bottom:none}

    .tableField{position:relative;min-height:104px;display:grid;gap:7px}
    .tableField.off{opacity:.42;filter:saturate(.86)}
    .tableToggle{
      position:absolute;top:0;right:0;width:25px;height:25px;border-radius:999px;border:1px solid rgba(15,23,42,.10);
      background:#fff;color:#64748b;cursor:pointer;display:grid;place-items:center;box-shadow:0 6px 14px rgba(15,23,42,.05);
      font-size:12px;font-weight:900;line-height:1;padding:0;z-index:2
    }
    .tableToggle.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary2))}
    .tableToggle.ghost{cursor:default;opacity:.28;border-style:dashed;box-shadow:none;pointer-events:none}
    .tableMainBtn{
      width:100%;
      min-height:104px;
      border:1px solid rgba(15,23,42,.08);
      border-radius:18px;
      background:linear-gradient(180deg,#fff,#f8fafc);
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      text-align:left;
      padding:11px 12px;
      display:grid;
      gap:7px;
      cursor:pointer;
    }
    .tableMainBtn[data-kind="subject"]{background:linear-gradient(180deg,var(--c-subject),#fff)}
    .tableMainBtn[data-kind="time"]{background:linear-gradient(180deg,var(--c-time),#fff)}
    .tableMainBtn[data-kind="location"]{background:linear-gradient(180deg,var(--c-location),#fff)}
    .tableMainBtn[data-kind="object"]{background:linear-gradient(180deg,var(--c-object),#fff)}
    .tableMainBtn[data-kind="description"]{background:linear-gradient(180deg,var(--c-description),#fff)}
    .tableMainBtn[data-kind="verb"]{background:linear-gradient(180deg,var(--c-verb),#fff)}
    .tableMainBtn[data-kind="connector"]{background:linear-gradient(180deg,var(--c-connector),#fff)}

    .tableValue{
      font-size:21px;
      line-height:1.06;
      font-weight:900;
      letter-spacing:-.02em;
      color:#0f172a;
      word-break:keep-all;
      margin-top:auto;
    }
    .tableMeta{
      font-size:11px;
      line-height:1.35;
      color:#64748b;
      font-weight:800;
      min-height:14px;
    }

    .tableInputWrap{
      min-height:104px;
      border:1px solid rgba(15,23,42,.08);
      border-radius:18px;
      background:linear-gradient(180deg,#fff,#f8fafc);
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      padding:11px 12px;
      display:grid;
      gap:8px;
    }
    .tableInput{
      width:100%;
      border:1px solid rgba(15,23,42,.10);
      border-radius:12px;
      background:#fff;
      padding:10px 11px;
      font:inherit;
      font-size:15px;
      font-weight:800;
      color:var(--text);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
    }
    .tableInput:focus{border-color:rgba(109,94,252,.42);box-shadow:0 0 0 4px rgba(109,94,252,.08)}
    .tableInputMeta{
      font-size:11px;
      line-height:1.35;
      color:#64748b;
      font-weight:800;
      min-height:14px;
    }
    .tableDash{color:#94a3b8;font-weight:900}

    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(12px);min-width:min(92vw,560px);max-width:92vw;
      padding:13px 15px;border-radius:16px;background:#fff;border:1px solid rgba(15,23,42,.10);box-shadow:0 18px 40px rgba(15,23,42,.16);
      font-size:14px;line-height:1.5;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:100
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media (max-width:980px){
      .builderTable{min-width:1460px}
    }
    @media (max-width:720px){
      body{padding:12px}
      .panel{padding:13px}
      .title{font-size:16px}
      textarea{min-height:88px;font-size:16px}
      .translationText{font-size:16px}
      .word{font-size:20px}
      .tableValue{font-size:18px}
      .builderTable thead th,.builderTable tbody td{padding:9px}
      .builderTable{min-width:1340px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="topbar">
        <h1 class="title">Raluca Korean — Builder</h1>
        <div class="toolbar">
          <a href="./index.html" class="tinyBtn">🏠</a>
          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble">
              <span class="topicDot"></span>
              <span id="topicSummaryText">T1 ▾</span>
            </summary>
            <div class="topicDropdown" id="topicDropdown">
              <button class="topicOption" data-level="1" type="button">T1</button>
              <button class="topicOption" data-level="2" type="button">T2</button>
              <button class="topicOption" data-level="3" type="button">T3</button>
              <button class="topicOption" data-level="4" type="button">T4</button>
              <button class="topicOption" data-level="5" type="button">T5</button>
              <button class="topicOption" data-level="6" type="button">T6</button>
            </div>
          </details>
          <button id="btnRo" class="pill active" type="button">RO</button>
          <button id="btnEn" class="pill" type="button">EN</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <textarea id="freeText" placeholder="Scrie aici o propoziție sau un lanț de propoziții..."></textarea>
    </section>

    <section class="panel">
      <div class="previewBar">
        <div class="previewTools">
          <button class="iconBtn" id="refreshBtn" type="button" title="Refresh">↻</button>
          <button class="iconBtn" id="playBtn" type="button" title="Ascultă propoziția">🔊</button>
          <button class="iconBtn" id="recordBtn" type="button" title="Înregistrează vocea">🎤</button>
        </div>
      </div>
      <div class="sentenceBox" id="sentenceBox" tabindex="0" role="button" aria-label="Play sentence">
        <div class="sentenceWords" id="sentenceWords"></div>
      </div>
      <div class="translationBox">
        <div class="translationText" id="translationText"></div>
      </div>
      <div class="recordBox" id="recordBox">
        <div class="recordedLabel">Înregistrarea ta</div>
        <audio id="recordedAudio" controls playsinline></audio>
      </div>
    </section>

    <section class="panel">
      <div class="clauseList" id="clauseList"></div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  function normalizeLatin(str){
    return String(str || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function hasHangul(str){

  }

      .replace(/\s+/g, ' ')
      .replace(/\s+([,.!?])/g, '$1')
      .trim();
  }

  function escapeHtml(str){
    return String(str || '')
      .replace(/&/g,'&amp;')

      .replace(/>/g,'&gt;')

      .replace(/'/g,'&#039;');
  }

    var idx = Number(clause[fieldKey].index) || 0;
    if(idx < 0 || idx >= list.length) idx = 0;
    return list[idx];
  }

      if(!value) continue;
      if(textFold.indexOf(normalizeLatin(value)) !== -1) return true;

    return false;
  }

      if(raw.indexOf(qs[i]) !== -1) return qs[i];
    }
    return '';
  }

  function inferAssociate(text){
    var raw = normalizeLatin(text);
    var m = raw.match(/\b(?:cu|impreuna cu)\s+([a-z0-9\s]+?)(?=\b(?:azi|astazi|ieri|maine|la|in|pe|pentru|ca sa|si|iar|dar)\b|$)/);
    return m ? m[1].trim() : '';
  }

  function inferTransit(text){
    var raw = normalizeLatin(text);
    var m = raw.match(/\b(?:prin|pe la|via)\s+([a-z0-9\s]+?)(?=\b(?:si|iar|dar|pentru|ca sa|apoi)\b|$)/);
    return m ? m[1].trim() : '';
  }

  function inferBeneficiary(text){
    var raw = normalizeLatin(text);
    var m = raw.match(/\b(?:pentru)\s+([a-z0-9\s]+?)(?=\b(?:si|iar|dar|ca sa|apoi)\b|$)/);
    return m ? m[1].trim() : '';
  }

  function inferObject2(text){
    var raw = normalizeLatin(text);
    var list = DATA.object;
    var found = [];
    for(var i=1;i<list.length;i++){
      if(matchEntry(raw, list[i])) found.push(list[i]);
    }
    if(found.length > 1){
      return state.lang === 'en' ? (found[1].en || found[1].ro || '') : (found[1].ro || found[1].en || '');
    }
    return '';
  }

  function splitIntoSegments(text){
    var working = ' ' + normalizeLatin(text) + ' ';
    var markers = [
      {key:'cause1', phrases:['pentru ca','because']},
      {key:'cause2', phrases:['fiindca','since']},
      {key:'condition', phrases:['daca','if']},
      {key:'contrast1', phrases:['dar','insa','but','however']},
      {key:'contrast2', phrases:['iar','while']},
      {key:'purpose', phrases:['ca sa','in order to']},
      {key:'seq', phrases:['si apoi','and then','si','and','apoi']}
    ];

    for(var i=0;i<markers.length;i++){
      for(var j=0;j<markers[i].phrases.length;j++){
        var phrase = markers[i].phrases[j];
        working = working.split(' ' + phrase + ' ').join(' |||' + markers[i].key + '||| ');
      }
    }

    working = working.replace(/,/g, ' |||none||| ');

    var parts = working.split('|||');
    var segments = [];
    var currentText = '';

    for(var k=0;k<parts.length;k++){
      var part = String(parts[k] || '').trim();
      if(!part) continue;

      var isConnector = false;
      for(var c=0;c<DATA.connector.length;c++){
        if(DATA.connector[c].key === part){
          isConnector = true;
          break;
        }
      }

      if(!isConnector){
        currentText = currentText ? currentText + ' ' + part : part;
      }else{
        segments.push({ text: currentText.trim(), connector: part });
        currentText = '';
      }
    }

    if(currentText.trim()) segments.push({ text: currentText.trim(), connector: 'none' });
    if(!segments.length) segments.push({ text: normalizeLatin(text), connector: 'none' });

    return segments;
  }

  function ensureChainLength(){
    var required = 1;
    for(var i=0;i<state.clauses.length && i<required;i++){
      if(connectorKey(state.clauses[i]) !== 'none') required += 1;
    }
    while(state.clauses.length < required){
      var prev = state.clauses[state.clauses.length - 1];
      state.clauses.push(makeClause(prev && prev.subject ? prev.subject.index : 0, false));
    }
    if(state.clauses.length > required) state.clauses = state.clauses.slice(0, required);
  }

  function parseTextIntoClauses(){
    var raw = state.text;
    if(!raw || !String(raw).trim()){
      state.clauses = [makeClause(0, true)];
      ensureChainLength();
      return;
    }

    var segments = splitIntoSegments(raw);
    var clauses = [];

    for(var i=0;i<segments.length;i++){
      var seg = segments[i];
      var prev = i > 0 ? clauses[i - 1] : null;
      var clause = makeClause(prev ? prev.subject.index : 0, i === 0);
      clause.sourceText = seg.text || '';
      clause.extras.associate = inferAssociate(seg.text);
      clause.extras.transit = inferTransit(seg.text);
      clause.extras.numeral = inferNumeral(seg.text);
      clause.extras.quantifier = inferQuantifier(seg.text);
      clause.extras.beneficiary = inferBeneficiary(seg.text);
      clause.extras.object2 = inferObject2(seg.text);

      var keys = ['subject','time','location','object','description','verb'];
      for(var f=0;f<keys.length;f++){
        var key = keys[f];
        var found = findIndexInDataset(key, seg.text);
        if(found > -1){
          clause[key].enabled = true;
          clause[key].index = found;
        }else if(key === 'verb'){
          clause.verb.enabled = true;
          clause.verb.index = prev ? prev.verb.index : 0;
        }else if(key === 'subject' && i > 0){
          clause.subject.enabled = false;
        }else{
          clause[key].enabled = false;
          clause[key].index = 0;
        }
      }

      clause.connector.enabled = true;
      clause.connector.index = connectorIndexByKey(seg.connector);
      clauses.push(clause);
    }

    state.clauses = clauses.length ? clauses : [makeClause(0, true)];
    ensureChainLength();
  }

  function randomNonZero(length){
    return length <= 1 ? 0 : Math.floor(Math.random() * (length - 1)) + 1;
  }

  function refreshSentences(){
    if(state.text && String(state.text).trim()) parseTextIntoClauses();

    for(var i=0;i<state.clauses.length;i++){
      var clause = state.clauses[i];
      var keys = ['subject','time','location','object','description','verb','connector'];
      for(var f=0;f<keys.length;f++){
        var key = keys[f];
        var list = datasetFor(key);
        if(key === 'connector'){
          clause.connector.index = i === state.clauses.length - 1 ? 0 : randomNonZero(list.length);
          continue;
        }
        if(clause[key].enabled) clause[key].index = randomNonZero(list.length);
      }
      if(i === 0) clause.subject.enabled = true;
    }

    ensureChainLength();
    renderAll();
  }

  function subjectRoleFromKo(subjectKo){
    if(subjectKo === '저는' || subjectKo === '나는') return 'i';
    if(subjectKo === '우리는') return 'we';
    return 'third';
  }

  function resolvedSubjectKo(clause, previousClause){
    var subject = itemOf(clause, 'subject');
    if(clause.subject && clause.subject.enabled && subject && subject.ko) return subject.ko;
    if(previousClause){
      var prevSubject = itemOf(previousClause, 'subject');
      if(prevSubject && prevSubject.ko) return prevSubject.ko;
    }
    return '';
  }

  function finiteVerbText(verb, lang, subjectKo){
    var hit = verb && VERB_FINITE_MAP[verb.ko];
    var role = subjectRoleFromKo(subjectKo || '');
    if(hit && hit[lang] && hit[lang][role]) return hit[lang][role];
    return verb ? (verb[lang] || '') : '';
  }

  function connectorTextByKey(key, lang){
    return CONNECTOR_TEXT_MAP[lang] && CONNECTOR_TEXT_MAP[lang][key] ? CONNECTOR_TEXT_MAP[lang][key] : '';
  }

  function fieldValueMain(clause, key, previousClause){
    var item = itemOf(clause, key);
    if(key === 'connector') return connectorTextByKey(item.key, state.lang) || '—';
    if(key === 'verb') return finiteVerbText(item, state.lang, resolvedSubjectKo(clause, previousClause)) || localizedItemText(item);
    return localizedItemText(item) || '—';
  }

  function fieldValueMeta(clause, key){
    var item = itemOf(clause, key);
    if(key === 'connector') return item.ko || '';
    if(key === 'verb'){
      var connector = itemOf(clause, 'connector');
      return clause.connector.enabled && connector.key !== 'none'
        ? (item.forms[connector.key] || item.final || item.ko)
        : (item.final || item.ko || '');
    }
    return item.ko || '';
  }

  function buildClauseRow(clause, previousClause){
    return {
      topicTr: clause.subject.enabled ? fieldValueMain(clause,'subject',previousClause) : '',
      topicKo: clause.subject.enabled ? fieldValueMeta(clause,'subject') : '',
      timeTr: clause.time.enabled ? fieldValueMain(clause,'time',previousClause) : '',
      timeKo: clause.time.enabled ? fieldValueMeta(clause,'time') : '',
      departureTr: clause.location.enabled ? fieldValueMain(clause,'location',previousClause) : '',
      departureKo: clause.location.enabled ? fieldValueMeta(clause,'location') : '',
      object1Tr: clause.object.enabled ? fieldValueMain(clause,'object',previousClause) : '',
      object1Ko: clause.object.enabled ? fieldValueMeta(clause,'object') : '',
      adverbTr: clause.description.enabled ? fieldValueMain(clause,'description',previousClause) : '',
      adverbKo: clause.description.enabled ? fieldValueMeta(clause,'description') : '',
      verbTr: clause.verb.enabled ? fieldValueMain(clause,'verb',previousClause) : '',
      verbKo: clause.verb.enabled ? fieldValueMeta(clause,'verb') : '',
      connectorTr: clause.connector.enabled ? fieldValueMain(clause,'connector',previousClause) : '',
      connectorKo: clause.connector.enabled ? fieldValueMeta(clause,'connector') : '',
      associate: clause.extras.associate || '',
      transit: clause.extras.transit || '',
      numeral: clause.extras.numeral || '',
      quantifier: clause.extras.quantifier || '',
      beneficiary: clause.extras.beneficiary || '',
      object2: clause.extras.object2 || ''
    };
  }

  function buildRomanianLine(row){
    var parts = [];
    if(row.topicTr) parts.push(row.topicTr);
    if(row.associate) parts.push('cu ' + row.associate);
    if(row.timeTr) parts.push(row.timeTr);
    if(row.departureTr) parts.push(row.departureTr);
    if(row.transit) parts.push('prin ' + row.transit);
    if(row.numeral) parts.push(row.numeral);
    if(row.quantifier) parts.push(row.quantifier);
    if(row.object1Tr) parts.push(row.object1Tr);
    if(row.beneficiary) parts.push('pentru ' + row.beneficiary);
    if(row.object2) parts.push(row.object2);
    if(row.adverbTr) parts.push(row.adverbTr);
    if(row.verbTr) parts.push(row.verbTr);
    return cleanSentenceText(parts.join(' '));
  }

  function convertNumeralToKorean(value){
    var raw = normalizeLatin(value);
    var map = {
      '1':'한','2':'두','3':'세','4':'네','5':'다섯',
      'un':'한','o':'한','unu':'한','una':'한',
      'doi':'두','doua':'두',
      'trei':'세','patru':'네','cinci':'다섯','sase':'여섯','sapte':'일곱','opt':'여덟','noua':'아홉','zece':'열'
    };
    return map[raw] || '';
  }

  function convertQuantifierToKorean(value){
    var raw = normalizeLatin(value);
    if(raw.indexOf('bucat') !== -1) return '개';
    if(raw.indexOf('sticl') !== -1) return '병';
    if(raw.indexOf('pahar') !== -1 || raw.indexOf('can') !== -1) return '잔';
    if(raw.indexOf('port') !== -1) return '인분';
    return '';
  }

  function extraTextToKo(value, type){
    var raw = String(value || '').trim();
    if(!raw) return '';
    if(hasHangul(raw)) return raw;

    var subjectHit = findEntryInDataset('subject', raw);
    var objectHit = findEntryInDataset('object', raw);
    var locationHit = findEntryInDataset('location', raw);

    if(type === 'associate' && subjectHit) return subjectHit.ko.replace(/(는|은)$/,'') + '하고';
    if(type === 'beneficiary' && subjectHit) return subjectHit.ko.replace(/(는|은)$/,'') + '에게';
    if(type === 'transit' && locationHit) return locationHit.ko;
    if(type === 'object2' && objectHit) return objectHit.ko;
    return '';
  }

  function buildFullOutput(){
    var outKo = [], outTr = [], prev = null;

    for(var i=0;i<state.clauses.length;i++){
      var clause = state.clauses[i];
      var row = buildClauseRow(clause, prev);

      var koParts = [];
      if(row.topicKo) koParts.push(row.topicKo);

      var associateKo = extraTextToKo(row.associate, 'associate');
      if(associateKo) koParts.push(associateKo);

      if(row.timeKo) koParts.push(row.timeKo);
      if(row.departureKo) koParts.push(row.departureKo);

      var transitKo = extraTextToKo(row.transit, 'transit');
      if(transitKo) koParts.push(transitKo);

      if(row.object1Ko) koParts.push(row.object1Ko);

      var numKo = convertNumeralToKorean(row.numeral);
      var quantKo = convertQuantifierToKorean(row.quantifier);
      if(numKo) koParts.push(numKo);
      if(quantKo) koParts.push(quantKo);

      var beneficiaryKo = extraTextToKo(row.beneficiary, 'beneficiary');
      if(beneficiaryKo) koParts.push(beneficiaryKo);

      var object2Ko = extraTextToKo(row.object2, 'object2');
      if(object2Ko) koParts.push(object2Ko);

      if(row.adverbKo) koParts.push(row.adverbKo);
      if(row.verbKo) koParts.push(row.verbKo);

      var roLine = buildRomanianLine(row);

      if(koParts.length) outKo.push(cleanSentenceText(koParts.join(' ')));
      if(roLine) outTr.push(roLine);

      prev = clause;
    }

    return {
      korean: cleanSentenceText(outKo.join(' ')),
      translation: cleanSentenceText(outTr.join(', '))
    };
  }

  function renderPreview(){
    var built = buildFullOutput();
    var words = built.korean ? built.korean.split(/\s+/) : ['저는','공부해요'];
    var html = '';
    for(var i=0;i<words.length;i++){
      html += '<span class="word">' + escapeHtml(words[i]) + '</span>';
    }
    els.sentenceWords.innerHTML = html;
    els.translationText.textContent = built.translation || currentUI().defaultTranslation;
  }

  function getVisibleColumns(){
    var visible = [];
    for(var i=0;i<COLUMN_DEFS.length;i++){
      if(state.level >= COLUMN_DEFS[i].level) visible.push(COLUMN_DEFS[i]);
    }
    return visible;
  }

  function renderDatasetCell(clauseIndex, col, previousClause){
    var clause = state.clauses[clauseIndex];
    var enabled = col.toggleable === false ? true : !!clause[col.fieldKey].enabled;
    var value = fieldValueMain(clause, col.fieldKey, previousClause);
    var meta = fieldValueMeta(clause, col.fieldKey);

    var toggleHtml = col.toggleable === false
      ? '<button class="tableToggle ghost" type="button">•</button>'
      : '<button class="tableToggle ' + (enabled ? 'active' : '') + '" data-toggle="' + clauseIndex + ':' + col.fieldKey + '" type="button">✓</button>';

    return '' +
      '<div class="tableField ' + (enabled ? '' : 'off') + '">' +
        toggleHtml +
        '<button class="tableMainBtn" data-kind="' + escapeHtml(col.kind || col.fieldKey) + '" data-cycle="' + clauseIndex + ':' + col.fieldKey + '" type="button">' +
          '<div class="tableMeta">' + escapeHtml(currentUI().labels[col.fieldKey] || col.fieldKey) + '</div>' +
          '<div class="tableValue">' + escapeHtml(value || '—') + '</div>' +
          '<div class="tableMeta">' + escapeHtml(meta || '') + '</div>' +
        '</button>' +
      '</div>';
  }

  function renderExtraCell(clauseIndex, col){
    var clause = state.clauses[clauseIndex];
    var value = clause.extras[col.extraKey] || '';
    return '' +
      '<div class="tableInputWrap">' +
        '<div class="tableMeta">' + escapeHtml(currentUI().editable) + '</div>' +
        '<input class="tableInput" data-extra-input="' + clauseIndex + ':' + col.extraKey + '" value="' + escapeHtml(value) + '" placeholder="' + escapeHtml(currentUI()[col.placeholderKey] || '') + '">' +
        '<div class="tableInputMeta">' + escapeHtml(value ? currentUI().editable : currentUI().inferred) + '</div>' +
      '</div>';
  }

  function renderClauses(){
    var cols = getVisibleColumns();
    var html = '<div class="builderTableWrap"><table class="builderTable"><thead><tr>';

    for(var c=0;c<cols.length;c++){
      html += '<th>' + escapeHtml(currentUI().columns[cols[c].key] || cols[c].key) + '</th>';
    }

    html += '</tr></thead><tbody>';

    for(var i=0;i<state.clauses.length;i++){
      var prev = i > 0 ? state.clauses[i-1] : null;
      html += '<tr>';
      for(var j=0;j<cols.length;j++){
        var col = cols[j];
        html += '<td>';
        if(col.mode === 'dataset') html += renderDatasetCell(i, col, prev);
        else html += renderExtraCell(i, col);
        html += '</td>';
      }
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    els.clauseList.innerHTML = html;
  }

  function renderAll(){
    renderPreview();
    renderClauses();
  }

  function cycleField(clauseIndex, key){
    var clause = state.clauses[clauseIndex];
    if(!clause || !clause[key]) return;

    var list = datasetFor(key);
    if(!list.length) return;

    if(key !== 'verb' && key !== 'connector' && !clause[key].enabled) return;

    clause[key].index = (Number(clause[key].index) + 1) % list.length;
    ensureChainLength();
    renderAll();
  }

  function toggleField(clauseIndex, key){
    var clause = state.clauses[clauseIndex];
    if(!clause || !clause[key] || key === 'verb' || key === 'connector') return;

    clause[key].enabled = !clause[key].enabled;
    if(!clause[key].enabled){
      clause[key].index = 0;
    }else if((Number(clause[key].index) || 0) === 0 && datasetFor(key).length > 1){
      clause[key].index = 1;
    }

    renderAll();
  }

  function updateExtraField(clauseIndex, extraKey, value){
    var clause = state.clauses[clauseIndex];
    if(!clause || !clause.extras) return;
    clause.extras[extraKey] = value;
    renderPreview();
  }

  function playCurrent(){
    var built = buildFullOutput();
    if(!built.korean){
      showToast(currentUI().noSpeech);
      return;
    }
    if(!('speechSynthesis' in window)){
      showToast(currentUI().noSpeech);
      return;
    }

    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(built.korean);
    utter.lang = 'ko-KR';
    utter.rate = 0.9;

    var activeIndex = -1;
    var wordEls = els.sentenceWords.querySelectorAll('.word');

    utter.onboundary = function(){
      activeIndex += 1;
      for(var i=0;i<wordEls.length;i++){
        wordEls[i].classList.toggle('active', i === activeIndex);
      }
    };
    utter.onend = function(){
      for(var i=0;i<wordEls.length;i++) wordEls[i].classList.remove('active');
    };

    window.speechSynthesis.speak(utter);
  }

  function detectMimeType(){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported){
      if(MediaRecorder.isTypeSupported('audio/mp4;codecs=mp4a.40.2')) return 'audio/mp4;codecs=mp4a.40.2';
      if(MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
      if(MediaRecorder.isTypeSupported('audio/x-m4a')) return 'audio/x-m4a';
      if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
      if(MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
    }
    return '';
  }

  function toggleRecording(){
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || typeof MediaRecorder === 'undefined'){
      showToast(currentUI().recordUnsupported);
      return;
    }

    if(mediaRecorder && mediaRecorder.state === 'recording'){
      mediaRecorder.stop();
      els.recordBtn.classList.remove('recording');
      showToast(currentUI().recordStop);
      return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
      recordedChunks = [];
      recordedStream = stream;
      var mime = detectMimeType();
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);

      mediaRecorder.ondataavailable = function(event){
        if(event.data && event.data.size > 0) recordedChunks.push(event.data);
      };

      mediaRecorder.onstop = function(){
        var blobType = mime || (recordedChunks[0] && recordedChunks[0].type) || 'audio/mp4';
        var blob = new Blob(recordedChunks, { type: blobType });

        if(recordedUrl) URL.revokeObjectURL(recordedUrl);
        recordedUrl = URL.createObjectURL(blob);

        els.recordedAudio.pause();
        els.recordedAudio.removeAttribute('src');
        els.recordedAudio.src = recordedUrl;
        els.recordedAudio.load();
        els.recordBox.classList.add('show');

        if(recordedStream){
          var tracks = recordedStream.getTracks();
          for(var i=0;i<tracks.length;i++) tracks[i].stop();
          recordedStream = null;
        }
      };

      mediaRecorder.start();
      els.recordBtn.classList.add('recording');
      showToast(currentUI().recordStart);
    }).catch(function(){
      showToast(currentUI().recordUnsupported);
    });
  }

  function bindEvents(){
    els.btnRo.addEventListener('click', function(){ setLang('ro'); });
    els.btnEn.addEventListener('click', function(){ setLang('en'); });

    if(els.topicDropdown){
      els.topicDropdown.addEventListener('click', function(event){
        var btn = event.target.closest('.topicOption');
        if(!btn) return;
        setLevel(btn.getAttribute('data-level'));
        var details = document.getElementById('topicMenu');
        if(details) details.removeAttribute('open');
      });
    }

    els.freeText.addEventListener('input', function(){
      state.text = els.freeText.value || '';
      parseTextIntoClauses();
      renderAll();
    });

    els.refreshBtn.addEventListener('click', refreshSentences);
    els.playBtn.addEventListener('click', playCurrent);
    els.recordBtn.addEventListener('click', toggleRecording);

    els.sentenceBox.addEventListener('click', playCurrent);
    els.sentenceBox.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        playCurrent();
      }
    });

    els.clauseList.addEventListener('click', function(event){
      var toggleBtn = event.target.closest('[data-toggle]');
      if(toggleBtn){
        event.preventDefault();
        event.stopPropagation();
        var t = toggleBtn.getAttribute('data-toggle').split(':');
        toggleField(Number(t[0]), t[1]);
        return;
      }

      var cycleBtn = event.target.closest('[data-cycle]');
      if(cycleBtn){
        event.preventDefault();
        var c = cycleBtn.getAttribute('data-cycle').split(':');
        cycleField(Number(c[0]), c[1]);
      }
    });

    els.clauseList.addEventListener('input', function(event){
      var input = event.target.closest('[data-extra-input]');
      if(!input) return;
      var p = input.getAttribute('data-extra-input').split(':');
      updateExtraField(Number(p[0]), p[1], input.value || '');
    });
  }

  function setLang(lang){
    state.lang = lang === 'en' ? 'en' : 'ro';
    els.btnRo.classList.toggle('active', state.lang === 'ro');
    els.btnEn.classList.toggle('active', state.lang === 'en');
    els.freeText.placeholder = currentUI().placeholder;
    renderAll();
  }

  function setLevel(level){
    level = Number(level);
    if(level < 1 || level > 6 || !level) level = 6;
    state.level = level;
    if(els.topicSummaryText) els.topicSummaryText.textContent = 'T' + level + ' ▾';

    var buttons = els.topicDropdown ? els.topicDropdown.querySelectorAll('.topicOption') : [];
    for(var i=0;i<buttons.length;i++){
      buttons[i].classList.toggle('active', Number(buttons[i].getAttribute('data-level')) === level);
    }

    renderAll();
  }

  function init(){
    els.freeText.value = '';
    bindEvents();
    setLevel(1);
    setLang('ro');
    ensureChainLength();
    renderAll();
  }

  init();
})();
</script>
