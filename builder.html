<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <style>
:root{
  --builder-line: rgba(15,23,42,.08);
  --builder-line-soft: rgba(15,23,42,.06);
  --builder-text: #0f172a;
  --builder-muted: #64748b;
  --builder-bg: #ffffff;
  --builder-shadow: 0 10px 24px rgba(15,23,42,.06);
  --builder-shadow-soft: 0 6px 14px rgba(15,23,42,.05);
  --builder-radius: 20px;

  --c-topic: #eef4ff;
  --c-associate: #f6f0ff;
  --c-time: #fff8ea;
  --c-departure: #eefbf5;
  --c-transit: #f2fbff;
  --c-numeral: #fff4ef;
  --c-quantifier: #fdf7e9;
  --c-object1: #fff1f6;
  --c-beneficiary: #f7f3ff;
  --c-object2: #f5f7fb;
  --c-adverb: #f8fafc;
  --c-verb: #fff2d9;
  --c-connector: #efe7ff;

  --picker-backdrop: rgba(15,23,42,.42);
}

.clauseList{
  display:block;
  width:100%;
}

.builderTableWrap{
  width:100%;
  overflow:auto;
  border:1px solid var(--builder-line);
  border-radius:24px;
  background:#fff;
  box-shadow:var(--builder-shadow);
}

.builderTable{
  width:100%;
  min-width:2210px;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}

.builderTable th,
.builderTable td{
  width:170px;
  min-width:170px;
  max-width:170px;
}

.builderTable thead th{
  position:sticky;
  top:0;
  z-index:2;
  height:58px;
  padding:14px 12px;
  text-align:left;
  vertical-align:middle;
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  border-bottom:1px solid var(--builder-line);
  color:#334155;
  font-size:12px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  white-space:normal;
  word-break:keep-all;
}

.builderTable tbody td{
  padding:12px;
  vertical-align:top;
  border-bottom:1px solid var(--builder-line-soft);
  background:#fff;
}

.builderTable tbody tr:last-child td{
  border-bottom:none;
}

.tableField{
  width:100%;
  min-height:132px;
  height:132px;
  display:flex;
}

.tableMainBtn{
  position:relative;
  width:100%;
  min-height:132px;
  height:132px;
  box-sizing:border-box;
  border-radius:20px;
  border:1px solid rgba(15,23,42,.08);
  box-shadow:0 8px 18px rgba(15,23,42,.04);
  padding:13px 13px 12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:flex-start;
  text-align:left;
  cursor:pointer;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  background:linear-gradient(180deg,#fff,#f8fafc);
  color:var(--builder-text);
}

.tableMainBtn:hover{
  transform:translateY(-1px);
  box-shadow:0 12px 22px rgba(15,23,42,.07);
  border-color:rgba(15,23,42,.12);
}

.tableMainBtn:active{
  transform:translateY(0);
}

.tableMainBtn.is-empty .tableValue{
  color:#94a3b8;
}

.tableMainBtn[data-kind="topic"]{background:linear-gradient(180deg,var(--c-topic),#fff);}
.tableMainBtn[data-kind="associate"]{background:linear-gradient(180deg,var(--c-associate),#fff);}
.tableMainBtn[data-kind="time"]{background:linear-gradient(180deg,var(--c-time),#fff);}
.tableMainBtn[data-kind="departure"]{background:linear-gradient(180deg,var(--c-departure),#fff);}
.tableMainBtn[data-kind="transit"]{background:linear-gradient(180deg,var(--c-transit),#fff);}
.tableMainBtn[data-kind="numeral"]{background:linear-gradient(180deg,var(--c-numeral),#fff);}
.tableMainBtn[data-kind="quantifier"]{background:linear-gradient(180deg,var(--c-quantifier),#fff);}
.tableMainBtn[data-kind="object1"]{background:linear-gradient(180deg,var(--c-object1),#fff);}
.tableMainBtn[data-kind="beneficiary"]{background:linear-gradient(180deg,var(--c-beneficiary),#fff);}
.tableMainBtn[data-kind="object2"]{background:linear-gradient(180deg,var(--c-object2),#fff);}
.tableMainBtn[data-kind="adverb"]{background:linear-gradient(180deg,var(--c-adverb),#fff);}
.tableMainBtn[data-kind="verb"]{background:linear-gradient(180deg,var(--c-verb),#fff);}
.tableMainBtn[data-kind="connector"]{background:linear-gradient(180deg,var(--c-connector),#fff);}

.tableMeta{
  font-size:12px;
  line-height:1.1;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#64748b;
}

.tableValue{
  width:100%;
  font-size:18px;
  line-height:1.08;
  font-weight:900;
  color:#0f172a;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

.tableSub{
  font-size:12px;
  line-height:1.2;
  font-weight:800;
  color:#64748b;
}

.tablePickedDot{
  position:absolute;
  top:12px;
  right:12px;
  width:26px;
  height:26px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,#7c5cff,#5b7cff);
  color:#fff;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 16px rgba(109,94,252,.20);
}

.builderControlsRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.is-active-level{
  box-shadow:0 0 0 2px rgba(109,94,252,.16) inset !important;
  border-color:rgba(109,94,252,.34) !important;
}

.vocabSheet{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
}

.vocabSheet.open{
  display:block;
}

.vocabSheetBackdrop{
  position:absolute;
  inset:0;
  background:var(--picker-backdrop);
}

.vocabSheetPanel{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:min(960px, 100%);
  max-height:80vh;
  background:#fff;
  border-radius:28px 28px 0 0;
  box-shadow:0 -24px 60px rgba(15,23,42,.22);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.vocabSheetHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.vocabSheetTitle{
  font-size:18px;
  font-weight:900;
  color:#0f172a;
}

.vocabSheetClose{
  width:42px;
  height:42px;
  border-radius:999px;
  border:1px solid rgba(15,23,42,.08);
  background:#fff;
  color:#0f172a;
  cursor:pointer;
  font-size:18px;
  font-weight:900;
  box-shadow:var(--builder-shadow-soft);
}

.vocabSheetSearch{
  width:100%;
  height:48px;
  border-radius:14px;
  border:1px solid rgba(15,23,42,.10);
  padding:0 14px;
  font:inherit;
  font-size:15px;
  font-weight:800;
  color:#0f172a;
  outline:none;
  background:#fff;
}

.vocabSheetSearch:focus{
  border-color:rgba(109,94,252,.38);
  box-shadow:0 0 0 4px rgba(109,94,252,.08);
}

.vocabSheetList{
  overflow:auto;
  display:grid;
  gap:10px;
  padding-bottom:6px;
}

.vocabItem{
  width:100%;
  border:1px solid rgba(15,23,42,.08);
  border-radius:18px;
  background:#fff;
  padding:14px 16px;
  text-align:left;
  cursor:pointer;
  transition:background .16s ease, transform .16s ease, border-color .16s ease;
}

.vocabItem:hover{
  background:#f8fafc;
  transform:translateY(-1px);
  border-color:rgba(15,23,42,.12);
}

.vocabItemKo{
  font-size:18px;
  line-height:1.12;
  font-weight:900;
  color:#0f172a;
  margin-bottom:4px;
}

.vocabItemMeta{
  font-size:13px;
  line-height:1.3;
  color:#64748b;
  font-weight:700;
}

.vocabEmpty{
  padding:18px;
  border:1px dashed rgba(15,23,42,.14);
  border-radius:16px;
  color:#64748b;
  font-weight:800;
  background:#fff;
}

.recordInlineAudio{
  width:100%;
  margin-top:8px;
}

@media (max-width:1200px){
  .builderTable{
    min-width:2210px;
  }
}

@media (max-width:860px){
  .builderTable th,
  .builderTable td{
    width:160px;
    min-width:160px;
    max-width:160px;
  }

  .tableField,
  .tableMainBtn{
    min-height:124px;
    height:124px;
  }

  .tableValue{
    font-size:17px;
  }
}
</style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="topbar">
        <h1 class="title">Raluca Korean — Builder</h1>
        <div class="toolbar">
          <a href="./index.html" class="tinyBtn">🏠</a>
          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble">
              <span class="topicDot"></span>
              <span id="topicSummaryText">T1 ▾</span>
            </summary>
            <div class="topicDropdown" id="topicDropdown">
              <button class="topicOption" data-level="1" type="button">T1</button>
              <button class="topicOption" data-level="2" type="button">T2</button>
              <button class="topicOption" data-level="3" type="button">T3</button>
              <button class="topicOption" data-level="4" type="button">T4</button>
              <button class="topicOption" data-level="5" type="button">T5</button>
              <button class="topicOption" data-level="6" type="button">T6</button>
            </div>
          </details>
          <button id="btnRo" class="pill active" type="button">RO</button>
          <button id="btnEn" class="pill" type="button">EN</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <textarea id="freeText" placeholder="Scrie aici o propoziție sau un lanț de propoziții..."></textarea>
    </section>

    <section class="panel">
      <div class="previewBar">
        <div class="previewTools">
          <button class="iconBtn" id="refreshBtn" type="button" title="Refresh">↻</button>
          <button class="iconBtn" id="playBtn" type="button" title="Ascultă propoziția">🔊</button>
          <button class="iconBtn" id="recordBtn" type="button" title="Înregistrează vocea">🎤</button>
        </div>
      </div>
      <div class="sentenceBox" id="sentenceBox" tabindex="0" role="button" aria-label="Play sentence">
        <div class="sentenceWords" id="sentenceWords"></div>
      </div>
      <div class="translationBox">
        <div class="translationText" id="translationText"></div>
      </div>
      <div class="recordBox" id="recordBox">
        <div class="recordedLabel">Înregistrarea ta</div>
        <audio id="recordedAudio" controls playsinline></audio>
      </div>
    </section>

    <section class="panel">
      <div class="clauseList" id="clauseList"></div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>
  <script>
(function(){
  'use strict';

  const TABLE_KO = {
    topic: '주제',
    associate: '관련 인물',
    time: '시간',
    departure: '출발지',
    transit: '경유지',
    numeral: '수사',
    quantifier: '분류사 / 단위',
    object1: '목적어 1',
    beneficiary: '수혜자',
    object2: '목적어 2',
    adverb: '부사',
    verb: '동사',
    connector: '연결어'
  };

  const TABLE_PLACEHOLDER_KO = {
    topic: '선택',
    associate: '선택',
    time: '선택',
    departure: '선택',
    transit: '선택',
    numeral: '선택',
    quantifier: '선택',
    object1: '선택',
    beneficiary: '선택',
    object2: '선택',
    adverb: '선택',
    verb: '선택',
    connector: '선택'
  };

  const FIELD_ALIASES = {
    topic: ['topic', 'subject'],
    associate: ['associate', 'participant', 'relative', 'associatedParticipant'],
    time: ['time'],
    departure: ['departure', 'location', 'place', 'from'],
    transit: ['transit', 'via', 'through'],
    numeral: ['numeral', 'number'],
    quantifier: ['quantifier', 'classifier', 'unit'],
    object1: ['object1', 'object', 'primaryObject'],
    beneficiary: ['beneficiary'],
    object2: ['object2', 'secondaryObject'],
    adverb: ['adverb', 'description', 'manner'],
    verb: ['verb'],
    connector: ['connector']
  };

  const VOCAB_BUCKET_MAP = {
    topic: ['subjects', 'subject', 'topics', 'topic', 'people', 'persons'],
    associate: ['participants', 'participant', 'relatives', 'relative', 'people', 'persons', 'subjects'],
    time: ['times', 'time'],
    departure: ['locations', 'location', 'places', 'place', 'departures', 'departure'],
    transit: ['locations', 'location', 'places', 'place', 'transit'],
    numeral: ['numerals', 'numeral', 'numbers', 'number'],
    quantifier: ['quantifiers', 'quantifier', 'classifiers', 'classifier', 'units', 'unit'],
    object1: ['objects', 'object', 'object1'],
    beneficiary: ['beneficiaries', 'beneficiary', 'people', 'persons', 'subjects'],
    object2: ['objects', 'object', 'object2'],
    adverb: ['adverbs', 'adverb', 'descriptions', 'description', 'manners'],
    verb: ['verbs', 'verb'],
    connector: ['connectors', 'connector']
  };

  const TABLE_COLUMNS = [
    { key: 'topic', level: 1 },
    { key: 'verb', level: 1 },
    { key: 'associate', level: 2 },
    { key: 'time', level: 2 },
    { key: 'departure', level: 3 },
    { key: 'transit', level: 3 },
    { key: 'numeral', level: 4 },
    { key: 'quantifier', level: 4 },
    { key: 'object1', level: 4 },
    { key: 'beneficiary', level: 5 },
    { key: 'object2', level: 5 },
    { key: 'adverb', level: 5 },
    { key: 'connector', level: 6 }
  ];

  const FIELD_ORDER = [
    'topic',
    'associate',
    'time',
    'departure',
    'transit',
    'numeral',
    'quantifier',
    'object1',
    'beneficiary',
    'object2',
    'adverb',
    'verb',
    'connector'
  ];

  const DOM = {};
  const state = (window.state && typeof window.state === 'object') ? window.state : (window.state = {});

  if(typeof state.lang !== 'string') state.lang = 'ro';
  if(typeof state.level !== 'number') state.level = 1;
  if(!Array.isArray(state.clauses) || !state.clauses.length) state.clauses = [makeClause()];

  const vocabPickerState = {
    rowIndex: 0,
    fieldKey: 'topic',
    items: [],
    filteredItems: []
  };

  let mediaRecorder = null;
  let mediaStream = null;
  let mediaChunks = [];
  let isRecording = false;

  function makeClause(){
    return {
      topic: '',
      associate: '',
      time: '',
      departure: '',
      transit: '',
      numeral: '',
      quantifier: '',
      object1: '',
      beneficiary: '',
      object2: '',
      adverb: '',
      verb: '',
      connector: '',
      __picked: {}
    };
  }

  function cacheDom(){
    DOM.btnRo = document.getElementById('btnRo');
    DOM.btnEn = document.getElementById('btnEn');
    DOM.btnPlay = document.getElementById('btnPlay');
    DOM.btnRefresh = document.getElementById('btnRefresh');
    DOM.btnRecord = document.getElementById('btnRecord');
    DOM.textInput = document.getElementById('textInput');
    DOM.sentenceText = document.getElementById('sentenceText');
    DOM.translationText = document.getElementById('translationText');
    DOM.clauseList = document.getElementById('clauseList');
    DOM.levelBadge = document.getElementById('levelBadge');
    DOM.recordBox = document.getElementById('recordBox');
    DOM.recordAudio = document.getElementById('recordAudio');
  }

  function escapeHtml(value){
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeLoose(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\p{L}\p{N}\s]/gu, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function ensureClauseShape(clause){
    if(!clause || typeof clause !== 'object') return makeClause();
    if(!clause.__picked || typeof clause.__picked !== 'object') clause.__picked = {};

    FIELD_ORDER.forEach(function(fieldKey){
      const aliases = FIELD_ALIASES[fieldKey] || [fieldKey];
      if(!clause[fieldKey]){
        for(let i=0;i<aliases.length;i++){
          const alias = aliases[i];
          if(clause[alias]){
            clause[fieldKey] = clause[alias];
            break;
          }
        }
      }
      if(typeof clause[fieldKey] !== 'string') clause[fieldKey] = clause[fieldKey] ? String(clause[fieldKey]) : '';
    });

    return clause;
  }

  state.clauses = state.clauses.map(ensureClauseShape);

  function getVisibleColumns(){
    const level = Math.max(1, Math.min(6, Number(state.level) || 1));
    return TABLE_COLUMNS.filter(function(col){
      return col.level <= level;
    });
  }

  function getAppVocab(){
    return (
      window.RALUCA_VOCAB ||
      window.APP_VOCAB ||
      window.VOCAB ||
      window.vocabulary ||
      window.__VOCAB__ ||
      window.DATA ||
      {}
    );
  }

  function extractBucket(source, bucketName){
    if(!source || !bucketName) return [];
    if(Array.isArray(source[bucketName])) return source[bucketName];
    if(source[bucketName] && Array.isArray(source[bucketName].items)) return source[bucketName].items;
    if(source.data && Array.isArray(source.data[bucketName])) return source.data[bucketName];
    if(source.data && source.data[bucketName] && Array.isArray(source.data[bucketName].items)) return source.data[bucketName].items;
    return [];
  }

  function normalizeItem(item, index){
    if(typeof item === 'string'){
      return {
        id: item,
        ko: item,
        ro: '',
        en: '',
        raw: item
      };
    }

    const ko = item.ko || item.kr || item.korean || item.surface || item.text || item.value || '';
    const ro = item.ro || item.romanian || item.meaningRo || item.meaning_ro || item.translationRo || item.translation_ro || item.meaning || '';
    const en = item.en || item.english || item.meaningEn || item.meaning_en || item.translationEn || item.translation_en || '';
    const id = item.id || item.key || item.value || ko || ro || en || ('item-' + index);

    return {
      id: String(id),
      ko: String(ko || id),
      ro: String(ro || ''),
      en: String(en || ''),
      raw: item
    };
  }

  function uniqItems(items){
    const seen = new Set();
    return items.filter(function(item){
      const key = [item.id, item.ko, item.ro, item.en].join('|');
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function getFallbackBucket(fieldKey){
    const DATA = window.DATA || {};
    switch(fieldKey){
      case 'topic': return extractBucket(DATA, 'subjects').length ? extractBucket(DATA, 'subjects') : extractBucket(DATA, 'subject');
      case 'associate': return extractBucket(DATA, 'relatives').length ? extractBucket(DATA, 'relatives') : extractBucket(DATA, 'subjects');
      case 'time': return extractBucket(DATA, 'times').length ? extractBucket(DATA, 'times') : extractBucket(DATA, 'time');
      case 'departure':
      case 'transit': return extractBucket(DATA, 'locations').length ? extractBucket(DATA, 'locations') : extractBucket(DATA, 'location');
      case 'numeral': return extractBucket(DATA, 'numerals').length ? extractBucket(DATA, 'numerals') : extractBucket(DATA, 'numbers');
      case 'quantifier': return extractBucket(DATA, 'quantifiers').length ? extractBucket(DATA, 'quantifiers') : extractBucket(DATA, 'classifiers');
      case 'object1':
      case 'object2': return extractBucket(DATA, 'objects').length ? extractBucket(DATA, 'objects') : extractBucket(DATA, 'object');
      case 'beneficiary': return extractBucket(DATA, 'subjects').length ? extractBucket(DATA, 'subjects') : extractBucket(DATA, 'relatives');
      case 'adverb': return extractBucket(DATA, 'adverbs').length ? extractBucket(DATA, 'adverbs') : extractBucket(DATA, 'descriptions');
      case 'verb': return extractBucket(DATA, 'verbs').length ? extractBucket(DATA, 'verbs') : extractBucket(DATA, 'verb');
      case 'connector': return extractBucket(DATA, 'connectors').length ? extractBucket(DATA, 'connectors') : extractBucket(DATA, 'connector');
      default: return [];
    }
  }

  function getVocabOptionsForField(fieldKey){
    const source = getAppVocab();
    const candidates = VOCAB_BUCKET_MAP[fieldKey] || [fieldKey];
    let raw = [];

    for(let i=0;i<candidates.length;i++){
      raw = extractBucket(source, candidates[i]);
      if(raw && raw.length) break;
    }

    if(!raw || !raw.length){
      raw = getFallbackBucket(fieldKey);
    }

    const normalized = (Array.isArray(raw) ? raw : []).map(normalizeItem).filter(function(item){
      return item && item.ko;
    });

    return uniqItems(normalized);
  }

  function getClauseValue(clause, fieldKey){
    if(!clause) return '';
    const aliases = FIELD_ALIASES[fieldKey] || [fieldKey];
    for(let i=0;i<aliases.length;i++){
      const key = aliases[i];
      if(clause[key]) return String(clause[key]);
    }
    return '';
  }

  function setClauseValue(clause, fieldKey, item){
    if(!clause.__picked || typeof clause.__picked !== 'object') clause.__picked = {};
    clause.__picked[fieldKey] = item;

    const value = item && (item.id || item.ko || item.ro || item.en) ? String(item.id || item.ko || item.ro || item.en) : '';
    clause[fieldKey] = value;

    const aliases = FIELD_ALIASES[fieldKey] || [];
    aliases.forEach(function(alias){
      clause[alias] = value;
    });
  }

  function getPickedDisplay(clause, fieldKey){
    if(clause && clause.__picked && clause.__picked[fieldKey]) return clause.__picked[fieldKey];

    const raw = getClauseValue(clause, fieldKey);
    if(!raw) return null;

    const options = getVocabOptionsForField(fieldKey);
    const rawNorm = normalizeLoose(raw);

    const matched = options.find(function(opt){
      return [
        opt.id,
        opt.ko,
        opt.ro,
        opt.en
      ].some(function(part){
        return normalizeLoose(part) === rawNorm;
      });
    });

    if(matched) return matched;

    return {
      id: raw,
      ko: raw,
      ro: '',
      en: '',
      raw: raw
    };
  }

  function buildSentenceKo(clause){
    const pieces = [];

    FIELD_ORDER.forEach(function(fieldKey){
      const picked = getPickedDisplay(clause, fieldKey);
      if(!picked || !picked.ko) return;
      pieces.push(String(picked.ko).trim());
    });

    return pieces.join(' ').replace(/\s+/g, ' ').trim() || '—';
  }

  function buildTranslation(clause){
    const pieces = [];

    FIELD_ORDER.forEach(function(fieldKey){
      const picked = getPickedDisplay(clause, fieldKey);
      if(!picked) return;

      const part = state.lang === 'en'
        ? (picked.en || picked.ro || picked.ko)
        : (picked.ro || picked.en || picked.ko);

      if(part) pieces.push(String(part).trim());
    });

    return pieces.join(' ').replace(/\s+/g, ' ').trim() || '—';
  }

  function renderPreview(){
    const clause = state.clauses[0] || makeClause();
    if(DOM.sentenceText) DOM.sentenceText.textContent = buildSentenceKo(clause);
    if(DOM.translationText) DOM.translationText.textContent = buildTranslation(clause);
  }

  function renderCell(rowIndex, fieldKey, clause){
    const picked = getPickedDisplay(clause, fieldKey);
    const mainValue = picked ? (picked.ko || '—') : (TABLE_PLACEHOLDER_KO[fieldKey] || '선택');
    const subText = picked ? '클릭하여 변경' : '클릭하여 선택';
    const hasValue = !!picked;

    return `
      <div class="tableField">
        <button
          type="button"
          class="tableMainBtn vocabOpenBtn ${hasValue ? '' : 'is-empty'}"
          data-row-index="${rowIndex}"
          data-field-key="${escapeHtml(fieldKey)}"
          data-kind="${escapeHtml(fieldKey)}"
        >
          <div class="tableMeta">${escapeHtml(TABLE_KO[fieldKey] || fieldKey)}</div>
          <div class="tableValue">${escapeHtml(mainValue)}</div>
          <div class="tableSub">${escapeHtml(subText)}</div>
          ${hasValue ? '<div class="tablePickedDot">✓</div>' : ''}
        </button>
      </div>
    `;
  }

  function renderClauses(){
    if(!DOM.clauseList) return;

    const visibleCols = getVisibleColumns();
    const rows = Array.isArray(state.clauses) && state.clauses.length ? state.clauses : [makeClause()];

    const thead = `
      <thead>
        <tr>
          ${visibleCols.map(function(col){
            return `<th>${escapeHtml(TABLE_KO[col.key] || col.key)}</th>`;
          }).join('')}
        </tr>
      </thead>
    `;

    const tbody = `
      <tbody>
        ${rows.map(function(clause, rowIndex){
          ensureClauseShape(clause);
          return `
            <tr>
              ${visibleCols.map(function(col){
                return `<td>${renderCell(rowIndex, col.key, clause)}</td>`;
              }).join('')}
            </tr>
          `;
        }).join('')}
      </tbody>
    `;

    DOM.clauseList.innerHTML = `
      <div class="builderTableWrap">
        <table class="builderTable">
          ${thead}
          ${tbody}
        </table>
      </div>
    `;
  }

  function renderLevelBadge(){
    if(DOM.levelBadge){
      DOM.levelBadge.textContent = 'TOPIK ' + state.level;
    }
  }

  function renderLevelButtons(){
    for(let i=1;i<=6;i++){
      const btn = document.getElementById('btnT' + i);
      if(btn){
        btn.classList.toggle('is-active-level', i === state.level);
        btn.setAttribute('aria-pressed', i === state.level ? 'true' : 'false');
      }
    }

    document.querySelectorAll('[data-level]').forEach(function(btn){
      const level = Number(btn.getAttribute('data-level'));
      btn.classList.toggle('is-active-level', level === state.level);
      btn.setAttribute('aria-pressed', level === state.level ? 'true' : 'false');
    });
  }

  function renderLangButtons(){
    if(DOM.btnRo) DOM.btnRo.classList.toggle('is-active-level', state.lang === 'ro');
    if(DOM.btnEn) DOM.btnEn.classList.toggle('is-active-level', state.lang === 'en');
  }

  function renderAll(){
    renderLevelBadge();
    renderLevelButtons();
    renderLangButtons();
    renderPreview();
    renderClauses();
  }

  function setLevel(level){
    const next = Math.max(1, Math.min(6, Number(level) || 1));
    state.level = next;
    renderAll();
  }

  function ensureVocabSheet(){
    if(document.getElementById('vocabSheet')) return;

    const el = document.createElement('div');
    el.id = 'vocabSheet';
    el.className = 'vocabSheet';
    el.innerHTML = `
      <div class="vocabSheetBackdrop" data-close-vocab="1"></div>
      <div class="vocabSheetPanel">
        <div class="vocabSheetHead">
          <div class="vocabSheetTitle" id="vocabSheetTitle">선택</div>
          <button type="button" class="vocabSheetClose" id="vocabSheetClose">✕</button>
        </div>
        <input id="vocabSheetSearch" class="vocabSheetSearch" type="text" placeholder="검색">
        <div id="vocabSheetList" class="vocabSheetList"></div>
      </div>
    `;
    document.body.appendChild(el);
  }

  function renderVocabSheetList(items){
    const list = document.getElementById('vocabSheetList');
    if(!list) return;

    vocabPickerState.filteredItems = items.slice();

    if(!items.length){
      list.innerHTML = `<div class="vocabEmpty">항목이 없습니다</div>`;
      return;
    }

    list.innerHTML = items.map(function(item, index){
      const meta = [item.ro, item.en].filter(Boolean).join(' · ');
      return `
        <button
          type="button"
          class="vocabItem"
          data-vocab-index="${index}"
        >
          <div class="vocabItemKo">${escapeHtml(item.ko || '—')}</div>
          <div class="vocabItemMeta">${escapeHtml(meta)}</div>
        </button>
      `;
    }).join('');
  }

  function filterVocabSheet(keyword){
    const q = normalizeLoose(keyword);
    if(!q){
      renderVocabSheetList(vocabPickerState.items);
      return;
    }

    const filtered = vocabPickerState.items.filter(function(item){
      const hay = [
        item.ko || '',
        item.ro || '',
        item.en || '',
        item.id || ''
      ].join(' ');
      return normalizeLoose(hay).includes(q);
    });

    renderVocabSheetList(filtered);
  }

  function openVocabSheet(rowIndex, fieldKey){
    ensureVocabSheet();

    vocabPickerState.rowIndex = rowIndex;
    vocabPickerState.fieldKey = fieldKey;
    vocabPickerState.items = getVocabOptionsForField(fieldKey);

    const root = document.getElementById('vocabSheet');
    const title = document.getElementById('vocabSheetTitle');
    const search = document.getElementById('vocabSheetSearch');

    if(title) title.textContent = TABLE_KO[fieldKey] || '선택';
    if(search) search.value = '';

    renderVocabSheetList(vocabPickerState.items);

    if(root) root.classList.add('open');
    if(search) setTimeout(function(){ search.focus(); }, 0);
  }

  function closeVocabSheet(){
    const root = document.getElementById('vocabSheet');
    if(root) root.classList.remove('open');
  }

  function pickVocabItem(index){
    const item = vocabPickerState.filteredItems[index];
    if(!item) return;

    const clause = state.clauses[vocabPickerState.rowIndex];
    if(!clause) return;

    setClauseValue(clause, vocabPickerState.fieldKey, item);
    closeVocabSheet();
    renderAll();
  }

  function parseTextToClause(text){
    const clause = makeClause();
    const normalizedText = normalizeLoose(text);

    if(!normalizedText){
      state.clauses = [clause];
      renderAll();
      return;
    }

    FIELD_ORDER.forEach(function(fieldKey){
      const options = getVocabOptionsForField(fieldKey);
      const found = options.find(function(item){
        const variants = [
          item.ko || '',
          item.ro || '',
          item.en || '',
          item.id || ''
        ].map(normalizeLoose).filter(Boolean);

        return variants.some(function(v){
          return v && normalizedText.includes(v);
        });
      });

      if(found){
        setClauseValue(clause, fieldKey, found);
      }
    });

    state.clauses = [clause];
    renderAll();
  }

  function speakSentence(){
    const clause = state.clauses[0] || makeClause();
    const text = buildSentenceKo(clause);
    if(!text || text === '—') return;

    if('speechSynthesis' in window){
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'ko-KR';
      utter.rate = 0.95;
      window.speechSynthesis.speak(utter);
    }
  }

  function ensureRecordAudioEl(){
    if(DOM.recordAudio) return DOM.recordAudio;

    if(DOM.recordBox){
      const audio = document.createElement('audio');
      audio.id = 'recordAudio';
      audio.className = 'recordInlineAudio';
      audio.controls = true;
      DOM.recordBox.innerHTML = '';
      DOM.recordBox.appendChild(audio);
      DOM.recordAudio = audio;
      return audio;
    }

    return null;
  }

  async function startRecording(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaChunks = [];
    mediaRecorder = new MediaRecorder(mediaStream);

    mediaRecorder.ondataavailable = function(e){
      if(e.data && e.data.size > 0) mediaChunks.push(e.data);
    };

    mediaRecorder.onstop = function(){
      const blob = new Blob(mediaChunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(blob);
      const audioEl = ensureRecordAudioEl();
      if(audioEl){
        audioEl.src = url;
        audioEl.load();
      }

      if(mediaStream){
        mediaStream.getTracks().forEach(function(track){ track.stop(); });
      }

      mediaStream = null;
      mediaRecorder = null;
      mediaChunks = [];
      isRecording = false;
      if(DOM.btnRecord) DOM.btnRecord.classList.remove('is-active-level');
    };

    mediaRecorder.start();
    isRecording = true;
    if(DOM.btnRecord) DOM.btnRecord.classList.add('is-active-level');
  }

  function stopRecording(){
    if(mediaRecorder && isRecording){
      mediaRecorder.stop();
    }
  }

  async function toggleRecording(){
    try{
      if(isRecording){
        stopRecording();
      }else{
        await startRecording();
      }
    }catch(err){
      console.error(err);
    }
  }

  function bindStaticButtons(){
    if(DOM.btnRo){
      DOM.btnRo.addEventListener('click', function(){
        state.lang = 'ro';
        renderAll();
      });
    }

    if(DOM.btnEn){
      DOM.btnEn.addEventListener('click', function(){
        state.lang = 'en';
        renderAll();
      });
    }

    if(DOM.btnPlay){
      DOM.btnPlay.addEventListener('click', function(){
        speakSentence();
      });
    }

    if(DOM.btnRefresh){
      DOM.btnRefresh.addEventListener('click', function(){
        state.clauses = [makeClause()];
        if(DOM.textInput) DOM.textInput.value = '';
        renderAll();
      });
    }

    if(DOM.btnRecord){
      DOM.btnRecord.addEventListener('click', function(){
        toggleRecording();
      });
    }

    for(let i=1;i<=6;i++){
      const btn = document.getElementById('btnT' + i);
      if(btn){
        btn.addEventListener('click', function(){
          setLevel(i);
        });
      }
    }

    document.querySelectorAll('[data-level]').forEach(function(btn){
      btn.addEventListener('click', function(){
        setLevel(Number(btn.getAttribute('data-level')));
      });
    });

    if(DOM.textInput){
      DOM.textInput.addEventListener('input', function(){
        parseTextToClause(DOM.textInput.value);
      });
    }
  }

  function bindDelegatedEvents(){
    document.addEventListener('click', function(e){
      const openBtn = e.target.closest('.vocabOpenBtn');
      if(openBtn){
        const rowIndex = Number(openBtn.getAttribute('data-row-index'));
        const fieldKey = openBtn.getAttribute('data-field-key');
        openVocabSheet(rowIndex, fieldKey);
        return;
      }

      if(e.target.closest('#vocabSheetClose') || e.target.closest('[data-close-vocab]')){
        closeVocabSheet();
        return;
      }

      const vocabItem = e.target.closest('.vocabItem');
      if(vocabItem){
        const index = Number(vocabItem.getAttribute('data-vocab-index'));
        pickVocabItem(index);
      }
    });

    document.addEventListener('input', function(e){
      if(e.target && e.target.id === 'vocabSheetSearch'){
        filterVocabSheet(e.target.value);
      }
    });

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape'){
        closeVocabSheet();
      }
    });
  }

  function initFromExistingInput(){
    if(DOM.textInput && DOM.textInput.value && DOM.textInput.value.trim()){
      parseTextToClause(DOM.textInput.value);
    }else{
      renderAll();
    }
  }

  function init(){
    cacheDom();
    ensureVocabSheet();
    bindStaticButtons();
    bindDelegatedEvents();
    initFromExistingInput();

    window.setLevel = setLevel;
    window.renderClauses = renderClauses;
    window.renderAll = renderAll;
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  }else{
    init();
  }
})();
</script>
