
<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raluca Korean — Builder</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#db2777">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./theme-anime.css">
  <link rel="stylesheet" href="./builder.css">

</head><body>
  <div class="app">
    <section class="panel">
      <div class="topbar">
        <h1 class="title">Raluca Korean — Builder</h1>

        <div class="toolbar">
          <div id="pageControls"></div>

          <details class="topicMenu" id="templateMenu">
            <summary class="tplBubble">
              <span id="templateSummaryText">Șablon ▾</span>
            </summary>
            <div class="tplDropdown" id="templateDropdown"></div>
          </details>

          <details class="topicMenu" id="topicMenu">
            <summary class="topicBubble">
              <span class="topicDot"></span>
              <span id="topicSummaryText">T1 ▾</span>
            </summary>

            <div class="topicDropdown" id="topicDropdown">
              <button class="topicOption" data-level="1" type="button">T1</button>
              <button class="topicOption" data-level="2" type="button">T2</button>
              <button class="topicOption" data-level="3" type="button">T3</button>
              <button class="topicOption" data-level="4" type="button">T4</button>
              <button class="topicOption" data-level="5" type="button">T5</button>
              <button class="topicOption" data-level="6" type="button">T6</button>
            </div>
          </details>


        </div>
      </div>
    </section>

    <section class="panel">
      <div class="txtBar">
        <button class="tinyBtn txtToggleBtn" id="txtToggleBtn" type="button">▼ Text</button>
      </div>
      <div class="txtCollapsible" id="txtCollapsible">
        <textarea
          id="freeText"
          placeholder="Scrie aici o propoziție sau un lanț de propoziții..."
          autocomplete="off"
          autocapitalize="sentences"
          spellcheck="false"
        ></textarea>
      </div>
    </section>

    <section class="panel">
      <div class="previewBar">
        <div class="previewTools">
          <button class="iconBtn" id="refreshBtn" type="button" title="Refresh" aria-label="Refresh">↻</button>
          <button class="iconBtn" id="playBtn" type="button" title="Ascultă propoziția" aria-label="Ascultă propoziția">🔊</button>
          <button class="iconBtn" id="recordBtn" type="button" title="Înregistrează vocea" aria-label="Înregistrează vocea">🎤</button>
          <button class="iconBtn" id="saveBtn" type="button" title="Salvează propoziția" aria-label="Salvează propoziția">💾</button>
          <button class="iconBtn" id="quizBtn" type="button" title="Mod Quiz" aria-label="Mod Quiz">🎯</button>
        </div>
      </div>

      <div class="quizBar" id="quizBar">
        <div class="quizLabel" id="quizLabelEl"></div>
        <div class="quizTargetTr" id="quizTargetTr"></div>
        <div class="quizBtns">
          <button class="tinyBtn quizCheckBtn" id="quizCheckBtn" type="button"></button>
          <button class="tinyBtn quizExitBtn"  id="quizExitBtn"  type="button"></button>
        </div>
        <div class="quizResultEl" id="quizResultEl"></div>
      </div>

      <div
        class="sentenceBox"
        id="sentenceBox"
        tabindex="0"
        role="button"
        aria-label="Play sentence"
      >
        <div class="sentenceWords" id="sentenceWords"></div>
      </div>

      <div class="translationBox">
        <div class="translationText" id="translationText" contenteditable="true" spellcheck="false" data-placeholder="traducere..."></div>
      </div>

      <div class="recordBox" id="recordBox">
        <div class="recordedLabel">Înregistrarea ta</div>
        <audio id="recordedAudio" controls playsinline></audio>
      </div>
    </section>

    <section class="panel savedPanel" id="savedPanel">
      <div class="savedHeader">
        <span class="savedTitle" id="savedTitle">Propoziții salvate</span>
        <div class="savedActions">
          <button class="tinyBtn" id="exportBtn" type="button">⬇ .txt</button>
        </div>
      </div>
      <div class="savedList" id="savedList"></div>
    </section>

    <section class="panel">
      <div class="tableOuter">
        <div class="clauseList" id="clauseList"></div>
        <div class="tableFadeRight" id="tableFadeRight"></div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="./js/core/lang-picker.js"></script>
  <script src="./js/core/audio.js"></script>
  <script src="./js/core/conjugation.js"></script>
  <script src="./js/core/grammar.js"></script>
  <script src="./js/core/vocab-data.js"></script>
  <script src="./js/core/vocabulary.js"></script>
  <script src="./js/core/translations.js"></script>
  <script src="./js/core/sentence-builder.js"></script>
  <script src="./js/core/parser.js"></script>
  <script src="./js/core/grammar-color.js?v=18"></script>
  <script src="./js/builder.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
