<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Speaking</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
:root {
  --green: #58CC02;
  --green-dk: #45A800;
  --blue: #1CB0F6;
  --blue-dk: #009AC7;
  --red: #FF4B4B;
  --red-dk: #CC0000;
  --yellow: #FFC800;
  --yellow-dk: #A87700;
  --cyan: #22D3EE;
  --cyan-dk: #0E7490;
}
* { box-sizing: border-box; }

body.theme-anime {
  background: #f0f4f8;
  color: #3c3c3c;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  min-height: 100vh;
  margin: 0;
}

.app { max-width: 680px; margin: 0 auto; padding: 16px; }

.card {
  background: #fff;
  border: 2px solid #e5e5e5;
  border-bottom: 4px solid #d0d0d0;
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 14px;
}

/* ── HEADER ──────────────────────────────────────────── */
.hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.hdr-left h1 { margin: 0; font-size: 18px; font-weight: 900; }
.hdr-left .sub { font-size: 12px; color: #afafaf; font-weight: 700; margin-top: 2px; }
.hdr-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

#langRo, #langEn {
  padding: 6px 12px;
  border-radius: 10px;
  border: 2px solid #e5e5e5;
  border-bottom: 3px solid #d0d0d0;
  background: #fff;
  color: #3c3c3c;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
}
#langRo.active, #langEn.active {
  background: var(--blue);
  border-color: var(--blue);
  border-bottom-color: var(--blue-dk);
  color: #fff;
}

/* ── FILTER ──────────────────────────────────────────── */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-btn {
  padding: 7px 14px;
  border-radius: 12px;
  border: 2px solid #e5e5e5;
  border-bottom: 4px solid #d0d0d0;
  background: #fff;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  color: #3c3c3c;
  transition: transform .1s;
}
.filter-btn:hover { transform: translateY(-1px); }
.filter-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  border-bottom-color: var(--blue-dk);
  color: #fff;
}

/* ── SENTENCE CARD ───────────────────────────────────── */
.s-card {
  background: #fff;
  border: 2px solid #e5e5e5;
  border-bottom: 4px solid #d0d0d0;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
}
.s-badge {
  display: inline-block;
  background: var(--blue);
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  padding: 2px 9px;
  border-radius: 6px;
  margin-bottom: 10px;
}
.s-text {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 4px;
  letter-spacing: 1px;
  cursor: pointer;
}
.s-text:hover { opacity: .8; }
.s-rom { font-size: 13px; color: #afafaf; font-style: italic; margin-bottom: 4px; }
.s-meaning { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 14px; }

/* ── BUTTONS ──────────────────────────────────────────── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.s-btn {
  padding: 8px 14px;
  border-radius: 12px;
  border: 2px solid #e5e5e5;
  border-bottom: 4px solid #d0d0d0;
  background: #fff;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  color: #3c3c3c;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: transform .1s;
}
.s-btn:hover { transform: translateY(-1px); }
.s-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

.btn-blue  { background: var(--blue);   border-color: var(--blue);   border-bottom-color: var(--blue-dk);   color: #fff; }
.btn-red   { background: var(--red);    border-color: var(--red);    border-bottom-color: var(--red-dk);    color: #fff; }
.btn-green { background: var(--green);  border-color: var(--green);  border-bottom-color: var(--green-dk);  color: #fff; }
.btn-gold  { background: var(--yellow); border-color: var(--yellow); border-bottom-color: var(--yellow-dk); color: #3c3c3c; }
.btn-grey  { background: #afafaf;       border-color: #afafaf;       border-bottom-color: #888;             color: #fff; }

/* ── RECORDING INDICATOR ─────────────────────────────── */
.rec-ind {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 800;
  color: var(--red);
  margin: 10px 0 4px;
  cursor: pointer;
  user-select: none;
}
.rec-ind.on { display: flex; }
.rec-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--red);
  animation: blink .7s infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ── RESULT PANEL ────────────────────────────────────── */
.s-result {
  display: none;
  background: #f8f8f8;
  border: 1.5px solid #e5e5e5;
  border-radius: 12px;
  padding: 14px;
  margin-top: 12px;
}
.s-result.on { display: block; }
.score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.score-pct { font-size: 26px; font-weight: 900; min-width: 56px; }
.score-bar { flex: 1; height: 10px; border-radius: 999px; background: #e5e5e5; overflow: hidden; }
.score-fill { height: 100%; border-radius: 999px; transition: width .5s ease; }
.recog-txt { font-size: 13px; color: #888; margin-bottom: 6px; }
.s-highlight { font-size: 22px; font-weight: 700; letter-spacing: 1px; line-height: 1.4; }
.ch-ok  { color: var(--green); }
.ch-err { color: var(--red); text-decoration: underline dotted; }

/* ── DARK MODE ───────────────────────────────────────── */
body.dark-mode.theme-anime { background: #1a1a2e !important; color: #e0e0e0 !important; }

body.dark-mode .card,
body.dark-mode .s-card {
  background: #16213e !important;
  border-color: #2a2a4a !important;
  border-bottom-color: #1a1a30 !important;
  color: #e0e0e0 !important;
}

body.dark-mode .s-result {
  background: #0d1b2e;
  border-color: #2a2a4a;
}

body.dark-mode .filter-btn {
  background: #16213e !important;
  border-color: #2a2a4a !important;
  border-bottom-color: #1a1a30 !important;
  color: #e0e0e0 !important;
}
body.dark-mode .filter-btn.active {
  background: var(--blue) !important;
  border-color: var(--blue) !important;
  border-bottom-color: var(--blue-dk) !important;
  color: #fff !important;
}

body.dark-mode .s-btn:not(.btn-blue):not(.btn-red):not(.btn-green):not(.btn-gold):not(.btn-grey) {
  background: #16213e !important;
  border-color: #2a2a4a !important;
  border-bottom-color: #1a1a30 !important;
  color: #e0e0e0 !important;
}

body.dark-mode .s-rom     { color: #6a6a9a; }
body.dark-mode .s-meaning { color: #b0b0d0; }
body.dark-mode .recog-txt { color: #8080a0; }
body.dark-mode .score-bar { background: #2a2a4a; }

body.dark-mode #langRo:not(.active),
body.dark-mode #langEn:not(.active) {
  background: #16213e;
  border-color: #2a2a4a;
  color: #e0e0e0;
}
</style>
</head>
<body class="theme-anime">
<div class="app">

<!-- ══ HEADER ══════════════════════════════════════════ -->
<div class="card hdr">
  <div class="hdr-left">
    <h1 id="pageTitle">Speaking</h1>
    <div class="sub" id="pageSub">Pronunție · Ascultă · Înregistrează</div>
  </div>
  <div class="hdr-right">
    <a href="./index.html" class="homeBtn" aria-label="Acasă">🏠</a>
    <button id="langRo">ro</button>
    <button id="langEn">en</button>
  </div>
</div>

<!-- ══ FILTER ══════════════════════════════════════════ -->
<div class="filter-row" id="filterRow"></div>

<!-- ══ CARDS ═══════════════════════════════════════════ -->
<div id="cardList"></div>

</div><!-- /app -->

<script>
var LANG = localStorage.getItem('RK_LANG') || 'ro';
var FILTER = 0;

var SENTENCES = [
  // TOPIK 1
  {id:1,  topik:1, text:'안녕하세요',                       rom:'annyeonghaseyo',                          ro:'Bună ziua',                          en:'Hello'},
  {id:2,  topik:1, text:'감사합니다',                       rom:'gamsahamnida',                            ro:'Mulțumesc',                          en:'Thank you'},
  {id:3,  topik:1, text:'죄송합니다',                       rom:'joesonghamnida',                          ro:'Îmi pare rău',                       en:"I'm sorry"},
  {id:4,  topik:1, text:'저는 학생이에요',                  rom:'jeoneun haengseonieoyo',                  ro:'Sunt student(ă)',                     en:'I am a student'},
  {id:5,  topik:1, text:'오늘 날씨가 좋아요',               rom:'oneul nalssiga joayo',                    ro:'Vremea de azi e frumoasă',            en:'The weather is nice today'},
  {id:6,  topik:1, text:'저는 한국어를 공부해요',           rom:'jeoneun hangugeoreul gongbuhaeyo',        ro:'Studiez coreeana',                    en:'I study Korean'},
  // TOPIK 2
  {id:7,  topik:2, text:'내일 회의가 있어요',               rom:'naeil hoeiga isseoyo',                    ro:'Mâine am ședință',                    en:'There is a meeting tomorrow'},
  {id:8,  topik:2, text:'한국 음식이 맛있어요',             rom:'hanguk eumsigi massseoyo',                ro:'Mâncarea coreeană e delicioasă',      en:'Korean food is delicious'},
  {id:9,  topik:2, text:'지금 어디에 가요?',               rom:'jigeum eodie gayo',                       ro:'Unde mergi acum?',                    en:'Where are you going now?'},
  {id:10, topik:2, text:'저는 서울에 살아요',               rom:'jeoneun seoure sarayo',                   ro:'Locuiesc în Seul',                    en:'I live in Seoul'},
  // TOPIK 3
  {id:11, topik:3, text:'한국어를 배우는 것이 재미있어요',  rom:'hangugeoreul baeuneun geosi jaemiisseoyo',ro:'A învăța coreeana e interesant',      en:'Learning Korean is fun'},
  {id:12, topik:3, text:'서울에서 태어났어요',              rom:'seoureseo taeeonansseoyo',                ro:'M-am născut în Seul',                 en:'I was born in Seoul'}
];

var I18N = {
  ro: {
    title:     'Speaking',
    sub:       'Pronunție · Ascultă · Înregistrează',
    all:       'Toate',
    listen:    'Ascultă',
    slow:      'Lent',
    record:    'Înregistrează',
    recording: 'Înregistrare... (apasă pentru oprire)',
    playback:  'Redă',
    check:     'Verifică',
    shadow:    'Shadow',
    yousaid:   'Ai spus: ',
    unavail:   'Recunoaștere vocală indisponibilă în browser'
  },
  en: {
    title:     'Speaking',
    sub:       'Pronunciation · Listen · Record',
    all:       'All',
    listen:    'Listen',
    slow:      'Slow',
    record:    'Record',
    recording: 'Recording... (tap to stop)',
    playback:  'Play back',
    check:     'Check',
    shadow:    'Shadow',
    yousaid:   'You said: ',
    unavail:   'Speech recognition not supported in this browser'
  }
};

function t(k) { return I18N[LANG][k]; }

/* ── UTILS ──────────────────────────────────────────── */
function levenshtein(a, b) {
  var m = a.length, n = b.length, i, j;
  var d = [];
  for (i = 0; i <= m; i++) { d[i] = [i]; }
  for (j = 0; j <= n; j++) { d[0][j] = j; }
  for (i = 1; i <= m; i++) {
    for (j = 1; j <= n; j++) {
      d[i][j] = a[i-1] === b[j-1]
        ? d[i-1][j-1]
        : 1 + Math.min(d[i-1][j-1], d[i-1][j], d[i][j-1]);
    }
  }
  return d[m][n];
}

function calcScore(exp, recog) {
  var e = (exp   || '').replace(/\s+/g, '');
  var r = (recog || '').replace(/\s+/g, '');
  if (!r) return 0;
  return Math.max(0, 1 - levenshtein(e, r) / Math.max(e.length, r.length));
}

function scoreColor(s) {
  if (s >= 0.9) return '#58CC02';
  if (s >= 0.7) return '#FFC800';
  return '#FF4B4B';
}

function highlightText(exp, recog) {
  var e = exp.split('');
  var r = (recog || '').split('');
  return e.map(function(ch, i) {
    if (ch === ' ') return ' ';
    var ok = r[i] === ch;
    return '<span class="' + (ok ? 'ch-ok' : 'ch-err') + '">' + ch + '</span>';
  }).join('');
}

/* ── TTS ────────────────────────────────────────────── */
function playTTS(text, rate) {
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = rate || 1;
  speechSynthesis.speak(u);
}

/* ── BUILD CARD ─────────────────────────────────────── */
function buildCard(s) {
  var div = document.createElement('div');
  div.className = 's-card';

  var state = {
    recording:  false,
    mr:         null,
    blob:       null,
    url:        null,
    recognized: null,
    stopTimer:  null
  };

  div.innerHTML = [
    '<div class="s-badge">TOPIK ' + s.topik + '</div>',
    '<div class="s-text" title="' + t('listen') + '">' + s.text + '</div>',
    '<div class="s-rom">' + s.rom + '</div>',
    '<div class="s-meaning">' + s[LANG] + '</div>',
    '<div class="btn-row">',
      '<button class="s-btn btn-blue b-listen">🔊 ' + t('listen') + '</button>',
      '<button class="s-btn btn-blue b-slow">🐢 ' + t('slow') + '</button>',
      '<button class="s-btn btn-red b-rec">🎙 ' + t('record') + '</button>',
      '<button class="s-btn btn-gold b-shadow">⚡ ' + t('shadow') + '</button>',
    '</div>',
    '<div class="rec-ind b-recind">',
      '<div class="rec-dot"></div>',
      '<span class="rec-label">' + t('recording') + '</span>',
    '</div>',
    '<div class="btn-row btn-row-post" style="display:none;margin-top:10px;">',
      '<button class="s-btn btn-blue b-playback">▶️ ' + t('playback') + '</button>',
      '<button class="s-btn btn-green b-check">✔️ ' + t('check') + '</button>',
    '</div>',
    '<div class="s-result">',
      '<div class="score-row">',
        '<div class="score-pct">—</div>',
        '<div class="score-bar"><div class="score-fill"></div></div>',
      '</div>',
      '<div class="recog-txt"></div>',
      '<div class="s-highlight"></div>',
    '</div>'
  ].join('');

  var btnListen  = div.querySelector('.b-listen');
  var btnSlow    = div.querySelector('.b-slow');
  var btnRec     = div.querySelector('.b-rec');
  var btnShadow  = div.querySelector('.b-shadow');
  var recInd     = div.querySelector('.b-recind');
  var postRow    = div.querySelector('.btn-row-post');
  var btnPlayback= div.querySelector('.b-playback');
  var btnCheck   = div.querySelector('.b-check');
  var resDiv     = div.querySelector('.s-result');
  var scorePct   = div.querySelector('.score-pct');
  var scoreFill  = div.querySelector('.score-fill');
  var recogTxt   = div.querySelector('.recog-txt');
  var highlight  = div.querySelector('.s-highlight');

  /* TTS */
  div.querySelector('.s-text').onclick = function() { playTTS(s.text, 1); };
  btnListen.onclick = function() { playTTS(s.text, 1); };
  btnSlow.onclick   = function() { playTTS(s.text, 0.6); };

  /* Start recording */
  function startRec() {
    if (state.recording) return;
    navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
      var chunks = [];
      state.mr = new MediaRecorder(stream);
      state.mr.ondataavailable = function(e) { chunks.push(e.data); };
      state.mr.onstop = function() {
        state.blob = new Blob(chunks, {type: 'audio/webm'});
        state.url  = URL.createObjectURL(state.blob);
        stream.getTracks().forEach(function(t) { t.stop(); });
        state.recording = false;
        clearTimeout(state.stopTimer);
        recInd.classList.remove('on');
        btnRec.style.display = '';
        postRow.style.display = 'flex';
      };
      state.mr.start();
      state.recording = true;
      recInd.classList.add('on');
      btnRec.style.display = 'none';

      /* Run SpeechRecognition in parallel for scoring */
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        var recog = new SR();
        recog.lang = 'ko-KR';
        recog.interimResults = false;
        recog.onresult = function(e) {
          state.recognized = e.results[0][0].transcript;
        };
        try { recog.start(); } catch(e) { /* ignore if mic already in use */ }
      }

      /* Auto-stop after 6 s */
      state.stopTimer = setTimeout(function() {
        if (state.recording && state.mr) state.mr.stop();
      }, 6000);

    }).catch(function() {
      alert(LANG === 'ro' ? 'Acces la microfon necesar' : 'Microphone access required');
    });
  }

  btnRec.onclick   = startRec;
  recInd.onclick   = function() { if (state.recording && state.mr) state.mr.stop(); };

  /* Playback */
  btnPlayback.onclick = function() {
    if (state.url) new Audio(state.url).play();
  };

  /* Check */
  btnCheck.onclick = function() {
    var score = calcScore(s.text, state.recognized);
    var pct   = Math.round(score * 100);
    var color = scoreColor(score);

    scorePct.textContent  = pct + '%';
    scorePct.style.color  = color;
    scoreFill.style.width = pct + '%';
    scoreFill.style.background = color;

    if (state.recognized) {
      recogTxt.textContent = t('yousaid') + state.recognized;
      highlight.innerHTML  = highlightText(s.text, state.recognized);
    } else {
      recogTxt.textContent = t('unavail');
      highlight.innerHTML  = '';
    }
    resDiv.classList.add('on');
  };

  /* Shadow: TTS slow → auto-record after audio ends */
  btnShadow.onclick = function() {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(s.text);
    u.lang = 'ko-KR';
    u.rate = 0.7;
    u.onend = function() {
      setTimeout(function() {
        if (!state.recording) startRec();
      }, 400);
    };
    speechSynthesis.speak(u);
  };

  return div;
}

/* ── RENDER ─────────────────────────────────────────── */
function renderFilter() {
  var row = document.getElementById('filterRow');
  row.innerHTML = '';
  var levels = [0, 1, 2, 3];
  levels.forEach(function(lvl) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (lvl === FILTER ? ' active' : '');
    btn.textContent = lvl === 0 ? t('all') : 'TOPIK ' + lvl;
    btn.onclick = function() {
      FILTER = lvl;
      row.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderCards();
    };
    row.appendChild(btn);
  });
}

function renderCards() {
  var list = document.getElementById('cardList');
  var data = FILTER === 0
    ? SENTENCES
    : SENTENCES.filter(function(s) { return s.topik === FILTER; });
  list.innerHTML = '';
  data.forEach(function(s) { list.appendChild(buildCard(s)); });
}

function applyLang(lang) {
  LANG = lang;
  localStorage.setItem('RK_LANG', lang);
  document.documentElement.lang = lang;
  document.getElementById('langRo').classList.toggle('active', lang === 'ro');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.getElementById('pageTitle').textContent = t('title');
  document.getElementById('pageSub').textContent   = t('sub');
  renderFilter();
  renderCards();
}

document.getElementById('langRo').onclick = function() { applyLang('ro'); };
document.getElementById('langEn').onclick = function() { applyLang('en'); };

applyLang(LANG);
</script>

<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
