<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Lecții TOPIK</title>

<style>
:root{
  --bg:#070617;
  --card: rgba(16,14,40,.75);
  --stroke: rgba(255,255,255,.12);
  --text:#f3f4ff;
  --muted: rgba(243,244,255,.7);
  --accent:#7c3aed;
  --accent2:#22d3ee;
  --radius:22px;
  --shadow:0 18px 50px rgba(0,0,0,.45);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:linear-gradient(135deg,#090818,#071425);
  color:var(--text);
}

.app{
  max-width:1000px;
  margin:0 auto;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

h1,h2,h3{margin:0 0 10px}
h1{font-size:24px}
h2{font-size:20px}
h3{font-size:16px}

.sub{color:var(--muted);font-size:13px}

.grid{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:16px;
}
@media(max-width:720px){
  .grid{grid-template-columns:1fr}
}

/* SIDEBAR */
.lesson-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.lesson-item{
  padding:10px 12px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:rgba(10,8,28,.55);
  cursor:pointer;
  font-weight:700;
}
.lesson-item:hover{border-color:var(--accent2)}
.lesson-item.active{
  background:rgba(124,58,237,.18);
  border-color:var(--accent);
}

/* CONTENT */
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(124,58,237,.15);
  border:1px solid rgba(124,58,237,.35);
  font-weight:800;
  font-size:12px;
  margin-bottom:10px;
}
.example{
  background:rgba(10,8,28,.55);
  border:1px dashed rgba(255,255,255,.18);
  border-radius:14px;
  padding:10px 12px;
  margin:8px 0;
}
.example .ko{font-weight:900}
.example .ro{font-size:13px;color:var(--muted)}
.notes{margin-top:10px;font-size:13px;color:var(--muted)}

button{
  margin-top:14px;
  padding:10px 16px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  font-weight:900;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <div class="card">
    <h1 id="pageTitle">Lecții TOPIK</h1>
    <div class="sub" id="pageSubtitle">Structurate • Clare • Conectate cu exercițiile</div>

    <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
      <button type="button" id="langRo">Română</button>
      <button type="button" id="langEn">English</button>
    </div>
  </div>

  <div class="grid">

    <!-- SIDEBAR -->
    <div class="card">
      <h3>TOPIK 1–4</h3>
      <div class="lesson-list" id="lessonList"></div>
    </div>

    <!-- CONTENT -->
    <div class="card" id="lessonContent">
      <div class="sub">Selectează o lecție din stânga</div>
    </div>

  </div>
</div>

<script>
const listEl = document.getElementById("lessonList");
const contentEl = document.getElementById("lessonContent");
const pageTitleEl = document.getElementById("pageTitle");
const pageSubtitleEl = document.getElementById("pageSubtitle");
const langRoBtn = document.getElementById("langRo");
const langEnBtn = document.getElementById("langEn");

let lessons = [];
let currentLessonId = null;
let currentLang = localStorage.getItem("RK_LANG") || "ro";

const UI_TEXT = {
  ro: {
    pageTitle: "Lecții TOPIK",
    pageSubtitle: "Structurate • Clare • Conectate cu exercițiile",
    sidebarTitle: "TOPIK 1–6",
    selectLesson: "Selectează o lecție din stânga",
    lessonMissing: "Lecția nu există.",
    structure: "Structură",
    notes: "Note",
    practice: "Exersează această lecție →",
    topik: "TOPIK"
  },
  en: {
    pageTitle: "TOPIK Lessons",
    pageSubtitle: "Structured • Clear • Connected to exercises",
    sidebarTitle: "TOPIK 1–6",
    selectLesson: "Select a lesson from the left",
    lessonMissing: "Lesson not found.",
    structure: "Structure",
    notes: "Notes",
    practice: "Practice this lesson →",
    topik: "TOPIK"
  }
};

function t(key){
  return UI_TEXT[currentLang][key];
}

function updateHeaderTexts(){
  pageTitleEl.textContent = t("pageTitle");
  pageSubtitleEl.textContent = t("pageSubtitle");

  const sidebarTitle = document.querySelector(".card h3");
  if(sidebarTitle){
    sidebarTitle.textContent = t("sidebarTitle");
  }
}

function updateLanguageButtons(){
  const activeStyle = "linear-gradient(135deg,#22d3ee,#7c3aed)";
  const inactiveStyle = "rgba(10,8,28,.55)";

  if(currentLang === "ro"){
    langRoBtn.style.background = activeStyle;
    langRoBtn.style.color = "#000";
    langEnBtn.style.background = inactiveStyle;
    langEnBtn.style.color = "var(--text)";
  } else {
    langEnBtn.style.background = activeStyle;
    langEnBtn.style.color = "#000";
    langRoBtn.style.background = inactiveStyle;
    langRoBtn.style.color = "var(--text)";
  }
}

function setLanguage(lang){
  currentLang = lang;
  localStorage.setItem("RK_LANG", lang);
  updateHeaderTexts();
  updateLanguageButtons();
  renderLessonList();

  if(currentLessonId){
    selectLesson(currentLessonId);
  } else {
    contentEl.innerHTML = `<div class="sub">${t("selectLesson")}</div>`;
  }
}

async function loadLessons(){
  try {
    const response = await fetch("./data/lessons.json");
    const data = await response.json();

    lessons = Array.isArray(data) ? data : [];

    lessons.sort((a, b) => {
      if (a.topik !== b.topik) return a.topik - b.topik;
      return a.id.localeCompare(b.id);
    });

    renderLessonList();

    if(lessons.length > 0){
      selectLesson(lessons[0].id);
    } else {
      contentEl.innerHTML = `<div class="sub">${t("lessonMissing")}</div>`;
    }
  } catch (error) {
    console.error("Lessons load error:", error);
    contentEl.innerHTML = `<div class="sub">Nu am putut încărca lessons.json</div>`;
  }
}

function renderLessonList(){
  listEl.innerHTML = "";

  lessons.forEach(lesson => {
    const el = document.createElement("div");
    el.className = "lesson-item";
    el.dataset.id = lesson.id;
    el.textContent = `${t("topik")} ${lesson.topik} · ${lesson.title[currentLang]}`;

    if(lesson.id === currentLessonId){
      el.classList.add("active");
    }

    el.addEventListener("click", () => {
      selectLesson(lesson.id);
    });

    listEl.appendChild(el);
  });
}

function selectLesson(id){
  currentLessonId = id;

  document.querySelectorAll(".lesson-item").forEach(item => {
    item.classList.toggle("active", item.dataset.id === id);
  });

  const lesson = lessons.find(item => item.id === id);

  if(!lesson){
    contentEl.innerHTML = `<div class="sub">${t("lessonMissing")}</div>`;
    return;
  }

  const title = lesson.title[currentLang];
  const explanation = lesson.explanation[currentLang];
  const notes = Array.isArray(lesson.notes[currentLang]) ? lesson.notes[currentLang] : [];
  const examples = Array.isArray(lesson.examples) ? lesson.examples : [];

  contentEl.innerHTML = `
    <span class="badge">${t("topik")} ${lesson.topik}</span>
    <h2>${title}</h2>
    <p>${explanation}</p>
    <div class="sub"><b>${t("structure")}:</b> ${lesson.structure}</div>

    ${examples.map(example => `
      <div class="example">
        <div class="ko">${example.ko}</div>
        <div class="ro">${example[currentLang]}</div>
      </div>
    `).join("")}

    ${notes.length ? `
      <div class="notes">
        <b>${t("notes")}:</b>
        <ul>
          ${notes.map(note => `<li>${note}</li>`).join("")}
        </ul>
      </div>
    ` : ""}

    <button type="button" id="practiceLessonBtn">${t("practice")}</button>
  `;

  const practiceBtn = document.getElementById("practiceLessonBtn");
  if(practiceBtn){
    practiceBtn.addEventListener("click", () => {
      goExercises(lesson.id);
    });
  }
}

function goExercises(lessonId){
  window.location.href = `exercises.html?lesson=${lessonId}`;
}

langRoBtn.addEventListener("click", () => setLanguage("ro"));
langEnBtn.addEventListener("click", () => setLanguage("en"));

updateHeaderTexts();
updateLanguageButtons();
loadLessons();
</script>

</body>
</html>
