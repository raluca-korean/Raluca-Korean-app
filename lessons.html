<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Lecții TOPIK</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
.ko-speak { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
.ko-speak:hover { opacity: 0.8; }
.speak-icon { font-size: 14px; opacity: 0.6; flex-shrink: 0; }
</style>
</head>
  <body class="theme-anime">
    
<div class="app">

  <!-- HEADER -->
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <div>
      <h1 id="pageTitle">Lecții TOPIK</h1>
      <div class="sub" id="pageSubtitle">Structurate • Clare • Conectate cu exercițiile</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
      <a href="./index.html" class="homeBtn" aria-label="Acasă">🏠</a>
      <button type="button" id="langRo" aria-label="Română" aria-pressed="true">ro</button>
      <button type="button" id="langEn" aria-label="English" aria-pressed="false">en</button>
    </div>
  </div>

  <div class="grid">

    <!-- SIDEBAR -->
    <div class="card" id="sidebarCard">
      <div class="topik-tabs" id="topikTabs"></div>
      <div class="lesson-list" id="lessonList"></div>
    </div>

    <!-- CONTENT -->
    <div class="card" id="lessonContent"></div>

  </div>
</div>

<style>
.topik-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
}
.topik-tab{
  padding:10px 4px;
  min-height:44px;
  border-radius:14px;
  border:1.5px solid rgba(219,39,119,.20);
  background:linear-gradient(160deg,#fff,#fdf4ff);
  font-weight:900;
  font-size:14px;
  cursor:pointer;
  text-align:center;
  color:#7c3aed;
  box-shadow:0 4px 12px rgba(219,39,119,.08);
  transition:transform .12s, box-shadow .12s, background .12s;
}
.topik-tab:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 22px rgba(219,39,119,.18);
}
.topik-tab.active{
  background:linear-gradient(135deg,#db2777,#7c3aed);
  color:#fff;
  border-color:transparent;
  box-shadow:0 8px 24px rgba(219,39,119,.30);
}
</style>

<script src="./js/core/lang.js"></script>
<script src="./js/lessons.js"></script>

<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
