<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Lecții</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7c3aed">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<style>
/* ════════════════════════════════════════════════════════════
   SYNAPTIC BLOOM  —  Living Knowledge Architecture  v1.0
   ────────────────────────────────────────────────────────────
   A new interface paradigm.
   Knowledge does not live in pages or lists.
   It exists as living organisms in a cognitive field.
   The field responds to the user's attention.
   Nodes bloom. Gravity pulls. The cosmos breathes.
════════════════════════════════════════════════════════════ */

/* ── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── LIGHT MODE (Aurora Field) ──────────────────────────── */
:root {
  --sb-bg:             linear-gradient(145deg,#f9f7ff 0%,#fdf2ff 45%,#f0f8ff 100%);
  --sb-dot:            rgba(124,58,237,0.09);
  --sb-orb1:           rgba(139,92,246,0.13);
  --sb-orb2:           rgba(236,72,153,0.10);
  --sb-orb3:           rgba(14,165,233,0.08);

  --sb-text:           #0d0320;
  --sb-text2:          #5b21b6;
  --sb-muted:          rgba(91,33,182,0.50);
  --sb-hdr-bg:         rgba(249,247,255,0.88);
  --sb-hdr-border:     rgba(124,58,237,0.10);

  --sb-nd-bg:          rgba(255,255,255,0.88);
  --sb-nd-border:      rgba(124,58,237,0.28);
  --sb-nd-glow:        rgba(124,58,237,0.14);
  --sb-nd-hover-b:     rgba(219,39,119,0.60);
  --sb-nd-hover-glow:  rgba(219,39,119,0.18);
  --sb-nd-done-b:      rgba(22,163,74,0.45);
  --sb-nd-done-glow:   rgba(22,163,74,0.12);
  --sb-nd-ko:          #6d28d9;
  --sb-nd-hover-ko:    #be185d;
  --sb-nd-done-ko:     #15803d;

  --sb-bloom-bg:       rgba(255,255,255,0.97);
  --sb-bloom-border:   rgba(124,58,237,0.18);
  --sb-bloom-shadow:   0 40px 100px rgba(91,33,182,0.14),
                       0 8px 32px rgba(91,33,182,0.08),
                       0 0 0 1px rgba(124,58,237,0.10);
  --sb-bloom-line:     rgba(124,58,237,0.14);
  --sb-ex-bg:          rgba(124,58,237,0.05);
  --sb-ex-bg-hover:    rgba(124,58,237,0.09);
  --sb-ex-border:      rgba(124,58,237,0.20);
  --sb-note-bg:        rgba(219,39,119,0.04);
  --sb-note-border:    rgba(219,39,119,0.14);

  --sb-orb-bg:         rgba(248,246,255,0.92);
  --sb-orb-border:     rgba(124,58,237,0.10);
  --sb-orb-active-bg:  rgba(124,58,237,0.10);
  --sb-orb-active-b:   #7c3aed;
  --sb-orb-active-c:   #7c3aed;
  --sb-orb-dot:        rgba(124,58,237,0.35);

  --sb-a1:             #7c3aed;
  --sb-a2:             #db2777;
  --sb-a3:             #0ea5e9;
  --sb-green:          #16a34a;
  --sb-close-bg:       rgba(124,58,237,0.07);
  --sb-close-hover:    rgba(124,58,237,0.14);

  --sb-conn-color:     rgba(124,58,237,0.25);
  --sb-conn-active:    rgba(219,39,119,0.40);

  --sb-badge-bg:       rgba(124,58,237,0.08);
  --sb-badge-border:   rgba(124,58,237,0.22);
  --sb-badge-text:     #6d28d9;
  --sb-done-badge-bg:  rgba(22,163,74,0.08);
  --sb-done-badge-b:   rgba(22,163,74,0.25);
  --sb-done-badge-c:   #15803d;
}

/* ── DARK MODE (Deep Cosmos) ─────────────────────────────── */
body.dark-mode {
  --sb-bg:             linear-gradient(145deg,#04000e 0%,#080018 45%,#030010 100%);
  --sb-dot:            rgba(167,139,250,0.055);
  --sb-orb1:           rgba(139,92,246,0.20);
  --sb-orb2:           rgba(236,72,153,0.15);
  --sb-orb3:           rgba(14,165,233,0.12);

  --sb-text:           #ede0ff;
  --sb-text2:          #c4b5fd;
  --sb-muted:          rgba(196,181,253,0.45);
  --sb-hdr-bg:         rgba(4,0,14,0.90);
  --sb-hdr-border:     rgba(167,139,250,0.09);

  --sb-nd-bg:          rgba(12,0,32,0.82);
  --sb-nd-border:      rgba(167,139,250,0.28);
  --sb-nd-glow:        rgba(139,92,246,0.22);
  --sb-nd-hover-b:     rgba(244,114,182,0.65);
  --sb-nd-hover-glow:  rgba(244,114,182,0.22);
  --sb-nd-done-b:      rgba(74,222,128,0.40);
  --sb-nd-done-glow:   rgba(74,222,128,0.12);
  --sb-nd-ko:          #c4b5fd;
  --sb-nd-hover-ko:    #f9a8d4;
  --sb-nd-done-ko:     #4ade80;

  --sb-bloom-bg:       rgba(6,0,20,0.97);
  --sb-bloom-border:   rgba(167,139,250,0.16);
  --sb-bloom-shadow:   0 40px 100px rgba(0,0,0,0.80),
                       0 8px 32px rgba(0,0,0,0.60),
                       0 0 0 1px rgba(167,139,250,0.10),
                       0 0 80px rgba(124,58,237,0.12);
  --sb-bloom-line:     rgba(167,139,250,0.12);
  --sb-ex-bg:          rgba(139,92,246,0.07);
  --sb-ex-bg-hover:    rgba(139,92,246,0.12);
  --sb-ex-border:      rgba(167,139,250,0.20);
  --sb-note-bg:        rgba(244,114,182,0.06);
  --sb-note-border:    rgba(244,114,182,0.14);

  --sb-orb-bg:         rgba(4,0,14,0.94);
  --sb-orb-border:     rgba(167,139,250,0.09);
  --sb-orb-active-bg:  rgba(167,139,250,0.10);
  --sb-orb-active-b:   #a78bfa;
  --sb-orb-active-c:   #a78bfa;
  --sb-orb-dot:        rgba(167,139,250,0.40);

  --sb-a1:             #a78bfa;
  --sb-a2:             #f472b6;
  --sb-a3:             #38bdf8;
  --sb-green:          #4ade80;
  --sb-close-bg:       rgba(167,139,250,0.07);
  --sb-close-hover:    rgba(167,139,250,0.14);

  --sb-conn-color:     rgba(167,139,250,0.22);
  --sb-conn-active:    rgba(244,114,182,0.38);

  --sb-badge-bg:       rgba(167,139,250,0.10);
  --sb-badge-border:   rgba(167,139,250,0.22);
  --sb-badge-text:     #c4b5fd;
  --sb-done-badge-bg:  rgba(74,222,128,0.09);
  --sb-done-badge-b:   rgba(74,222,128,0.24);
  --sb-done-badge-c:   #4ade80;
}

/* ── Base ────────────────────────────────────────────────── */
body.theme-anime {
  font-family: 'Space Grotesk','Noto Sans KR',system-ui,sans-serif;
  background: var(--sb-bg) !important;
  color: var(--sb-text) !important;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
  transition: background 0.45s ease, color 0.35s ease;
}

/* ── Dot-grid neural-net texture ────────────────────────── */
body.theme-anime::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: radial-gradient(circle, var(--sb-dot) 1.5px, transparent 1.5px);
  background-size: 42px 42px;
  pointer-events: none;
  transition: background-image 0.45s ease;
}

/* ── Ambient gradient aura ──────────────────────────────── */
body.theme-anime::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(ellipse 55% 45% at 18% 22%, var(--sb-orb1) 0%, transparent 72%),
    radial-gradient(ellipse 50% 40% at 82% 72%, var(--sb-orb2) 0%, transparent 72%),
    radial-gradient(ellipse 42% 55% at 62% 8%,  var(--sb-orb3) 0%, transparent 72%);
  transition: background 0.45s ease;
}

/* ── Ambient drift orbs ─────────────────────────────────── */
#sb-ambience {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}
.sb-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  animation: sb-drift linear infinite;
  will-change: transform;
}
.sb-orb-a {
  width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
  top: -120px; left: -80px;
  animation-duration: 28s;
  opacity: 0.7;
}
.sb-orb-b {
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(219,39,119,0.15) 0%, transparent 70%);
  bottom: -80px; right: -60px;
  animation-duration: 34s;
  animation-delay: -14s;
  opacity: 0.7;
}
.sb-orb-c {
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
  top: 35%; right: 8%;
  animation-duration: 22s;
  animation-delay: -8s;
  opacity: 0.6;
}
@keyframes sb-drift {
  0%,100% { transform: translate(0,0) scale(1); }
  25%      { transform: translate(28px,-18px) scale(1.04); }
  50%      { transform: translate(-18px,26px) scale(0.97); }
  75%      { transform: translate(14px,18px) scale(1.02); }
}

/* ── LOADER ─────────────────────────────────────────────── */
#sb-loader {
  position: fixed;
  inset: 0;
  z-index: 900;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: var(--sb-bg);
  transition: opacity 0.5s ease;
}
#sb-loader.sb-hidden {
  opacity: 0;
  pointer-events: none;
}
.sb-ring {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid var(--sb-dot);
  border-top-color: var(--sb-a1);
  animation: sb-spin 0.85s linear infinite;
}
@keyframes sb-spin { to { transform: rotate(360deg); } }
#sb-loader-txt {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--sb-muted);
}

/* ── HEADER ─────────────────────────────────────────────── */
#sb-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  background: var(--sb-hdr-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--sb-hdr-border);
  transition: background 0.45s, border-color 0.45s;
}
#sb-paradigm {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sb-muted);
  margin-bottom: 1px;
}
#sb-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--sb-text);
  letter-spacing: -0.2px;
}

/* ── NODE FIELD ─────────────────────────────────────────── */
#sb-field {
  position: fixed;
  inset: 60px 0 74px 0;
  z-index: 10;
  overflow: hidden;
}

/* SVG connector lines layer */
#sb-svg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: visible;
}

/* ── NODE ───────────────────────────────────────────────── */
.sb-node {
  position: absolute;
  width: 156px;
  height: 62px;
  border-radius: 18px;
  cursor: pointer;
  transform: translate(-50%, -50%);
  z-index: 5;

  background: var(--sb-nd-bg);
  border: 1.5px solid var(--sb-nd-border);
  box-shadow: 0 0 0 7px var(--sb-nd-glow), 0 4px 18px rgba(0,0,0,0.07);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 0 10px;

  user-select: none;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  will-change: transform, box-shadow, opacity;
  transition:
    box-shadow 0.35s ease,
    border-color 0.35s ease,
    opacity 0.4s ease;
}

/* Breathing pulse ring */
.sb-node::before {
  content: '';
  position: absolute;
  inset: -9px;
  border-radius: 24px;
  border: 1px solid var(--sb-nd-border);
  opacity: 0;
  animation: sb-breathe 3.5s ease-in-out infinite;
  pointer-events: none;
}
.sb-node:nth-child(2n)::before  { animation-delay: -0.6s; }
.sb-node:nth-child(3n)::before  { animation-delay: -1.2s; }
.sb-node:nth-child(4n)::before  { animation-delay: -1.8s; }
.sb-node:nth-child(5n)::before  { animation-delay: -2.4s; }
.sb-node:nth-child(7n)::before  { animation-delay: -2.9s; }
@keyframes sb-breathe {
  0%,100% { opacity: 0;    transform: scale(1);    }
  50%      { opacity: 0.45; transform: scale(1.10); }
}

/* Hover + focus */
.sb-node:hover,
.sb-node:focus-visible {
  border-color: var(--sb-nd-hover-b);
  box-shadow: 0 0 0 11px var(--sb-nd-hover-glow), 0 8px 28px rgba(0,0,0,0.12);
  z-index: 15;
  outline: none;
}
.sb-node:hover .sb-nd-ko,
.sb-node:focus-visible .sb-nd-ko { color: var(--sb-nd-hover-ko); }

/* Done */
.sb-node.sb-done {
  border-color: var(--sb-nd-done-b);
  box-shadow: 0 0 0 7px var(--sb-nd-done-glow), 0 4px 18px rgba(0,0,0,0.07);
}
.sb-node.sb-done .sb-nd-ko { color: var(--sb-nd-done-ko); }

/* Korean glyph in node */
.sb-nd-ko {
  font-family: 'Noto Sans KR', 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--sb-nd-ko);
  line-height: 1.25;
  width: 100%;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  pointer-events: none;
  transition: color 0.3s ease;
  padding: 0 4px;
}

/* Full lesson title on node */
.sb-nd-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--sb-text);
  opacity: 0.62;
  line-height: 1.25;
  width: 100%;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  pointer-events: none;
  transition: color 0.3s ease, opacity 0.3s ease;
}
.sb-node:hover .sb-nd-title { opacity: 0.90; }
.sb-node.sb-done .sb-nd-title { color: var(--sb-nd-done-ko); opacity: 0.72; }

/* Entrance animation */
@keyframes sb-node-in {
  from { opacity: 0; transform: translate(-50%,-50%) scale(0.4); }
  to   { opacity: 1; transform: translate(-50%,-50%) scale(1);   }
}

/* Recede when another node is bloomed */
.sb-node.sb-recede {
  opacity: 0.15 !important;
  transform: translate(-50%,-50%) scale(0.68) !important;
  pointer-events: none !important;
  transition:
    opacity 0.5s cubic-bezier(0.4,0,0.2,1),
    transform 0.5s cubic-bezier(0.4,0,0.2,1) !important;
}

/* Active (source of current bloom) — stays visible as a faint anchor */
.sb-node.sb-active-src {
  opacity: 0.22 !important;
  pointer-events: none !important;
  transition: opacity 0.4s ease !important;
}

/* ── SYNAPTIC CONNECTOR LINE (SVG) ──────────────────────── */
.sb-conn-line {
  stroke: var(--sb-conn-color);
  stroke-width: 1;
  fill: none;
  stroke-dasharray: 4 6;
  animation: sb-dash 1.2s linear infinite;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.sb-conn-line.sb-conn-visible {
  opacity: 1;
}
@keyframes sb-dash { to { stroke-dashoffset: -20; } }

/* ── BLOOM ORGANISM ─────────────────────────────────────── */
/* Not a panel. Not a modal. A living knowledge organism.    */
#sb-bloom {
  position: fixed;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  /* JS positions this */
}
#sb-bloom.sb-bloom-open {
  pointer-events: all;
  opacity: 1;
}

#sb-bloom-body {
  position: relative;
  background: var(--sb-bloom-bg);
  border: 1px solid var(--sb-bloom-border);
  border-radius: 26px;
  box-shadow: var(--sb-bloom-shadow);
  padding: 30px 32px 26px;
  width: 500px;
  max-width: calc(100vw - 28px);
  max-height: calc(100dvh - 152px);
  overflow-y: auto;
  overflow-x: hidden;
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  scrollbar-width: thin;
  scrollbar-color: var(--sb-bloom-border) transparent;
  transition: background 0.45s, border-color 0.45s, box-shadow 0.45s;
}
#sb-bloom-body::-webkit-scrollbar { width: 3px; }
#sb-bloom-body::-webkit-scrollbar-track { background: transparent; }
#sb-bloom-body::-webkit-scrollbar-thumb { background: var(--sb-bloom-border); border-radius: 2px; }

/* Bloom entrance / exit */
@keyframes sb-bloom-enter {
  0%   { opacity: 0; transform: scale(0.82) translateY(14px); }
  60%  { opacity: 1; transform: scale(1.02) translateY(-2px); }
  100% { opacity: 1; transform: scale(1)    translateY(0);     }
}
@keyframes sb-bloom-exit {
  from { opacity: 1; transform: scale(1)    translateY(0);  }
  to   { opacity: 0; transform: scale(0.88) translateY(8px); }
}
.sb-bloom-entering #sb-bloom-body {
  animation: sb-bloom-enter 0.48s cubic-bezier(0.16,1,0.3,1) both;
}
.sb-bloom-leaving #sb-bloom-body {
  animation: sb-bloom-exit 0.26s ease both;
}

/* ── BLOOM CONTENT ───────────────────────────────────────── */
/* Each section crystallizes in with a staggered delay */
@keyframes sb-cryst {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0);     }
}

.sb-topik-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sb-badge-text);
  background: var(--sb-badge-bg);
  border: 1px solid var(--sb-badge-border);
  border-radius: 999px;
  padding: 3px 11px;
  margin-bottom: 10px;
  opacity: 0;
  animation: sb-cryst 0.4s 0.06s ease both;
}

/* done tag shown alongside TOPIK tag */
.sb-done-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sb-done-badge-c);
  background: var(--sb-done-badge-bg);
  border: 1px solid var(--sb-done-badge-b);
  border-radius: 999px;
  padding: 3px 10px;
  margin-left: 6px;
  opacity: 0;
  animation: sb-cryst 0.4s 0.10s ease both;
}

.sb-bloom-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 21px;
  font-weight: 900;
  color: var(--sb-text);
  line-height: 1.3;
  margin-bottom: 12px;
  opacity: 0;
  animation: sb-cryst 0.4s 0.14s ease both;
}

.sb-bloom-exp {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--sb-text);
  line-height: 1.72;
  margin-bottom: 6px;
  opacity: 0;
  animation: sb-cryst 0.4s 0.19s ease both;
}

.sb-bloom-struct {
  font-size: 12px;
  font-weight: 600;
  color: var(--sb-muted);
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: 0.2px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--sb-bloom-line);
  opacity: 0;
  animation: sb-cryst 0.4s 0.23s ease both;
}

.sb-section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.8px;
  text-transform: uppercase;
  color: var(--sb-muted);
  margin-bottom: 9px;
  opacity: 0;
  animation: sb-cryst 0.4s 0.28s ease both;
}

.sb-examples {
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-bottom: 18px;
  opacity: 0;
  animation: sb-cryst 0.5s 0.32s ease both;
}

.sb-ex {
  padding: 11px 14px;
  border-radius: 13px;
  background: var(--sb-ex-bg);
  border-left: 2.5px solid var(--sb-a1);
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}
.sb-ex:hover {
  background: var(--sb-ex-bg-hover);
  border-left-color: var(--sb-a2);
}
.sb-ex-ko {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15.5px;
  font-weight: 700;
  color: var(--sb-a1);
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
body.dark-mode .sb-ex-ko { color: var(--sb-a3); }

<body class="theme-anime">

<div id="sb-loader">

<header id="sb-header">

    <div id="sb-paradigm">Synaptic Bloom</div>

<!-- ── LIVING NODE FIELD ─────────────────────────────── -->

  <!-- Empty state -->
  <div id="sb-empty" aria-live="polite">
    <div class="sb-empty-glyph">한</div>

  <!-- Nodes injected by JS -->

  <div id="sb-bloom-body">
    <button type="button" id="sb-bloom-close" aria-label="Închide">✕</button>
    <div id="sb-bloom-content"></div>
  </div>
</div>

<!-- ── TOPIK ORBIT SELECTOR ─────────────────────────── -->
<nav id="sb-orbit" aria-label="Nivel TOPIK">
  <!-- injected by JS -->
</nav>

<!-- ── SCRIPTS ──────────────────────────────────────── -->
<script src="./js/core/storage.js"></script>
<script src="./js/core/grammar-color.js?v=18"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   SYNAPTIC BLOOM — Interaction Engine v1.0
   ════════════════════════════════════════════════════════════ */
'use strict';

// ── State ─────────────────────────────────────────────────────
let _lessons     = [];
let _topik       = 1;
let _lang        = RKLang.get();
let _bloomId     = null;
let _animating   = false;

// ── DOM Refs ──────────────────────────────────────────────────
const fieldEl   = document.getElementById('sb-field');
const svgEl     = document.getElementById('sb-svg');
const bloomEl   = document.getElementById('sb-bloom');
const bloomBody = document.getElementById('sb-bloom-body');
const bloomCont = document.getElementById('sb-bloom-content');
const orbitEl   = document.getElementById('sb-orbit');
const loaderEl  = document.getElementById('sb-loader');
const loaderTxt = document.getElementById('sb-loader-txt');
const titleEl   = document.getElementById('sb-title');
const emptyEl   = document.getElementById('sb-empty');
const emptyTxt  = document.getElementById('sb-empty-txt');

// ── i18n ──────────────────────────────────────────────────────
const I18N = {
  ro: {
    title:   'Lecții TOPIK',
    loading: 'Se încarcă câmpul de cunoaștere…',
    struct:  'Structură',
    notes:   'Note',
    examples:'Exemple',
    practice:'Practică această lecție →',
    empty:   'Nicio lecție pentru acest nivel.',
    done:    'Completat',
    error:   'Eroare la încărcarea lecțiilor.',
    hear:    '▶ ascultă',
  },
  en: {
    title:   'TOPIK Lessons',
    loading: 'Loading knowledge field…',
    struct:  'Structure',
    notes:   'Notes',
    examples:'Examples',
    practice:'Practice this lesson →',
    empty:   'No lessons for this level.',
    done:    'Completed',
    error:   'Could not load lessons.',
    hear:    '▶ hear',
  }
};
const t = k => I18N[_lang][k];

// ── Completed lessons ─────────────────────────────────────────
function getDone() {
  try { return JSON.parse(localStorage.getItem('RK_LESSON_DONE') || '[]'); } catch { return []; }
}

// ── Extract node display glyph ────────────────────────────────
// Returns the primary Korean form from the lesson title
// e.g. "은 / 는 — tema" → "는"  |  "-고 있다 — aspect" → "-고 있다"
function nodeGlyph(lesson) {
  return lesson.title[_lang].split(' — ')[0].split(' / ').pop().trim();
}

// ── Golden-angle spiral node layout ──────────────────────────
// Produces a beautiful sunflower distribution for N nodes
function spiralPositions(n) {
  if (n === 0) return [];
  const GA = 2.39996; // golden angle in radians
  const MX = 12, MY = 14; // margin % from edges
  const UW = 100 - MX * 2, UH = 100 - MY * 2;
  const maxR = Math.min(UW, UH) / 2 * 0.87;
  const positions = [];
  for (let i = 0; i < n; i++) {
    const r = n === 1 ? 0 : Math.sqrt((i + 0.5) / n) * maxR;
    const a = i * GA;
    // Compensate for widescreen aspect
    const ax = (UW / UH);
    const x = 50 + r * Math.cos(a) * (ax > 1 ? ax * 0.72 : 1);
    const y = 50 + r * Math.sin(a);
    positions.push({
      left: Math.max(MX + 2, Math.min(100 - MX - 2, x)),
      top:  Math.max(MY + 2, Math.min(100 - MY - 2, y))
    });
  }
  return positions;
}

// ── Render orbit (level selector) ─────────────────────────────
function renderOrbit() {
  orbitEl.innerHTML = '';
  const done = getDone();
  for (let lvl = 1; lvl <= 6; lvl++) {
    const lvlLessons = _lessons.filter(l => l.topik === lvl);
    const doneCount  = lvlLessons.filter(l => done.includes(l.id)).length;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'sb-orbit-btn' +
      (lvl === _topik ? ' sb-active' : '') +
      (doneCount > 0 ? ' sb-has-done' : '');
    btn.setAttribute('aria-label', 'TOPIK ' + lvl);
    btn.innerHTML =
      '<div class="sb-orbit-btn-lbl">T' + lvl + '</div>' +
      '<div class="sb-orbit-dot"></div>' +
      '<div class="sb-orbit-done">' + doneCount + '</div>';
    btn.addEventListener('click', () => setTopik(lvl));
    orbitEl.appendChild(btn);
  }
}

// ── Render nodes ──────────────────────────────────────────────
function renderNodes() {
  // Remove old nodes + SVG content
  fieldEl.querySelectorAll('.sb-node').forEach(n => n.remove());
  svgEl.innerHTML = '';

  const filtered = _lessons.filter(l => l.topik === _topik);
  const done = getDone();

  if (filtered.length === 0) {
    emptyTxt.textContent = t('empty');
    emptyEl.classList.add('sb-vis');
    return;
  }
  emptyEl.classList.remove('sb-vis');

  const positions = spiralPositions(filtered.length);

  filtered.forEach((lesson, i) => {
    const pos   = positions[i];
    const isDone = done.includes(lesson.id);

    const node = document.createElement('div');
    node.className = 'sb-node' + (isDone ? ' sb-done' : '');
    node.dataset.id  = lesson.id;
    node.style.left  = pos.left + '%';
    node.style.top   = pos.top + '%';
    node.style.animation =
      `sb-node-in 0.5s ${i * 0.042}s cubic-bezier(0.16,1,0.3,1) backwards`;
    node.setAttribute('role', 'button');
    node.setAttribute('tabindex', '0');
    node.setAttribute('aria-label', lesson.title[_lang] + (isDone ? ' — ' + t('done') : ''));

    node.innerHTML =
      '<div class="sb-nd-ko" aria-hidden="true">' + nodeGlyph(lesson) + '</div>';

    node.addEventListener('click', () => openBloom(lesson.id));
    node.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBloom(lesson.id); }
    });
    fieldEl.appendChild(node);
  });

  // Initialise gravity tracking
  startGravity();
}

// ══════════════════════════════════════════════════════════════
//  ATTENTIONAL GRAVITY
//  The original interaction mechanism of Synaptic Bloom.
//  Nodes gravitationally attract toward the user's cursor,
//  as if they feel your attention coming before you arrive.
// ══════════════════════════════════════════════════════════════
let _mx = -9999, _my = -9999, _gravRAF = null;

function startGravity() {
  fieldEl.addEventListener('mousemove', _onMouse, { passive: true });
  fieldEl.addEventListener('mouseleave', _resetGravity, { passive: true });
}
function _onMouse(e) {
  _mx = e.clientX; _my = e.clientY;
  if (!_gravRAF) _gravRAF = requestAnimationFrame(_applyGravity);
}
function _resetGravity() {
  _mx = -9999; _my = -9999;
  fieldEl.querySelectorAll('.sb-node:not(.sb-recede):not(.sb-active-src)').forEach(n => {
    n.style.transform = 'translate(-50%,-50%)';
  });
}
function _applyGravity() {
  _gravRAF = null;
  if (_bloomId) return;
  const nodes = fieldEl.querySelectorAll('.sb-node:not(.sb-recede):not(.sb-active-src)');
  nodes.forEach(node => {
    const r  = node.getBoundingClientRect();
    const nx = r.left + r.width  / 2;
    const ny = r.top  + r.height / 2;
    const dx = _mx - nx, dy = _my - ny;
    const d  = Math.sqrt(dx * dx + dy * dy);
    const MAX_D = 155, MAX_P = 8;
    if (d < MAX_D && d > 0) {
      const s  = (1 - d / MAX_D) * MAX_P;
      const ox = (dx / d) * s, oy = (dy / d) * s;
      node.style.transform = `translate(calc(-50% + ${ox.toFixed(2)}px), calc(-50% + ${oy.toFixed(2)}px))`;
    } else {
      node.style.transform = 'translate(-50%,-50%)';
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  BLOOM — The knowledge organism opens
// ══════════════════════════════════════════════════════════════
function openBloom(id) {
  if (_animating) return;
  const lesson = _lessons.find(l => l.id === id);
  if (!lesson) return;
  _animating = true;
  _bloomId   = id;

  // 1 — Recede all nodes, mark source node
  fieldEl.querySelectorAll('.sb-node').forEach(node => {
    if (node.dataset.id === id) node.classList.add('sb-active-src');
    else                        node.classList.add('sb-recede');
  });

  // 2 — Draw synaptic connector from source node to bloom center
  _drawConnector(id);

  // 3 — Populate bloom content
  _populateBloom(lesson);

  // 4 — Position bloom organism
  _positionBloom();

  // 5 — Open with entrance animation; move focus for keyboard users
  bloomEl.classList.add('sb-bloom-open', 'sb-bloom-entering');
  setTimeout(() => {
    bloomEl.classList.remove('sb-bloom-entering');
    _animating = false;
    const closeBtn = document.getElementById('sb-bloom-close');
    if (closeBtn) closeBtn.focus();
  }, 480);
}

function closeBloom() {
  if (_animating || !_bloomId) return;
  _animating = true;
  const returnId = _bloomId;

  bloomEl.classList.add('sb-bloom-leaving');

  // Remove connector
  svgEl.innerHTML = '';

  setTimeout(() => {
    bloomEl.classList.remove('sb-bloom-open', 'sb-bloom-leaving');
    bloomEl.style.left = '';
    bloomEl.style.top  = '';

    fieldEl.querySelectorAll('.sb-node').forEach(node => {
      node.classList.remove('sb-recede', 'sb-active-src');
    });

    bloomCont.innerHTML = '';
    _bloomId   = null;
    _animating = false;

    // Return focus to the source node for keyboard users
    const src = fieldEl.querySelector(`.sb-node[data-id="${returnId}"]`);
    if (src) src.focus();
  }, 280);
}

function _positionBloom() {
  const W  = window.innerWidth;
  const H  = window.innerHeight;
  const pH = 74 + 60; // orbit + header
  const bW = Math.min(500, W - 28);

  // Center horizontally; vertically within the field
  const left = (W - bW) / 2;
  const fieldH = H - pH;
  const maxBH = fieldH * 0.88;
  bloomBody.style.maxHeight = maxBH + 'px';

  bloomEl.style.left  = left + 'px';
  bloomEl.style.top   = (60 + (fieldH - Math.min(maxBH, 580)) / 2) + 'px';
  bloomEl.style.width = bW + 'px';
}

function _drawConnector(id) {
  const srcNode = fieldEl.querySelector(`.sb-node[data-id="${id}"]`);
  if (!srcNode) return;

  const fr    = fieldEl.getBoundingClientRect();
  const nr    = srcNode.getBoundingClientRect();
  const nx    = nr.left + nr.width  / 2 - fr.left;
  const ny    = nr.top  + nr.height / 2 - fr.top;
  const cx    = fr.width / 2;
  const cy    = fr.height / 2;

  const line  = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', nx);
  line.setAttribute('y1', ny);
  line.setAttribute('x2', cx);
  line.setAttribute('y2', cy);
  line.setAttribute('class', 'sb-conn-line');
  svgEl.appendChild(line);

  // Animate line in
  requestAnimationFrame(() => line.classList.add('sb-conn-visible'));
}

// ══════════════════════════════════════════════════════════════
//  BLOOM CONTENT — crystallizes from the knowledge organism
// ══════════════════════════════════════════════════════════════
function _populateBloom(lesson) {
  const notes    = Array.isArray(lesson.notes[_lang]) ? lesson.notes[_lang] : [];
  const examples = Array.isArray(lesson.examples) ? lesson.examples : [];
  const isDone   = getDone().includes(lesson.id);

  bloomCont.innerHTML =
    '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:0">' +
      '<span class="sb-topik-tag">TOPIK ' + lesson.topik + '</span>' +
      (isDone ? '<span class="sb-done-tag">✓ ' + t('done') + '</span>' : '') +
    '</div>' +

    '<h2 id="sb-bloom-heading" class="sb-bloom-title">' +
      _esc(lesson.title[_lang]) +
    '</h2>' +

    '<p class="sb-bloom-exp">' + _esc(lesson.explanation[_lang]) + '</p>' +

    '<div class="sb-bloom-struct">' +
      '<b>' + t('struct') + ':</b> ' + _esc(lesson.structure) +
    '</div>' +

    '<div class="sb-section-label">' + t('examples') + '</div>' +
    '<div class="sb-examples" id="sb-ex-list">' +
      examples.map((ex, i) =>
        '<div class="sb-ex" data-idx="' + i + '">' +
          '<div class="sb-ex-ko">' +
            '<span class="sb-ko-inner" data-idx="' + i + '"></span>' +
            '<span class="sb-ex-hint">' + t('hear') + '</span>' +
          '</div>' +
          '<div class="sb-ex-tr">' + _esc(ex[_lang]) + '</div>' +
        '</div>'
      ).join('') +
    '</div>' +

    (notes.length ?
      '<div class="sb-notes-wrap">' +
        '<strong>' + t('notes') + '</strong>' +
        '<ul>' + notes.map(n => '<li>' + _esc(n) + '</li>').join('') + '</ul>' +
      '</div>'
    : '') +

    '<button type="button" class="sb-practice" id="sb-practice-btn">' +
      t('practice') +
    '</button>';

  // Colorize Korean examples
  examples.forEach((ex, i) => {
    const el = bloomCont.querySelector(`.sb-ko-inner[data-idx="${i}"]`);
    if (el) el.innerHTML = GrammarColor.colorize(ex.ko);
  });

  // Click to speak
  bloomCont.querySelectorAll('.sb-ex').forEach((el, i) => {
    el.addEventListener('click', () => _speak(examples[i].ko));
  });

  // Practice button
  const pb = document.getElementById('sb-practice-btn');
  if (pb) pb.addEventListener('click', () => {
    window.location.href = 'exercises.html?lesson=' + lesson.id;
  });
}

function _esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function _speak(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════════════════
//  TOPIK LEVEL SWITCH
// ══════════════════════════════════════════════════════════════
function setTopik(lvl) {
  if (_bloomId) closeBloom();
  _topik = lvl;
  renderOrbit();
  renderNodes();
}

// ══════════════════════════════════════════════════════════════
//  LANGUAGE SWITCH
// ══════════════════════════════════════════════════════════════
function setLanguage(lang) {
  _lang = lang;
  titleEl.textContent = t('title');
  renderOrbit();
  renderNodes();
  if (_bloomId) {
    const lesson = _lessons.find(l => l.id === _bloomId);
    if (lesson) _populateBloom(lesson);
  }
}

// ══════════════════════════════════════════════════════════════
//  CLOSE TRIGGERS
// ══════════════════════════════════════════════════════════════
document.getElementById('sb-bloom-close').addEventListener('click', closeBloom);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBloom(); });
document.addEventListener('pointerdown', e => {
  if (_bloomId &&
      !e.target.closest('#sb-bloom') &&
      !e.target.closest('.sb-node')) {
    closeBloom();
  }
});

// ══════════════════════════════════════════════════════════════
//  LOAD DATA
// ══════════════════════════════════════════════════════════════
async function loadLessons() {
  loaderTxt.textContent = t('loading');
  try {
    const res  = await fetch('./data/lessons.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    _lessons   = Array.isArray(data) ? data : [];
    _lessons.sort((a, b) =>
      a.topik !== b.topik ? a.topik - b.topik : a.id.localeCompare(b.id)
    );

    // Fade loader out
    loaderEl.classList.add('sb-hidden');
    setTimeout(() => { loaderEl.style.display = 'none'; }, 520);

    renderOrbit();
    renderNodes();

    // Auto-open first lesson after field appears (optional UX: feel alive immediately)
    // Disabled — let user explore the living field first.

  } catch (err) {
    loaderTxt.textContent = t('error');
    loaderTxt.style.color = 'var(--sb-a2)';
  }
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
titleEl.textContent = t('title');
RKLang.init(setLanguage);
loadLessons();
</script>
</body>
</html>
