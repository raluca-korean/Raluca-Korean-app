<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speaking — Raluca Korean</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7c3aed">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   MORPHIC FIELD INTERFACE · MFI v1.0
   "Bioluminescent Knowledge Space"
   — A new interaction paradigm —
   Knowledge as a living organism. Information reorganizes
   itself around the user's attention. Nodes breathe, drift,
   attract and bloom in response to voice and focus.
═══════════════════════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0}

/* ── LIGHT MODE TOKENS ── */
:root{
  --v:  #04020F;   /* void deep */
  --v2: #0A0318;
  --nc: radial-gradient(circle at 40% 35%, rgba(255,255,255,.95) 0%, rgba(200,160,255,.7) 30%, rgba(120,50,220,.35) 65%, transparent 100%);
  --nb: rgba(167,139,250,.55);
  --ng: rgba(124,58,237,.3);
  --nG: rgba(180,143,255,.75);
  --th: rgba(167,139,250,.22);
  --tp: #F0E8FF;
  --ts: rgba(240,232,255,.55);
  --cy: #22D3EE;
  --pk: #F472B6;
  --gd: #FCD34D;
  --vi: #A78BFA;
  --pt: rgba(167,139,250,.45);
  --re: rgba(167,139,250,.1);
}

/* ── LIGHT MODE OVERRIDE ── */
body:not(.dm){
  --v:  #F4F0FF;
  --v2: #EDE8FF;
  --nc: radial-gradient(circle at 40% 35%, #fff 0%, rgba(220,200,255,.9) 30%, rgba(180,140,255,.4) 65%, transparent 100%);
  --nb: rgba(124,58,237,.45);
  --ng: rgba(124,58,237,.12);
  --nG: rgba(124,58,237,.4);
  --th: rgba(124,58,237,.18);
  --tp: #1a0533;
  --ts: rgba(26,5,51,.45);
  --cy: #0EA5E9;
  --pk: #db2777;
  --gd: #D97706;
  --vi: #7c3aed;
  --pt: rgba(124,58,237,.25);
  --re: rgba(124,58,237,.07);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:var(--v);
  color:var(--tp);
  transition:background .6s,color .6s;
}

/* ── CANVAS BACKGROUND ── */
#cv{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ── MORPHIC FIELD ── */
#mf{
  position:fixed;inset:0;
  z-index:1;
  overflow:hidden;
}

/* ── SVG THREADS ── */
#web{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:1;
  overflow:visible;
}

/* ── BASE NODE ── */
.nd{
  position:absolute;
  border-radius:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  cursor:pointer;
  user-select:none;
  z-index:3;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),
             box-shadow .35s ease, opacity .35s ease;
  will-change:transform;
}
.nd:hover{transform:scale(1.1) !important;}

/* ── CORE NODE ── */
#nc{
  width:164px;height:164px;
  background:var(--nc);
  border:1.5px solid var(--nb);
  box-shadow:
    0 0 0 14px var(--ng),
    0 0 0 32px var(--re),
    0 0 70px var(--nG),
    inset 0 0 36px rgba(255,255,255,.12);
  animation:breath 3.8s ease-in-out infinite;
  z-index:5;
}
.ck{font-size:26px;font-weight:900;color:var(--tp);line-height:1.2;letter-spacing:-.5px;}
.ct{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ts);margin-top:5px;}

@keyframes breath{
  0%,100%{
    box-shadow:0 0 0 14px var(--ng),0 0 0 32px var(--re),0 0 70px var(--nG),inset 0 0 36px rgba(255,255,255,.12);
    transform:scale(1);
  }
  50%{
    box-shadow:0 0 0 22px var(--ng),0 0 0 48px var(--re),0 0 100px var(--nG),inset 0 0 50px rgba(255,255,255,.18);
    transform:scale(1.025);
  }
}

/* ── SATELLITE NODES ── */
#nr{/* romanization — cyan */
  width:88px;height:88px;
  background:radial-gradient(circle, rgba(34,211,238,.85) 0%, rgba(14,165,233,.4) 50%, transparent 100%);
  border:1.5px solid rgba(34,211,238,.45);
  box-shadow:0 0 28px rgba(34,211,238,.38),0 0 55px rgba(34,211,238,.13);
  animation:fl1 9s ease-in-out infinite, nb1 4.2s ease-in-out infinite;
}
body:not(.dm) #nr{
  background:radial-gradient(circle, rgba(14,165,233,.75) 0%, rgba(14,165,233,.28) 50%, transparent 100%);
}
#nm{/* meaning — pink */
  width:102px;height:102px;
  background:radial-gradient(circle, rgba(244,114,182,.88) 0%, rgba(219,39,119,.4) 50%, transparent 100%);
  border:1.5px solid rgba(244,114,182,.45);
  box-shadow:0 0 28px rgba(244,114,182,.38),0 0 55px rgba(244,114,182,.13);
  animation:fl2 12s ease-in-out infinite, nb1 5s ease-in-out .5s infinite;
}
body:not(.dm) #nm{
  background:radial-gradient(circle, rgba(219,39,119,.7) 0%, rgba(219,39,119,.24) 50%, transparent 100%);
}
#ne{/* example — gold */
  width:118px;height:118px;
  background:radial-gradient(circle, rgba(251,191,36,.82) 0%, rgba(217,119,6,.38) 50%, transparent 100%);
  border:1.5px solid rgba(251,191,36,.45);
  box-shadow:0 0 28px rgba(251,191,36,.3),0 0 55px rgba(251,191,36,.1);
  animation:fl3 16s ease-in-out infinite, nb1 6s ease-in-out 1s infinite;
}
body:not(.dm) #ne{
  background:radial-gradient(circle, rgba(217,119,6,.65) 0%, rgba(217,119,6,.2) 50%, transparent 100%);
}
#np{/* progress — violet */
  width:72px;height:72px;
  background:radial-gradient(circle, rgba(167,139,250,.9) 0%, rgba(124,58,237,.4) 50%, transparent 100%);
  border:1.5px solid rgba(167,139,250,.45);
  box-shadow:0 0 22px rgba(167,139,250,.38),0 0 44px rgba(167,139,250,.13);
  animation:fl4 14s ease-in-out infinite, nb1 4.8s ease-in-out .8s infinite;
}
body:not(.dm) #np{
  background:radial-gradient(circle, rgba(124,58,237,.7) 0%, rgba(124,58,237,.24) 50%, transparent 100%);
}

/* node label + text */
.nl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px;}
.nx{font-size:11px;font-weight:700;color:var(--tp);text-align:center;padding:0 9px;line-height:1.35;}
.ns{font-size:9px;color:var(--ts);margin-top:3px;font-weight:600;}
.pr{font-size:17px;font-weight:900;color:var(--tp);}

#nr .nl{color:var(--cy);}
#nm .nl{color:var(--pk);}
#ne .nl{color:var(--gd);}
#np .nl{color:var(--vi);}

body:not(.dm) #nr .nl{color:#0369A1;}
body:not(.dm) #nm .nl{color:#BE185D;}
body:not(.dm) #ne .nl{color:#92400E;}
body:not(.dm) #np .nl{color:#5B21B6;}

/* orbital float animations */
@keyframes fl1{0%{translate:0 0}25%{translate:9px -13px}50%{translate:15px 5px}75%{translate:5px 13px}100%{translate:0 0}}
@keyframes fl2{0%{translate:0 0}25%{translate:-11px 9px}50%{translate:-7px -15px}75%{translate:11px -9px}100%{translate:0 0}}
@keyframes fl3{0%{translate:0 0}20%{translate:13px -11px}40%{translate:-9px -7px}60%{translate:-15px 11px}80%{translate:7px 15px}100%{translate:0 0}}
@keyframes fl4{0%{translate:0 0}33%{translate:-13px -11px}66%{translate:11px -13px}100%{translate:0 0}}
@keyframes nb1{0%,100%{opacity:.88}50%{opacity:1}}

/* ── RESONANCE RINGS ── */
.rr{
  position:absolute;border-radius:50%;
  border:1px solid var(--th);
  pointer-events:none;z-index:2;
  left:50%;top:50%;
  width:164px;height:164px;
  transform:translate(-50%,-50%);
  opacity:0;
}
.rr.go{animation:rexp 2.2s cubic-bezier(.2,.8,.4,1) forwards;}
@keyframes rexp{
  0%  {width:164px;height:164px;opacity:.7;border-color:var(--nG);}
  100%{width:700px;height:700px;opacity:0;}
}

/* ── BLOOM / ERROR ── */
@keyframes bloom{
  0%  {transform:scale(1);}
  28% {transform:scale(1.38);box-shadow:0 0 0 28px rgba(88,204,2,.28),0 0 80px rgba(88,204,2,.5);}
  60% {transform:scale(1.08);}
  100%{transform:scale(1);}
}
@keyframes err{
  0%  {transform:scale(1);}
  18% {transform:scale(.9) rotate(-2deg);box-shadow:0 0 35px rgba(255,75,75,.65);}
  38% {transform:scale(1.04) rotate(2deg);}
  58% {transform:scale(.97);}
  100%{transform:scale(1);}
}
#nc.bloom{animation:bloom .85s ease-out forwards !important;}
#nc.err  {animation:err .65s ease-out forwards !important;}

/* ── VOICE FIELD ── */
#vf{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:13px;
  z-index:10;
}
#wf{display:flex;align-items:center;gap:3px;height:34px;opacity:0;transition:opacity .3s;}
#wf.on{opacity:1;}
.wb{width:3px;background:var(--vi);border-radius:3px;animation:wb .85s ease-in-out infinite;}
.wb:nth-child(1){height:7px;  animation-delay:0s}
.wb:nth-child(2){height:15px; animation-delay:.1s}
.wb:nth-child(3){height:23px; animation-delay:.2s}
.wb:nth-child(4){height:30px; animation-delay:.3s}
.wb:nth-child(5){height:23px; animation-delay:.4s}
.wb:nth-child(6){height:15px; animation-delay:.5s}
.wb:nth-child(7){height:7px;  animation-delay:.6s}
@keyframes wb{0%,100%{transform:scaleY(1);opacity:.7}50%{transform:scaleY(.28);opacity:1}}

.vbw{display:flex;align-items:center;gap:14px;}

#bL,#bS,#bN{
  border:none;cursor:pointer;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:transform .2s,box-shadow .2s;
  background:transparent;
}
#bL{
  width:50px;height:50px;
  background:rgba(34,211,238,.13);
  border:1.5px solid rgba(34,211,238,.38);
  color:var(--cy);font-size:19px;
  box-shadow:0 0 18px rgba(34,211,238,.18);
}
body:not(.dm) #bL{background:rgba(14,165,233,.09);border-color:rgba(14,165,233,.45);color:#0369A1;}
#bS{
  width:68px;height:68px;
  background:radial-gradient(circle, #7c3aed, rgba(124,58,237,.65));
  border:2px solid rgba(167,139,250,.45);
  color:#fff;font-size:24px;
  box-shadow:0 0 30px var(--ng),0 0 60px rgba(124,58,237,.13);
}
#bS.on{
  background:radial-gradient(circle,#db2777,rgba(219,39,119,.65));
  animation:sp 1.1s ease-in-out infinite;
}
@keyframes sp{
  0%,100%{box-shadow:0 0 30px rgba(219,39,119,.5),0 0 60px rgba(219,39,119,.18);}
  50%    {box-shadow:0 0 55px rgba(219,39,119,.85),0 0 110px rgba(219,39,119,.3);}
}
#bN{
  width:50px;height:50px;
  background:rgba(251,191,36,.13);
  border:1.5px solid rgba(251,191,36,.38);
  color:var(--gd);font-size:19px;
  box-shadow:0 0 18px rgba(251,191,36,.18);
}
body:not(.dm) #bN{background:rgba(217,119,6,.09);border-color:rgba(217,119,6,.45);color:#92400E;}

#bL:hover,#bN:hover{transform:scale(1.09);}
#bS:hover{transform:scale(1.07);}
#bS:active{transform:scale(.95);}

#sh{
  font-size:10px;font-weight:700;
  color:var(--ts);letter-spacing:.6px;text-align:center;
}

/* ── TOP CONTROLS ── */
#tc{
  position:fixed;top:18px;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;z-index:10;pointer-events:none;
}
#tc>*{pointer-events:auto;}
.cg{display:flex;align-items:center;gap:7px;}
.cb{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--nb);
  background:var(--ng);color:var(--tp);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;
  transition:transform .2s,box-shadow .2s;
  backdrop-filter:blur(10px);
  text-decoration:none;font-family:inherit;
}
.cb:hover{transform:scale(1.12);box-shadow:0 0 16px var(--nG);}

/* ── LEVEL DOTS ── */
#ld{
  position:fixed;left:22px;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:11px;
  z-index:10;
}
.ldot{
  width:9px;height:9px;border-radius:50%;
  border:1.5px solid var(--th);background:transparent;
  cursor:pointer;transition:all .3s;position:relative;
}
.ldot:hover,.ldot.on{
  background:var(--vi);border-color:var(--vi);
  box-shadow:0 0 10px var(--nG);transform:scale(1.5);
}
.ldot::after{
  content:attr(data-l);position:absolute;
  left:18px;top:50%;transform:translateY(-50%);
  font-size:8px;font-weight:700;color:var(--ts);
  white-space:nowrap;opacity:0;transition:opacity .2s;letter-spacing:1px;
}
#ld:hover .ldot::after{opacity:1;}

/* ── PROGRESS SPINE ── */
#ps{
  position:fixed;right:22px;top:50%;
  transform:translateY(-50%);z-index:10;
}

/* ── TOAST ── */
#toast{
  position:fixed;top:76px;left:50%;
  transform:translateX(-50%) translateY(-18px);
  background:var(--ng);border:1px solid var(--nb);
  border-radius:100px;padding:7px 18px;
  font-size:11px;font-weight:700;color:var(--tp);
  opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(14px);letter-spacing:.5px;
  z-index:20;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── FIELD FLASH ── */
#fl{position:fixed;inset:0;pointer-events:none;z-index:30;opacity:0;}
#fl.ok{animation:fok .65s ease-out forwards;}
#fl.no{animation:fno .65s ease-out forwards;}
@keyframes fok{0%{opacity:1;background:radial-gradient(ellipse at 50% 50%,rgba(88,204,2,.14) 0%,transparent 70%)}100%{opacity:0}}
@keyframes fno{0%{opacity:1;background:radial-gradient(ellipse at 50% 50%,rgba(255,75,75,.1) 0%,transparent 70%)}100%{opacity:0}}

/* ── TRANSITION OUT ── */
#mf.out .nd{animation:cout .38s ease-in forwards;}
@keyframes cout{to{opacity:0;transform:scale(.78)translateY(12px);}}
#mf.out #nc{animation:cout .38s ease-in .05s forwards;}

/* ── PARADIGM TAG ── */
#ptag{
  position:fixed;bottom:14px;right:18px;
  font-size:8px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--ts);opacity:.35;
  z-index:5;pointer-events:none;
}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  #nc{width:136px;height:136px;}
  .ck{font-size:21px;}
  #nr{width:72px;height:72px;}
  #nm{width:84px;height:84px;}
  #ne{width:96px;height:96px;}
  #np{width:58px;height:58px;}
  #ld{display:none;}
}
</style>
</head>
<body>

<!-- background particle canvas -->
<canvas id="cv"></canvas>

<!-- morphic field -->
<div id="mf">

  <!-- svg thread web -->

  <!-- resonance rings -->
  <div class="rr" id="r1"></div>
  <div class="rr" id="r2"></div>
  <div class="rr" id="r3"></div>

  <!-- core attention node -->
  <div class="nd" id="nc">
    <div class="ck" id="ck">안녕하세요</div>
    <div class="ct" id="ct">TOPIK 1</div>
  </div>

  <!-- romanization -->
  <div class="nd" id="nr">
    <div class="nl" id="nrl">발음</div>
    <div class="nx" id="nrt">annyeonghaseyo</div>

</div>

<div id="vf">

</div>

<!-- top controls -->
<div id="tc">
  <div class="cg">
    <a href="index.html" class="cb" title="Acasă">🏠</a>
  </div>
  <div class="cg">
    <button class="cb" id="bLang">EN</button>
    <button class="cb" id="bTheme">☾</button>
  </div>
</div>

<!-- level dots -->
<div id="ld">
  <div class="ldot on" data-l="TOPIK 1" data-t="1"></div>
  <div class="ldot"    data-l="TOPIK 2" data-t="2"></div>
  <div class="ldot"    data-l="TOPIK 3" data-t="3"></div>
  <div class="ldot"    data-l="TOPIK 4" data-t="4"></div>
  <div class="ldot"    data-l="TOPIK 5" data-t="5"></div>
  <div class="ldot"    data-l="TOPIK 6" data-t="6"></div>
</div>

<!-- progress spine -->
<div id="ps">
  <svg width="36" height="190" viewBox="0 0 36 190">
    <line id="ptrack" x1="18" y1="8" x2="18" y2="182"
          stroke-width="1.5" stroke-linecap="round" opacity=".2"/>
    <circle id="pthumb" cx="18" cy="8" r="5.5"
            fill="none" stroke-width="2" fill-opacity=".3"/>
  </svg>
</div>

<!-- toast -->
<div id="toast"></div>

<!-- field flash -->
<div id="fl"></div>

<!-- paradigm tag -->
<div id="ptag">Morphic Field Interface · MFI v1.0</div>

<script>

// ── STATE ─────────────────────────────────────────────────
let lang  = localStorage.getItem('RK_LANG') || 'ro';
let topik = 1;
let idx   = 0;
let score = {};   // idx → correct count
let recog = null;
let speaking = false;

// ── SATELLITE POSITIONS (angle°, distance px) ──────────────
const SATS = {
  nr: {a:-30,  d:210},
  nm: {a:148,  d:248},
  ne: {a:58,   d:308},
  np: {a:-135, d:192},
};

// ── INIT ──────────────────────────────────────────────────
(function(){
  const dark = localStorage.getItem('RK_DARK')==='1' ||
    window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(dark) document.body.classList.add('dm');

  initCanvas();
  place();
  render(items()[0], 0);
  weave();
  initSpeech();
  bind();
  syncTheme();
  syncLang();
  spineRefresh();
  window.addEventListener('resize',()=>{place();weave();});
})();

function items(){ return DATA.filter(d=>d.t===topik); }

// ── POSITIONING ───────────────────────────────────────────
function place(){
  const cx=innerWidth/2, cy=innerHeight/2;
  const nc=document.getElementById('nc');
  nc.style.left=(cx-82)+'px';
  nc.style.top =(cy-82)+'px';
  Object.entries(SATS).forEach(([id,{a,d}])=>{
    const el=document.getElementById(id);
    if(!el) return;
    const rad=a*Math.PI/180;
    const hw=el.offsetWidth/2||50, hh=el.offsetHeight/2||50;
    el.style.left=(cx+Math.cos(rad)*d-hw)+'px';
    el.style.top =(cy+Math.sin(rad)*d-hh)+'px';
  });
}

// ── SVG THREAD WEB ─────────────────────────────────────────
function weave(){
  const svg=document.getElementById('web');
  svg.innerHTML='';
  const cx=innerWidth/2, cy=innerHeight/2;
  const dm=document.body.classList.contains('dm');
  const col=dm?'rgba(167,139,250,.2)':'rgba(124,58,237,.16)';

  Object.values(SATS).forEach(({a,d})=>{
    const rad=a*Math.PI/180;
    const x=cx+Math.cos(rad)*d, y=cy+Math.sin(rad)*d;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);
    line.setAttribute('x2',x); line.setAttribute('y2',y);
    line.setAttribute('stroke',col);
    line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','5 9');
    const an=document.createElementNS('http://www.w3.org/2000/svg','animate');
    an.setAttribute('attributeName','stroke-dashoffset');
    an.setAttribute('from','0');an.setAttribute('to','56');
    an.setAttribute('dur','3.5s');an.setAttribute('repeatCount','indefinite');
    line.appendChild(an);
    svg.appendChild(line);
  });
}

// ── RENDER ITEM ───────────────────────────────────────────
function render(item, i){
  if(!item) return;
  idx=i;
  document.getElementById('ck').textContent=item.k;
  document.getElementById('ct').textContent='TOPIK '+item.t;
  document.getElementById('nrt').textContent=item.r;
  document.getElementById('nml').textContent=lang==='ro'?'sens':'meaning';
  document.getElementById('nmt').textContent=item.m[lang];
  document.getElementById('nel').textContent=lang==='ro'?'exemplu':'example';
  document.getElementById('net').textContent=item.e.ko;
  document.getElementById('nes').textContent=item.e[lang];
  document.getElementById('npl').textContent=lang==='ro'?'progres':'progress';
  const pct=Math.min(100,(score[i]||0)*25);
  document.getElementById('npt').textContent=pct+'%';
  spineRefresh();
}

function next(animate){
  const arr=items();
  const ni=(idx+1)%arr.length;
  if(animate){
    const f=document.getElementById('mf');
    f.classList.add('out');
    setTimeout(()=>{f.classList.remove('out');render(arr[ni],ni);},360);
  } else {
    render(arr[ni],ni);
  }
}

// ── PARTICLE CANVAS ───────────────────────────────────────
function initCanvas(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  let W,H,P=[];

  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  function mkP(){
    const dm=document.body.classList.contains('dm');
    const hues=dm?[260,300,200,320,280]:[220,270,300,200,260];
    return{
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.6+.3,
      vx:(Math.random()-.5)*.14, vy:(Math.random()-.5)*.14,
      op:Math.random()*.5+.1,
      hue:hues[Math.floor(Math.random()*hues.length)],
      ph:Math.random()*Math.PI*2,
      ps:.012+Math.random()*.018,
    };
  }

  P=Array.from({length:130},mkP);

  (function frame(){
    const dm=document.body.classList.contains('dm');
    ctx.clearRect(0,0,W,H);

    // background
    const bg=ctx.createRadialGradient(W/2,H*.45,0,W/2,H*.5,Math.max(W,H)*.6);
    if(dm){bg.addColorStop(0,'#0B0320');bg.addColorStop(1,'#04020F');}
    else  {bg.addColorStop(0,'#F5F0FF');bg.addColorStop(1,'#EAE4FF');}
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // ambient glow at center
    const ag=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,260);
    if(dm){ag.addColorStop(0,'rgba(100,40,200,.12)');ag.addColorStop(1,'transparent');}
    else  {ag.addColorStop(0,'rgba(180,140,255,.06)');ag.addColorStop(1,'transparent');}
    ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);

    // particles
    P.forEach(p=>{
      p.ph+=p.ps;
      const al=p.op*(.65+.35*Math.sin(p.ph));
      ctx.fillStyle=dm
        ?`hsla(${p.hue},75%,72%,${al})`
        :`hsla(${p.hue},55%,48%,${al*.38})`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });
    requestAnimationFrame(frame);
  })();
}

// ── PROGRESS SPINE ─────────────────────────────────────────
function spineRefresh(){
  const arr=items();
  const done=arr.filter((_,i)=>(score[i]||0)>=1).length;
  const pct=arr.length?done/arr.length:0;
  const dm=document.body.classList.contains('dm');
  const c1=dm?'rgba(167,139,250,.4)':'rgba(124,58,237,.4)';
  const c2=dm?'#A78BFA':'#7c3aed';
  const tr=document.getElementById('ptrack');
  const th=document.getElementById('pthumb');
  if(tr){tr.setAttribute('stroke',c1);}
  if(th){
    th.setAttribute('cy',(8+pct*174).toFixed(1));
    th.setAttribute('stroke',c2);
    th.setAttribute('fill',c2);
    th.setAttribute('fill-opacity','.3');
  }
}

// ── RESONANCE ─────────────────────────────────────────────
function resonate(){
  ['r1','r2','r3'].forEach((id,i)=>{
    setTimeout(()=>{
      const r=document.getElementById(id);
      r.classList.remove('go');
      void r.offsetWidth;
      r.classList.add('go');
      setTimeout(()=>r.classList.remove('go'),2300);
    },i*220);
  });
}

// ── SPEECH ────────────────────────────────────────────────
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recog=new SR();
  recog.lang='ko-KR';
  recog.continuous=false;
  recog.interimResults=false;
  recog.onresult=e=>evaluate(e.results[0][0].transcript);
  recog.onend=()=>stopMic();
  recog.onerror=()=>{
    stopMic();
    toast(lang==='ro'?'Microfon indisponibil':'Microphone unavailable');
  };
}

function startMic(){
  if(!recog){
    toast(lang==='ro'?'Recunoașterea vocală nu e disponibilă':'Speech recognition unavailable');
    return;
  }
  speaking=true;
  document.getElementById('bS').classList.add('on');
  document.getElementById('bS').textContent='⏹';
  document.getElementById('wf').classList.add('on');
  document.getElementById('sh').textContent=lang==='ro'?'ascultând…':'listening…';
  try{recog.start();}catch(e){}
}

function stopMic(){
  speaking=false;
  document.getElementById('bS').classList.remove('on');
  document.getElementById('bS').textContent='🎙';
  document.getElementById('wf').classList.remove('on');
  document.getElementById('sh').textContent=lang==='ro'?'atingeți pentru a vorbi':'tap to speak';
  try{recog.stop();}catch(e){}
}

function evaluate(transcript){
  stopMic();
  const item=items()[idx];
  if(!item) return;
  const clean=s=>s.replace(/[^가-힣a-z]/gi,'').toLowerCase();
  const ok=clean(transcript)===clean(item.k)||transcript.includes(item.k);
  if(ok){
    score[idx]=(score[idx]||0)+1;
    resonate();
    const nc=document.getElementById('nc');
    nc.classList.add('bloom');
    setTimeout(()=>nc.classList.remove('bloom'),900);
    const fl=document.getElementById('fl');
    fl.className='ok';
    setTimeout(()=>fl.className='',700);
    toast(lang==='ro'?'✦ Rezonanță perfectă!':'✦ Perfect resonance!');
    render(items()[idx],idx);
  } else {
    const nc=document.getElementById('nc');
    nc.classList.add('err');
    setTimeout(()=>nc.classList.remove('err'),700);
    const fl=document.getElementById('fl');
    fl.className='no';
    setTimeout(()=>fl.className='',700);
    const heard=transcript.length>18?transcript.slice(0,18)+'…':transcript;
    toast((lang==='ro'?'⟳ Auzit: ':'⟳ Heard: ')+heard);
  }
}

function speakKo(txt){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='ko-KR'; u.rate=.82;
  speechSynthesis.speak(u);
}

// ── TOAST ─────────────────────────────────────────────────
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  if(toastT) clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('on'),2600);
}

// ── GRAVITY PULL (nodes drift toward cursor) ──────────────
let graf=null;
document.getElementById('mf').addEventListener('mousemove',e=>{
  if(graf) return;
  graf=requestAnimationFrame(()=>{
    graf=null;
    const cx=innerWidth/2, cy=innerHeight/2;
    const mx=e.clientX-cx, my=e.clientY-cy;
    Object.entries(SATS).forEach(([id,{a,d}])=>{
      const rad=a*Math.PI/180;
      const nx=Math.cos(rad)*d, ny=Math.sin(rad)*d;
      const dx=mx-nx, dy=my-ny;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const str=Math.max(0,1-dist/220)*20;
      const ox=(dx/Math.max(dist,1))*str;
      const oy=(dy/Math.max(dist,1))*str;
      const el=document.getElementById(id);
      if(!el) return;
      const hw=el.offsetWidth/2, hh=el.offsetHeight/2;
      el.style.transition='left .28s ease,top .28s ease,transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease,opacity .35s ease';
      el.style.left=(cx+Math.cos(rad)*d+ox-hw)+'px';
      el.style.top =(cy+Math.sin(rad)*d+oy-hh)+'px';
    });
  });
});

// restore positions on mouse leave
document.getElementById('mf').addEventListener('mouseleave',()=>{
  place();
});

// ── BIND CONTROLS ─────────────────────────────────────────
function bind(){
  document.getElementById('bL').addEventListener('click',()=>{
    const item=items()[idx];
    if(item) speakKo(item.k);
  });
  document.getElementById('bS').addEventListener('click',()=>{
    speaking?stopMic():startMic();
  });
  document.getElementById('bN').addEventListener('click',()=>next(true));
  document.getElementById('bTheme').addEventListener('click',()=>{
    document.body.classList.toggle('dm');
    localStorage.setItem('RK_DARK',document.body.classList.contains('dm')?'1':'0');
    syncTheme();
    weave();
    spineRefresh();
  });
  document.getElementById('bLang').addEventListener('click',()=>{
    lang=lang==='ro'?'en':'ro';
    localStorage.setItem('RK_LANG',lang);
    syncLang();
    render(items()[idx],idx);
  });

  // level dots
  document.querySelectorAll('.ldot').forEach(d=>{
    d.addEventListener('click',()=>{
      document.querySelectorAll('.ldot').forEach(x=>x.classList.remove('on'));
      d.classList.add('on');
      topik=parseInt(d.dataset.t);
      idx=0;
      const arr=items();
      if(arr.length){
        const f=document.getElementById('mf');
        f.classList.add('out');
        setTimeout(()=>{f.classList.remove('out');render(arr[0],0);},360);
      }
      spineRefresh();
    });
  });

  // tap nodes to speak their content
  document.getElementById('nr').addEventListener('click',()=>{
    const item=items()[idx];
    if(item) speakKo(item.k);
  });
  document.getElementById('nc').addEventListener('click',()=>{
    const item=items()[idx];
    if(item) speakKo(item.k);
  });
}

function syncTheme(){
  document.getElementById('bTheme').textContent=
    document.body.classList.contains('dm')?'☾':'☀';
}
function syncLang(){
  document.getElementById('bLang').textContent=lang==='ro'?'RO':'EN';
}
</script>
