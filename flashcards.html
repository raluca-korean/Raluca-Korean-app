<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">

<title>Raluca Korean — Flashcards</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2877">
<link rel="preconnect" href="https://fonts.googleapis.com">

<body class="theme-anime">
<div class="app">

<div class="card">

    <div>
      <h1 id="pageTitle">🃏 Flashcards</h1>

    <button type="button" class="filter-btn" id="sortHard" title="Greu întâi">🤯</button>
    <button type="button" class="filter-btn" id="sortEasy" title="Ușor întâi">🤓</button>
  </div>
</div>

<div id="fcArea"></div>

</div>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/flashcards.js"></script>
