<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Raluca Korean — Flashcards</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RK Korean">
<meta name="format-detection" content="telephone=no">

<link rel="stylesheet" href="./theme-anime.css">
<style>
:root{
  --card:rgba(255,255,255,.97);
  --stroke:rgba(219,39,119,.13);
  --text:#1a0533;
  --muted:rgba(126,58,110,.80);
  --radius:22px;
  --shadow:0 16px 40px rgba(219,39,119,.13);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(219,39,119,.22) 0%, transparent 45%),
    radial-gradient(ellipse at 100% 0%,  rgba(14,165,233,.18)  0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.16)  0%, transparent 45%),
    linear-gradient(180deg,#fce7f3 0%,#fdf4ff 40%,#eff6ff 100%);
  color:var(--text);
}
.app{max-width:680px;margin:0 auto;padding:20px}
.card{
  background:var(--card);
  border:1.5px solid var(--stroke);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
h1{margin:0 0 4px;font-size:22px}
.sub{font-size:13px;color:var(--muted)}

/* Filter buttons */
.filter-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.filter-btn{
  padding:8px 16px;border-radius:999px;border:1.5px solid rgba(219,39,119,.20);
  background:#fff;color:var(--text);font-weight:800;font-size:13px;cursor:pointer;
  transition:background .15s,color .15s;
}
.filter-btn.active{
  background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color:#fff;border-color:transparent;
}

/* Progress bar */
.prog-bar{height:8px;border-radius:999px;background:rgba(219,39,119,.10);margin-top:12px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f472b6,#a855f7);transition:width .3s ease}
.prog-text{font-size:12px;color:var(--muted);margin-top:4px;text-align:right}

/* Flashcard */
.fc-scene{
  perspective:1000px;
  height:260px;
  cursor:pointer;
  margin:4px 0 16px;
  user-select:none;
}
.fc-card{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  border-radius:22px;
}
.fc-card.flipped{ transform:rotateY(180deg); }
.fc-front,.fc-back{
  position:absolute;inset:0;
  border-radius:22px;
  backface-visibility:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  border:1.5px solid var(--stroke);
  box-shadow:var(--shadow);
}
.fc-front{
  background:linear-gradient(160deg,#fff8fc,#f5f0ff);
}
.fc-back{
  background:linear-gradient(160deg,#f0faff,#f5f0ff);
  transform:rotateY(180deg);
}
.fc-ko{
  font-size:52px;font-weight:900;
  background:linear-gradient(135deg,#db2777,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.2;
}
.fc-hint{font-size:13px;color:var(--muted);margin-top:8px}
.fc-meaning{
  font-size:26px;font-weight:900;color:var(--text);
  text-align:center;line-height:1.3;
}
.fc-cat{
  font-size:12px;color:var(--muted);margin-top:8px;
  padding:4px 12px;border-radius:999px;
  background:rgba(219,39,119,.08);
}
.fc-speak{
  margin-top:14px;font-size:13px;cursor:pointer;
  color:#db2777;font-weight:700;background:none;border:none;
}

/* Action buttons */
.action-row{display:flex;gap:12px}
.btn-know{
  flex:1;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;font-size:16px;font-weight:900;cursor:pointer;
  box-shadow:0 8px 20px rgba(34,197,94,.25);
  transition:transform .1s ease;
}
.btn-know:hover{transform:translateY(-2px)}
.btn-dontknow{
  flex:1;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#f43f5e,#e11d48);
  color:#fff;font-size:16px;font-weight:900;cursor:pointer;
  box-shadow:0 8px 20px rgba(244,63,94,.25);
  transition:transform .1s ease;
}
.btn-dontknow:hover{transform:translateY(-2px)}

/* Summary */
.summary-num{
  font-size:48px;font-weight:900;
  background:linear-gradient(135deg,#db2777,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;
}
.summary-label{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}

/* Dark mode */
body.dark-mode{
  --card:rgba(32,6,55,.95);--stroke:rgba(244,114,182,.18);
  --text:#f0e8ff;--muted:rgba(210,170,240,.70);
}
body.dark-mode .fc-front{background:linear-gradient(160deg,rgba(40,10,65,.92),rgba(28,3,52,.97)) !important;border-color:rgba(244,114,182,.20) !important}
body.dark-mode .fc-back{background:linear-gradient(160deg,rgba(10,30,65,.92),rgba(28,3,52,.97)) !important;border-color:rgba(244,114,182,.20) !important}
body.dark-mode .filter-btn{background:rgba(28,4,50,.90) !important;color:#f0e8ff !important}
body.dark-mode .filter-btn.active{background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1) !important;color:#fff !important}
</style>

<body class="theme-anime">
<div class="app">

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <h1 id="pageTitle">🃏 Flashcards</h1>
      <div class="sub" id="pageSubtitle">Apasă pe card ca să-l întorci</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="./index.html" class="homeBtn">🏠</a>
      <button type="button" id="langRo">ro</button>
      <button type="button" id="langEn">en</button>
    </div>
  </div>
  <div class="filter-row">
    <button type="button" class="filter-btn active" id="filterAll">Toate</button>
    <button type="button" class="filter-btn" id="filterFav">⭐ Favorite</button>
  </div>
</div>

<div id="fcArea"></div>

</div>
<script>
let currentLang = localStorage.getItem("RK_LANG") || "ro";
let WORDS = [];
let deck = [];
let cardIndex = 0;
let knowCount = 0;
let dontCount = 0;
let flipped = false;
let filterFav = false;

const UI = {
  ro:{
    title:"🃏 Flashcards", subtitle:"Apasă pe card ca să-l întorci",
    tapToFlip:"Atinge ca să vezi răspunsul",
    know:"✓ Știu", dontKnow:"✗ Nu știu",
    filterAll:"Toate", filterFav:"⭐ Favorite",
    progress:"Progres",
    summaryTitle:"Sesiune completă!",
    know2:"Știu", dontKnow2:"Nu știu",
    restart:"🔁 Reia",
    noFav:"Nu ai favorite. Adaugă din Glosar!",
    loadError:"Nu am putut încărca vocab-korean.json"
  },
  en:{
    title:"🃏 Flashcards", subtitle:"Tap the card to flip it",
    tapToFlip:"Tap to see the answer",
    know:"✓ I know", dontKnow:"✗ Don't know",
    filterAll:"All", filterFav:"⭐ Favorites",
    progress:"Progress",
    summaryTitle:"Session complete!",
    know2:"Know", dontKnow2:"Don't know",
    restart:"🔁 Restart",
    noFav:"No favorites. Add some in the Glossary!",
    loadError:"Could not load vocab-korean.json"
  }
};

function t(k){ return UI[currentLang][k]; }

function getMeaning(w){ return currentLang === "ro" ? w.ro : w.en; }
function getCat(w){ return currentLang === "ro" ? (w.categoriesRo||[])[0] : (w.categoriesEn||[])[0]; }

function getFavs(){ return JSON.parse(localStorage.getItem("FAV_WORDS") || "[]"); }

function buildDeck(){
  let pool = WORDS;
  if(filterFav){
    const favs = getFavs();
    pool = WORDS.filter(w => favs.includes(w.ko));
  }
  deck = [...pool].sort(() => Math.random() - 0.5);
  cardIndex = 0;
  knowCount = 0;
  dontCount = 0;
  flipped = false;
}

function speakKO(text){
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "ko-KR"; utt.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

function renderFC(){
  const el = document.getElementById("fcArea");

  if(WORDS.length === 0){
    el.innerHTML = `<div class="card"><div style="text-align:center;color:var(--muted);padding:20px">${t("loadError")}</div></div>`;
    return;
  }

  if(filterFav && deck.length === 0 && getFavs().length === 0){
    el.innerHTML = `<div class="card"><div style="text-align:center;color:var(--muted);padding:20px">${t("noFav")}</div></div>`;
    return;
  }

  if(cardIndex >= deck.length){
    renderSummary();
    return;
  }

  const word = deck[cardIndex];
  const done = knowCount + dontCount;
  const progPct = deck.length === 0 ? 0 : Math.round(done / deck.length * 100);

  el.innerHTML = `
    <div class="card" style="padding-bottom:12px">
      <div class="prog-bar"><div class="prog-fill" style="width:${progPct}%"></div></div>
      <div class="prog-text">${done}/${deck.length}</div>

      <div class="fc-scene" id="fcScene" onclick="flipCard()">
        <div class="fc-card" id="fcCard">
          <div class="fc-front">
            <div class="fc-ko">${word.ko}</div>
            <div class="fc-hint">${t("tapToFlip")}</div>
          </div>
          <div class="fc-back">
            <div class="fc-meaning">${getMeaning(word) || "—"}</div>
            ${getCat(word) ? `<div class="fc-cat">${getCat(word)}</div>` : ""}
            <button class="fc-speak" onclick="event.stopPropagation();speakKO('${word.ko.replace(/'/g,"\\'")}')">🔈 ${word.ko}</button>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-dontknow" onclick="answer(false)">${t("dontKnow")}</button>
        <button class="btn-know" onclick="answer(true)">${t("know")}</button>
      </div>
    </div>`;

  if(flipped) document.getElementById("fcCard").classList.add("flipped");
}

function flipCard(){
  flipped = !flipped;
  const card = document.getElementById("fcCard");
  if(card) card.classList.toggle("flipped", flipped);
  if(flipped && deck[cardIndex]) speakKO(deck[cardIndex].ko);
}

function answer(knows){
  if(knows) knowCount++; else dontCount++;
  cardIndex++;
  flipped = false;
  renderFC();
}

function renderSummary(){
  const el = document.getElementById("fcArea");
  el.innerHTML = `
    <div class="card" style="text-align:center">
      <h2 style="margin-bottom:16px">${t("summaryTitle")}</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div class="stat-box" style="background:rgba(34,197,94,.10);border:1.5px solid rgba(34,197,94,.25);border-radius:16px;padding:16px">
          <div style="font-size:36px;font-weight:900;color:#16a34a">${knowCount}</div>
          <div style="font-size:12px;color:var(--muted);font-weight:700">${t("know2")}</div>
        </div>
        <div class="stat-box" style="background:rgba(244,63,94,.10);border:1.5px solid rgba(244,63,94,.25);border-radius:16px;padding:16px">
          <div style="font-size:36px;font-weight:900;color:#e11d48">${dontCount}</div>
          <div style="font-size:12px;color:var(--muted);font-weight:700">${t("dontKnow2")}</div>
        </div>
      </div>
      <button onclick="buildDeck();renderFC()" style="padding:12px 28px;border-radius:999px;border:none;background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1);color:#fff;font-weight:900;font-size:15px;cursor:pointer">${t("restart")}</button>
    </div>`;
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("RK_LANG", lang);
  updateLangBtns();
  updateFilterBtns();
  document.getElementById("pageTitle").textContent = t("title");
  document.getElementById("pageSubtitle").textContent = t("subtitle");
  document.getElementById("filterAll").textContent = t("filterAll");
  document.getElementById("filterFav").textContent = t("filterFav");
  buildDeck();
  renderFC();
}

function updateLangBtns(){
  const on = "linear-gradient(135deg,#f472b6,#a855f7,#6366f1)";
  const off = "linear-gradient(160deg,#fff,#fdf4ff)";
  document.getElementById("langRo").style.background = currentLang==="ro"?on:off;
  document.getElementById("langRo").style.color = currentLang==="ro"?"#fff":"var(--text)";
  document.getElementById("langEn").style.background = currentLang==="en"?on:off;
  document.getElementById("langEn").style.color = currentLang==="en"?"#fff":"var(--text)";
}

function updateFilterBtns(){
  document.getElementById("filterAll").classList.toggle("active", !filterFav);
  document.getElementById("filterFav").classList.toggle("active", filterFav);
}

document.getElementById("langRo").addEventListener("click", () => setLang("ro"));
document.getElementById("langEn").addEventListener("click", () => setLang("en"));
document.getElementById("filterAll").addEventListener("click", () => {
  filterFav = false; updateFilterBtns(); buildDeck(); renderFC();
});
document.getElementById("filterFav").addEventListener("click", () => {
  filterFav = true; updateFilterBtns(); buildDeck(); renderFC();
});

async function loadVocab(){
  try{
    const resp = await fetch("./data/vocab-korean.json");
    const vocab = await resp.json();
    const map = new Map();
    const cats = ["subjects","nouns","objects","verbs","adjectives","adverbs","modifiers","connectors","grammar"];
    const catLabels = {
      subjects:{ro:"Subiect",en:"Subject"},nouns:{ro:"Substantiv",en:"Noun"},
      objects:{ro:"Obiect",en:"Object"},verbs:{ro:"Verb",en:"Verb"},
      adjectives:{ro:"Adjectiv",en:"Adjective"},adverbs:{ro:"Adverb",en:"Adverb"},
      modifiers:{ro:"Modificator",en:"Modifier"},connectors:{ro:"Conector",en:"Connector"},
      grammar:{ro:"Gramatică",en:"Grammar"}
    };
    cats.forEach(cat => {
      (vocab[cat]||[]).forEach(e => {
        if(!e.ko) return;
        if(!map.has(e.ko)) map.set(e.ko,{ko:e.ko,ro:e.ro||"",en:e.en||"",categoriesRo:[],categoriesEn:[]});
        const w = map.get(e.ko);
        if(!w.categoriesRo.includes(catLabels[cat].ro)) w.categoriesRo.push(catLabels[cat].ro);
        if(!w.categoriesEn.includes(catLabels[cat].en)) w.categoriesEn.push(catLabels[cat].en);
      });
    });
    WORDS = [...map.values()].sort((a,b)=>a.ko.localeCompare(b.ko,"ko"));
    buildDeck();
    renderFC();
  } catch(e){
    document.getElementById("fcArea").innerHTML = `<div class="card"><div style="text-align:center;color:var(--muted);padding:20px">${t("loadError")}</div></div>`;
  }
}

updateLangBtns();
loadVocab();
</script>
