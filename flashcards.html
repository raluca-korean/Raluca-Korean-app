<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Flashcards</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
:root{
  --card:#ffffff;
  --stroke:#e5e5e5;
  --text:#3c3c3c;
  --muted:#afafaf;
  --green:#58CC02;
  --green-dk:#45A800;
  --blue:#1CB0F6;
  --blue-dk:#009AC7;
  --red:#FF4B4B;
  --red-dk:#CC0000;
  --radius:16px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#f0f4f8;
  color:var(--text);
}
.app{max-width:680px;margin:0 auto;padding:20px}
.card{
  background:var(--card);
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:14px;
  box-shadow:none;
}
h1{margin:0 0 4px;font-size:22px;font-weight:900;color:var(--text)}
.sub{font-size:13px;color:var(--muted)}

/* Buttons generali */
.homeBtn,button{
  border:2px solid var(--stroke) !important;
  border-bottom:4px solid #d0d0d0 !important;
  background:#fff !important;
  color:var(--text) !important;
  border-radius:12px !important;
  font-weight:800 !important;
  box-shadow:none !important;
}
button:hover{ transform:translateY(-1px); }
button:active{ transform:translateY(2px); border-bottom-width:2px !important; }

/* Filter buttons */
.filter-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.filter-btn{
  padding:8px 16px;border-radius:12px;
  min-height:44px;
  border:2px solid var(--stroke) !important;
  border-bottom:4px solid #d0d0d0 !important;
  background:#fff !important;color:var(--text) !important;
  font-weight:800;font-size:13px;cursor:pointer;
}
.filter-btn.active{
  background:var(--blue) !important;
  border-color:var(--blue) !important;
  border-bottom-color:var(--blue-dk) !important;
  color:#fff !important;
}

/* Progress bar */
.prog-bar{height:12px;border-radius:999px;background:#e5e5e5;margin-top:12px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:var(--green);transition:width .3s ease}
.prog-text{font-size:12px;color:var(--muted);margin-top:4px;text-align:right;font-weight:700}

/* Flashcard */
.fc-scene{
  perspective:1000px;
  height:260px;
  cursor:pointer;
  margin:4px 0 16px;
  user-select:none;
}
.fc-card{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  border-radius:16px;
}
.fc-card.flipped{ transform:rotateY(180deg); }
.fc-front,.fc-back{
  position:absolute;inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  border:2px solid var(--stroke);
  border-bottom:6px solid #d0d0d0;
}
.fc-front{ background:#fff; }
.fc-back{
  background:#f0faff;
  border-color:var(--blue);
  border-bottom-color:var(--blue-dk);
  transform:rotateY(180deg);
}
.fc-ko{
  font-size:52px;font-weight:900;
  color:var(--text);
  -webkit-text-fill-color:var(--text);
  text-align:center;line-height:1.2;
}
.fc-hint{font-size:13px;color:var(--muted);margin-top:8px}
.fc-meaning{
  font-size:26px;font-weight:900;color:var(--blue-dk);
  text-align:center;line-height:1.3;
}
.fc-cat{
  font-size:12px;color:var(--muted);margin-top:8px;
  padding:4px 12px;border-radius:999px;
  background:#e5e5e5;
}
.fc-speak{
  margin-top:14px;font-size:13px;cursor:pointer;
  color:var(--blue);font-weight:700;
  background:none !important;border:none !important;
  border-bottom:none !important;box-shadow:none !important;
  padding:6px 14px;
  min-height:44px;
  display:inline-flex;align-items:center;
}

/* Action buttons */
.action-row{display:flex;gap:12px}
.btn-know{
  flex:1;padding:14px;border-radius:14px;
  background:var(--green) !important;
  border-color:var(--green) !important;
  border-bottom-color:var(--green-dk) !important;
  color:#fff !important;font-size:16px;font-weight:900;cursor:pointer;
}
.btn-dontknow{
  flex:1;padding:14px;border-radius:14px;
  background:var(--red) !important;
  border-color:var(--red) !important;
  border-bottom-color:var(--red-dk) !important;
  color:#fff !important;font-size:16px;font-weight:900;cursor:pointer;
}

/* Summary */
.summary-num{
  font-size:48px;font-weight:900;
  color:var(--text);
  text-align:center;
}
.summary-label{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}

/* Dark mode */
body.dark-mode{
  background:#1a1a2e;color:#e0e0e0;
}
body.dark-mode .card{ background:#16213e !important;border-color:#2a2a4a !important;border-bottom-color:#111130 !important; }
body.dark-mode h1{ color:#e0e0e0 !important; }
body.dark-mode .fc-front{ background:#16213e !important;border-color:#2a2a4a !important; }
body.dark-mode .fc-back{ background:#0a2040 !important;border-color:var(--blue) !important; }
body.dark-mode .fc-ko{ color:#e0e0e0 !important;-webkit-text-fill-color:#e0e0e0 !important; }
body.dark-mode .filter-btn{ background:#16213e !important;border-color:#2a2a4a !important;color:#e0e0e0 !important; }
body.dark-mode .filter-btn.active{ background:var(--blue) !important;border-color:var(--blue) !important;color:#fff !important; }
body.dark-mode button:not(.btn-know):not(.btn-dontknow):not(.filter-btn){ background:#16213e !important;border-color:#2a2a4a !important;color:#e0e0e0 !important; }
</style>
</head>
<body class="theme-anime">
<div class="app">

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <h1 id="pageTitle">🃏 Flashcards</h1>
      <div class="sub" id="pageSubtitle">Apasă pe card ca să-l întorci</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="./index.html" class="homeBtn">🏠</a>
      <button type="button" id="langRo" aria-label="Română" aria-pressed="true">ro</button>
      <button type="button" id="langEn" aria-label="English" aria-pressed="false">en</button>
    </div>
  </div>
  <div class="filter-row">
    <button type="button" class="filter-btn active" id="filterAll">Toate</button>
    <button type="button" class="filter-btn" id="filterFav">⭐ Favorite</button>
  </div>
</div>

<div id="fcArea" aria-live="polite" aria-atomic="true"></div>

</div>
<script src="./js/core/lang.js"></script>
<script src="./js/flashcards.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
