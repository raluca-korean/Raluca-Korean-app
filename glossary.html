<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Glosar</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2877">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./glossary.css">
</head>
<body class="gls">

<!-- ── Top bar ── -->
<header class="gls-bar">
  <div class="gls-bar-search">
    <svg class="gls-search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" class="gls-search" autocomplete="off" spellcheck="false">
  </div>
  <div class="gls-bar-tools">
    <div id="glsCatDots" class="gls-cats" role="toolbar" aria-label="Filtru categorie"></div>
    <a href="./flashcards.html" class="gls-fc-btn" title="Flashcards">🃏</a>
    <button id="sortBtn" class="gls-fav-btn" type="button" title="Sortare">⇅</button>
    <button id="favFilterBtn" class="gls-fav-btn" type="button">◆</button>
    <div id="pageControls"></div>
  </div>
</header>

<!-- ── Daily words ── -->
<div id="dailyCard" class="gls-daily"></div>

<!-- ── Stats ── -->
<div id="count" class="gls-stats" aria-live="polite"></div>

<!-- ── Word list ── -->
<main id="list" class="gls-stream" role="main" aria-label="Vocabular"></main>

<!-- ── Word detail panel ── -->
<aside id="glsPanel" class="gls-panel" aria-hidden="true">
  <div id="glsPanelBody" class="gls-panel-body"></div>
</aside>
<div id="glsVeil" class="gls-veil"></div>

<!-- Compat stubs (used by legacy/compat code) -->
<span id="pageTitle"    hidden>Glosar Korean</span>
<span id="pageSubtitle" hidden>Prism</span>
<select id="catFilter"  aria-hidden="true" style="display:none"></select>

<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/glossary.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
