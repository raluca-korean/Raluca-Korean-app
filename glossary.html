<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Raluca Korean — Glosar</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RK Korean">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="stylesheet" href="./theme-anime.css">
<style>
:root{
  --card: rgba(255,255,255,.97);
  --stroke: rgba(219,39,119,.13);
  --text:#1a0533;
  --muted: rgba(126,58,110,.80);
  --accent:#db2777;
  --radius:22px;
  --shadow:0 16px 40px rgba(219,39,119,.13);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(219,39,119,.22) 0%, transparent 45%),
    radial-gradient(ellipse at 100% 0%,  rgba(14,165,233,.18)  0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.16)  0%, transparent 45%),
    linear-gradient(180deg, #fce7f3 0%, #fdf4ff 40%, #eff6ff 100%);
  color:var(--text);
}

.app{max-width:900px;margin:0 auto;padding:20px}

.card{
  background:var(--card);
  border:1.5px solid var(--stroke);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

h1{margin:0 0 6px;color:var(--text);}
.sub{font-size:13px;color:var(--muted)}

input{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1.5px solid rgba(219,39,119,.18);
  background:#fff;
  color:var(--text);
  outline:none;
  font:inherit;
}

input:focus{
  border-color:rgba(219,39,119,.45);
  box-shadow:0 0 0 4px rgba(219,39,119,.10);
}

.word{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:12px;
  border-radius:14px;
  border:1.5px solid rgba(219,39,119,.12);
  background:linear-gradient(160deg,#fff,#fdf4ff);
  margin-bottom:8px;
  box-shadow:0 4px 14px rgba(219,39,119,.07);
}

.ko{
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,#db2777,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.ro{font-size:13px;color:var(--muted)}

.actions{display:flex;gap:10px}
.icon{cursor:pointer}
.star.active{color:#f59e0b}

.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  margin-top:16px;
  padding-top:14px;
  border-top:1.5px solid rgba(219,39,119,.12);
}
.pgBtn{
  width:38px;height:38px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color:#fff;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(168,85,247,.25);
  transition:opacity .15s;
}
.pgBtn:disabled{opacity:.3;cursor:default}
.pgInfo{
  font-size:15px;font-weight:700;
  color:var(--text);
  min-width:60px;text-align:center;
}

button{
  padding:8px 14px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(168,85,247,.25);
}

.filterRow{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
  align-items:center;
}

.catSelect{
  padding:8px 12px;
  border-radius:14px;
  border:1.5px solid rgba(219,39,119,.18);
  background:#fff;
  color:var(--text);
  font:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  outline:none;
  flex:1;
  min-width:140px;
}

.catSelect:focus{
  border-color:rgba(219,39,119,.45);
  box-shadow:0 0 0 4px rgba(219,39,119,.10);
}

.favBtn{
  padding:8px 14px;
  border-radius:999px;
  border:1.5px solid rgba(219,39,119,.20);
  background:#fff;
  color:var(--text);
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  transition:background .15s,color .15s;
  white-space:nowrap;
}

.favBtn.active{
  background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1);
  color:#fff;
  border-color:transparent;
}

body.dark-mode{
  --card:rgba(32,6,55,.95);
  --stroke:rgba(244,114,182,.18);
  --text:#f0e8ff;
  --muted:rgba(210,170,240,.70);
}

body.dark-mode .catSelect{
  background:rgba(28,4,50,.92) !important;
  color:#f0e8ff !important;
  border-color:rgba(244,114,182,.25) !important;
}

body.dark-mode .favBtn{
  background:rgba(28,4,50,.92) !important;
  color:#f0e8ff !important;
  border-color:rgba(244,114,182,.25) !important;
}

body.dark-mode .favBtn.active{
  background:linear-gradient(135deg,#f472b6,#a855f7,#6366f1) !important;
  color:#fff !important;
  border-color:transparent !important;
}
</style>
</head>
 <body class="theme-anime glossary-page">
 
<div class="app">

<!-- 3 CUVINTE PE ZI -->
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <div>
      <h1 id="pageTitle">Glosar Korean</h1>
      <div class="sub" id="pageSubtitle">Pronunție · Favorite · Context real</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
      <a href="./index.html" class="homeBtn" aria-label="Acasă">🏠</a>
      <button type="button" id="langRo">ro</button>
      <button type="button" id="langEn">en</button>
    </div>
  </div>
</div>
  <div class="card" id="dailyCard"></div>

<!-- SEARCH + FILTERS -->
<div class="card">
  <input id="search" placeholder="Caută (KO / RO / EN)">
  <div class="filterRow">
    <select id="catFilter" class="catSelect"></select>
    <button type="button" id="favFilterBtn" class="favBtn">⭐ Favorite</button>
  </div>
</div>

<!-- LIST -->
<div class="card">
  <div class="sub" id="count"></div>
  <div id="list"></div>
</div>

</div>
<script>
const pageTitleEl = document.getElementById("pageTitle");
const pageSubtitleEl = document.getElementById("pageSubtitle");
const langRoBtn = document.getElementById("langRo");
const langEnBtn = document.getElementById("langEn");
const dailyCard = document.getElementById("dailyCard");
const searchInput = document.getElementById("search");
const countEl = document.getElementById("count");
const listEl = document.getElementById("list");
const catFilterEl = document.getElementById("catFilter");
const favFilterBtn = document.getElementById("favFilterBtn");

const PAGE_SIZE = 20;
let currentPage = 1;
let WORDS = [];
let daily = [];
let dailyIndex = 0;
let dailyHTML = "";
let currentLang = localStorage.getItem("RK_LANG") || "ro";
let filterCategory = "";
let filterFavsOnly = false;

const CATEGORY_LABELS = {
  subjects:   { ro: "Subiect",     en: "Subject"    },
  nouns:      { ro: "Substantiv",  en: "Noun"        },
  objects:    { ro: "Obiect",      en: "Object"      },
  verbs:      { ro: "Verb",        en: "Verb"        },
  adjectives: { ro: "Adjectiv",    en: "Adjective"   },
  adverbs:    { ro: "Adverb",      en: "Adverb"      },
  modifiers:  { ro: "Modificator", en: "Modifier"    },
  connectors: { ro: "Conector",    en: "Connector"   },
  grammar:    { ro: "Gramatică",   en: "Grammar"     }
};

const UI_TEXT = {
  ro: {
    title: "Glosar Korean",
    subtitle: "Pronunție · Favorite · Context real",
    searchPlaceholder: "Caută (KO / RO / EN)",
    countWords: "cuvinte",
    noWords: "Nu există cuvinte.",
    dailyTitle: "📅 3 cuvinte pe zi",
    speak: "🔊 Pronunție",
    practice: "🧠 Exersează",
    refresh: "🔁 Alte cuvinte",
    quizQuestion: "🧠 Ce înseamnă:",
    done: "🎉 Gata!",
    back: "⬅ Înapoi",
    tryAgain: "❌ Mai încearcă",
    loadError: "Nu am putut încărca vocab-korean.json",
    category: "Categorie",
    allCategories: "Toate categoriile",
    favOnly: "⭐ Favorite"
  },
  en: {
    title: "Korean Glossary",
    subtitle: "Pronunciation · Favorites · Real context",
    searchPlaceholder: "Search (KO / RO / EN)",
    countWords: "words",
    noWords: "No words found.",
    dailyTitle: "📅 3 words a day",
    speak: "🔊 Pronunciation",
    practice: "🧠 Practice",
    refresh: "🔁 New words",
    quizQuestion: "🧠 What does it mean:",
    done: "🎉 Done!",
    back: "⬅ Back",
    tryAgain: "❌ Try again",
    loadError: "Could not load vocab-korean.json",
    category: "Category",
    allCategories: "All categories",
    favOnly: "⭐ Favorites"
  }
};

function t(key){
  return UI_TEXT[currentLang][key];
}

function updateLanguageButtons(){
  const activeStyle = "linear-gradient(135deg,#f472b6,#a855f7,#6366f1)";
  const inactiveStyle = "linear-gradient(160deg,#fff,#fdf4ff)";
  const activeShadow = "0 8px 20px rgba(168,85,247,.25)";
  const inactiveShadow = "0 4px 12px rgba(219,39,119,.10)";

  if(currentLang === "ro"){
    langRoBtn.style.background = activeStyle;
    langRoBtn.style.color = "#fff";
    langRoBtn.style.boxShadow = activeShadow;
    langEnBtn.style.background = inactiveStyle;
    langEnBtn.style.color = "var(--text)";
    langEnBtn.style.boxShadow = inactiveShadow;
  } else {
    langEnBtn.style.background = activeStyle;
    langEnBtn.style.color = "#fff";
    langEnBtn.style.boxShadow = activeShadow;
    langRoBtn.style.background = inactiveStyle;
    langRoBtn.style.color = "var(--text)";
    langRoBtn.style.boxShadow = inactiveShadow;
  }
}

function updateStaticTexts(){
  pageTitleEl.textContent = t("title");
  pageSubtitleEl.textContent = t("subtitle");
  searchInput.placeholder = t("searchPlaceholder");
  favFilterBtn.textContent = t("favOnly") + (filterFavsOnly ? " ✓" : "");
  buildCatOptions();
}

function buildCatOptions(){
  const labels = Object.values(CATEGORY_LABELS).map(l => l[currentLang]);
  const opts = [`<option value="">${t("allCategories")}</option>`]
    .concat(labels.map(l => `<option value="${l}" ${filterCategory === l ? "selected" : ""}>${l}</option>`));
  catFilterEl.innerHTML = opts.join("");
}

function setLanguage(lang){
  currentLang = lang;
  filterCategory = "";
  localStorage.setItem("RK_LANG", lang);
  updateStaticTexts();
  updateLanguageButtons();
  renderDailyView();
  render();
}

function getMeaning(word){
  return currentLang === "ro" ? word.ro : word.en;
}

function getCategories(word){
  return currentLang === "ro" ? word.categoriesRo : word.categoriesEn;
}

function shuffle(array){
  return [...array].sort(() => Math.random() - 0.5);
}

function getFavs(){
  return JSON.parse(localStorage.getItem("FAV_WORDS") || "[]");
}

function isFav(ko){
  return getFavs().includes(ko);
}

function toggleFav(ko){
  const favs = getFavs();
  const nextFavs = favs.includes(ko)
    ? favs.filter(item => item !== ko)
    : [...favs, ko];

  localStorage.setItem("FAV_WORDS", JSON.stringify(nextFavs));
  render();
  renderDailyView();
}

function speakKO(text){
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "ko-KR";
  utterance.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function openYouGlish(word){
  window.open(
    `https://youglish.com/pronounce/${encodeURIComponent(word)}/korean`,
    "_blank"
  );
}

function normalizeWordEntry(entry){
  return {
    ko: entry.ko || "",
    ro: entry.ro || "",
    en: entry.en || ""
  };
}

function buildWordsFromVocabulary(vocab){
  const map = new Map();

  Object.keys(CATEGORY_LABELS).forEach(categoryKey => {
    const items = Array.isArray(vocab[categoryKey]) ? vocab[categoryKey] : [];

    items.forEach(rawEntry => {
      const entry = normalizeWordEntry(rawEntry);
      const ko = entry.ko.trim();

      if(!ko) return;

      if(!map.has(ko)){
        map.set(ko, {
          ko,
          ro: entry.ro || "",
          en: entry.en || "",
          categoriesRo: new Set(),
          categoriesEn: new Set()
        });
      }

      const current = map.get(ko);

      if(!current.ro && entry.ro) current.ro = entry.ro;
      if(!current.en && entry.en) current.en = entry.en;

      current.categoriesRo.add(CATEGORY_LABELS[categoryKey].ro);
      current.categoriesEn.add(CATEGORY_LABELS[categoryKey].en);
    });
  });

  return Array.from(map.values())
    .map(word => ({
      ko: word.ko,
      ro: word.ro,
      en: word.en,
      categoriesRo: [...word.categoriesRo],
      categoriesEn: [...word.categoriesEn]
    }))
    .sort((a, b) => a.ko.localeCompare(b.ko, "ko"));
}

async function loadVocabulary(){
  try {
    const response = await fetch("./data/vocab-korean.json");
    const vocab = await response.json();

    WORDS = buildWordsFromVocabulary(vocab);

    pickDaily();
    renderDailyView();
    render();
  } catch (error) {
    console.error("Vocabulary load error:", error);
    dailyCard.innerHTML = `<div class="sub">${t("loadError")}</div>`;
    countEl.textContent = t("loadError");
    listEl.innerHTML = "";
  }
}

function pickDaily(){
  if(WORDS.length === 0){
    daily = [];
    return;
  }

  daily = shuffle(WORDS).slice(0, Math.min(3, WORDS.length));
}

function renderDailyView(){
  if(daily.length === 0){
    dailyCard.innerHTML = `<div class="sub">${t("noWords")}</div>`;
    return;
  }

  dailyCard.innerHTML = `
    <h3>${t("dailyTitle")}</h3>
    ${daily.map(word => `
      <div class="word">
        <div>
          <div class="ko">${word.ko}</div>
          <div class="ro">${getMeaning(word)}</div>
          <div class="ro">${getCategories(word).join(" • ")}</div>
        </div>
        <div class="actions">
          <span class="icon" onclick="speakKO('${word.ko.replace(/'/g, "\\'")}')">🔈</span>
          <span class="icon" onclick="openYouGlish('${word.ko.replace(/'/g, "\\'")}')">🎥</span>
          <span class="icon star ${isFav(word.ko) ? 'active' : ''}" onclick="toggleFav('${word.ko.replace(/'/g, "\\'")}')">⭐</span>
        </div>
      </div>
    `).join("")}

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button type="button" onclick="playDaily()">${t("speak")}</button>
      <button type="button" onclick="startQuiz()">${t("practice")}</button>
      <button type="button" onclick="refreshDaily()">${t("refresh")}</button>
    </div>
  `;

  dailyHTML = dailyCard.innerHTML;
}

function playDaily(){
  daily.forEach((word, index) => {
    setTimeout(() => speakKO(word.ko), index * 1200);
  });
}

function startQuiz(){
  dailyIndex = 0;
  showQuizQuestion();
}

function showQuizQuestion(){
  if(dailyIndex >= daily.length){
    dailyCard.innerHTML = `
      <h3>${t("done")}</h3>
      <button type="button" onclick="exitQuiz()">${t("back")}</button>
    `;
    return;
  }

  const currentWord = daily[dailyIndex];
  speakKO(currentWord.ko);
  const correctMeaning = getMeaning(currentWord);

  const wrongPool = WORDS
    .map(word => getMeaning(word))
    .filter(meaning => meaning && meaning !== correctMeaning);

  const wrongOptions = shuffle([...new Set(wrongPool)]).slice(0, 2);
  const options = shuffle([correctMeaning, ...wrongOptions]);

  dailyCard.innerHTML = `
    <h3>${t("quizQuestion")}</h3>
    <div class="ko">${currentWord.ko}</div>
    ${options.map(option => `
      <button type="button" onclick="checkQuizAnswer('${option.replace(/'/g, "\\'")}', '${correctMeaning.replace(/'/g, "\\'")}')">${option}</button>
    `).join("")}
    <br>
    <button type="button" onclick="exitQuiz()">${t("back")}</button>
  `;
}

function checkQuizAnswer(selectedAnswer, correctAnswer){
  if(selectedAnswer === correctAnswer){
    dailyIndex++;
    showQuizQuestion();
  } else {
    alert(t("tryAgain"));
  }
}

function exitQuiz(){
  dailyCard.innerHTML = dailyHTML;
}

function refreshDaily(){
  pickDaily();
  renderDailyView();
}

function getFiltered(){
  const query = searchInput.value.trim().toLowerCase();
  return WORDS.filter(word => {
    const textMatch = word.ko.toLowerCase().includes(query) ||
      (word.ro || "").toLowerCase().includes(query) ||
      (word.en || "").toLowerCase().includes(query);
    const cats = currentLang === "ro" ? word.categoriesRo : word.categoriesEn;
    const catMatch = !filterCategory || cats.includes(filterCategory);
    const favMatch = !filterFavsOnly || isFav(word.ko);
    return textMatch && catMatch && favMatch;
  });
}

function render(){
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;

  countEl.textContent = `${filtered.length} ${t("countWords")}`;

  if(filtered.length === 0){
    listEl.innerHTML = `<div class="sub">${t("noWords")}</div>`;
    return;
  }

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageWords = filtered.slice(start, start + PAGE_SIZE);

  const wordsHTML = pageWords.map(word => `
    <div class="word">
      <div>
        <div class="ko">${word.ko}</div>
        <div class="ro">${getMeaning(word)}</div>
        <div class="ro">${getCategories(word).join(" • ")}</div>
      </div>
      <div class="actions">
        <span class="icon" onclick="speakKO('${word.ko.replace(/'/g, "\\'")}')">🔈</span>
        <span class="icon" onclick="openYouGlish('${word.ko.replace(/'/g, "\\'")}')">🎥</span>
        <span class="icon star ${isFav(word.ko) ? 'active' : ''}" onclick="toggleFav('${word.ko.replace(/'/g, "\\'")}')">⭐</span>
      </div>
    </div>
  `).join("");

  const paginationHTML = totalPages > 1 ? `
    <div class="pagination">
      <button class="pgBtn" onclick="changePage(-1)" ${currentPage === 1 ? "disabled" : ""}>&#8592;</button>
      <span class="pgInfo">${currentPage} / ${totalPages}</span>
      <button class="pgBtn" onclick="changePage(1)" ${currentPage === totalPages ? "disabled" : ""}>&#8594;</button>
    </div>
  ` : "";

  listEl.innerHTML = wordsHTML + paginationHTML;
}

function changePage(delta){
  const totalPages = Math.max(1, Math.ceil(getFiltered().length / PAGE_SIZE));
  currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
  render();
  listEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

searchInput.addEventListener("input", () => { currentPage = 1; render(); });
langRoBtn.addEventListener("click", () => setLanguage("ro"));
langEnBtn.addEventListener("click", () => setLanguage("en"));
catFilterEl.addEventListener("change", () => {
  filterCategory = catFilterEl.value;
  currentPage = 1;
  render();
});
favFilterBtn.addEventListener("click", () => {
  filterFavsOnly = !filterFavsOnly;
  favFilterBtn.classList.toggle("active", filterFavsOnly);
  favFilterBtn.textContent = t("favOnly") + (filterFavsOnly ? " ✓" : "");
  currentPage = 1;
  render();
});

updateStaticTexts();
updateLanguageButtons();
loadVocabulary();
</script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
