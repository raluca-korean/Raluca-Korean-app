<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Glosar</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2877">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme-anime.css">
<link rel="stylesheet" href="./glossary.css">
</head>
<body class="theme-anime nlb">

<!-- ═══════════════════════════════════════════════════════
     NeuraLux Field — Living Knowledge Topology
     A new interaction paradigm where knowledge is alive.
     Words are luminous organisms in a semantic field.
     Information reorganizes itself around your attention.
     ═══════════════════════════════════════════════════════ -->

<!-- Breathing nebula canvas -->
<canvas id="nlCanvas"></canvas>

<!-- Minimal HUD -->
<header class="nl-hud">
  <div class="nl-hud-l">
    <div class="nl-search-wrap">
      <svg class="nl-search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" class="nl-search" autocomplete="off" spellcheck="false">
    </div>
  </div>
  <div class="nl-hud-r">
    <div id="nlCatDots" class="nl-cat-dots" role="toolbar" aria-label="Category filter"></div>
    <button id="favFilterBtn" class="nl-fav-btn" type="button">◆</button>
    <div id="pageControls" class="nl-page-controls"></div>
  </div>
</header>

<!-- Field stats -->
<div class="nl-stats" id="count" aria-live="polite"></div>

<!-- The Living Knowledge Field -->
<main class="nl-field" id="list" role="main" aria-label="Knowledge Field"></main>

<!-- Detail Lens — slides in on word focus -->
<aside class="nl-lens" id="nlLens" aria-hidden="true">
  <div id="nlLensInner" class="nl-lens-inner"></div>
</aside>

<!-- Daily Revelation -->
<div class="nl-revelation" id="dailyCard" role="complementary"></div>

<!-- Compatibility stubs -->
<span id="pageTitle"    hidden>Glosar Korean</span>
<span id="pageSubtitle" hidden>NeuraLux Field</span>
<select id="catFilter"  aria-hidden="true" style="display:none"></select>

<script src="./js/core/storage.js"></script>
<script src="./js/core/lang-picker.js"></script>
<script src="./js/glossary.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
