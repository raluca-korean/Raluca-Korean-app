<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raluca Korean — Glosar</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#db2777">
<link rel="stylesheet" href="./theme-anime.css">
<style>
:root{
  --card: #ffffff;
  --stroke: #e5e5e5;
  --text: #3c3c3c;
  --muted: #afafaf;
  --green: #58CC02;
  --green-dk: #45A800;
  --blue: #1CB0F6;
  --blue-dk: #009AC7;
  --yellow: #FFC800;
  --radius: 16px;
}

*{box-sizing:border-box}
body{ margin:0; }

.app{max-width:900px;margin:0 auto;padding:20px}

.card{ margin-bottom:14px; }

h1{margin:0 0 4px;font-weight:900;}
.sub{font-size:13px;}

input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  background:#fff;
  color:var(--text);
  outline:none;
  font:inherit;
  font-weight:700;
}

input:focus{
  border-color: var(--blue);
  outline: none;
}

.word{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  background:#fff;
  margin-bottom:8px;
}

.word:hover{ border-color: var(--blue); background: #f0faff; }

.ko{
  font-weight:900;
  font-size:18px;
  color: var(--text);
  -webkit-text-fill-color: var(--text);
}
.ro{font-size:13px;color:var(--muted)}

.actions{display:flex;gap:4px}
.icon{
  cursor:pointer;font-size:18px;
  min-width:44px;min-height:44px;
  display:inline-flex;align-items:center;justify-content:center;
}
.star.active{color: var(--yellow)}

.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-top:14px;
  padding-top:12px;
  border-top:2px solid var(--stroke);
}

.pgBtn{
  width:44px;height:44px;
  border-radius:12px;
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  background:#fff;
  color:var(--text);
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .10s;
}

.pgBtn:hover{ border-color: var(--blue); }
.pgBtn:disabled{opacity:.30;cursor:default}

.pgInfo{
  font-size:15px;font-weight:800;
  color:var(--text);
  min-width:60px;text-align:center;
}


.filterRow{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
  align-items:center;
}

.catSelect{
  padding:10px 12px;
  border-radius:12px;
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  background:#fff;
  color:var(--text);
  font:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  outline:none;
  flex:1;
  min-width:140px;
}

.favBtn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid var(--stroke);
  border-bottom:4px solid #d0d0d0;
  background:#fff;
  color:var(--text);
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
  white-space:nowrap;
}

.favBtn.active{
  background: var(--yellow);
  border-color: #E6A000;
  border-bottom-color: #B87D00;
  color: #3c3c3c;
}

</style>
</head>
 <body class="theme-anime glossary-page">
 
<div class="app">

<!-- 3 CUVINTE PE ZI -->
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <div>
      <h1 id="pageTitle">Glosar Korean</h1>
      <div class="sub" id="pageSubtitle">Pronunție • Favorite • Context real</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
      <a href="./index.html" class="homeBtn" aria-label="Acasă">🏠</a>
      <button type="button" id="langRo" aria-label="Română" aria-pressed="true">ro</button>
      <button type="button" id="langEn" aria-label="English" aria-pressed="false">en</button>
    </div>
  </div>
</div>
  <div class="card" id="dailyCard" aria-live="polite" aria-atomic="true"></div>

<!-- SEARCH + FILTERS -->
<div class="card">
  <input id="search" placeholder="Caută (KO / RO / EN)">
  <div class="filterRow">
    <select id="catFilter" class="catSelect"></select>
    <button type="button" id="favFilterBtn" class="favBtn">⭐ Favorite</button>
  </div>
</div>

<!-- LIST -->
<div class="card">
  <div class="sub" id="count"></div>
  <div id="list"></div>
</div>

</div>
<script src="./js/core/lang.js"></script>
<script src="./js/glossary.js"></script>
<script src="./js/core/dark-mode.js"></script>
<script src="./js/core/register-sw.js"></script>
</body>
</html>
