<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Antrenament — Raluca Korean</title>
  <link rel="stylesheet" href="theme-anime.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--c-bg);color:var(--c-text);font-family:system-ui,-apple-system,sans-serif;}

    /* ── HEADER ── */
    .drillHeader{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--c-border);background:var(--c-surface);}
    .drillPageTitle{font-size:1rem;font-weight:700;flex:1;text-align:center;}
    .langBar{display:flex;gap:4px;}
    .langBtn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--c-border);background:transparent;color:var(--c-muted);font-size:.8rem;font-weight:600;cursor:pointer;}
    .langBtn.active{background:var(--c-accent);color:#fff;border-color:var(--c-accent);}

    /* ── TABS ── */
    .drillTabs{display:flex;border-bottom:2px solid var(--c-border);background:var(--c-surface);}
    .drillTab{flex:1;padding:11px 8px;text-align:center;font-size:.9rem;font-weight:700;color:var(--c-muted);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s;}
    .drillTab.active{color:var(--c-accent);border-bottom-color:var(--c-accent);}

    /* ── SCORE BAR ── */
    .scoreBar{display:flex;justify-content:center;gap:20px;padding:8px 16px;background:var(--c-surface);border-bottom:1px solid var(--c-border);}
    .scoreItem{display:flex;align-items:center;gap:5px;font-size:.85rem;font-weight:600;}
    .scoreIcon{font-size:1rem;}

    /* ── PROGRESS ── */
    .progressWrap{padding:8px 16px 4px;background:var(--c-surface);border-bottom:1px solid var(--c-border);}
    .progressTrack{height:6px;background:var(--c-border);border-radius:3px;overflow:hidden;}
    .progressFill{height:100%;background:var(--c-accent);border-radius:3px;transition:width .4s ease;}
    .progressLabel{font-size:.72rem;color:var(--c-muted);margin-top:4px;text-align:right;}

    /* ── CARD ── */
    .cardWrap{padding:16px;}
    .drillCard{background:var(--c-surface);border-radius:18px;padding:22px 18px;box-shadow:0 2px 16px rgba(0,0,0,.07);}

    /* Conjugation card */
    .verbBlock{text-align:center;margin-bottom:18px;}
    .verbKo{font-size:2.2rem;font-weight:800;letter-spacing:.02em;}
    .verbTr{font-size:.9rem;color:var(--c-muted);margin-top:4px;}
    .tenseTag{display:inline-block;margin:14px auto 18px;padding:5px 16px;border-radius:20px;font-size:.75rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
    .tenseTag.pres{background:#d1fae5;color:#065f46;}
    .tenseTag.past{background:#fee2e2;color:#991b1b;}
    .tenseTag.fut {background:#dbeafe;color:#1e40af;}
    body.dark-mode .tenseTag.pres{background:#064e3b;color:#6ee7b7;}
    body.dark-mode .tenseTag.past{background:#7f1d1d;color:#fca5a5;}
    body.dark-mode .tenseTag.fut {background:#1e3a5f;color:#93c5fd;}
    .questionText{text-align:center;font-size:.9rem;color:var(--c-muted);margin-bottom:16px;}

    .optGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .optBtn{padding:16px 10px;border-radius:13px;border:2px solid var(--c-border);background:var(--c-bg);color:var(--c-text);font-size:1rem;font-weight:700;cursor:pointer;transition:border-color .12s,background .12s;text-align:center;line-height:1.3;}
    .optBtn:hover:not(:disabled){border-color:var(--c-accent);background:rgba(139,92,246,.06);}
    .optBtn.correct{border-color:#10b981!important;background:#d1fae5!important;color:#065f46!important;}
    .optBtn.wrong  {border-color:#ef4444!important;background:#fee2e2!important;color:#991b1b!important;}
    .optBtn.reveal {border-color:#10b981!important;background:#d1fae5!important;color:#065f46!important;}
    .optBtn:disabled{cursor:default;opacity:.85;}
    body.dark-mode .optBtn.correct{background:#064e3b!important;color:#6ee7b7!important;}
    body.dark-mode .optBtn.wrong  {background:#7f1d1d!important;color:#fca5a5!important;}
    body.dark-mode .optBtn.reveal {background:#064e3b!important;color:#6ee7b7!important;}
    body.dark-mode .optBtn{background:var(--c-surface);}

    /* Extension card */
    .extHeader{text-align:center;font-size:.85rem;color:var(--c-muted);margin-bottom:12px;}
    .sentencePair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .sentBox{padding:12px;border-radius:11px;background:var(--c-bg);border:2px solid var(--c-border);text-align:center;}
    .sentKo{font-size:.95rem;font-weight:700;}
    .sentTr{font-size:.75rem;color:var(--c-muted);margin-top:4px;}
    .connTag{display:block;text-align:center;margin-bottom:14px;padding:6px 16px;border-radius:20px;background:rgba(139,92,246,.12);color:#7c3aed;font-weight:800;font-size:.85rem;}
    body.dark-mode .connTag{background:rgba(167,139,250,.15);color:#a78bfa;}
    .extOptGrid{display:grid;grid-template-columns:1fr;gap:9px;}
    .extOptBtn{padding:13px 14px;border-radius:12px;border:2px solid var(--c-border);background:var(--c-bg);color:var(--c-text);font-size:.9rem;font-weight:600;cursor:pointer;transition:border-color .12s,background .12s;text-align:left;}
    .extOptBtn:hover:not(:disabled){border-color:var(--c-accent);}
    .extOptBtn.correct{border-color:#10b981!important;background:#d1fae5!important;color:#065f46!important;}
    .extOptBtn.wrong  {border-color:#ef4444!important;background:#fee2e2!important;color:#991b1b!important;}
    .extOptBtn.reveal {border-color:#10b981!important;background:#d1fae5!important;color:#065f46!important;}
    .extOptBtn:disabled{cursor:default;}
    body.dark-mode .extOptBtn{background:var(--c-surface);}
    body.dark-mode .extOptBtn.correct{background:#064e3b!important;color:#6ee7b7!important;}
    body.dark-mode .extOptBtn.wrong  {background:#7f1d1d!important;color:#fca5a5!important;}
    body.dark-mode .extOptBtn.reveal {background:#064e3b!important;color:#6ee7b7!important;}

    /* Feedback + Next */
    .feedbackRow{text-align:center;margin-top:14px;min-height:28px;}
    .feedbackTxt{font-size:.9rem;font-weight:700;}
    .feedbackTxt.ok{color:#10b981;}
    .feedbackTxt.ko{color:#ef4444;}
    .nextBtn{width:100%;margin-top:14px;padding:14px;border-radius:13px;border:none;background:var(--c-accent);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;display:none;}
    .nextBtn.visible{display:block;}

    /* Summary */
    .summaryCard{background:var(--c-surface);border-radius:18px;padding:32px 20px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.07);}
    .summaryEmoji{font-size:3rem;margin-bottom:8px;}
    .summaryScore{font-size:3.2rem;font-weight:900;color:var(--c-accent);}
    .summaryTotal{font-size:.9rem;color:var(--c-muted);margin-top:4px;}
    .summaryStreak{font-size:1rem;font-weight:600;margin-top:10px;}
    .restartBtn{margin-top:22px;padding:14px 36px;border-radius:13px;border:none;background:var(--c-accent);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>

<header class="drillHeader">
  <a href="index.html" class="homeBtn" title="Acasă">🏠</a>
  <span class="drillPageTitle" id="pageTitle">Antrenament</span>
  <div class="langBar">
    <button class="langBtn" id="btnRo">ro</button>
    <button class="langBtn" id="btnEn">en</button>
  </div>
</header>

<div class="drillTabs">
  <button class="drillTab active" id="tabConjug">🔤 Conjugare</button>
  <button class="drillTab"        id="tabExt">🔗 Extindere</button>
</div>

<div class="scoreBar">
  <div class="scoreItem"><span class="scoreIcon">✅</span><span id="scoreCorrect">0</span></div>

</div>

<div class="progressWrap">
  <div class="progressTrack"><div class="progressFill" id="progressFill" style="width:0%"></div></div>
  <div class="progressLabel" id="progressLabel">0 / 0</div>
</div>

<div class="cardWrap" id="cardArea"></div>

<script src="js/core/conjugation.js"></script>
<script>

var EXT = [
  {s1_ko:'밥을 먹어요', s1_ro:'Mănânc.',       s1_en:'I eat.',
   s2_ko:'물을 마셔요', s2_ro:'Beau apă.',     s2_en:'I drink water.',
   conn:'-고', conn_ro:'și (secvențial)', conn_en:'and (then)',

  {s1_ko:'공부해요',    s1_ro:'Studiez.',       s1_en:'I study.',
   s2_ko:'쉬어요',      s2_ro:'Mă odihnesc.',  s2_en:'I rest.',
   conn:'-고', conn_ro:'și (secvențial)', conn_en:'and (then)',
   correct:'공부하고 쉬어요',
   wrongs:['공부해서 쉬어요','쉬고 공부해요','공부하지만 쉬어요']},

  {s1_ko:'책을 읽어요', s1_ro:'Citesc o carte.',  s1_en:'I read a book.',

   conn:'-고', conn_ro:'și (secvențial)', conn_en:'and (then)',

  {s1_ko:'운동해요',    s1_ro:'Fac sport.',        s1_en:'I exercise.',
   s2_ko:'물을 마셔요', s2_ro:'Beau apă.',         s2_en:'I drink water.',
   conn:'-고', conn_ro:'și (secvențial)', conn_en:'and (then)',
   correct:'운동하고 물을 마셔요',
   wrongs:['운동해서 물을 마셔요','물을 마시고 운동해요','운동하지만 물을 마셔요']},

  {s1_ko:'음악을 들어요', s1_ro:'Ascult muzică.',   s1_en:'I listen to music.',
   s2_ko:'공부해요',      s2_ro:'Studiez.',          s2_en:'I study.',
   conn:'-고', conn_ro:'și (secvențial)', conn_en:'and (then)',
   correct:'음악을 듣고 공부해요',
   wrongs:['음악을 들어서 공부해요','공부하고 음악을 들어요','음악을 듣지만 공부해요']},

  {s1_ko:'학교에 가요', s1_ro:'Merg la școală.',   s1_en:'I go to school.',
   s2_ko:'공부해요',    s2_ro:'Studiez.',            s2_en:'I study.',
   conn:'-아/어서', conn_ro:'deci (cauzal)', conn_en:'so (causal)',
   correct:'학교에 가서 공부해요',
   wrongs:['학교에 가고 공부해요','공부해서 학교에 가요','학교에 가지만 공부해요']},

  {s1_ko:'카페에 가요',   s1_ro:'Merg la cafenea.',  s1_en:'I go to the café.',
   s2_ko:'커피를 마셔요', s2_ro:'Beau cafea.',        s2_en:'I drink coffee.',
   conn:'-아/어서', conn_ro:'deci (cauzal)', conn_en:'so (causal)',
   correct:'카페에 가서 커피를 마셔요',
   wrongs:['카페에 가고 커피를 마셔요','커피를 마셔서 카페에 가요','카페에 가지만 커피를 마셔요']},

  {s1_ko:'책을 사요',  s1_ro:'Cumpăr cartea.',     s1_en:'I buy the book.',
   s2_ko:'읽어요',     s2_ro:'Citesc.',             s2_en:'I read it.',
   conn:'-아/어서', conn_ro:'deci (cauzal)', conn_en:'so (causal)',
   correct:'책을 사서 읽어요',
   wrongs:['책을 사고 읽어요','읽어서 책을 사요','책을 사지만 읽어요']},

  {s1_ko:'음악을 들어요', s1_ro:'Ascult muzică.',   s1_en:'I listen to music.',
   s2_ko:'공부해요',      s2_ro:'Studiez.',          s2_en:'I study.',
   conn:'-지만', conn_ro:'dar (contrast)', conn_en:'but (contrast)',
   correct:'음악을 듣지만 공부해요',
   wrongs:['음악을 들어서 공부해요','음악을 듣고 공부해요','공부하지만 음악을 들어요']},

  {s1_ko:'말해요',  s1_ro:'Vorbesc.',              s1_en:'I speak.',
   s2_ko:'잘 들어요', s2_ro:'Ascult atent.',       s2_en:'I listen carefully.',
   conn:'-지만', conn_ro:'dar (contrast)', conn_en:'but (contrast)',
   correct:'말하지만 잘 들어요',
   wrongs:['말해서 잘 들어요','말하고 잘 들어요','잘 들어서 말해요']},
];

var UI = {
  ro:{
    title:'Antrenament',
    tabConjug:'🔤 Conjugare',
    tabExt:'🔗 Extindere',
    question:'Alege forma corectă:',
    extInstruct:'Combină propozițiile cu conectorul:',
    correct:'✅ Corect!',
    wrong:'❌ Greșit! Răspunsul corect:',
    next:'Următorul →',
    endTitle:'Secțiune completă!',
    endSub:'răspunsuri corecte din',
    endStreak:'Cel mai lung streak: 🔥',
    restart:'Reia secțiunea',
    tense:{pres:'PREZENT',past:'TRECUT',fut:'VIITOR'},
  },
  en:{
    title:'Drill',
    tabConjug:'🔤 Conjugation',
    tabExt:'🔗 Extension',
    question:'Choose the correct form:',
    extInstruct:'Combine the sentences using the connector:',
    correct:'✅ Correct!',
    wrong:'❌ Wrong! Correct answer:',
    next:'Next →',
    endTitle:'Section complete!',
    endSub:'correct answers out of',
    endStreak:'Best streak: 🔥',
    restart:'Restart section',
    tense:{pres:'PRESENT',past:'PAST',fut:'FUTURE'},
  }
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
var state = {
  lang: 'ro',
  section: 'conjug',
  conjQueue: [],
  conjIdx: 0,
  extQueue: [],
  extIdx: 0,
  answered: false,
  correct: 0,
  wrong: 0,
  streak: 0,
  maxStreak: 0,
};

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function getForm(verbKo, tense){
  var c = window.Conjugation;
  if(!c) return verbKo;
  if(tense==='pres') return c.present(verbKo);
  if(tense==='past') return c.past(verbKo);
  return c.future(verbKo);
}

function buildConjOptions(verbKo, tense){
  var correct = getForm(verbKo, tense);
  var other1  = getForm(verbKo, tense==='pres'?'past':tense==='past'?'fut':'pres');
  var other2  = getForm(verbKo, tense==='pres'?'fut':tense==='past'?'pres':'past');
  var pool = [correct, other1, other2];
  var others = shuffle(DRILL_VERBS.filter(function(v){return v.ko!==verbKo;}));
  for(var i=0;i<others.length&&pool.length<4;i++){
    var f = getForm(others[i].ko, tense);
    if(pool.indexOf(f)===-1) pool.push(f);
  }
  return {correct:correct, options:shuffle(pool.slice(0,4))};
}

function buildConjQueue(){
  var q=[];
  DRILL_VERBS.forEach(function(v){
    ['pres','past','fut'].forEach(function(t){ q.push({verb:v,tense:t}); });
  });
  return shuffle(q);
}

function cur(){return UI[state.lang];}

/* ══════════════════════════════════════
   SCORE UI
══════════════════════════════════════ */
function updateScore(){
  document.getElementById('scoreCorrect').textContent = state.correct;
  document.getElementById('scoreWrong').textContent   = state.wrong;
  document.getElementById('scoreStreak').textContent  = state.streak;
}

function updateProgress(){
  var total, idx;
  if(state.section==='conjug'){
    total = state.conjQueue.length; idx = state.conjIdx;
  } else {
    total = state.extQueue.length; idx = state.extIdx;
  }
  var pct = total ? Math.round(idx/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = idx+' / '+total;
}

/* ══════════════════════════════════════
   RENDER — CONJUGATION
══════════════════════════════════════ */
function renderConjCard(){
  var area = document.getElementById('cardArea');
  var q = state.conjQueue[state.conjIdx];
  if(!q){ renderSummary(); return; }

  var ui = cur();
  var lang = state.lang;
  var data = buildConjOptions(q.verb.ko, q.tense);
  var tenseClass = q.tense;
  var tenseLabel = ui.tense[q.tense];

  var optHtml = data.options.map(function(opt){
    return '<button class="optBtn" data-val="'+escH(opt)+'" data-correct="'+escH(data.correct)+'">' + escH(opt) + '</button>';
  }).join('');

  area.innerHTML =
    '<div class="drillCard">' +
      '<div class="verbBlock">' +
        '<div class="verbKo">'+escH(q.verb.ko)+'</div>' +
        '<div class="verbTr">'+escH(q.verb[lang])+'</div>' +
      '</div>' +
      '<div style="text-align:center"><span class="tenseTag '+tenseClass+'">'+escH(tenseLabel)+'</span></div>' +
      '<div class="questionText">'+escH(ui.question)+'</div>' +
      '<div class="optGrid">'+optHtml+'</div>' +
      '<div class="feedbackRow"><span class="feedbackTxt" id="feedbackTxt"></span></div>' +
      '<button class="nextBtn" id="nextBtn">'+escH(ui.next)+'</button>' +
    '</div>';

  area.querySelectorAll('.optBtn').forEach(function(btn){
    btn.addEventListener('click', function(){ handleConjAnswer(btn, data.correct); });
  });
  document.getElementById('nextBtn').addEventListener('click', function(){
    state.conjIdx++;
    state.answered = false;
    renderConjCard();
    updateProgress();
  });
  updateProgress();
}

function handleConjAnswer(btn, correct){
  if(state.answered) return;
  state.answered = true;
  var chose = btn.getAttribute('data-val');
  var isOk = chose === correct;

  if(isOk){ state.correct++; state.streak++; if(state.streak>state.maxStreak) state.maxStreak=state.streak; }
  else     { state.wrong++;  state.streak=0; }

  document.querySelectorAll('.optBtn').forEach(function(b){
    b.disabled = true;
    if(b.getAttribute('data-val')===correct) b.classList.add('reveal');
  });
  if(isOk) btn.classList.add('correct');
  else     btn.classList.add('wrong');

  var fb = document.getElementById('feedbackTxt');
  if(isOk){ fb.textContent=cur().correct; fb.className='feedbackTxt ok'; }
  else     { fb.textContent=cur().wrong+' '+correct; fb.className='feedbackTxt ko'; }

  document.getElementById('nextBtn').classList.add('visible');
  updateScore();
}

/* ══════════════════════════════════════
   RENDER — EXTENSION
══════════════════════════════════════ */
function renderExtCard(){
  var area = document.getElementById('cardArea');
  var ex = state.extQueue[state.extIdx];
  if(!ex){ renderSummary(); return; }

  var ui = cur();
  var lang = state.lang;
  var opts = shuffle([ex.correct].concat(ex.wrongs));

  var optHtml = opts.map(function(opt){
    return '<button class="extOptBtn" data-val="'+escH(opt)+'" data-correct="'+escH(ex.correct)+'">'+escH(opt)+'</button>';
  }).join('');

  area.innerHTML =
    '<div class="drillCard">' +
      '<div class="extHeader">'+escH(ui.extInstruct)+'</div>' +
      '<div class="sentencePair">' +
        '<div class="sentBox"><div class="sentKo">'+escH(ex.s1_ko)+'</div><div class="sentTr">'+escH(ex['s1_'+lang])+'</div></div>' +
        '<div class="sentBox"><div class="sentKo">'+escH(ex.s2_ko)+'</div><div class="sentTr">'+escH(ex['s2_'+lang])+'</div></div>' +
      '</div>' +
      '<span class="connTag">'+escH(ex.conn)+' — '+escH(ex['conn_'+lang])+'</span>' +
      '<div class="extOptGrid">'+optHtml+'</div>' +
      '<div class="feedbackRow"><span class="feedbackTxt" id="feedbackTxt"></span></div>' +
      '<button class="nextBtn" id="nextBtn">'+escH(ui.next)+'</button>' +
    '</div>';

  area.querySelectorAll('.extOptBtn').forEach(function(btn){
    btn.addEventListener('click', function(){ handleExtAnswer(btn, ex.correct); });
  });
  document.getElementById('nextBtn').addEventListener('click', function(){
    state.extIdx++;
    state.answered = false;
    renderExtCard();
    updateProgress();
  });
  updateProgress();
}

function handleExtAnswer(btn, correct){
  if(state.answered) return;
  state.answered = true;
  var chose = btn.getAttribute('data-val');
  var isOk = chose === correct;

  if(isOk){ state.correct++; state.streak++; if(state.streak>state.maxStreak) state.maxStreak=state.streak; }
  else     { state.wrong++;  state.streak=0; }

  document.querySelectorAll('.extOptBtn').forEach(function(b){
    b.disabled = true;
    if(b.getAttribute('data-val')===correct) b.classList.add('reveal');
  });
  if(isOk) btn.classList.add('correct');
  else     btn.classList.add('wrong');

  var fb = document.getElementById('feedbackTxt');
  if(isOk){ fb.textContent=cur().correct; fb.className='feedbackTxt ok'; }
  else     { fb.textContent=cur().wrong+' '+correct; fb.className='feedbackTxt ko'; }

  document.getElementById('nextBtn').classList.add('visible');
  updateScore();
}

/* ══════════════════════════════════════
   RENDER — SUMMARY
══════════════════════════════════════ */
function renderSummary(){
  var area = document.getElementById('cardArea');
  var ui = cur();
  var total = state.correct + state.wrong;
  var pct = total ? Math.round(state.correct/total*100) : 0;
  var emoji = pct>=90?'🏆':pct>=70?'⭐':pct>=50?'👍':'💪';

  area.innerHTML =
    '<div class="summaryCard">' +
      '<div class="summaryEmoji">'+emoji+'</div>' +
      '<div class="summaryScore">'+state.correct+' / '+total+'</div>' +
      '<div class="summaryTotal">'+escH(ui.endSub)+' '+total+' ('+pct+'%)</div>' +
      '<div class="summaryStreak">'+escH(ui.endStreak)+' '+state.maxStreak+'</div>' +
      '<button class="restartBtn" id="restartBtn">'+escH(ui.restart)+'</button>' +
    '</div>';

  document.getElementById('restartBtn').addEventListener('click', function(){
    restartSection();
  });
  document.getElementById('progressFill').style.width='100%';
}

/* ══════════════════════════════════════
   SECTION SWITCH
══════════════════════════════════════ */
function restartSection(){
  state.correct=0; state.wrong=0; state.streak=0; state.maxStreak=0; state.answered=false;
  if(state.section==='conjug'){ state.conjQueue=buildConjQueue(); state.conjIdx=0; renderConjCard(); }
  else { state.extQueue=shuffle(EXT.slice()); state.extIdx=0; renderExtCard(); }
  updateScore(); updateProgress();
}

function setSection(sec){
  state.section = sec;
  document.getElementById('tabConjug').classList.toggle('active', sec==='conjug');
  document.getElementById('tabExt').classList.toggle('active', sec==='ext');
  restartSection();
}

/* ══════════════════════════════════════
   LANG
══════════════════════════════════════ */
function setLang(lang){
  state.lang = lang;
  localStorage.setItem('RK_LANG', lang);
  document.getElementById('btnRo').classList.toggle('active', lang==='ro');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  document.getElementById('pageTitle').textContent = cur().title;
  document.getElementById('tabConjug').textContent = cur().tabConjug;
  document.getElementById('tabExt').textContent    = cur().tabExt;
  if(state.section==='conjug') renderConjCard();
  else renderExtCard();
}

function escH(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function init(){
  state.lang = localStorage.getItem('RK_LANG') || 'ro';
  state.conjQueue = buildConjQueue();
  state.extQueue  = shuffle(EXT.slice());

  document.getElementById('btnRo').classList.toggle('active', state.lang==='ro');
  document.getElementById('btnEn').classList.toggle('active', state.lang==='en');
  document.getElementById('pageTitle').textContent = cur().title;
  document.getElementById('tabConjug').textContent = cur().tabConjug;
  document.getElementById('tabExt').textContent    = cur().tabExt;

  document.getElementById('btnRo').addEventListener('click', function(){ setLang('ro'); });
  document.getElementById('btnEn').addEventListener('click', function(){ setLang('en'); });
  document.getElementById('tabConjug').addEventListener('click', function(){ setSection('conjug'); });
  document.getElementById('tabExt').addEventListener('click', function(){ setSection('ext'); });

  renderConjCard();
  updateScore();
}

init();
</script>

<script src="js/core/dark-mode.js"></script>
</body>
</html>
